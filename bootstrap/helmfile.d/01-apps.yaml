---
# yaml-language-server: $schema=https://json.schemastore.org/helmfile

helmDefaults:
  cleanupOnFail: true
  wait: true
  waitForJobs: true

releases:
  - name: cilium
    namespace: kube-system
    atomic: true
    chart: oci://quay.io/cilium/charts/cilium
    version: 1.19.5
    values: ["../templates/values.yaml.gotmpl"]
    hooks:
      - # Wait for cilium CRDs to be available
        events: ["postsync"]
        command: bash
        args:
          - -c
          - until kubectl --context={{ requiredEnv "CLUSTER" }} get crd ciliumloadbalancerippools.cilium.io ciliumbgpadvertisements.cilium.io ciliumbgppeerconfigs.cilium.io ciliumbgpclusterconfigs.cilium.io &>/dev/null; do sleep 5; done
        showlogs: true
      - # Advertise Kubernetes VIP
        events: ["postsync"]
        command: kubectl
        args:
          - --context={{ requiredEnv "CLUSTER" }}
          - apply
          - --namespace=kube-system
          - --server-side
          - --field-manager=kustomize-controller
          - --filename={{ requiredEnv "CLUSTER_APPS" }}/kube-system/cilium/networking.yaml
        showlogs: true

  - name: coredns
    namespace: kube-system
    atomic: true
    chart: oci://ghcr.io/coredns/charts/coredns
    version: 1.46.0
    values: ["../templates/values.yaml.gotmpl"]
    needs: ["kube-system/cilium"]

  - name: cert-manager
    namespace: cert-manager
    atomic: true
    chart: oci://quay.io/jetstack/charts/cert-manager
    version: v1.20.3
    values: ["../templates/values.yaml.gotmpl"]
    needs: ["kube-system/coredns"]

  - name: external-secrets
    namespace: external-secrets
    atomic: true
    chart: oci://ghcr.io/external-secrets/charts/external-secrets
    version: 2.7.0
    values: ["../templates/values.yaml.gotmpl"]
    needs: ["cert-manager/cert-manager"]

  - name: onepassword-connect
    namespace: external-secrets
    atomic: true
    chart: oci://ghcr.io/1password/connect
    version: 2.4.1
    values: ["../templates/values.yaml.gotmpl"]
    needs: ["external-secrets/external-secrets"]
    hooks:
      - # Wait for ClusterSecretStore CRD to be available
        events: ["postsync"]
        command: bash
        args:
          - -c
          - until kubectl --context={{ requiredEnv "CLUSTER" }} get crd clustersecretstores.external-secrets.io &>/dev/null; do sleep 5; done
        showlogs: true
      - # Apply ClusterSecretStore so Flux finds it Ready on first reconcile
        events: ["postsync"]
        command: kubectl
        args:
          - --context={{ requiredEnv "CLUSTER" }}
          - apply
          - --server-side
          - --force-conflicts
          - --filename=../../kubernetes/apps/base/external-secrets/onepassword-connect/clustersecretstore.yaml
        showlogs: true

  - name: flux-operator
    namespace: flux-system
    atomic: true
    chart: oci://ghcr.io/controlplaneio-fluxcd/charts/flux-operator
    version: 0.53.0
    values: ["../templates/values.yaml.gotmpl"]
    needs: ["external-secrets/onepassword-connect"]

  - name: flux-instance
    namespace: flux-system
    atomic: true
    chart: oci://ghcr.io/controlplaneio-fluxcd/charts/flux-instance
    version: 0.53.0
    values: ["../templates/flux-values.yaml.gotmpl"]
    needs: ["flux-system/flux-operator"]

---
# yaml-language-server: $schema=https://json.schemastore.org/helmfile

# This helmfile is for installing Custom Resource Definitions (CRDs) from Helm charts.
# It is not intended to be used with helmfile apply or sync.

helmDefaults:
  args: ['--include-crds', '--no-hooks'] # Prevent helmfile apply or sync

releases:
  - name: cloudflare-dns
    namespace: network
    chart: oci://ghcr.io/home-operations/charts-mirror/external-dns
    version: 1.20.0

  - name: external-secrets
    namespace: external-secrets
    chart: oci://ghcr.io/external-secrets/charts/external-secrets
    version: 2.4.1

  - name: envoy-gateway
    namespace: network
    chart: oci://mirror.gcr.io/envoyproxy/gateway-helm
    version: v1.7.2

  - name: grafana-operator
    namespace: observability
    chart: oci://ghcr.io/grafana/helm-charts/grafana-operator
    version: 5.22.2

  - name: envoy-ai-gateway
    namespace: llm
    chart: oci://mirror.gcr.io/envoyproxy/ai-gateway-crds-helm
    version: v0.5.0

  - name: kube-prometheus-stack
    namespace: observability
    chart: oci://ghcr.io/prometheus-community/charts/kube-prometheus-stack
    version: 84.4.0

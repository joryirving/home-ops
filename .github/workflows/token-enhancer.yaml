name: Build Token Enhancer

on:
  workflow_dispatch:
  push:
    tags:
      - 'token-enhancer/**'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      packages: write
      contents: read

    steps:
      - name: Checkout token-enhancer
        uses: actions/checkout@v4
        with:
          repository: Boof-Pack/token-enhancer
          path: token-enhancer

      - name: Copy Dockerfile
        run: cp ${{ github.workspace }}/.github/token-enhancer/Dockerfile token-enhancer/

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/containers/token-enhancer
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=sha,prefix=

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ./token-enhancer
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

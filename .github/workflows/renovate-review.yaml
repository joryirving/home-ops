---
name: Renovate PR Review (AI Deep)

on:
  pull_request:
    branches: ["main"]
    types: [opened, reopened, synchronize, ready_for_review]

concurrency:
  group: renovate-review-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write

jobs:
  review-renovate-pr:
    name: Deep Renovate Review
    if: github.event.pull_request.user.login == 'smurf-bot[bot]'
    runs-on: home-ops-runner-main
    timeout-minutes: 35

    env:
      REPO: ${{ github.repository }}
      PR_NUMBER: ${{ github.event.pull_request.number }}
      HEAD_SHA: ${{ github.event.pull_request.head.sha }}
      AI_BASE_URL: ${{ vars.AI_BASE_URL || 'http://llama-35b.llm:8080/v1' }}
      AI_MODEL: ${{ vars.AI_MODEL || 'qwen35b' }}
      AI_FALLBACK_BASE_URL: ${{ vars.AI_FALLBACK_BASE_URL || 'http://ollama.llm:11434/v1' }}
      AI_FALLBACK_MODEL: ${{ vars.AI_FALLBACK_MODEL || 'qwen3.5:9b' }}
      AI_PRIMARY_RETRIES: ${{ vars.AI_PRIMARY_RETRIES || '8' }}
      AI_PRIMARY_RETRY_DELAY_SEC: ${{ vars.AI_PRIMARY_RETRY_DELAY_SEC || '15' }}

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Configure 1password
        uses: 1password/load-secrets-action/configure@92467eb28f72e8255933372f1e0707c567ce2259 # v4.0.0
        with:
          connect-host: ${{ secrets.dashboardsCONNECT_HOST || secrets.OP_CONNECT_HOST }}
          connect-token: ${{ secrets.dashboardsCONNECT_TOKEN || secrets.OP_CONNECT_TOKEN }}

      - name: Get Secrets
        uses: 1password/load-secrets-action@92467eb28f72e8255933372f1e0707c567ce2259 # v4.0.0
        with:
          export-env: true
        env:
          BOT_APP_ID: op://Kubernetes/openclaw/MISO_BOT_ID
          BOT_APP_PRIVATE_KEY: op://Kubernetes/openclaw/MISO_BOT_PRIVATE_KEY

      - name: Generate bot token (miso-assistant)
        id: app-token
        uses: actions/create-github-app-token@f8d387b68d61c58ab83c6c016672934102569859 # v3.0.0
        with:
          app-id: ${{ env.BOT_APP_ID }}
          private-key: ${{ env.BOT_APP_PRIVATE_KEY }}

      - name: Prefer bot token for GitHub API/reviews
        run: |
          set -euo pipefail
          echo "GH_TOKEN=${{ steps.app-token.outputs.token }}" >> "$GITHUB_ENV"

      - name: Validate runtime dependencies
        run: |
          set -euo pipefail
          command -v gh >/dev/null
          command -v jq >/dev/null
          command -v curl >/dev/null
          command -v git >/dev/null

      - name: Validate AI config
        run: |
          set -euo pipefail
          : "${AI_BASE_URL:?Missing variable AI_BASE_URL}"
          : "${AI_MODEL:?Missing variable AI_MODEL}"

          : "${AI_FALLBACK_BASE_URL:?Missing variable AI_FALLBACK_BASE_URL}"
          : "${AI_FALLBACK_MODEL:?Missing variable AI_FALLBACK_MODEL}"

      - name: Collect PR context
        run: |
          set -euo pipefail

          gh pr view "$PR_NUMBER" --repo "$REPO" \
            --json number,title,body,headRefOid,baseRefName,headRefName,author,changedFiles,additions,deletions,files,url > pr.json

          gh pr diff "$PR_NUMBER" --repo "$REPO" > pr.diff
          head -c 140000 pr.diff > pr.diff.truncated

          gh api "repos/$REPO/pulls/$PR_NUMBER/files" --paginate > pr-files.raw.json
          jq '[.[] | {filename,status,additions,deletions,changes,previous_filename,patch}]' pr-files.raw.json > pr-files.json
          head -c 70000 pr-files.json > pr-files.truncated.json

          jq -r '.body // ""' pr.json > pr-body.txt

          cat pr-body.txt pr.diff.truncated \
            | grep -Eo 'https?://[^ )]+' \
            | sed 's/[",.;]$//' \
            | sort -u \
            | head -n 25 > urls.txt || true

          grep -E '^[+-].*(image:|tag:|version:|chart:|appVersion:|digest:)' pr.diff.truncated > version-hints.txt || true
          head -n 180 version-hints.txt > version-hints.truncated.txt || true

      - name: Gather linked sources
        run: |
          set -euo pipefail

          : > linked-sources.md
          if [ ! -s urls.txt ]; then
            echo "No URLs found in PR body/diff." > linked-sources.md
            exit 0
          fi

          TARGET_VERSION="$(jq -r '.title' pr.json | sed -n 's/.*→ *v\?\([0-9][0-9.]*\).*/\1/p' | head -n1)"
          if [ -z "$TARGET_VERSION" ]; then
            TARGET_VERSION="$(grep -Eo 'v?[0-9]+\.[0-9]+\.[0-9]+' version-hints.truncated.txt 2>/dev/null | sed 's/^v//' | tail -n1 || true)"
          fi

          : > seen-repos.txt
          i=0
          while IFS= read -r url; do
            [ -z "$url" ] && continue
            i=$((i+1))
            [ "$i" -gt 25 ] && break

            normalized_url="$(printf '%s' "$url" | sed -E 's#^https?://redirect.github.com/#https://github.com/#')"

            {
              echo "## Source $i"
              echo "URL: $url"
              if [ "$normalized_url" != "$url" ]; then
                echo "Normalized URL: $normalized_url"
              fi
              echo
              echo "### Fetched Content (truncated)"
            } >> linked-sources.md

            if curl -fsSL -L --max-time 25 "$normalized_url" -o source.raw 2>/dev/null; then
              head -c 5000 source.raw | tr '\0' ' ' > source.tmp
              if [ -s source.tmp ]; then
                echo '```text' >> linked-sources.md
                cat source.tmp >> linked-sources.md
                echo >> linked-sources.md
                echo '```' >> linked-sources.md
              else
                echo "(No content captured from URL)" >> linked-sources.md
              fi
            else
              echo "(Failed to fetch URL content)" >> linked-sources.md
            fi

            if [[ "$normalized_url" =~ ^https?://github\.com/([^/]+)/([^/]+)/releases/tag/([^/?#]+) ]]; then
              owner="${BASH_REMATCH[1]}"
              repo="${BASH_REMATCH[2]}"
              tag="${BASH_REMATCH[3]}"

              echo >> linked-sources.md
              echo "### GitHub Release Metadata: $owner/$repo@$tag" >> linked-sources.md

              if gh api "repos/$owner/$repo/releases/tags/$tag" > gh-release.json 2>/dev/null; then
                jq '{tag_name,name,published_at,html_url,body}' gh-release.json > gh-release.filtered.json
                echo '```json' >> linked-sources.md
                head -c 5000 gh-release.filtered.json >> linked-sources.md
                echo >> linked-sources.md
                echo '```' >> linked-sources.md
              else
                echo "(Could not fetch release metadata for tag $tag)" >> linked-sources.md
              fi

              if gh api "repos/$owner/$repo/releases?per_page=8" > gh-releases.json 2>/dev/null; then
                jq '[.[] | {tag_name,name,published_at,html_url}]' gh-releases.json > gh-releases.filtered.json
                echo "### Recent Releases" >> linked-sources.md
                echo '```json' >> linked-sources.md
                head -c 3000 gh-releases.filtered.json >> linked-sources.md
                echo >> linked-sources.md
                echo '```' >> linked-sources.md
              fi
            fi

            if [[ "$normalized_url" =~ ^https?://github\.com/([^/]+)/([^/]+)/compare/([^?#]+)$ ]]; then
              owner="${BASH_REMATCH[1]}"
              repo="${BASH_REMATCH[2]}"
              compare_spec="${BASH_REMATCH[3]}"

              echo >> linked-sources.md
              echo "### GitHub Compare Metadata: $owner/$repo@$compare_spec" >> linked-sources.md

              if gh api "repos/$owner/$repo/compare/$compare_spec" > gh-compare.json 2>/dev/null; then
                jq '{html_url,status,ahead_by,behind_by,total_commits,commits:[.commits[]? | {sha,commit:{message,author,date}}]}' gh-compare.json > gh-compare.filtered.json
                echo '```json' >> linked-sources.md
                head -c 7000 gh-compare.filtered.json >> linked-sources.md
                echo >> linked-sources.md
                echo '```' >> linked-sources.md

                jq '[.files[]? | {filename,status,additions,deletions,changes,patch}]' gh-compare.json > gh-compare.files.json
                echo "### GitHub Compare Files" >> linked-sources.md
                echo '```json' >> linked-sources.md
                head -c 7000 gh-compare.files.json >> linked-sources.md
                echo >> linked-sources.md
                echo '```' >> linked-sources.md
              else
                echo "(Could not fetch compare metadata for $owner/$repo@$compare_spec)" >> linked-sources.md
              fi
            fi

            if [[ "$normalized_url" =~ ^https?://github\.com/([^/]+)/([^/?#]+) ]]; then
              owner="${BASH_REMATCH[1]}"
              repo="${BASH_REMATCH[2]}"
              repo_key="$owner/$repo"

              if ! grep -qx "$repo_key" seen-repos.txt 2>/dev/null; then
                echo "$repo_key" >> seen-repos.txt

                echo >> linked-sources.md
                echo "### GitHub Releases Enrichment: $repo_key" >> linked-sources.md

                if gh api "repos/$owner/$repo/releases?per_page=30" > gh-releases.repo.json 2>/dev/null; then
                  jq '[.[] | {tag_name,name,published_at,html_url}]' gh-releases.repo.json > gh-releases.repo.filtered.json
                  echo "#### Recent Releases (tags)" >> linked-sources.md
                  echo '```json' >> linked-sources.md
                  head -c 5000 gh-releases.repo.filtered.json >> linked-sources.md
                  echo >> linked-sources.md
                  echo '```' >> linked-sources.md

                  if [ -n "$TARGET_VERSION" ]; then
                    jq --arg v "$TARGET_VERSION" '
                      [ .[]
                        | select(
                            ((.tag_name // "" | ascii_downcase) | contains(($v | ascii_downcase)))
                            or
                            ((.name // "" | ascii_downcase) | contains(($v | ascii_downcase)))
                          )
                        | {tag_name,name,published_at,html_url,body}
                      ][:5]
                    ' gh-releases.repo.json > gh-releases.target.filtered.json
                    if [ "$(jq 'length' gh-releases.target.filtered.json)" -gt 0 ]; then
                      echo "#### Releases matching target version $TARGET_VERSION" >> linked-sources.md
                      echo '```json' >> linked-sources.md
                      head -c 8000 gh-releases.target.filtered.json >> linked-sources.md
                      echo >> linked-sources.md
                      echo '```' >> linked-sources.md
                    else
                      echo "(No release tags matched target version $TARGET_VERSION in $repo_key)" >> linked-sources.md
                    fi
                  fi
                else
                  echo "(Could not fetch releases list for $repo_key)" >> linked-sources.md
                fi
              fi
            fi

            echo >> linked-sources.md
          done < urls.txt


      - name: Gather image digest provenance context
        run: |
          set -euo pipefail

          python3 - <<'PY2'
          import json
          import re
          from pathlib import Path
          from urllib import parse
          import subprocess

          diff_path = Path("pr.diff.truncated")
          out_path = Path("image-digest-context.md")

          def parse_diff(diff_text: str):
              current_file = ""
              current_repo = ""
              buckets = {}

              for raw in diff_text.splitlines():
                  m_file = re.match(r"^diff --git a/(.+?) b/(.+)$", raw)
                  if m_file:
                      current_file = m_file.group(2)
                      current_repo = ""
                      continue

                  m_repo = re.match(r'^[ +\-]?\s*repository:\s*[\'"]?([^\'"\s,]+)', raw)
                  if m_repo:
                      current_repo = m_repo.group(1)
                      continue

                  m_tag = re.match(r'^([+-])\s*tag:\s*[\'"]?([^\'"\s,]+)', raw)
                  if m_tag:
                      sign = m_tag.group(1)
                      tag_val = m_tag.group(2)
                      m_digest = re.match(r"([^@\s]+)@sha256:([0-9a-f]{64})", tag_val)
                      if m_digest and current_repo:
                          tag_base = m_digest.group(1)
                          digest = f"sha256:{m_digest.group(2)}"
                          key = (current_file, current_repo, tag_base)
                          buckets.setdefault(key, {"old": [], "new": []})
                          buckets[key]["old" if sign == '-' else "new"].append(digest)
                      continue

                  m_image = re.match(r'^([+-])\s*image:\s*[\'"]?([^\'"\s,]+@sha256:[0-9a-f]{64})', raw)
                  if m_image:
                      sign = m_image.group(1)
                      image_ref = m_image.group(2)
                      repo_and_tag, digest = image_ref.split("@", 1)
                      digest = digest if digest.startswith("sha256:") else f"sha256:{digest}"
                      repo = repo_and_tag
                      tag_base = "(inline-image)"
                      if ":" in repo_and_tag.rsplit("/", 1)[-1]:
                          repo, tag_base = repo_and_tag.rsplit(":", 1)
                      key = (current_file, repo, tag_base)
                      buckets.setdefault(key, {"old": [], "new": []})
                      buckets[key]["old" if sign == '-' else "new"].append(digest)

              changes = []
              for (file_path, repo, tag_base), vals in buckets.items():
                  pairs = min(len(vals["old"]), len(vals["new"]))
                  for i in range(pairs):
                      old = vals["old"][i]
                      new = vals["new"][i]
                      if old != new:
                          changes.append(
                              {
                                  "file": file_path,
                                  "repository": repo,
                                  "tag": tag_base,
                                  "old_digest": old,
                                  "new_digest": new,
                              }
                          )
              return changes

          def http_json(url, headers=None):
              cmd = [
                  "curl",
                  "-fsSL",
                  "--connect-timeout",
                  "20",
                  "--max-time",
                  "40",
                  url,
              ]
              for key, value in (headers or {}).items():
                  cmd.extend(["-H", f"{key}: {value}"])
              raw = subprocess.check_output(cmd)
              return json.loads(raw.decode("utf-8", errors="replace"))

          def registry_targets(repo: str):
              if repo.startswith("docker.io/"):
                  repo_path = repo[len("docker.io/"):]
                  token_url = (
                      "https://auth.docker.io/token?service=registry.docker.io&scope="
                      + parse.quote(f"repository:{repo_path}:pull", safe=":")
                  )
                  base_url = "https://registry-1.docker.io"
                  return repo_path, token_url, base_url
              if repo.startswith("ghcr.io/"):
                  repo_path = repo[len("ghcr.io/"):]
                  token_url = (
                      "https://ghcr.io/token?scope="
                      + parse.quote(f"repository:{repo_path}:pull", safe=":")
                  )
                  base_url = "https://ghcr.io"
                  return repo_path, token_url, base_url
              if repo.count("/") == 1 and not repo.startswith(("quay.io/", "gcr.io/", "registry.k8s.io/")):
                  repo_path = repo
                  token_url = (
                      "https://auth.docker.io/token?service=registry.docker.io&scope="
                      + parse.quote(f"repository:{repo_path}:pull", safe=":")
                  )
                  base_url = "https://registry-1.docker.io"
                  return repo_path, token_url, base_url
              raise ValueError(f"unsupported registry for repo {repo}")

          def fetch_digest_metadata(repo: str, digest: str):
              result = {
                  "repository": repo,
                  "digest": digest,
                  "mediaType": None,
                  "configDigest": None,
                  "created": None,
                  "revision": None,
                  "source": None,
                  "version": None,
                  "refName": None,
                  "error": None,
                  "indexManifests": None,
              }
              try:
                  repo_path, token_url, base_url = registry_targets(repo)
                  token = http_json(token_url).get("token")
                  if not token:
                      raise RuntimeError("registry token unavailable")

                  accept = ", ".join(
                      [
                          "application/vnd.oci.image.manifest.v1+json",
                          "application/vnd.docker.distribution.manifest.v2+json",
                          "application/vnd.oci.image.index.v1+json",
                          "application/vnd.docker.distribution.manifest.list.v2+json",
                      ]
                  )
                  manifest = http_json(
                      f"{base_url}/v2/{repo_path}/manifests/{digest}",
                      headers={"Authorization": f"Bearer {token}", "Accept": accept},
                  )
                  result["mediaType"] = manifest.get("mediaType")

                  manifests = manifest.get("manifests")
                  if isinstance(manifests, list):
                      result["indexManifests"] = [
                          {
                              "digest": m.get("digest"),
                              "mediaType": m.get("mediaType"),
                              "platform": m.get("platform"),
                          }
                          for m in manifests[:6]
                      ]

                  config_digest = (manifest.get("config") or {}).get("digest")
                  result["configDigest"] = config_digest
                  if config_digest:
                      config = http_json(
                          f"{base_url}/v2/{repo_path}/blobs/{config_digest}",
                          headers={"Authorization": f"Bearer {token}"},
                      )
                      labels = (
                          (config.get("config") or {}).get("Labels")
                          or (config.get("container_config") or {}).get("Labels")
                          or {}
                      )
                      result["created"] = config.get("created")
                      result["revision"] = labels.get("org.opencontainers.image.revision")
                      result["source"] = labels.get("org.opencontainers.image.source")
                      result["version"] = labels.get("org.opencontainers.image.version")
                      result["refName"] = labels.get("org.opencontainers.image.ref.name")
              except Exception as exc:  # noqa: BLE001
                  result["error"] = str(exc)
              return result

          def github_repo_from_source(source: str | None):
              if not source:
                  return None
              src = source.strip()
              m = re.search(r"github\.com[:/](?P<owner>[^/\s]+)/(?P<repo>[^/\s?#]+)", src, re.IGNORECASE)
              if m:
                  owner = m.group("owner")
                  repo = m.group("repo")
                  if repo.endswith(".git"):
                      repo = repo[:-4]
                  return f"{owner}/{repo}"
              if re.match(r"^[A-Za-z0-9_.-]+/[A-Za-z0-9_.-]+$", src):
                  return src
              return None

          def guess_repo_from_image(image_repo: str):
              if image_repo.startswith("docker.io/"):
                  tail = image_repo[len("docker.io/"):]
              elif image_repo.startswith("ghcr.io/"):
                  tail = image_repo[len("ghcr.io/"):]
              else:
                  tail = image_repo
              parts = tail.split("/")
              if len(parts) >= 2:
                  return f"{parts[0]}/{parts[1]}"
              return None

          def fetch_github_compare(repo: str | None, old_rev: str | None, new_rev: str | None):
              result = {
                  "repo": repo,
                  "old_revision": old_rev,
                  "new_revision": new_rev,
                  "status": None,
                  "ahead_by": None,
                  "behind_by": None,
                  "total_commits": None,
                  "html_url": None,
                  "commits": [],
                  "files": [],
                  "error": None,
                  "repo_source": None,
              }
              if not repo:
                  result["error"] = "repo unavailable"
                  return result
              if not old_rev or not new_rev:
                  result["error"] = "revision labels missing"
                  return result
              try:
                  data = http_json(
                      f"https://api.github.com/repos/{repo}/compare/{old_rev}...{new_rev}",
                      headers={
                          "Accept": "application/vnd.github+json",
                          "User-Agent": "home-ops-renovate-review",
                      },
                  )
                  result["status"] = data.get("status")
                  result["ahead_by"] = data.get("ahead_by")
                  result["behind_by"] = data.get("behind_by")
                  result["total_commits"] = data.get("total_commits")
                  result["html_url"] = data.get("html_url")
                  result["commits"] = [
                      {
                          "sha": (c.get("sha") or "")[:12],
                          "message": ((c.get("commit") or {}).get("message") or "").splitlines()[0],
                      }
                      for c in (data.get("commits") or [])[:15]
                  ]
                  result["files"] = [
                      {
                          "filename": f.get("filename"),
                          "status": f.get("status"),
                          "changes": f.get("changes"),
                      }
                      for f in (data.get("files") or [])[:20]
                  ]
              except Exception as exc:  # noqa: BLE001
                  result["error"] = str(exc)
              return result

          def short(value):
              if not value:
                  return "(unknown)"
              if isinstance(value, str) and len(value) > 120:
                  return value[:117] + "..."
              return str(value)

          changes = parse_diff(diff_path.read_text(encoding="utf-8", errors="replace")) if diff_path.exists() else []

          lines = []
          if not changes:
              lines.append("No image digest changes detected in PR diff.")
          else:
              lines.append("# Image Digest Provenance Analysis")
              lines.append("")
              for idx, change in enumerate(changes, start=1):
                  old_meta = fetch_digest_metadata(change["repository"], change["old_digest"])
                  new_meta = fetch_digest_metadata(change["repository"], change["new_digest"])

                  lines.append(f"## Image {idx}: {change['repository']}")
                  lines.append(f"- File: `{change['file']}`")
                  lines.append(f"- Tag/variant: `{change['tag']}`")
                  lines.append(f"- Old digest: `{change['old_digest']}`")
                  lines.append(f"- New digest: `{change['new_digest']}`")
                  lines.append(f"- Old revision: `{short(old_meta.get('revision'))}`")
                  lines.append(f"- New revision: `{short(new_meta.get('revision'))}`")
                  lines.append(f"- Old created: `{short(old_meta.get('created'))}`")
                  lines.append(f"- New created: `{short(new_meta.get('created'))}`")
                  lines.append(f"- Old source: `{short(old_meta.get('source'))}`")
                  lines.append(f"- New source: `{short(new_meta.get('source'))}`")

                  old_rev = old_meta.get("revision")
                  new_rev = new_meta.get("revision")
                  if old_rev and new_rev:
                      if old_rev != new_rev:
                          lines.append("- Revision changed: **yes** (new code revision present)")
                      else:
                          lines.append("- Revision changed: **no** (likely rebuild/republish of same source revision)")
                  else:
                      lines.append("- Revision changed: **unknown** (missing OCI revision labels)")

                  old_repo = github_repo_from_source(old_meta.get("source"))
                  new_repo = github_repo_from_source(new_meta.get("source"))
                  compare_repo = None
                  compare_repo_source = ""
                  if old_repo and new_repo and old_repo == new_repo:
                      compare_repo = old_repo
                      compare_repo_source = "oci-source-label"
                  elif old_repo and not new_repo:
                      compare_repo = old_repo
                      compare_repo_source = "oci-source-label-old"
                  elif new_repo and not old_repo:
                      compare_repo = new_repo
                      compare_repo_source = "oci-source-label-new"
                  elif old_repo and new_repo and old_repo != new_repo:
                      lines.append(f"- Root repo mismatch between old/new labels: `{old_repo}` vs `{new_repo}`")
                  if not compare_repo:
                      guessed = guess_repo_from_image(change["repository"])
                      if guessed:
                          compare_repo = guessed
                          compare_repo_source = "image-repo-heuristic"

                  compare = fetch_github_compare(compare_repo, old_rev, new_rev)
                  compare["repo_source"] = compare_repo_source or None

                  lines.append(f"- Root repo for commit compare: `{short(compare_repo)}` (source: `{short(compare_repo_source or 'none')}`)")
                  if compare.get("html_url"):
                      lines.append(f"- Commit compare URL: {compare['html_url']}")
                  if compare.get("total_commits") is not None:
                      lines.append(
                          f"- Compare summary: status={short(compare.get('status'))}, total_commits={short(compare.get('total_commits'))}, ahead_by={short(compare.get('ahead_by'))}, behind_by={short(compare.get('behind_by'))}"
                      )
                  elif compare.get("error"):
                      lines.append(f"- Compare lookup: **unavailable** ({short(compare.get('error'))})")

                  commits = compare.get("commits") or []
                  if commits:
                      lines.append("- Commits between old/new revision:")
                      for c in commits:
                          lines.append(f"  - `{short(c.get('sha'))}` {short(c.get('message'))}")

                  files = compare.get("files") or []
                  if files:
                      lines.append("- Changed files in root repo compare (first 20):")
                      for f in files:
                          lines.append(
                              f"  - `{short(f.get('filename'))}` status={short(f.get('status'))} changes={short(f.get('changes'))}"
                          )

                  lines.append("- Old digest metadata:")
                  lines.append("```json")
                  lines.append(json.dumps(old_meta, indent=2))
                  lines.append("```")
                  lines.append("- New digest metadata:")
                  lines.append("```json")
                  lines.append(json.dumps(new_meta, indent=2))
                  lines.append("```")
                  lines.append("")

          out_path.write_text("\n".join(lines) + "\n", encoding="utf-8")
          PY2

      - name: Gather repo impact + history context
        run: |
          set -euo pipefail

          {
            jq -r '.title, (.body // "")' pr.json
            cat version-hints.truncated.txt 2>/dev/null || true
          } \
            | tr '[:upper:]' '[:lower:]' \
            | grep -Eo '[a-z0-9][a-z0-9._/-]{2,}' \
            | grep -Ev '^(https?|from|into|that|this|with|without|renovate|pull|request|release|notes|digest|sha|main|chart|image|version|kubernetes|github|com|www|docker|ghcr|io)$' \
            | sort -u \
            | head -n 14 > terms.txt || true

          : > repo-impact.md
          : > repo-history.md

          if [ ! -s terms.txt ]; then
            echo "No candidate dependency terms extracted." > repo-impact.md
            echo "No candidate dependency terms extracted." > repo-history.md
            exit 0
          fi

          while IFS= read -r term; do
            [ -z "$term" ] && continue

            {
              echo "## Term: $term"
              echo
              echo "### git grep hits"
              echo '```text'
              git grep -n -- "$term" -- \
                kubernetes \
                .github \
                docs \
                2>/dev/null | head -n 60 || true
              echo '```'
              echo
            } >> repo-impact.md

            {
              echo "## Term: $term"
              echo
              echo "### git log context"
              echo '```text'
              git log --oneline --decorate --grep="$term" -n 10 || true
              echo '```'
              echo
            } >> repo-history.md
          done < terms.txt

          head -c 45000 repo-impact.md > repo-impact.truncated.md
          head -c 20000 repo-history.md > repo-history.truncated.md

      - name: Build review corpus
        run: |
          set -euo pipefail

          {
            echo "# PR Metadata"
            echo '```json'
            jq . pr.json
            echo '```'
            echo
            echo "# PR Files (truncated)"
            echo '```json'
            cat pr-files.truncated.json
            echo
            echo '```'
            echo
            echo "# Version Hints from Diff"
            echo '```text'
            cat version-hints.truncated.txt 2>/dev/null || echo "(none)"
            echo '```'
            echo
            echo "# PR Diff (truncated)"
            echo '```diff'
            cat pr.diff.truncated
            echo
            echo '```'
            echo
            echo "# Linked Sources"
            cat linked-sources.md
            echo
            echo "# Image Digest Provenance"
            cat image-digest-context.md
            echo
            echo "# Repository Impact Scan"
            cat repo-impact.truncated.md
            echo
            echo "# Repository History"
            cat repo-history.truncated.md
          } > review-corpus.md

          head -c 220000 review-corpus.md > review-corpus.truncated.md

      - name: Analyze with local AI model
        id: analyze
        run: |
          set -euo pipefail

          SYSTEM_PROMPT="You research dependency upgrades in Renovate pull requests and produce a GitHub PR review. You do NOT modify files. This is a Flux GitOps Kubernetes repository. Use ONLY the provided corpus (PR metadata, diff, linked sources, image digest provenance, repo impact scan, repo history). Do not invent facts. Method: identify upgrades (including wrapper vs upstream), trace release/changelog evidence, map findings to actual repo usage, classify breaking changes/deprecations/new features, then choose verdict approve or request_changes. Never claim an upgrade is safe solely because it is a minor/patch bump. For digest-only image updates (same tag, new sha256), analyze OCI metadata (revision/source/created) and explicitly state whether provenance shows code change vs rebuild. If evidence quality is weak or fetches fail, explicitly say what evidence is missing and keep the recommendation conservative. Return STRICT JSON with keys verdict, review_markdown, and packages[]. review_markdown must be fully human-readable markdown with summary/recommendation, per-package sections, sources, and an Unknowns/Needs verification section if evidence is incomplete."

          jq -n             --arg model "$AI_MODEL"             --arg system "$SYSTEM_PROMPT"             --arg user "Analyze this Renovate PR corpus and return STRICT JSON."             --rawfile corpus review-corpus.truncated.md             '{model:$model,messages:[{role:"system",content:$system},{role:"user",content:($user + "\n\n" + $corpus)}],temperature:0.1}' > ai-request.primary.json

          # Smaller corpus for CPU fallback model
          head -c 120000 review-corpus.md > review-corpus.fallback.truncated.md
          jq -n             --arg model "$AI_FALLBACK_MODEL"             --arg system "$SYSTEM_PROMPT"             --arg user "Analyze this Renovate PR corpus and return STRICT JSON."             --rawfile corpus review-corpus.fallback.truncated.md             '{model:$model,messages:[{role:"system",content:$system},{role:"user",content:($user + "\n\n" + $corpus)}],temperature:0.1}' > ai-request.fallback.json

          parse_and_validate() {
            local response_file="$1"
            jq -r '.choices[0].message.content // empty' "$response_file" > ai-output.raw
            sed -e 's/^```json$//' -e 's/^```$//' ai-output.raw | sed '/^$/d' > ai-output.json
            jq . ai-output.json > /dev/null
            jq -e '.verdict == "approve" or .verdict == "request_changes"' ai-output.json > /dev/null
            jq -e '.review_markdown and (.review_markdown | length > 0)' ai-output.json > /dev/null
          }

          PRIMARY_OK=0
          ATTEMPT=1
          while [ "$ATTEMPT" -le "$AI_PRIMARY_RETRIES" ]; do
            echo "Primary model attempt ${ATTEMPT}/${AI_PRIMARY_RETRIES}: $AI_MODEL @ $AI_BASE_URL"
            if curl -fsSL "$AI_BASE_URL/chat/completions"               -H "Content-Type: application/json"               --data @ai-request.primary.json > ai-response.primary.json               && parse_and_validate ai-response.primary.json; then
              PRIMARY_OK=1
              break
            fi

            echo "Primary model attempt $ATTEMPT failed; waiting ${AI_PRIMARY_RETRY_DELAY_SEC}s" >&2
            ATTEMPT=$((ATTEMPT + 1))
            sleep "$AI_PRIMARY_RETRY_DELAY_SEC"
          done

          if [ "$PRIMARY_OK" -eq 1 ]; then
            ANALYSIS_ENGINE="$AI_MODEL@$AI_BASE_URL"
            echo "Primary model succeeded"
          else
            echo "Primary model unavailable after retries; trying fallback: $AI_FALLBACK_MODEL @ $AI_FALLBACK_BASE_URL" >&2
            curl -fsSL "$AI_FALLBACK_BASE_URL/chat/completions"               -H "Content-Type: application/json"               --data @ai-request.fallback.json > ai-response.fallback.json
            parse_and_validate ai-response.fallback.json
            ANALYSIS_ENGINE="$AI_FALLBACK_MODEL@$AI_FALLBACK_BASE_URL"
            echo "Fallback model succeeded" >&2
          fi

          echo "analysis_engine=$ANALYSIS_ENGINE" >> "$GITHUB_OUTPUT"

      - name: Build final review body
        run: |
          set -euo pipefail

          jq -r '.review_markdown' ai-output.json > review-body.md

      - name: Upsert automated review comment
        run: |
          set -euo pipefail
          REVIEW_MARKER='<!-- renovate-review-bot -->'

          VERDICT=$(jq -r '.verdict' ai-output.json)
          if [ "$VERDICT" = "request_changes" ]; then
            VERDICT_PREFIX="⚠️ **Automated recommendation: REQUEST CHANGES**"
          else
            VERDICT_PREFIX="✅ **Automated recommendation: APPROVE**"
          fi

          {
            echo "$REVIEW_MARKER"
            echo "<!-- renovate-review-sha:${HEAD_SHA} -->"
            echo "$VERDICT_PREFIX"
            echo
            echo "_Analysis engine: ${{ steps.analyze.outputs.analysis_engine }}_"
            echo
            cat review-body.md
          } > review-comment.md

          gh pr comment "$PR_NUMBER" --repo "$REPO" --edit-last --create-if-none --body-file review-comment.md

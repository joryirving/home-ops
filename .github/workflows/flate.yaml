---
# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
name: Flate

on:
  pull_request:
    branches: ["main"]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  filter:
    name: Flate - Filter
    runs-on: ubuntu-latest
    outputs:
      changed-files: ${{ steps.changed-files.outputs.changed_files }}
    steps:
      - name: Get Changed Files
        id: changed-files
        uses: bjw-s-labs/action-changed-files@a9a36fb08ce06db9b02fbd8026cc2c0945eb9841 # v0.6.0
        with:
          patterns: kubernetes/**/*

  flate:
    if: ${{ needs.filter.outputs.changed-files != '[]' }}
    needs: filter
    name: Flate - ${{ matrix.cluster }} - ${{ matrix.kind }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    strategy:
      matrix:
        cluster: ["main", "test", "utility"]
        kind: ["helmrelease", "kustomization"]
      fail-fast: false
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Install Flate
        uses: home-operations/flate/action@0.2.6
        with:
          base: origin/${{ github.event.repository.default_branch }}
          cache: "true"
          version: "0.2.6"

      - name: Run Flate
        id: flate
        env:
          CLUSTER: ${{ matrix.cluster }}
          FLATE_ALLOW_MISSING_SECRETS: "true"
          FLATE_CONCURRENCY: "4"
          FLATE_OUTPUT: diff
          FLATE_PATH: ./kubernetes/clusters/${{ matrix.cluster }}
          FLATE_SKIP_SCHEMA_VALIDATION: "true"
          KIND: ${{ matrix.kind }}
        run: |
          set -euo pipefail
          output="$CLUSTER-$KIND.diff"
          for attempt in 1 2 3; do
            if flate diff "$KIND" > "$output"; then
              break
            fi
            if [[ "$attempt" -eq 3 ]]; then
              exit 1
            fi
            echo "flate diff failed; retrying in 20s (${attempt}/3)" >&2
            sleep 20
          done
          if [[ -s "$output" ]]; then
            echo "has_diff=true" >> "$GITHUB_OUTPUT"
          else
            rm -f "$output"
            echo "has_diff=false" >> "$GITHUB_OUTPUT"
          fi

      - if: ${{ steps.flate.outputs.has_diff == 'true' }}
        name: Upload diff
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: flate-diff-${{ matrix.cluster }}-${{ matrix.kind }}
          path: ${{ matrix.cluster }}-${{ matrix.kind }}.diff
          retention-days: 1

      - if: ${{ steps.flate.outputs.has_diff == 'true' }}
        name: Generate Token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        id: app-token
        with:
          client-id: ${{ secrets.BOT_APP_ID }}
          private-key: ${{ secrets.BOT_APP_PRIVATE_KEY }}
          permission-pull-requests: write

      - if: ${{ steps.flate.outputs.has_diff == 'true' }}
        name: Add or Update Comment
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          github-token: ${{ steps.app-token.outputs.token }}
          script: |
            const fs = require('fs');
            const { owner, repo } = context.repo;
            const issue_number = context.issue.number;
            const cluster = '${{ matrix.cluster }}';
            const kind = '${{ matrix.kind }}';
            const title = `${cluster} ${kind}`;
            const marker = `<!-- flate-${cluster}-${kind} -->`;
            const runUrl = `${context.serverUrl}/${owner}/${repo}/actions/runs/${context.runId}`;
            const diff = fs.readFileSync(`${cluster}-${kind}.diff`, 'utf8');
            const LIMIT = 65000;
            const inline = [
              marker,
              `## ${title}`,
              `<details open><summary>Diff</summary>`,
              ``,
              "```diff",
              diff,
              "```",
              ``,
              `</details>`,
              ``,
              `<sub>Diff created by [flate](https://github.com/home-operations/flate) - [Workflow run](${runUrl})</sub>`,
            ].join("\n");
            const linked = [
              marker,
              `## ${title}`,
              `<details><summary>Diff (${diff.length.toLocaleString()} chars - too large to post)</summary>`,
              ``,
              `Download the artifact from the [workflow run](${runUrl}).`,
              ``,
              `</details>`,
              ``,
              `<sub>Diff created by [flate](https://github.com/home-operations/flate) - [Workflow run](${runUrl})</sub>`,
            ].join("\n");
            const body = inline.length <= LIMIT ? inline : linked;
            const comments = await github.paginate(github.rest.issues.listComments, {
              owner, repo, issue_number, per_page: 100,
            });
            const existing = comments.find(c => c.body?.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({ owner, repo, comment_id: existing.id, body });
            } else {
              await github.rest.issues.createComment({ owner, repo, issue_number, body });
            }

  success:
    if: ${{ !cancelled() }}
    needs: flate
    name: Flate - Success
    runs-on: ubuntu-latest
    steps:
      - name: Any jobs failed?
        if: ${{ contains(needs.*.result, 'failure') }}
        run: exit 1

      - name: All jobs passed or skipped?
        if: ${{ !(contains(needs.*.result, 'failure')) }}
        run: echo "All jobs passed or skipped" && echo "${{ toJSON(needs.*.result) }}"

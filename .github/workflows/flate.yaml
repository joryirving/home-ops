---
# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
name: Flate

on:
  pull_request:
    branches: ["main"]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  filter:
    name: Flate - Filter
    runs-on: ubuntu-latest
    outputs:
      changed-files: ${{ steps.changed-files.outputs.changed_files }}
    steps:
      - name: Get Changed Files
        id: changed-files
        uses: bjw-s-labs/action-changed-files@a9a36fb08ce06db9b02fbd8026cc2c0945eb9841 # v0.6.0
        with:
          patterns: kubernetes/**/*

  flate:
    if: ${{ needs.filter.outputs.changed-files != '[]' }}
    needs: filter
    name: Flate - ${{ matrix.cluster }} - ${{ matrix.kind }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        cluster: ["main", "test", "utility"]
        kind: ["helmrelease", "kustomization"]
      fail-fast: false
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Setup Mise
        uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4.0.1
        with:
          cache: false
          tool_versions: |
            github:home-operations/flate latest

      - name: Create baseline worktree
        env:
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
        run: |
          base="$(git merge-base HEAD "origin/$DEFAULT_BRANCH")"
          git worktree add --detach ../baseline "$base"

      - name: Run flate test
        env:
          CLUSTER: ${{ matrix.cluster }}
          KIND: ${{ matrix.kind }}
        run: |
          orig="../baseline/kubernetes/clusters/$CLUSTER"
          [ -d "$orig" ] || orig="$(mktemp -d)"
          flate test "$KIND" \
            --path ./kubernetes/clusters/"$CLUSTER" \
            --path-orig "$orig"

      - name: Run flate diff
        env:
          CLUSTER: ${{ matrix.cluster }}
          KIND: ${{ matrix.kind }}
        run: |
          orig="../baseline/kubernetes/clusters/$CLUSTER"
          [ -d "$orig" ] || orig="$(mktemp -d)"
          flate diff "$KIND" \
            --path ./kubernetes/clusters/"$CLUSTER" \
            --path-orig "$orig" \
            > "$CLUSTER-$KIND.diff"
          [ -s "$CLUSTER-$KIND.diff" ] || rm "$CLUSTER-$KIND.diff"

      - if: ${{ hashFiles(format('{0}-{1}.diff', matrix.cluster, matrix.kind)) != '' }}
        name: Upload diff
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: flate-diff-${{ matrix.cluster }}-${{ matrix.kind }}
          path: ${{ matrix.cluster }}-${{ matrix.kind }}.diff
          retention-days: 1

  comment:
    if: ${{ !cancelled() && needs.flate.result != 'skipped' }}
    needs: flate
    name: Flate - Comment - ${{ matrix.cluster }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    strategy:
      matrix:
        cluster: ["main", "test", "utility"]
      fail-fast: false
    steps:
      - name: Download diffs
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: flate-diff-${{ matrix.cluster }}-*
          merge-multiple: true

      - if: ${{ hashFiles(format('{0}-*.diff', matrix.cluster)) != '' }}
        name: Generate Token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        id: app-token
        with:
          client-id: ${{ secrets.BOT_APP_ID }}
          private-key: ${{ secrets.BOT_APP_PRIVATE_KEY }}
          permission-pull-requests: write

      - if: ${{ hashFiles(format('{0}-*.diff', matrix.cluster)) != '' }}
        name: Add or Update Comment
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          github-token: ${{ steps.app-token.outputs.token }}
          script: |
            const fs = require('fs');
            const read = (path) => { try { return fs.readFileSync(path, 'utf8'); } catch { return ''; } };
            const { owner, repo } = context.repo;
            const issue_number = context.issue.number;
            const cluster = '${{ matrix.cluster }}';
            const marker = `<!-- flate-${cluster} -->`;
            const runUrl = `${context.serverUrl}/${owner}/${repo}/actions/runs/${context.runId}`;

            const diffs = {};
            for (const f of fs.readdirSync('.').filter(f => f.startsWith(cluster) && f.endsWith('.diff'))) {
              const content = read(f);
              if (content.trim()) {
                const kind = f.replace(cluster + '-', '').replace('.diff', '');
                diffs[kind.charAt(0).toUpperCase() + kind.slice(1)] = content;
              }
            }
            const LIMIT = 65000;

            const inlineSection = (label, diff) => [
              `<details open><summary>${label} diff</summary>`,
              ``,
              "```diff",
              diff,
              "```",
              ``,
              `</details>`,
            ];
            const linkedSection = (label, diff) => [
              `<details><summary>${label} diff (${diff.length.toLocaleString()} chars — too large to post)</summary>`,
              ``,
              `Diff exceeds GitHub's comment size limit. Download the artifact from the [workflow run](${runUrl}).`,
              ``,
              `</details>`,
            ];

            const present = Object.entries(diffs).filter(([, diff]) => diff.trim());
            const linked = new Set();
            const render = () => [
              marker,
              `## ${cluster.charAt(0).toUpperCase() + cluster.slice(1)}`,
              ...present.flatMap(([label, diff]) =>
                linked.has(label) ? linkedSection(label, diff) : inlineSection(label, diff)),
              ``,
              `<sub>Diff created by [flate](https://github.com/home-operations/flate) — [Workflow run](${runUrl})</sub>`,
            ].join("\n");
            for (const [label] of [...present].sort((a, b) => b[1].length - a[1].length)) {
              if (render().length <= LIMIT) break;
              linked.add(label);
            }

            const body = render();

            const comments = await github.paginate(github.rest.issues.listComments, {
              owner, repo, issue_number, per_page: 100,
            });
            const existing = comments.find(c => c.body?.includes(marker));

            if (existing) {
              await github.rest.issues.updateComment({ owner, repo, comment_id: existing.id, body });
            } else {
              await github.rest.issues.createComment({ owner, repo, issue_number, body });
            }

  success:
    if: ${{ !cancelled() }}
    needs:
      - flate
      - comment
    name: Flate - Success
    runs-on: ubuntu-latest
    steps:
      - name: Any jobs failed?
        if: ${{ contains(needs.*.result, 'failure') }}
        run: exit 1

      - name: All jobs passed or skipped?
        if: ${{ !(contains(needs.*.result, 'failure')) }}
        run: echo "All jobs passed or skipped" && echo "${{ toJSON(needs.*.result) }}"

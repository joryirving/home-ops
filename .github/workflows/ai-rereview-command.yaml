---
name: AI Re-review Command

# Privileged comment handler. It ONLY authorizes the commenter and relays to a
# workflow_dispatch of ai-pr-review.yaml — it never checks out the PR head, so
# attacker-controllable code never lands on this secret-bearing runner. This is
# kept in its own file so the review workflow's `on:` does not list
# issue_comment (CodeQL taints an entire workflow file that combines a
# privileged trigger with a PR-head checkout).

on:
  issue_comment:
    types: [created]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.issue.number }}
  cancel-in-progress: true

permissions:
  contents: read
  actions: write
  pull-requests: write

jobs:
  authorize:
    name: Authorize /ai-review
    if: ${{ github.event.issue.pull_request != null && contains(github.event.comment.body, '/ai-review') }}
    runs-on: ubuntu-latest
    steps:
      - name: Generate bot token
        id: app-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          client-id: ${{ secrets.SAFFRON_CLIENT_ID }}
          private-key: ${{ secrets.SAFFRON_APP_PRIVATE_KEY }}

      # Gate script ships with the action; taken from a pinned ref, never the PR head.
      - name: Check out re-review command gate
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          repository: misospace/pr-reviewer-action
          ref: bfe54bcac9959ca258da86482caa0f7b16d681c3 # v1.2.8
          path: .ai-review-gate
          persist-credentials: false

      - name: Authorize re-review command
        id: cmd
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          REPO: ${{ github.repository }}
          COMMENT_BODY: ${{ github.event.comment.body }}
          COMMENTER_LOGIN: ${{ github.event.comment.user.login }}
          IS_PR_COMMENT: ${{ github.event.issue.pull_request != null }}
        run: bash .ai-review-gate/scripts/parse_review_command.sh

      - name: Dispatch re-review
        if: steps.cmd.outputs.should_review == 'true'
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          PR_NUMBER: ${{ github.event.issue.number }}
          COMMENT_ID: ${{ github.event.comment.id }}
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
        run: |
          gh workflow run ai-pr-review.yaml --ref "$DEFAULT_BRANCH" -f pr_number="$PR_NUMBER"
          gh api "repos/${GITHUB_REPOSITORY}/issues/comments/${COMMENT_ID}/reactions" -f content=rocket --silent || true

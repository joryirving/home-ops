---
name: Renovate PR Review (AI Deep)

on:
  pull_request:
    branches: ["main"]
    types: [opened, reopened, synchronize, ready_for_review]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write

jobs:
  review-renovate-pr:
    name: Deep Renovate Review
    if: ${{ !github.event.pull_request.draft }}
    runs-on: home-ops-runner-main
    timeout-minutes: 35

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Decide whether to skip review
        id: version-check
        run: |
          set -euo pipefail
          echo "skip_review=false" >> "$GITHUB_OUTPUT"

      - name: Generate bot token (miso-assistant)
        if: steps.version-check.outputs.skip_review != 'true'
        id: app-token
        uses: actions/create-github-app-token@1b10c78c7865c340bc4f6099eb2f838309f1e8c3 # v3.1.1
        with:
          client-id: ${{ secrets.BOT_APP_ID }}
          private-key: ${{ secrets.BOT_APP_PRIVATE_KEY }}

      - name: Analyze PR with reusable AI reviewer
        if: steps.version-check.outputs.skip_review != 'true'
        id: analyze
        uses: misospace/pr-reviewer-action@75da928ffcffa84ba56320e19ea370a20436bf18 # v1.0.10
        with:
          github_token: ${{ steps.app-token.outputs.token }}
          ai_primary_retries: '8'
          ai_primary_retry_delay_sec: '15'
          ai_base_url: 'https://api.minimax.io/v1'
          ai_model: 'MiniMax-M2.7'
          ai_api_key: ${{ secrets.OPENAI_COMPATIBLE_API_KEY }}
          allowed_source_hosts: 'github.com,api.github.com,gitlab.com,registry.terraform.io,artifacthub.io,minecraft.net,www.minecraft.net,talos.dev,www.talos.dev'
          context_limit_mode: normal
          tool_mode: plan_execute_once
          tool_max_requests: '4'
          tool_planning_timeout_sec: '45'
          tool_planning_max_context_bytes: '15000'
          tool_planning_max_tokens: '300'
          tool_max_response_bytes: '12000'
          tool_allowed_gh_api_repos: 'siderolabs/kubelet,siderolabs/talos'
          tool_request_timeout_sec: '15'
          tool_failure_enforcement: 'true'
          tool_min_successful_requests: '1'
          tool_enable_for_forks: 'false'
          standards_file_candidates: 'AGENTS.md,.agents/*'
          publish_review_comment: 'true'
          comment_marker: <!-- renovate-review-bot -->

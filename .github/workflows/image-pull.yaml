---
# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
name: Image Pull

on:
  pull_request:
    branches: ["main"]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  filter:
    name: Image Pull - Filter
    runs-on: ubuntu-latest
    outputs:
      changed-files: ${{ steps.changed-files.outputs.changed_files }}
    steps:
      - name: Get Changed Files
        id: changed-files
        uses: bjw-s-labs/action-changed-files@a9a36fb08ce06db9b02fbd8026cc2c0945eb9841 # v0.6.0
        with:
          patterns: kubernetes/**/*

  diff:
    if: ${{ needs.filter.outputs.changed-files != '[]' }}
    needs: filter
    name: Image Pull - Diff Images
    runs-on: ubuntu-latest
    strategy:
      matrix:
        cluster: ["main", "utility"]
      fail-fast: false
    steps:
      - name: Checkout Pull Request Branch
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          path: pull

      - name: Checkout Default Branch
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          ref: ${{ github.event.repository.default_branch }}
          path: default

      - name: Setup Mise
        uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4.0.1
        with:
          tool_versions: |
            github:home-operations/flate 0.1.3

      - name: Diff Images
        env:
          CLUSTER: ${{ matrix.cluster }}
        run: |
          flate diff images \
            --output json \
            --output-file images.json \
            --path ./pull/kubernetes/clusters/"$CLUSTER" \
            --path-orig ./default/kubernetes/clusters/"$CLUSTER"

      - name: Summarize
        env:
          CLUSTER: ${{ matrix.cluster }}
        run: |
          echo "## New images for cluster \`$CLUSTER\`" >> $GITHUB_STEP_SUMMARY
          echo '```json' >> $GITHUB_STEP_SUMMARY
          jq '.' images.json >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

      - name: Upload Image List
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: diff-${{ matrix.cluster }}
          path: images.json

  pull:
    needs: diff
    name: Image Pull - Pull Images
    runs-on: ${{ format('home-ops-runner-{0}', matrix.cluster) }}
    strategy:
      matrix:
        cluster: ["main", "utility"]
      fail-fast: false
    steps:
      - name: Download Diff
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: diff-${{ matrix.cluster }}
          path: .

      - name: Install talosctl
        run: |
          for attempt in 1 2 3; do
            if curl -fsSL https://talos.dev/install | sh; then
              exit 0
            fi
            if [[ "$attempt" -eq 3 ]]; then
              exit 1
            fi
            echo "talosctl install failed; retrying in 20s (${attempt}/3)..." >&2
            sleep 20
          done

      - name: Pull Images
        run: |
          images=$(jq -r '.[]' images.json)
          if [[ -z "$images" ]]; then
            echo "No images to pull for cluster ${{ matrix.cluster }}"
            exit 0
          fi
          for image in $images; do
            echo "Pulling $image"
            for attempt in 1 2 3; do
              if talosctl --nodes $NODE image pull "$image"; then
                break
              fi
              if [[ "$attempt" -eq 3 ]]; then
                exit 1
              fi
              echo "Image pull failed for $image; retrying in 20s (${attempt}/3)..." >&2
              sleep 20
            done
          done

  success:
    if: ${{ !cancelled() }}
    needs: pull
    name: Image Pull - Success
    runs-on: ubuntu-latest
    steps:
      - name: Any jobs failed?
        if: ${{ contains(needs.*.result, 'failure') }}
        run: exit 1

      - name: All jobs passed or skipped?
        if: ${{ !(contains(needs.*.result, 'failure')) }}
        run: echo "All jobs passed or skipped" && echo "${{ toJSON(needs.*.result) }}"

---
# yaml-language-server: $schema=https://kube-schemas.pages.dev/postgresql.cnpg.io/cluster_v1.json
apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: ${APP}
  annotations:
    # Required for same-path/same-serverName rebuilds via bootstrap.recovery.
    # The default check blocks recovery when the destination archive is non-empty,
    # which is exactly the case when the rebuilt cluster reuses the same Barman
    # path. Safe here because the recovered cluster inherits the source's
    # system_identifier and writes new WAL on a new timeline (no name collisions).
    cnpg.io/skipEmptyWalArchiveCheck: enabled
spec:
  instances: 3
  imageName: ghcr.io/cloudnative-pg/postgresql:17.4
  primaryUpdateStrategy: unsupervised
  enableSuperuserAccess: true
  minSyncReplicas: 1
  maxSyncReplicas: 1
  storage:
    storageClass: local-hostpath
    size: 5Gi
  affinity:
    nodeAffinity:
      requiredDuringSchedulingIgnoredDuringExecution:
        nodeSelectorTerms:
          - matchExpressions:
              - key: topology.kubernetes.io/gpus
                operator: DoesNotExist
    topologyKey: kubernetes.io/hostname
    podAntiAffinityType: required
  postgresql:
    parameters:
      max_connections: "500"
      max_wal_size: "5GB"
      synchronous_commit: "on"
  bootstrap:
    initdb:
      database: ${POSTGRES_USERNAME:=${APP}}
      owner: ${POSTGRES_USERNAME:=${APP}}
      import:
        type: ${CNPG_IMPORT_TYPE:=microservice}
        databases:
          - ${POSTGRES_USERNAME:=${APP}}
        source:
          externalCluster: &source ${APP}-cpgo
        pgDumpExtraOptions:
          - --exclude-extension=pg_stat_statements
          - --exclude-extension=pgaudit
          - --exclude-schema=pgbouncer
  externalClusters:
    - name: *source
      connectionParameters:
        host: ${APP}-primary
        user: postgres
        dbname: postgres
        sslmode: prefer
      password:
        name: ${APP}-pguser-postgres
        key: password
  backup:
    barmanObjectStore:
      destinationPath: s3://postgresql/${APP}
      serverName: ${APP}
      endpointURL: https://s3.jory.dev
      s3Credentials:
        accessKeyId:
          name: ${APP}-postgres
          key: AWS_ACCESS_KEY_ID
        secretAccessKey:
          name: ${APP}-postgres
          key: AWS_SECRET_ACCESS_KEY
        region:
          name: ${APP}-postgres
          key: AWS_REGION
      wal:
        compression: bzip2
      data:
        compression: bzip2
    retentionPolicy: 7d
  monitoring:
    enablePodMonitor: true

---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/postgresql.cnpg.io/cluster_v1.json
apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: ${APP}
  annotations:
    # Required for same-path/same-serverName rebuilds via bootstrap.recovery.
    # The default check blocks recovery when the destination archive is non-empty,
    # which is exactly the case when the rebuilt cluster reuses the same Barman
    # path. Safe here because the recovered cluster inherits the source's
    # system_identifier and writes new WAL on a new timeline (no name collisions).
    cnpg.io/skipEmptyWalArchiveCheck: enabled
spec:
  instances: 3
  imageName: ghcr.io/cloudnative-pg/postgresql:17.4
  primaryUpdateStrategy: unsupervised
  enableSuperuserAccess: true
  minSyncReplicas: 1
  maxSyncReplicas: 1
  storage:
    storageClass: local-hostpath
    size: 5Gi
  affinity:
    nodeAffinity:
      requiredDuringSchedulingIgnoredDuringExecution:
        nodeSelectorTerms:
          - matchExpressions:
              - key: topology.kubernetes.io/gpus
                operator: DoesNotExist
    topologyKey: kubernetes.io/hostname
    podAntiAffinityType: required
  postgresql:
    parameters:
      max_connections: "500"
      max_wal_size: "5GB"
      synchronous_commit: "on"
  bootstrap:
    recovery:
      source: &archive ${APP}-backup-archive
      database: ${APP}
      owner: ${APP}
  externalClusters:
    - name: *archive
      barmanObjectStore: &barman
        destinationPath: s3://postgresql/${APP}
        serverName: ${APP}
        endpointURL: https://s3.jory.dev
        s3Credentials:
          accessKeyId:
            name: ${APP}-postgres
            key: AWS_ACCESS_KEY_ID
          secretAccessKey:
            name: ${APP}-postgres
            key: AWS_SECRET_ACCESS_KEY
          region:
            name: ${APP}-postgres
            key: AWS_REGION
        wal:
          compression: bzip2
        data:
          compression: bzip2
  backup:
    barmanObjectStore: *barman
    retentionPolicy: 7d
  monitoring:
    enablePodMonitor: true

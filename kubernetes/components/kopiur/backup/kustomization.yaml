---
# yaml-language-server: $schema=https://json.schemastore.org/kustomization
apiVersion: kustomize.config.k8s.io/v1alpha1
kind: Component
resources:
  - ./pvc.yaml
  - ./restore.yaml
  - ./snapshotpolicy.yaml
  - ./snapshotschedule.yaml
patches:
  - target:
      group: helm.toolkit.fluxcd.io
      version: v2
      kind: HelmRelease
    patch: |-
      - op: add
        path: /spec/dependsOn/-
        value:
          name: kopiur
          namespace: storage
      - op: add
        path: /spec/dependsOn/-
        value:
          name: ${STORAGE_HR:=rook-ceph-cluster}
          namespace: ${STORAGE_NS:=rook-ceph}

---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: cluster-apps
  namespace: flux-system
spec:
  deletionPolicy: WaitForTermination
  interval: 1h
  path: ./kubernetes/apps/main
  postBuild:
    substitute:
      CLUSTER: main
      SECRET_DOMAIN: jory.dev
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
  wait: true
  patches:
    - # Add Kustomization defaults for all child Kustomizations
      patch: |-
        apiVersion: kustomize.toolkit.fluxcd.io/v1
        kind: Kustomization
        metadata:
          name: not-used
        spec:
          deletionPolicy: WaitForTermination
          postBuild:
            substitute:
              CLUSTER: ${CLUSTER}
              SECRET_DOMAIN: ${SECRET_DOMAIN}
          patches:
            - patch: |-
                apiVersion: helm.toolkit.fluxcd.io/v2
                kind: HelmRelease
                metadata:
                  name: not-used
                spec:
                  install:
                    crds: CreateReplace
                  rollback:
                    cleanupOnFail: true
                    recreate: true
                  timeout: 10m
                  upgrade:
                    cleanupOnFail: true
                    crds: CreateReplace
                    strategy:
                      name: RemediateOnFailure
                    remediation:
                      remediateLastFailure: true
                      retries: 2
              target:
                group: helm.toolkit.fluxcd.io
                kind: HelmRelease
      target:
        group: kustomize.toolkit.fluxcd.io
        kind: Kustomization
    - # Update Cert-manager replicas
      patch: |-
        apiVersion: kustomize.toolkit.fluxcd.io/v1
        kind: Kustomization
        metadata:
          name: not-used
        spec:
          patches:
            - patch: |-
                apiVersion: helm.toolkit.fluxcd.io/v2
                kind: HelmRelease
                metadata:
                  name: not-used
                spec:
                  values:
                    webhook:
                      replicaCount: 2
                      podDisruptionBudget:
                        enabled: true
              target:
                kind: HelmRelease
                name: cert-manager
      target:
        kind: Kustomization
        name: cert-manager
    - # Update Cilium Operator replicas
      patch: |-
        apiVersion: kustomize.toolkit.fluxcd.io/v1
        kind: Kustomization
        metadata:
          name: not-used
        spec:
          patches:
            - patch: |-
                apiVersion: helm.toolkit.fluxcd.io/v2
                kind: HelmRelease
                metadata:
                  name: not-used
                spec:
                  values:
                    cluster:
                      name: main
                    operator:
                      replicas: 2
              target:
                kind: HelmRelease
                name: cilium
      target:
        kind: Kustomization
        name: cilium
    - # Update CoreDNS replicas
      patch: |-
        apiVersion: kustomize.toolkit.fluxcd.io/v1
        kind: Kustomization
        metadata:
          name: not-used
        spec:
          patches:
            - patch: |-
                apiVersion: helm.toolkit.fluxcd.io/v2
                kind: HelmRelease
                metadata:
                  name: not-used
                spec:
                  values:
                    replicaCount: 3
              target:
                kind: HelmRelease
                name: coredns
      target:
        kind: Kustomization
        name: coredns
    - # Update External-Secrets replicas
      patch: |-
        apiVersion: kustomize.toolkit.fluxcd.io/v1
        kind: Kustomization
        metadata:
          name: not-used
        spec:
          patches:
            - patch: |-
                apiVersion: helm.toolkit.fluxcd.io/v2
                kind: HelmRelease
                metadata:
                  name: not-used
                spec:
                  values:
                    webhook:
                      replicaCount: 2
              target:
                kind: HelmRelease
                name: external-secrets
      target:
        kind: Kustomization
        name: external-secrets
    - # Net-new CNPG cluster: plain initdb (no Barman recovery).
      # Use the `components.postgres/cnpg=init` label on an app's Flux Kustomization
      # to mark it as a brand-new cluster with no existing data. The component
      # default is bootstrap.recovery from Barman; this label opts out for net-new
      # apps that have no backup yet to recover from.
      # $${...} escape preserves the variable through outer (cluster-apps) substitution
      # so the inner (app) Kustomization's postBuild can resolve APP/POSTGRES_USERNAME.
      patch: |-
        apiVersion: kustomize.toolkit.fluxcd.io/v1
        kind: Kustomization
        metadata:
          name: not-used
        spec:
          patches:
            - target:
                group: postgresql.cnpg.io
                version: v1
                kind: Cluster
              patch: |-
                - op: replace
                  path: /spec/bootstrap
                  value:
                    initdb:
                      database: $${POSTGRES_USERNAME:=$${APP}}
                      owner: $${POSTGRES_USERNAME:=$${APP}}
                - op: remove
                  path: /spec/externalClusters
      target:
        kind: Kustomization
        labelSelector: "components.postgres/cnpg=init"

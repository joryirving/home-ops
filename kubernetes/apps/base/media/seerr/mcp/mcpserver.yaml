---
# yaml-language-server: $schema=https://kube-schemas.pages.dev/toolhive.stacklok.dev/mcpserver_v1alpha1.json
apiVersion: toolhive.stacklok.dev/v1alpha1
kind: MCPServer
metadata:
  name: seerr-mcp
spec:
  image: docker.io/node:24-alpine
  transport: stdio
  proxyMode: streamable-http
  proxyPort: 8080
  env:
    - name: HOME
      value: /tmp
    - name: NPM_CONFIG_CACHE
      value: /tmp/.npm
    - name: SEERR_URL
      value: http://seerr.media:80
  secrets:
    - name: toolhive-seerr
      key: SEERR_API_KEY
      targetEnvName: SEERR_API_KEY
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      memory: 256Mi
  podTemplateSpec:
    spec:
      containers:
        - name: mcp
          image: docker.io/node:24-alpine
          command:
            - npx
          args:
            - -y
            - "@jhomen368/overseerr-mcp"
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
  groupRef: mcp-tools

---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: stash
spec:
  chartRef:
    kind: OCIRepository
    name: app-template
  interval: 15m
  dependsOn: []
  values:
    defaultPodOptions:
      resourceClaims:
      - name: gpu
        resourceClaimTemplateName: stash-gpu
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 100
        fsGroup: 100
        fsGroupChangePolicy: OnRootMismatch
    controllers:
      stash:
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          app:
            image:
              repository: stashapp/stash
              tag: 
                v0.31.1@sha256:df744af5a0c976e2ec671052ecc1f8a9aa757fa12b8f9930b59910b7295f0da6
            env:
              STASH_STASH: /media/
              STASH_BLOBS_PATH: /blobs
              STASH_BLOBS_STORAGE: FILESYSTEM
              STASH_GENERATED: /generated
              STASH_METADATA: /metadata
              STASH_CACHE: /cache
              STASH_PLUGINS_PATH: /plugins
              STASH_SCRAPERS_PATH: /scrapers
              STASH_CONFIG_FILE: /config/config.yml
              STASH_PORT: &port 9999
              STASH_NO_BROWSER: "true"
              USER: "1000"
              HOME: /config
              TZ: America/Edmonton
            probes:
              liveness: &probe
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /healthz
                    port: *port
              readiness: *probe
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities: {drop: ["ALL"]}
            resources:
              claims:
              - name: gpu
              requests:
                cpu: 20m
                memory: 512Mi
              limits:
                memory: 2Gi
    persistence:
      config:
        existingClaim: "{{ .Release.Name }}"
        globalMounts:
        - path: /config
          subPath: config
        - path: /blobs
          subPath: blobs
        - path: /generated
          subPath: generated
        - path: /metadata
          subPath: metadata
      media:
        type: nfs
        server: voyager.internal
        path: /mnt/akademiya/data/metube
      tmpfs:
        type: emptyDir
        advancedMounts:
          stash:
            app:
            - path: /cache
              subPath: cache
            - path: /root/.stash/logs
              subPath: logs
            - path: /tmp
              subPath: tmp
    route:
      app:
        hostnames: ["stash.jory.dev"]
        parentRefs:
        - name: envoy-internal
          namespace: network
    service:
      app:
        ports:
          http:
            port: *port

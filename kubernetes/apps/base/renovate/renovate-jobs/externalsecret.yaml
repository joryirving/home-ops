---
# yaml-language-server: $schema=https://kube-schemas.pages.dev/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: &name smurf-bot-pem
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword
  target:
    name: *name
  data:
    - secretKey: private_key_pem
      remoteRef:
        key: github-bot
        property: BOT_APP_PRIVATE_KEY
---
# yaml-language-server: $schema=https://kube-schemas.pages.dev/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: &name miso-bot-pem
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword
  target:
    name: *name
  data:
    - secretKey: private_key_pem
      remoteRef:
        key: miso-bot
        property: BOT_APP_PRIVATE_KEY
---
# yaml-language-server: $schema=https://kube-schemas.pages.dev/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: &name docker-hub-token
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword
  target:
    name: *name
    template:
      data:
        DOCKERHUB_USERNAME: "{{ .username }}"
        DOCKERHUB_TOKEN: "{{ .DOCKERHUB_TOKEN }}"
  dataFrom:
  - extract:
      key: dockerhub



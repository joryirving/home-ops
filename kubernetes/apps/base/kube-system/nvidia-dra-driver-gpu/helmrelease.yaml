---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: nvidia-dra-driver-gpu
spec:
  interval: 1h
  chart:
    spec:
      chart: nvidia-dra-driver-gpu
      version: 25.12.0
      sourceRef:
        kind: HelmRepository
        name: nvidia-dra-driver-gpu
  values:
    # Talos installs the proprietary driver via the nonfree-kmod-nvidia
    # system extension; its userspace libs live under /usr/local.
    nvidiaDriverRoot: /usr/local
    gpuResourcesEnabledOverride: true
    resources:
      # Multi-node NVLink "compute domains" (IMEX) — not applicable here.
      computeDomains:
        enabled: false
    kubeletPlugin:
      # No NFD in this cluster: target our static GPU node label instead of
      # the chart default (feature.node.kubernetes.io/pci-0300_10de.present).
      # The plugin only runs where the card physically is, so moving the card
      # is just a matter of moving the topology.kubernetes.io/gpus label.
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: topology.kubernetes.io/gpus
                    operator: In
                    values: ["nvidia"]

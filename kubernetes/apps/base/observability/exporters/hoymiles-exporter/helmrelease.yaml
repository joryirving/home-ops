---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app hoymiles-exporter
spec:
  chartRef:
    kind: OCIRepository
    name: hoymiles-exporter
  interval: 15m
  dependsOn: []
  values:
    controllers:
      hoymiles-exporter:
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          app:
            image:
              repository: ghcr.io/joryirving/hoymiles-exporter
              tag: 0.1.1@sha256:2de6a7d07c6842c77c6c001d05471f02a51ddaa8184ac1f2d9f72fcc02ee63c2
            env:
              DTU_HOST: solar.internal
              TZ: America/Edmonton
            probes:
              liveness:
                enabled: true
              readiness:
                enabled: true
              startup:
                enabled: true
            resources:
              limits:
                cpu: 100m
                memory: 200Mi
    service:
      app:
        ports:
          metrics:
            enabled: true
            protocol: TCP
            port: 9099
        annotations:
          external-dns.alpha.kubernetes.io/hostname: exporters.jory.dev

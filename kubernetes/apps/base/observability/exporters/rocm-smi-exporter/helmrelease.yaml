---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app rocm-smi-exporter
spec:
  chartRef:
    kind: OCIRepository
    name: rocm-smi-exporter
  interval: 15m
  dependsOn: []
  values:
    defaultPodOptions:
      nodeSelector:
        topology.kubernetes.io/gpus: amd
      securityContext:
        runAsGroup: 65534
        runAsNonRoot: true
        runAsUser: 65534
      tolerations:
        - key: llm-workload
          operator: Exists
          effect: NoSchedule
    controllers:
      rocm-smi-exporter:
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          app:
            image:
              repository: ghcr.io/joryirving/rocm-smi-exporter
              tag: 0.1.0@sha256:85b84c6464d53ee97a456c9276f454a52a4d496a5616926dae9cd098ec9e0488
            env:
              SYSFS_ROOT: /host/sys
              TZ: America/Edmonton
            probes:
              liveness: &probes
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /metrics
                    port: &port 9494
                  initialDelaySeconds: 0
                  periodSeconds: 30
                  timeoutSeconds: 5
              readiness: *probes
            resources:
              requests:
                cpu: 10m
              limits:
                memory: 64Mi
            securityContext:
              allowPrivilegeEscalation: false
              capabilities: { drop: ["ALL"] }
              readOnlyRootFilesystem: true
    persistence:
      sys:
        type: hostPath
        hostPath: /sys
        globalMounts:
          - path: /host/sys
            readOnly: true
    service:
      app:
        ports:
          metrics:
            enabled: true
            protocol: TCP
            port: *port

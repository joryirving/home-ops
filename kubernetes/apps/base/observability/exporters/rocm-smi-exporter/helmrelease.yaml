---
# yaml-language-server: $schema=https://kube-schemas.pages.dev/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app rocm-smi-exporter
spec:
  interval: 30m
  chart:
    spec:
      chart: app-template
      version: 4.6.2
      sourceRef:
        kind: HelmRepository
        name: bjw-s
        namespace: flux-system
  values:
    controllers:
      rocm-smi-exporter:
        containers:
          app:
            image:
              repository: ghcr.io/rudimk/rocm-smi-exporter
              tag: latest
              pullPolicy: IfNotPresent
            resources:
              requests:
                cpu: 25m
                memory: 64Mi
              limits:
                memory: 256Mi
            securityContext:
              privileged: true
        nodeSelector:
          kubernetes.io/hostname: skirk
          topology.kubernetes.io/gpus: amd
        tolerations:
          - key: llm-workload
            operator: Exists
            effect: NoSchedule
    service:
      app:
        controller: rocm-smi-exporter
        ports:
          metrics:
            port: 9393
    serviceMonitor:
      app:
        serviceName: rocm-smi-exporter
        endpoints:
          - port: metrics
            interval: 30s
            path: /metrics
    persistence:
      dev-dri:
        type: hostPath
        hostPath: /dev/dri
        globalMounts:
          - readOnly: true
      dev-kfd:
        type: hostPath
        hostPath: /dev/kfd
        globalMounts:
          - readOnly: true

---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app valheim
spec:
  chartRef:
    kind: OCIRepository
    name: app-template
  interval: 15m
  dependsOn: []
  values:
    defaultPodOptions:
      securityContext:
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
    controllers:
      valheim:
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          app:
            image:
              repository: ghcr.io/mbround18/valheim
              tag: 
                3.6.0@sha256:abb98466d453f128b96e41d9730cd52f2938013cae7980ce6d3dccc14168d228
            probes:
              liveness:
                enabled: false
              readiness:
                enabled: false
              startup:
                enabled: false
            env:
              NAME: "Tako Tuesday"
              WORLD: "Tako Tuesday"
              TZ: America/Edmonton
              Type: BepInEx # Installs BepInEx mod loader for down the road
              PORT: &port 2456
              MODIFIERS: deathpenalty=casual,portals=casual
              # AUTO_UPDATE: 1
              # AUTO_UPDATE_SCHEDULE: 0 4 * * *
              # AUTO_UPDATE_PAUSE_WITH_PLAYERS: 1
              PUBLIC: 0
            envFrom:
            - secretRef:
                name: "{{ .Release.Name }}"
            resources:
              requests:
                cpu: 10m
                memory: 1Gi
              limits:
                memory: 10Gi
    persistence:
      data:
        existingClaim: "{{ .Release.Name }}"
        globalMounts:
        - path: /home/steam/.config/unity3d/IronGate/Valheim/
        - path: /home/steam/valheim/
      tmp:
        type: emptyDir
        globalMounts:
        - path: /home/steam/backups/
        - path: /home/steam/.steam/
        - path: /home/steam/.local/
    service:
      app:
        type: LoadBalancer
        annotations:
          lbipam.cilium.io/ips: 10.69.10.42
        ports:
          http:
            port: 80
          gameplay:
            enabled: true
            port: *port
            protocol: UDP
          auth:
            enabled: true
            port: 2457
            protocol: UDP
          voip:
            enabled: true
            port: 2458
            protocol: UDP

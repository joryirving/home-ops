---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &name valheim
spec:
  chartRef:
    kind: OCIRepository
    name: app-template
  dependsOn: []
  interval: 15m
  values:
    controllers:
      valheim:
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          app:
            image:
              repository: ghcr.io/lloesche/valheim-server
              tag: latest
            env:
              TZ: America/Edmonton
              SERVER_NAME: Valhalla Awaits
              SERVER_PASSWORD: "{{ .VALHEIM_PASSWORD }}"
              SERVER_PORT: &game-port 2456
              QUERY_PORT: &query-port 2457
              VOICE_PORT: &voice-port 2458
              BACKUP_INTERVAL: 6
              BACKUPS_TO_KEEP: 3
              BACKUP_LOCATION: /config/backups
              Worlds: "{{ .VALHEIM_WORLD_NAME }}"
            envFrom:
              - secretRef:
                  name: "{{ .Release.Name }}"
            ports:
              - containerPort: *game-port
                protocol: UDP
                name: game
              - containerPort: *query-port
                protocol: UDP
                name: query
              - containerPort: *voice-port
                protocol: UDP
                name: voice
            probes:
              liveness:
                enabled: false
              readiness:
                enabled: false
              startup:
                enabled: false
            resources:
              requests:
                cpu: 1000m
                memory: 2Gi
              limits:
                memory: 4Gi
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities:
                drop: ["ALL"]
        pod:
          securityContext:
            runAsUser: 1000
            runAsGroup: 1000
            fsGroup: 1000
            fsGroupChangePolicy: OnRootMismatch
    service:
      app:
        type: LoadBalancer
        annotations:
          lbipam.cilium.io/ips: 10.69.10.40
        ports:
          game:
            protocol: UDP
            port: *game-port
          query:
            protocol: UDP
            port: *query-port
          voice:
            protocol: UDP
            port: *voice-port
    persistence:
      config:
        existingClaim: "{{ .Release.Name }}"
        globalMounts:
          - path: /config
      backups:
        existingClaim: "{{ .Release.Name }}-backups"
        globalMounts:
          - path: /config/backups

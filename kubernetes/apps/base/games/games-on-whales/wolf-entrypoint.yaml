# Shadows the GOW base-image /entrypoint.sh in the wolf sidecar (mounted via
# the alex User's volumes + sidecarPolicies.wolf.volumeMounts). The stock
# entrypoint runs the cont-init.d scripts and then gosu's to ${UNAME}, and the
# operator hardcodes PUID=1000/UNAME=ubuntu -- but wolf's supervisord.conf has
# user=root, so a non-root supervisord dies with "Can't drop privilege as
# nonroot user". This wrapper keeps the init-script behavior but forces root
# and execs the startup script without dropping privileges.
apiVersion: v1
kind: ConfigMap
metadata:
  name: wolf-root-entrypoint
  annotations:
    # The ks.yaml postBuild envsubst would otherwise blank the script's
    # ${init_script} refs (undefined Flux var -> ""), turning the cont-init.d
    # loop into `source ""` and crash-looping wolf. This script needs no Flux
    # substitution, so exclude it.
    kustomize.toolkit.fluxcd.io/substitute: disabled
data:
  entrypoint.sh: |
    #!/usr/bin/env bash
    set -e

    source /opt/gow/bash-lib/utils.sh

    # Force root: 10-setup_user.sh becomes a no-op and we never gosu.
    export UNAME=root PUID=0 PGID=0 HOME=/root

    for init_script in /etc/cont-init.d/*.sh; do
      gow_log
      gow_log "[ ${init_script}: executing... ]"
      # shellcheck source=/dev/null
      source "${init_script}"
    done

    gow_log "Launching the container's startup script as root"
    chmod +x /opt/gow/startup.sh
    exec /opt/gow/startup.sh

---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app minecraft-takocraft
spec:
  chartRef:
    kind: OCIRepository
    name: minecraft-takocraft
  interval: 15m
  dependsOn: []
  values:
    extraEnv:
      TZ: America/Edmonton
    fullnameOverride: *app
    image:
      repository: ghcr.io/itzg/minecraft-server
      tag: 2026.6.0@sha256:775492ff9a85243383ac15fc2d3c311569c63cfe624e9c1c99b9a5c1c1585972
    livenessProbe:
      initialDelaySeconds: 30
    minecraftServer:
      eula: true
      # renovate: datasource=custom.minecraft-release
      version: 26.2.0
      type: PAPER
      overrideServerProperties: true
      jvmXXOpts: "-XX:MaxRAMPercentage=75"
      difficulty: normal
      spawnProtection: 0
      gameMode: survival
      pvp: false
      onlineMode: true
      #whitelist: "LilDrunkenSmurf"
      ops: "LilDrunkenSmurf"
      motd: "Takocraft. This is the old Vibecraft"
      worldSaveName: takocraft
      viewDistance: 12
      spigetResources:
        - 36618 #Prom Exporter
      rcon:
        enabled: true
        existingSecret: *app
    persistence:
      dataDir:
        enabled: true
        existingClaim: *app
    readinessProbe:
      initialDelaySeconds: 30
    resources:
      requests:
        cpu: 200m
      limits:
        cpu: 2000m
        memory: 4Gi
    securityContext:
      runAsUser: 1000
      fsGroup: 100
    serviceAnnotations:
      mc-router.itzg.me/externalServerName: takocraft.jory.dev
    startupProbe:
      enabled: true

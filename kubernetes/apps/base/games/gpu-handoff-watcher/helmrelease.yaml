---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: gpu-handoff-watcher
spec:
  chartRef:
    kind: OCIRepository
    name: gpu-handoff-watcher
  interval: 15m
  dependsOn: []
  values:
    defaultPodOptions:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 100
        fsGroup: 100
        fsGroupChangePolicy: OnRootMismatch
    controllers:
      gpu-handoff-watcher:
        annotations:
          reloader.stakater.com/auto: "true"
        serviceAccount:
          identifier: gpu-handoff-watcher
        containers:
          app:
            image:
              repository: docker.io/alpine/k8s
              tag: 1.34.1@sha256:ec714df3813b5405292860f8a1c55c5727bf8c33c88992f1e981efad8065547f
            command:
              - /bin/sh
              - -c
              - |
                apk add --no-cache curl jq
                exec /bin/sh /config/watch.sh
            env:
              PROMETHEUS_URL: "http://prometheus-operated.observability.svc.cluster.local:9090"
              LLAMA_JOB: "llama-nvidia"
              LLAMA_NAMESPACE: "llm"
              SESSIONS_NAMESPACE: "games"
              POLL_INTERVAL_SECONDS: "30"
              FORCE_AFTER_SECONDS: "900"
              RESTORE_DELAY_SECONDS: "300"
              TZ: America/Edmonton
            resources:
              requests:
                cpu: 25m
                memory: 64Mi
              limits:
                memory: 256Mi
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: false
              capabilities:
                drop:
                  - ALL
    persistence:
      config:
        type: configMap
        name: gpu-handoff-watcher-script
        defaultMode: 0755
        globalMounts:
          - path: /config/watch.sh
            subPath: watch.sh
            readOnly: true
      tmpfs:
        type: emptyDir
        advancedMounts:
          gpu-handoff-watcher:
            app:
              - path: /tmp
                subPath: tmp
    serviceAccount:
      gpu-handoff-watcher: {}

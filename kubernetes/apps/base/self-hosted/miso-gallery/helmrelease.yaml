---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: miso-gallery
  namespace: llm
spec:
  chartRef:
    kind: OCIRepository
    name: app-template
  interval: 15m
  values:
    controllers:
      miso-gallery:
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          app:
            image:
              repository: ghcr.io/joryirving/miso-gallery
              tag: 0.1.2@sha256:69be65d7236aaecb31642b03bafd09b91711ae60ff28e29ac6d7dedd4f9e866e
            env:
              IMAGE_BASE_URL: https://miso-gallery.jory.dev
              FAVICON_URL: https://miso-gallery.jory.dev/view/chibi/Miso_1772668503_chibi_photo_00001_.png
              AUTH_TYPE: oidc
              OIDC_ENABLED: "true"
              OIDC_ISSUER: https://sso.jory.dev
              OIDC_PROVIDER_NAME: Authentik
              OIDC_CALLBACK_URL: https://miso-gallery.jory.dev/auth/oidc/callback
            envFrom:
              - secretRef:
                  name: miso-gallery
            securityContext:
              allowPrivilegeEscalation: false
              capabilities: {drop: ["ALL"]}
            resources:
              requests:
                cpu: 50m
              limits:
                memory: 128Mi
    defaultPodOptions:
      securityContext:
        runAsUser: 1000
        runAsGroup: 100
        fsGroup: 100
        fsGroupChangePolicy: "OnRootMismatch"
    service:
      app:
        ports:
          http:
            port: 5000
    route:
      app:
        hostnames: ["miso-gallery.jory.dev"]
        parentRefs:
          - name: envoy-external
            namespace: network
    persistence:
      data:
        type: nfs
        server: voyager.internal
        path: /mnt/daena/comfyui/output

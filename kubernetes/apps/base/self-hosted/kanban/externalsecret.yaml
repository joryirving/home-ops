---
# yaml-language-server: $schema=https://kube-schemas.pages.dev/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: &name kanban
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword
  target:
    name: *name
    template:
      engineVersion: v2
      data:
        # GitHub plugin token (used in webhook URL)
        GITHUB_WEBHOOK_TOKEN: "{{ .KANBAN_GITHUB_WEBHOOK_TOKEN }}"
        # GitHub personal access token for API calls
        GH_TOKEN: "{{ .KANBAN_GH_TOKEN }}"
  dataFrom:
    - extract:
        key: kanban

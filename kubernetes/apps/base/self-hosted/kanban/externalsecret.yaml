---
# yaml-language-server: $schema=https://kube-schemas.pages.dev/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: &name kanban
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword
  target:
    name: *name
    template:
      engineVersion: v2
      data:
        GITHUB_WEBHOOK_TOKEN: "{{ .KANBAN_GITHUB_WEBHOOK_TOKEN }}"
        GH_TOKEN: "{{ .ITS_MISO_PAT }}"
  dataFrom:
    - extract:
        key: kanban
    - extract:
        key: openclaw

---
# yaml-language-server: $schema=https://raw.githubusercontent.com/tyzbit/acars-processor/refs/heads/main/schema.json

ACARSProcessorSettings:
  ColorOutput: true
  LogLevel: debug
  LogHideTimestamps: true
  Database:
    Enabled: true
    Type: sqlite
    SQLiteDatabasePath: /data/messages.db
  ACARSHub:
    MaxConcurrentRequests: 1
    ACARS:
      Host: &acarshubhost acars-hub
      Port: 15550
    # VDLM2:
    #   Host: *acarshubhost
    #   Port: 15555

Steps:
  # Add geolocation from the adsb-shim sidecar (adsb.lol data served in
  # tar1090 format)
  - Annotate:
      Tar1090:
        URL: http://localhost:8080
        ReferenceGeolocation: "${LATITUDE},${LONGITUDE}"

  - Filter: { Builtin: { HasText: true } }

    # The decoders often submit duplicate messages as they're able to reassemble
    # the messages
  - Filter:
      Builtin:
        PreviousMessageSimilarity:
          Similarity: 0.90
          MaximumLookBehind: 1000
          DontFilterIfLonger: false

    # These labels have not had a human-written message in the last 30 days
  - Filter:
      Builtin:
        Invert: true
        Labels:
          - "_d"
          - ""
          - ":;"
          - "12"
          - "16"
          - "21"
          - "22"
          - "32"
          - "33"
          - "36"
          - "3M"
          - "43" # PAX REOPENED
          - "44"
          - "4N"
          - "5V"
          - "8X"
          - "A9"
          - "B9"
          - "BA"
          - "C1"
          - "H1"
          - "HX"
          - "Q0"
          - "SA"
          - "SQ"

  # These terms are present in routine messages that can be filtered
  - Filter:
      Builtin:
        Invert: true
        RequireTerms:
          Count: 1
          Terms:
            - /FTMLDR
            - /ACKFLT
            - KO/
            - RESREQ
            - POSRPT
            - AUTOMATED FLT OPS
            - UNFCTRD
            - USADCXA
            - "#DFREQ"
            - ET EXP TIME
            - OFF EVENT
            - EXTEND/UP
            - EXTEND/DOWN
            - RETRACT/UP
            - RETRACT/DOWN
            - AFT CARGO OPEN -
            - AFT CARGO CLOSED -
            - /ACARG
            - /EV START
            - /EV STOP
            - /   0
            - "    /"
            - "



              "
            - /ENGR
            - LIF RUNWAY REQUEST
            - IF ERRORS ABOVE
            - AGFSR
            - PRG/
            - LOAD CLOSEOUT RVSN
            - ON-TIME ANALYSIS
            - APU START <
            - "<"
            - ">"
            - +++
            - TAKEOFF_
            - OUTRPT
            - .CSV
            - "LOC:"
            - TO 1)
            - "[  ]"
            - ((
            - ))
            - )(
            - PDC
            - YOW FROM
            - PART 01
            - QUATLASAV
            - /MPTO
            - " /ALT"
            - 0,0,0
            - "(,"
            - ":  "
            - ---- G
            - ------------
            - ---- ---- ---- ----
            - "- - - - - - - - - - - - - - - - - -"
            - /  /  /
            - "******"
            - "*** REMINDER MESSAGE ***"
            - "**AUTOMATED MESSAGE**"
            - AUTO CLOSEOUT
            - "EMAIL FROM:"
            - "ENROUTE ALTERNATES:"
            - "SENT: "
            - 1FINAL WEIGHTS
            # Airport DISP messages
            - ATIS INFO
            - TAXI AND SHUTDOWN THE APU
            - YOUR HELP IS APPRECIATED.
            - ADVS YOU
            - YOU HAVE INFO
            - BIRDS IN THE VICINITY
            - BIRD ACTIVITY
            - READBACK ALL
            - NOTICE TO AIRMEN
            - ALL GATES UNDER
            - S-E TAXI
            - NEXT FLT SUBJECT
            - NEW MRD IS REQUIRED
            - SEND AN OPS CONTROL
            - FLIGHT OPS AUTOMATED MESSAGE

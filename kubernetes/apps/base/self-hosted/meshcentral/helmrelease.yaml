---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: meshcentral
spec:
  chartRef:
    kind: OCIRepository
    name: app-template
  interval: 15m
  dependsOn: []
  values:
    defaultPodOptions:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 100
        fsGroup: 100
        fsGroupChangePolicy: OnRootMismatch
    controllers:
      meshcentral:
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          app:
            image:
              repository: ghcr.io/ylianst/meshcentral
              tag: 
                1.1.59@sha256:7a619610e187fece8d3a15b3ac9448412d32baa1a9e63c1922b328eaeea17f10
            env:
              TZ: America/Edmonton
              NODE_ENV: production
              HOSTNAME: &host mesh.jory.dev
              ALLOW_NEW_ACCOUNTS: "false"
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities: {drop: ["ALL"]}
            resources:
              requests:
                cpu: 100m
              limits:
                memory: 2Gi
    persistence:
      config:
        type: configMap
        name: "{{ .Release.Name }}-config"
        advancedMounts:
          meshcentral:
            app:
            - path: /opt/meshcentral/meshcentral-data/config.json
              subPath: config.json
      data:
        existingClaim: "{{ .Release.Name }}"
        globalMounts:
        - path: /root
          subPath: rootdir
        - path: /opt/meshcentral/meshcentral-data
          subPath: data
        - path: /opt/meshcentral/meshcentral-files
          subPath: userfiles
        - path: /opt/meshcentral/meshcentral-backups
          subPath: backups
    route:
      app:
        hostnames: [*host]
        parentRefs:
        - name: envoy-internal
          namespace: network
    service:
      app:
        ports:
          http:
            port: 8080

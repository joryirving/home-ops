---
# yaml-language-server: $schema=https://kube-schemas.pages.dev/source.toolkit.fluxcd.io/ocirepository_v1.json
apiVersion: source.toolkit.fluxcd.io/v1
kind: OCIRepository
metadata:
  name: cloudflare-dns
spec:
  interval: 5m
  layerSelector:
    mediaType: application/vnd.cncf.helm.chart.content.v1.tar+gzip
    operation: copy
  ref:
    tag: 1.20.0
  url: oci://ghcr.io/home-operations/charts-mirror/external-dns
---
# yaml-language-server: $schema=https://kube-schemas.pages.dev/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app cloudflare-dns
spec:
  chartRef:
    kind: OCIRepository
    name: cloudflare-dns
  interval: 15m
  dependsOn: []
  values:
    domainFilters: ["jory.dev"]
    env:
    - name: &name CF_API_TOKEN
      valueFrom:
        secretKeyRef:
          name: &secret cloudflare-dns
          key: *name
    - name: &name CF_ZONE_ID
      valueFrom:
        secretKeyRef:
          name: *secret
          key: *name
    extraArgs:
    - --cloudflare-dns-records-per-page=1000
    - --cloudflare-proxied
    - --crd-source-apiversion=externaldns.k8s.io/v1alpha1
    - --crd-source-kind=DNSEndpoint
    - --gateway-name=envoy-external
    - --zone-id-filter=$(CF_ZONE_ID)
    fullnameOverride: *app
    logLevel: info
    podAnnotations:
      secret.reloader.stakater.com/reload: *secret
    policy: sync
    provider:
      name: cloudflare
    serviceMonitor:
      enabled: true
    sources: ["crd", "gateway-httproute"]
    triggerLoopOnEvent: true
    txtOwnerId: ${CLUSTER}
    txtPrefix: k8s.${CLUSTER}.

---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: agentmemory
spec:
  chartRef:
    kind: OCIRepository
    name: agentmemory
  interval: 15m
  dependsOn: []
  values:
    defaultPodOptions:
      securityContext:
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
        runAsGroup: 1000
        runAsNonRoot: true
        runAsUser: 1000
        seccompProfile:
          type: RuntimeDefault
    controllers:
      agentmemory:
        annotations:
          reloader.stakater.com/auto: "true"
        replicas: 1
        strategy: Recreate
        type: deployment
        containers:
          app:
            image:
              repository: ghcr.io/joryirving/agentmemory
              tag: 0.9.27@sha256:3dbd28e1194f9e36babef9f8611ee10b5673444aed8df8b74144c3ba91073e48
            command:
              - /usr/bin/catatonit
              - --
              - /bin/sh
              - -c
              - |
                PREFS_HOME="${HOME:-/home/node}"
                mkdir -p "$PREFS_HOME/.agentmemory"
                if [ ! -s "$PREFS_HOME/.agentmemory/preferences.json" ]; then
                  printf '%s\n' '{"schemaVersion":1,"lastAgent":null,"lastAgents":[],"lastProvider":null,"skipSplash":true,"skipNpxHint":true,"skipGlobalInstall":true,"skipConsoleInstall":true,"firstRunAt":"1970-01-01T00:00:00.000Z"}' > "$PREFS_HOME/.agentmemory/preferences.json"
                fi
                exec /entrypoint.sh
            env:
              AGENTMEMORY_DROP_STALE_INDEX: true
              AGENTMEMORY_TOOLS: all
              EMBEDDING_PROVIDER: openai
              # Chat LLM (consolidation) via litellm's anthropic /v1/messages -> free local model.
              # OpenAI key stays embeddings-only (OPENAI_API_KEY_FOR_LLM=false) so it doesn't claim the LLM slot.
              ANTHROPIC_BASE_URL: http://litellm.llm:4000
              ANTHROPIC_MODEL: self-hosted
              AGENTMEMORY_LLM_TIMEOUT_MS: "120000"
              AGENTMEMORY_AUTO_COMPRESS: "true"
              CONSOLIDATION_ENABLED: "true"
              GRAPH_EXTRACTION_ENABLED: "true"
              III_REST_PORT: "3111"
              RUST_LOG: warn
              VIEWER_ALLOWED_HOSTS: agentmemory.jory.dev
              VIEWER_ALLOWED_ORIGINS: https://agentmemory.jory.dev
              OPENAI_BASE_URL: http://llama-embed.llm:8080
              OPENAI_API_KEY_FOR_LLM: "false"
              OPENAI_EMBEDDING_DIMENSIONS: "384"
              OPENAI_EMBEDDING_MODEL: sentence-transformers/all-MiniLM-L6-v2
              TZ: America/Edmonton
            envFrom:
              - secretRef:
                  name: agentmemory
            probes:
              liveness:
                enabled: true
                custom: true
                spec:
                  failureThreshold: 3
                  httpGet:
                    path: /agentmemory/livez
                    port: 3111
                  periodSeconds: 30
                  timeoutSeconds: 5
              readiness:
                enabled: true
                custom: true
                spec:
                  failureThreshold: 3
                  httpGet:
                    path: /agentmemory/livez
                    port: 3111
                  periodSeconds: 10
                  timeoutSeconds: 5
              startup:
                enabled: true
                custom: true
                spec:
                  failureThreshold: 60
                  httpGet:
                    path: /agentmemory/livez
                    port: 3111
                  periodSeconds: 5
                  timeoutSeconds: 5
            resources:
              requests:
                cpu: 100m
                memory: 256Mi
              limits:
                memory: 2Gi
            securityContext:
              allowPrivilegeEscalation: false
              capabilities:
                drop:
                  - ALL
    persistence:
      data:
        existingClaim: "{{ .Release.Name }}"
        globalMounts:
          - path: /data
      tmp:
        type: emptyDir
        globalMounts:
          - path: /tmp
    service:
      app:
        controller: agentmemory
        ports:
          api:
            port: 3111
          stream:
            port: 3112
          viewer:
            port: 3113
    route:
      app:
        hostnames: ["{{ .Release.Name }}.jory.dev"]
        parentRefs:
          - name: envoy-internal
            namespace: network
        rules:
          - matches:
              - path:
                  type: PathPrefix
                  value: /
                headers:
                  - name: Upgrade
                    value: websocket
            backendRefs:
              - name: "{{ .Release.Name }}"
                port: 3112
          - matches:
              - path:
                  type: PathPrefix
                  value: /
            backendRefs:
              - name: "{{ .Release.Name }}"
                port: 3113

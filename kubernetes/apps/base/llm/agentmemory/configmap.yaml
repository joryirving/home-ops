---
# yaml-language-server: $schema=https://kubernetesjsonschema.dev/v1.18.0/configmap-v1.json
apiVersion: v1
kind: ConfigMap
metadata:
  name: agentmemory-config
data:
  config.yaml: |
    workers:
      - name: iii-http
        config:
          port: 3111
          host: 0.0.0.0
          default_timeout: 180000
          cors:
            allowed_origins: ["http://localhost:3111", "http://localhost:3113", "http://127.0.0.1:3111", "http://127.0.0.1:3113"]
            allowed_methods: [GET, POST, PUT, DELETE, OPTIONS]
      - name: iii-state
        config:
          adapter:
            name: kv
            config:
              store_method: file_based
              file_path: /data/state_store.db
      - name: iii-queue
        config:
          adapter:
            name: builtin
      - name: iii-pubsub
        config:
          adapter:
            name: local
      - name: iii-cron
        config:
          adapter:
            name: kv
      - name: iii-stream
        config:
          port: 3112
          host: 0.0.0.0
          adapter:
            name: kv
            config:
              store_method: file_based
              file_path: /data/stream_store
      - name: iii-observability
        config:
          enabled: true
          service_name: agentmemory
          exporter: memory
          sampling_ratio: 1.0
          metrics_enabled: true
          logs_enabled: false
          logs_console_output: false
      - name: iii-exec
        config:
          watch:
            - src/**/*.ts
          exec:
            - node dist/index.mjs

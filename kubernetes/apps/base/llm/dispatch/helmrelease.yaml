---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: dispatch
spec:
  chartRef:
    kind: OCIRepository
    name: dispatch
  interval: 15m
  dependsOn: []
  values:
    controllers:
      dispatch:
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          app:
            image:
              repository: ghcr.io/misospace/dispatch
              tag: 0.5.16@sha256:5a82ca3f5dcf1309f1d4d27758dcdd3c4bc9ca52b5f30a7bf45b08353656e700
            env:
              DISPATCH_EXCLUDED_LABELS: renovate
              DISPATCH_GROOMER_DRY_RUN: false
              # Grooming is triage/classification, not code — a small model suffices.
              # vision = Qwen3.5-4B (llama-vision) via litellm. dispatch constrains the
              # output with a json_schema response_format (grammar-enforced on llama.cpp),
              # so the 4B produces reliable structure.
              DISPATCH_GROOMER_MODEL: vision
              DISPATCH_GROOMER_REPO_CONTEXT_ENABLED: true
              DISPATCH_HOSTED_GROOMER_ENABLED: true
              DISPATCH_LANE_CONFIG_JSON: '{"lanes":[{"id":"local","title":"Local","claimable":true,"role":"default","description":"Local model lane (nvidia) \u2014 routine, scoped implementation work.","color":"#3b82f6"},{"id":"cloud","title":"Cloud","claimable":true,"description":"Cloud model lane (dsv4p) \u2014 medium complexity, multi-file changes, debugging with inference.","color":"#8b5cf6"},{"id":"frontier","title":"Frontier","claimable":true,"role":"escalation","description":"Frontier model lane (glm-5.2) \u2014 architecture, security-sensitive, hard bugs.","color":"#f97316"},{"id":"backlog","title":"Backlog","claimable":false,"description":"Needs grooming before work can start. Not directly claimable.","color":"#6b7280"}],"laneAliases":{"normal":"local","escalated":"frontier"}}'
              DISPATCH_LLM_BASE_URL: http://litellm.llm:4000/v1
              # In-app scheduler (0.5.16+) replaces the dispatch-heartbeat cronjobs:
              # sync 15m, groomer 10m, pr-followup 15m, prune-closed daily. Jobs
              # loopback-POST the same endpoints the crons hit, so the sync/groomer
              # DB locks still serialize runs. Tune via DISPATCH_*_INTERVAL_MS ("0" disables).
              DISPATCH_SCHEDULER_ENABLED: true
              DATABASE_URL:
                valueFrom:
                  secretKeyRef:
                    name: "{{ .Release.Name }}-app"
                    key: uri
            envFrom:
              - secretRef:
                  name: dispatch
            resources:
              requests:
                cpu: 50m
                memory: 256Mi
              limits:
                memory: 512Mi
            probes:
              liveness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /
                    port: 3000
                  initialDelaySeconds: 10
                  periodSeconds: 10
                  failureThreshold: 3
              readiness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /
                    port: 3000
                  initialDelaySeconds: 5
                  periodSeconds: 10
                  failureThreshold: 3
    service:
      app:
        ports:
          http:
            port: 3000
    route:
      app:
        hostnames: ["dispatch.jory.dev"]
        parentRefs:
          - name: envoy-internal
            namespace: network
        rules:
          - backendRefs:
              - name: dispatch
                port: 3000

---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: &name dispatch
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword
  target:
    name: *name
    template:
      engineVersion: v2
      data:
        ## OIDC
        DISPATCH_AUTH_MODE: "oidc"
        DISPATCH_OIDC_ISSUER: https://sso.jory.dev/application/o/dispatch/
        NEXTAUTH_URL: https://dispatch.jory.dev
        ## SECRETS
        DISPATCH_OIDC_CLIENT_ID: "{{ .DISPATCH_CLIENT_ID }}"
        DISPATCH_OIDC_CLIENT_SECRET: "{{ .DISPATCH_CLIENT_SECRET }}"
        NEXTAUTH_SECRET: "{{ .NEXTAUTH_SECRET }}"
        ## EXISTING
        GITHUB_TOKEN: "{{ .GITHUB_TOKEN }}"
        DISPATCH_AGENT_TOKEN: "{{ .DISPATCH_AGENT_TOKEN }}"
        PR_FOLLOWUP_BOT_IDENTITIES: itsmiso-ai
        ## GROOMING
        DISPATCH_LLM_API_KEY: "{{ .LITELLM_DISPATCH_API_KEY }}"
  dataFrom:
    - extract:
        key: dispatch
    - extract:
        key: github-miso
    - extract:
        key: litellm

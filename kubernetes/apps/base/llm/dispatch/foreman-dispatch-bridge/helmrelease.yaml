---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: foreman-dispatch-bridge
spec:
  chartRef:
    kind: OCIRepository
    name: foreman-dispatch-bridge
  interval: 15m
  values:
    defaultPodOptions:
      # app-template defaults this off; the bridge needs the SA token to create
      # Workloads via the in-cluster kube API (load_incluster_config).
      automountServiceAccountToken: true
    controllers:
      foreman-dispatch-bridge:
        type: cronjob
        cronjob:
          schedule: "30 */1 * * *"
          timeZone: America/Edmonton
          concurrencyPolicy: Forbid
          successfulJobsHistory: 1
          failedJobsHistory: 1
        serviceAccount:
          identifier: foreman-dispatch-bridge
        containers:
          app:
            image:
              repository: ghcr.io/misospace/foreman-dispatch-bridge
              tag: 0.6.5@sha256:dac1bf9565f7497afd47e16a6af07f9ab889cde1be95fc86e2e45971f1a1ad72
            env:
              DISPATCH_URL: http://dispatch.llm:3000
              # Dash, not slash (like saffron-normal): agents auto-register, but a "/"
              # splits the queue URL path (/api/agents/{name}/queue) and 404s.
              DISPATCH_AGENT_NAME: foreman-coder
              # Two-tier flow: everything grooms into local; the bridge escalates
              # exhausted issues into frontier (cloud lane retired — no distinct
              # executor backed it, and upfront complexity triage was asking too
              # much of the 4B groomer).
              DISPATCH_LANES: local,frontier
              # Bridge 0.4.0+: instead of tombstoning after RETRY_MAX_ATTEMPTS,
              # re-lane the issue to frontier + unclaim; the next tick claims it
              # there and builds the Workload with the coder-frontier Agent
              # (cloud-proxy -> litellm -> MiniMax-M3). Ignored by older bridges.
              ESCALATION_LANE: frontier
              LANE_CODER_AGENTS: '{"*":"coder","frontier":"coder-frontier"}'
              BASE_CODER_AGENTS: '{"python":"coder-python","node":"coder-node","go":"coder-go","*":"coder"}'
              FOREMAN_NAMESPACE: llm
              MAX_IN_PROGRESS: "10"
              GATEPROFILE_MAP: '{"misospace/KubeTix":{"language":"python","image":"python:3.11","commands":{"format":"pip install -q black && black --check .","lint":"pip install -q flake8 && flake8 .","build":"python -m compileall -q .","test":"true"}},"misospace/miso-gallery":{"language":"python","image":"python:3.14","commands":{"format":"true","lint":"pip install -q ruff && ruff check . --select=E,F,W,B,SIM,I --ignore=E501","build":"pip install -q -r requirements.txt && python -m compileall -q .","test":"pip install -q -r requirements.txt pytest requests && python -m pytest -q"}},"misospace/pr-reviewer-action":{"language":"python","image":"python:3.14","commands":{"format":"true","lint":"pip install -q yamllint && yamllint action.yml examples/","build":"python -m compileall -q .","test":"true"}},"misospace/dispatch":{"language":"node","image":"node:22","commands":{"format":"true","lint":"npm ci --include=dev && npx prisma generate && NODE_ENV=development npm run lint","build":"NODE_ENV=development npm run typecheck","test":"true"}},"*":{"language":"generic"}}'
              REVISION_CODER_AGENTS: '{"*":"coder-revision"}'
              PR_FIX_ENABLED: "true"
              PR_FIX_MAX_ATTEMPTS: "3"
              PR_FIX_LANE_AGENTS: '{"NORMAL":"coder","ESCALATED":"coder-frontier"}'
            envFrom:
              - secretRef:
                  name: foreman-dispatch-bridge
            resources:
              requests:
                cpu: 25m
              limits:
                memory: 128Mi
    serviceAccount:
      foreman-dispatch-bridge: {}
    rbac:
      roles:
        # The bridge creates Workloads and, since v0.3.0, reconciles failed ones:
        # list/get to find Failed Workloads, delete + create to retry them (bounded).
        # No update/patch — retry is delete-then-recreate, not in-place mutation.
        foreman-dispatch-bridge:
          type: Role
          rules:
            - apiGroups: ["foreman.llmkube.dev"]
              resources: ["workloads"]
              verbs: ["create", "get", "list", "delete"]
            # Bridge 0.5.0 reads a failed Workload's task results (reviewer
            # NO-GO findings, coder errors) to build feedback-carrying retries.
            - apiGroups: ["foreman.llmkube.dev"]
              resources: ["agentictasks"]
              verbs: ["get", "list"]
      bindings:
        foreman-dispatch-bridge:
          type: RoleBinding
          roleRef:
            identifier: foreman-dispatch-bridge
          subjects:
            - identifier: foreman-dispatch-bridge
              serviceAccount: foreman-dispatch-bridge

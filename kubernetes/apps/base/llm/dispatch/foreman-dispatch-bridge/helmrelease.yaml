---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: foreman-dispatch-bridge
spec:
  chartRef:
    kind: OCIRepository
    name: foreman-dispatch-bridge
  interval: 15m
  values:
    defaultPodOptions:
      # app-template defaults this off; the bridge needs the SA token to create
      # Workloads via the in-cluster kube API (load_incluster_config).
      automountServiceAccountToken: true
    controllers:
      foreman-dispatch-bridge:
        type: cronjob
        cronjob:
          schedule: "30 */1 * * *"
          timeZone: America/Edmonton
          concurrencyPolicy: Forbid
          successfulJobsHistory: 1
          failedJobsHistory: 1
        serviceAccount:
          identifier: foreman-dispatch-bridge
        containers:
          app:
            image:
              repository: ghcr.io/joryirving/foreman-dispatch-bridge
              tag: 0.3.0@sha256:75ed439803e927ec23d45917258857200d0ab6f2349d437fd0306a7ce9e13ceb
            env:
              DISPATCH_URL: http://dispatch.llm:3000
              # Dash, not slash (like saffron-normal): agents auto-register, but a "/"
              # splits the queue URL path (/api/agents/{name}/queue) and 404s.
              DISPATCH_AGENT_NAME: foreman-coder
              # Two-tier flow: everything grooms into local; the bridge escalates
              # exhausted issues into frontier (cloud lane retired — no distinct
              # executor backed it, and upfront complexity triage was asking too
              # much of the 4B groomer).
              DISPATCH_LANES: local,frontier
              # Bridge 0.4.0+: instead of tombstoning after RETRY_MAX_ATTEMPTS,
              # re-lane the issue to frontier + unclaim; the next tick claims it
              # there and builds the Workload with the coder-frontier Agent
              # (cloud-proxy -> litellm -> MiniMax-M3). Ignored by older bridges.
              ESCALATION_LANE: frontier
              LANE_CODER_AGENTS: '{"*":"coder","frontier":"coder-frontier"}'
              FOREMAN_NAMESPACE: llm
              # Stamp a generic (no-op) gateProfile on every Workload. This
              # SUPPRESSES Foreman's Go default gate — critical because none of
              # these repos are Go, and the coder's in-pod fast self-gate runs in
              # the Go-only coder image (no node/python), so a real language gate
              # would fail "command not found", exhaust retries, and downgrade the
              # coder GO to INCOMPLETE (no PR). Generic + no commands = the self-gate
              # and the clean-room verify Job both no-op, so the coder pushes and
              # verification falls to the Ornith reviewer + each repo's CI + the
              # external PR reviewer. Real per-language gates await the upstream
              # self-gate fix (defer-to-Job on missing runtime).
              GATEPROFILE_MAP: '{"*":{"language":"generic"}}'
            envFrom:
              - secretRef:
                  name: foreman-dispatch-bridge
            resources:
              requests:
                cpu: 25m
              limits:
                memory: 128Mi
    serviceAccount:
      foreman-dispatch-bridge: {}
    rbac:
      roles:
        # The bridge creates Workloads and, since v0.3.0, reconciles failed ones:
        # list/get to find Failed Workloads, delete + create to retry them (bounded).
        # No update/patch — retry is delete-then-recreate, not in-place mutation.
        foreman-dispatch-bridge:
          type: Role
          rules:
            - apiGroups: ["foreman.llmkube.dev"]
              resources: ["workloads"]
              verbs: ["create", "get", "list", "delete"]
      bindings:
        foreman-dispatch-bridge:
          type: RoleBinding
          roleRef:
            identifier: foreman-dispatch-bridge
          subjects:
            - identifier: foreman-dispatch-bridge
              serviceAccount: foreman-dispatch-bridge

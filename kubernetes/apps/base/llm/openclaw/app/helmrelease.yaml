---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: openclaw
spec:
  chartRef:
    kind: OCIRepository
    name: app-template
  interval: 15m
  dependsOn: []
  values:
    defaultPodOptions:
      automountServiceAccountToken: true
      shareProcessNamespace: true
      securityContext:
        runAsUser: 1000
        runAsGroup: 100
        fsGroup: 100
        fsGroupChangePolicy: OnRootMismatch
    controllers:
      openclaw:
        annotations:
          reloader.stakater.com/auto: "true"
        initContainers:
          init:
            image:
              repository: docker.io/library/alpine
              tag: "3.23"
            command:
              - sh
              - -c
              - |
                set -euo pipefail
                cp /tmp/openclaw.json /home/node/.openclaw/openclaw.json
                chown 1000:100 /home/node/.openclaw/openclaw.json
                chmod 400 /home/node/.openclaw/openclaw.json
          daemon:
            image:
              repository: docker
              tag:
                29.4.1-dind@sha256:c77e5d7912f9b137cc67051fdc2991d8f5ae22c55ddf532bb836dcb693a04940
            restartPolicy: Always
            env:
              DOCKER_TLS_CERTDIR: /certs
            securityContext:
              privileged: true
              runAsUser: 0
              runAsGroup: 0
              allowPrivilegeEscalation: true
            probes:
              startup:
                enabled: true
                custom: true
                spec: &dockerProbe
                  exec:
                    command: ["docker", "info"]
                  periodSeconds: 2
                  timeoutSeconds: 3
                  failureThreshold: 60
              readiness:
                enabled: true
                custom: true
                spec:
                  <<: *dockerProbe
                  periodSeconds: 5
                  timeoutSeconds: 3
                  failureThreshold: 3
              liveness:
                enabled: true
                custom: true
                spec:
                  <<: *dockerProbe
                  periodSeconds: 20
                  timeoutSeconds: 3
                  failureThreshold: 3
        containers:
          app:
            image:
              repository: ghcr.io/openclaw/openclaw
              tag: 2026.5.7@sha256:1af3f457a2d5a1d210f4d95634fa5da6e23f9c0ac7b52ef4bc38e2ecf09704fd
            command:
            - /bin/sh
            - -c
            - |
              # Start gateway
              exec node dist/index.js gateway --bind lan
            env:
              OPENCLAW_LOG_LEVEL: debug
              BROWSER_WS_ENDPOINT: "ws://localhost:9222"
              DOCKER_HOST: "tcp://localhost:2376"
              DOCKER_CERT_PATH: /certs/client
              DOCKER_TLS_VERIFY: "1"
              GOPATH: /home/node/go
              HOME: &homepath /home/node
              HOMEBREW_CELLAR: /home/node/.local/homebrew/Cellar
              HOMEBREW_PREFIX: /home/node/.local/homebrew
              HOMEBREW_REPOSITORY: /home/node/.local/homebrew
              OPENCLAW_GATEWAY_PORT: &port 18789
              PATH:
                /home/node/.local/bin:/home/node/.local/go/bin:/home/node/.local/homebrew/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
              PIP_BREAK_SYSTEM_PACKAGES: "1"
              TERM: xterm-256color
              TZ: &tz America/Edmonton
            envFrom:
            - secretRef:
                name: openclaw
            resources:
              requests:
                cpu: 1
                memory: 2Gi
              limits:
                cpu: 10
                memory: 16Gi
          codeserver:
            image:
              repository: ghcr.io/coder/code-server
              tag:
                4.117.0@sha256:e6702766518b961c7e3c41095c129c7c9a82b041578c53326c52fa363a057727
            env:
              TZ: America/Edmonton
            args: ["--auth", "none", "--user-data-dir", "/home/node/.vscode", "--extensions-dir",
              "/home/node/.vscode", "--port", "12321", "/config"]
            resources:
              requests:
                cpu: 10m
              limits:
                memory: 1Gi
    persistence:
      openclaw-home:
        type: emptyDir
      config:
        existingClaim: "{{ .Release.Name }}"
        globalMounts:
        - path: *homepath
      data:
        type: nfs
        server: voyager.internal
        path: /mnt/delta/miso
        globalMounts:
        - path: /data
      downloads:
        type: nfs
        server: voyager.internal
        path: /mnt/akademiya/data
        globalMounts:
        - path: /downloads
          subPath: metube
      images:
        type: nfs
        server: voyager.internal
        path: /mnt/daena/comfyui/output
        globalMounts:
        - path: /home/node/.openclaw/workspace/images
      configmap:
        type: configMap
        name: "{{ .Release.Name }}-config"
        defaultMode: 0755
        globalMounts:
        - path: /tmp/openclaw.json
          subPath: openclaw.json
    rbac:
      roles:
        # Cluster-wide pod delete — restart any pod in any namespace
        openclaw-pod-delete-cluster-wide:
          type: ClusterRole
          rules:
          - apiGroups: [""]
            resources: ["pods"]
            verbs: ["delete"]
        # Namespace-scoped exec + deploy patch — llm namespace only
        openclaw-exec-deploy-llm:
          type: Role
          rules:
          - apiGroups: [""]
            resources: ["pods/exec"]
            verbs: ["create"]
          - apiGroups: ["apps"]
            resources: ["deployments"]
            verbs: ["patch", "update"]
      bindings:
        # Cluster-wide binding for pod delete
        openclaw-pod-delete-cluster-wide:
          type: ClusterRoleBinding
          roleRef:
            identifier: openclaw-pod-delete-cluster-wide
          subjects:
          - identifier: openclaw
            serviceAccount: openclaw
        # Namespace-scoped binding for exec+deploy — llm namespace only
        openclaw-exec-deploy-llm:
          type: RoleBinding
          roleRef:
            identifier: openclaw-exec-deploy-llm
          subjects:
          - identifier: openclaw
            serviceAccount: openclaw
            namespace: llm
    route:
      app:
        hostnames: ["miso.jory.dev"]
        parentRefs:
        - name: envoy-internal
          namespace: network
        rules:
        - backendRefs:
          - name: "{{ .Release.Name }}"
            port: *port
      codeserver:
        hostnames: ["miso-code.jory.dev"]
        parentRefs:
        - name: envoy-internal
          namespace: network
        rules:
        - backendRefs:
          - name: "{{ .Release.Name }}"
            port: &codeserverPort 12321
    service:
      app:
        type: LoadBalancer
        annotations:
          lbipam.cilium.io/ips: 10.69.10.41
        externalTrafficPolicy: Cluster
        ports:
          http:
            port: *port
          codeserver:
            port: *codeserverPort
    serviceAccount:
      openclaw: {}

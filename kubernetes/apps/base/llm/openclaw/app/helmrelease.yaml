---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: openclaw
spec:
  chartRef:
    kind: OCIRepository
    name: app-template
  interval: 15m
  dependsOn: []
  values:
    defaultPodOptions:
      shareProcessNamespace: true
      securityContext:
        runAsUser: 1000
        runAsGroup: 100
        fsGroup: 100
        fsGroupChangePolicy: OnRootMismatch
    controllers:
      openclaw:
        annotations:
          reloader.stakater.com/auto: "true"
        initContainers:
          daemon:
            image:
              repository: docker
              tag:
                29.4.1-dind@sha256:c77e5d7912f9b137cc67051fdc2991d8f5ae22c55ddf532bb836dcb693a04940
            restartPolicy: Always
            env:
              DOCKER_TLS_CERTDIR: /certs
            securityContext:
              privileged: true
              runAsUser: 0
              runAsGroup: 0
              allowPrivilegeEscalation: true
            probes:
              startup:
                enabled: true
                custom: true
                spec: &dockerProbe
                  exec:
                    command: ["docker", "info"]
                  periodSeconds: 2
                  timeoutSeconds: 3
                  failureThreshold: 60
              readiness:
                enabled: true
                custom: true
                spec:
                  <<: *dockerProbe
                  periodSeconds: 5
                  timeoutSeconds: 3
                  failureThreshold: 3
              liveness:
                enabled: true
                custom: true
                spec:
                  <<: *dockerProbe
                  periodSeconds: 20
                  timeoutSeconds: 3
                  failureThreshold: 3
        containers:
          app:
            image:
              repository: ghcr.io/openclaw/openclaw
              tag: 2026.4.29@sha256:2c56a23cb2fe826a0d521bf6d61c8e4bb4e4201274f358eccddf5876393155ae
            command:
            - /bin/sh
            - -c
            - |
              # Start gateway
              exec node dist/index.js gateway --bind lan
            env:
              OPENCLAW_LOG_LEVEL: debug
              BROWSER_WS_ENDPOINT: "ws://localhost:9222"
              DOCKER_HOST: "tcp://localhost:2376"
              DOCKER_CERT_PATH: /certs/client
              DOCKER_TLS_VERIFY: "1"
              GOPATH: /home/node/go
              HOME: &homepath /home/node
              HOMEBREW_CELLAR: /home/node/.local/homebrew/Cellar
              HOMEBREW_PREFIX: /home/node/.local/homebrew
              HOMEBREW_REPOSITORY: /home/node/.local/homebrew
              OPENCLAW_GATEWAY_PORT: &port 18789
              PATH:
                /home/node/.local/bin:/home/node/.local/go/bin:/home/node/.local/homebrew/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
              PIP_BREAK_SYSTEM_PACKAGES: "1"
              TERM: xterm-256color
              TZ: &tz America/Edmonton
            envFrom:
            - secretRef:
                name: openclaw
            - secretRef:
                name: openclaw-actual
            - secretRef:
                name: openclaw-miso-gallery
            resources:
              requests:
                cpu: 1
                memory: 2Gi
              limits:
                cpu: 10
                memory: 16Gi
          codeserver:
            image:
              repository: ghcr.io/coder/code-server
              tag:
                4.117.0@sha256:e6702766518b961c7e3c41095c129c7c9a82b041578c53326c52fa363a057727
            env:
              TZ: America/Edmonton
            args: ["--auth", "none", "--user-data-dir", "/home/node/.vscode", "--extensions-dir",
              "/home/node/.vscode", "--port", "12321", "/config"]
            resources:
              requests:
                cpu: 10m
              limits:
                memory: 1Gi
    persistence:
      config:
        existingClaim: "{{ .Release.Name }}"
        globalMounts:
        - path: *homepath
      data:
        type: nfs
        server: voyager.internal
        path: /mnt/delta/miso
        globalMounts:
        - path: /data
      downloads:
        type: nfs
        server: voyager.internal
        path: /mnt/akademiya/data
        globalMounts:
        - path: /downloads
          subPath: metube
      images:
        type: nfs
        server: voyager.internal
        path: /mnt/daena/comfyui/output
        globalMounts:
        - path: /home/node/.openclaw/workspace/images
      openclaw-config:
        type: secret
        name: "{{ .Release.Name }}-config"
        defaultMode: 0400
        globalMounts:
        - path: /home/node/.openclaw/openclaw.json
          subPath: openclaw.json
      next-cache:
        type: emptyDir
        globalMounts:
        - path: /app/.next/cache
      tmp:
        type: emptyDir
      certs:
        type: emptyDir
    rbac:
      roles:
        openclaw-read-all:
          type: ClusterRole
          rules:
            # Broad read-only access across cluster resources. Secrets intentionally excluded.
          - apiGroups: [""]
            resources: ["pods", "pods/log", "nodes", "services", "namespaces", "configmaps",
              "persistentvolumes", "persistentvolumeclaims", "endpoints", "resourcequotas",
              "limitranges", "serviceaccounts", "events"]
            verbs: ["get", "list", "watch"]
          - apiGroups: ["apps"]
            resources: ["deployments", "daemonsets", "statefulsets", "replicasets",
              "controllerrevisions"]
            verbs: ["get", "list", "watch"]
          - apiGroups: ["batch"]
            resources: ["jobs", "cronjobs"]
            verbs: ["get", "list", "watch"]
          - apiGroups: ["networking.k8s.io"]
            resources: ["ingresses", "ingressclasses", "networkpolicies"]
            verbs: ["get", "list", "watch"]
          - apiGroups: ["storage.k8s.io"]
            resources: ["storageclasses", "csinodes", "csidrivers", "volumeattachments"]
            verbs: ["get", "list", "watch"]
          - apiGroups: ["autoscaling"]
            resources: ["horizontalpodautoscalers"]
            verbs: ["get", "list", "watch"]
          - apiGroups: ["policy"]
            resources: ["poddisruptionbudgets"]
            verbs: ["get", "list", "watch"]
          - apiGroups: ["coordination.k8s.io"]
            resources: ["leases"]
            verbs: ["get", "list", "watch"]
          - apiGroups: ["rbac.authorization.k8s.io"]
            resources: ["roles", "rolebindings", "clusterroles", "clusterrolebindings"]
            verbs: ["get", "list", "watch"]
          - apiGroups: ["apiextensions.k8s.io"]
            resources: ["customresourcedefinitions"]
            verbs: ["get", "list", "watch"]
          - apiGroups: ["apiregistration.k8s.io"]
            resources: ["apiservices"]
            verbs: ["get", "list", "watch"]
          - apiGroups: ["metrics.k8s.io"]
            resources: ["nodes", "pods"]
            verbs: ["get", "list", "watch"]
          - apiGroups: ["helm.toolkit.fluxcd.io"]
            resources: ["helmreleases"]
            verbs: ["get", "list", "watch"]
          - apiGroups: ["kustomize.toolkit.fluxcd.io"]
            resources: ["kustomizations"]
            verbs: ["get", "list", "watch"]
          - apiGroups: ["source.toolkit.fluxcd.io"]
            resources: ["gitrepositories", "helmrepositories", "ocirepositories",
              "buckets", "helmcharts"]
            verbs: ["get", "list", "watch"]
          - apiGroups: ["external-secrets.io"]
            resources: ["externalsecrets", "secretstores", "clustersecretstores"]
            verbs: ["get", "list", "watch"]
          - apiGroups: ["monitoring.coreos.com"]
            resources: ["prometheuses", "alertmanagers", "servicemonitors", "podmonitors",
              "prometheusrules", "thanosrulers", "probes"]
            verbs: ["get", "list", "watch"]
          - apiGroups: ["snapshot.storage.k8s.io"]
            resources: ["volumesnapshots", "volumesnapshotcontents", "volumesnapshotclasses"]
            verbs: ["get", "list", "watch"]
        # Cluster-wide pod delete — restart any pod in any namespace
        openclaw-pod-delete-cluster-wide:
          type: ClusterRole
          rules:
          - apiGroups: [""]
            resources: ["pods"]
            verbs: ["delete"]
        # Namespace-scoped exec + deploy patch — llm namespace only
        openclaw-exec-deploy-llm:
          type: Role
          rules:
          - apiGroups: [""]
            resources: ["pods/exec"]
            verbs: ["create"]
          - apiGroups: ["apps"]
            resources: ["deployments"]
            verbs: ["patch", "update"]
      bindings:
        openclaw-read-all:
          type: ClusterRoleBinding
          roleRef:
            identifier: openclaw-read-all
          subjects:
          - identifier: openclaw
            serviceAccount: openclaw
        # Cluster-wide binding for pod delete
        openclaw-pod-delete-cluster-wide:
          type: ClusterRoleBinding
          roleRef:
            identifier: openclaw-pod-delete-cluster-wide
          subjects:
          - identifier: openclaw
            serviceAccount: openclaw
        # Namespace-scoped binding for exec+deploy — llm namespace only
        openclaw-exec-deploy-llm:
          type: RoleBinding
          roleRef:
            identifier: openclaw-exec-deploy-llm
          subjects:
          - identifier: openclaw
            serviceAccount: openclaw
            namespace: llm
    route:
      app:
        hostnames: ["miso.jory.dev"]
        parentRefs:
        - name: envoy-internal
          namespace: network
        rules:
        - backendRefs:
          - name: "{{ .Release.Name }}"
            port: *port
      codeserver:
        hostnames: ["miso-code.jory.dev"]
        parentRefs:
        - name: envoy-internal
          namespace: network
        rules:
        - backendRefs:
          - name: "{{ .Release.Name }}"
            port: &codeserverPort 12321
    service:
      app:
        type: LoadBalancer
        annotations:
          lbipam.cilium.io/ips: 10.69.10.41
        externalTrafficPolicy: Cluster
        ports:
          http:
            port: *port
          codeserver:
            port: *codeserverPort
    serviceAccount:
      openclaw: {}

---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: openclaw
spec:
  chartRef:
    kind: OCIRepository
    name: app-template
  interval: 15m
  dependsOn: []
  values:
    defaultPodOptions:
      automountServiceAccountToken: true
      securityContext:
        runAsUser: 1000
        runAsGroup: 100
        fsGroup: 100
        fsGroupChangePolicy: OnRootMismatch
    controllers:
      openclaw:
        annotations:
          reloader.stakater.com/auto: "true"
        initContainers:
          init:
            image:
              repository: docker.io/library/alpine
              tag: "3.24"
            command:
              - sh
              - -c
              - |
                set -euo pipefail
                mkdir -p /home/node/.openclaw/extensions/agentmemory
                chmod u+w /home/node/.openclaw /home/node/.openclaw/extensions/agentmemory || true
                rm -f /home/node/.openclaw/openclaw.json
                rm -f /home/node/.openclaw/extensions/agentmemory/openclaw.plugin.json
                rm -f /home/node/.openclaw/extensions/agentmemory/package.json
                rm -f /home/node/.openclaw/extensions/agentmemory/plugin.mjs
                cp /tmp/openclaw.json /home/node/.openclaw/openclaw.json
                cp /tmp/agentmemory-plugin/openclaw.plugin.json /home/node/.openclaw/extensions/agentmemory/openclaw.plugin.json
                cp /tmp/agentmemory-plugin/package.json /home/node/.openclaw/extensions/agentmemory/package.json
                cp /tmp/agentmemory-plugin/plugin.mjs /home/node/.openclaw/extensions/agentmemory/plugin.mjs
                chown 1000:100 /home/node/.openclaw/openclaw.json
                chown -R 1000:100 /home/node/.openclaw/extensions/agentmemory
                chmod 400 /home/node/.openclaw/openclaw.json
                chmod 500 /home/node/.openclaw/extensions/agentmemory
                chmod 400 /home/node/.openclaw/extensions/agentmemory/*
        containers:
          app:
            image:
              repository: ghcr.io/openclaw/openclaw
              tag: 2026.6.8@sha256:9f55f0cb32b2925a983f40726440189b8f422ec61ae2a0fb0cf90403cf6d63d7
            command:
              - /bin/sh
              - -c
              - |
                # Install the memini memory plugin from ClawHub, version-guarded:
                # only fetches when the pinned version differs from what's on the
                # persistent volume, so normal restarts stay offline.
                # renovate: datasource=github-tags depName=eleboucher/memini
                MEMINI_PLUGIN_VERSION=0.4.6
                if [ "$(cat "$HOME/.openclaw/extensions/memini/.clawver" 2>/dev/null)" != "$MEMINI_PLUGIN_VERSION" ]; then
                  if node dist/index.js plugins install "clawhub:@eleboucher/memini@$MEMINI_PLUGIN_VERSION" --pin --force; then
                    printf '%s' "$MEMINI_PLUGIN_VERSION" > "$HOME/.openclaw/extensions/memini/.clawver"
                  else
                    echo "WARN: memini plugin install failed; starting with whatever is present"
                  fi
                fi
                # Start gateway
                exec node dist/index.js gateway --bind lan
            env:
              OPENCLAW_LOG_LEVEL: debug
              BROWSER_WS_ENDPOINT: "ws://localhost:9222"
              GOPATH: /home/node/go
              HOME: &homepath /home/node
              HOMEBREW_CELLAR: /home/node/.local/homebrew/Cellar
              HOMEBREW_PREFIX: /home/node/.local/homebrew
              HOMEBREW_REPOSITORY: /home/node/.local/homebrew
              OPENCLAW_GATEWAY_PORT: &port 18789
              PATH: /home/node/.local/bin:/home/node/.local/go/bin:/home/node/.local/homebrew/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
              PIP_BREAK_SYSTEM_PACKAGES: "1"
              TERM: xterm-256color
              TZ: &tz America/Edmonton
            envFrom:
              - secretRef:
                  name: openclaw
            resources:
              requests:
                cpu: 1
                memory: 2Gi
              limits:
                cpu: 10
                memory: 16Gi
          codeserver:
            image:
              repository: ghcr.io/coder/code-server
              tag: 4.124.2@sha256:726c75e330d99c9e6545ff1208042ccc3d97465cf24cdb48b304d111a43cd441
            env:
              TZ: America/Edmonton
            args:
              [
                "--auth",
                "none",
                "--user-data-dir",
                "/home/node/.vscode",
                "--extensions-dir",
                "/home/node/.vscode",
                "--port",
                "12321",
                "/config",
              ]
            resources:
              requests:
                cpu: 10m
              limits:
                memory: 1Gi
    persistence:
      openclaw-home:
        type: emptyDir
      config:
        existingClaim: "{{ .Release.Name }}"
        globalMounts:
          - path: *homepath
      data:
        type: nfs
        server: voyager.internal
        path: /mnt/delta/miso
        globalMounts:
          - path: /data
      downloads:
        type: nfs
        server: voyager.internal
        path: /mnt/akademiya/data
        globalMounts:
          - path: /downloads
            subPath: metube
      images:
        type: nfs
        server: voyager.internal
        path: /mnt/daena/comfyui/output
        globalMounts:
          - path: /home/node/.openclaw/workspace/images
      configmap:
        type: configMap
        name: "{{ .Release.Name }}-config"
        defaultMode: 0755
        globalMounts:
          - path: /tmp/openclaw.json
            subPath: openclaw.json
      agentmemory-plugin:
        type: configMap
        name: openclaw-agentmemory-plugin
        defaultMode: 0755
        globalMounts:
          - path: /tmp/agentmemory-plugin/openclaw.plugin.json
            subPath: openclaw.plugin.json
          - path: /tmp/agentmemory-plugin/package.json
            subPath: package.json
          - path: /tmp/agentmemory-plugin/plugin.mjs
            subPath: plugin.mjs
    rbac:
      roles:
        # Cluster-wide pod delete — restart any pod in any namespace
        openclaw-pod-delete-cluster-wide:
          type: ClusterRole
          rules:
            - apiGroups: [""]
              resources: ["pods"]
              verbs: ["delete"]
        # Namespace-scoped exec + deploy patch — llm namespace only
        openclaw-exec-deploy-llm:
          type: Role
          rules:
            - apiGroups: [""]
              resources: ["pods/exec"]
              verbs: ["create"]
            - apiGroups: ["apps"]
              resources: ["deployments"]
              verbs: ["patch", "update"]
      bindings:
        # Cluster-wide binding for pod delete
        openclaw-pod-delete-cluster-wide:
          type: ClusterRoleBinding
          roleRef:
            identifier: openclaw-pod-delete-cluster-wide
          subjects:
            - identifier: openclaw
              serviceAccount: openclaw
        # Namespace-scoped binding for exec+deploy — llm namespace only
        openclaw-exec-deploy-llm:
          type: RoleBinding
          roleRef:
            identifier: openclaw-exec-deploy-llm
          subjects:
            - identifier: openclaw
              serviceAccount: openclaw
              namespace: llm
    route:
      app:
        hostnames: ["miso.jory.dev"]
        parentRefs:
          - name: envoy-internal
            namespace: network
        rules:
          - backendRefs:
              - name: "{{ .Release.Name }}"
                port: *port
      codeserver:
        hostnames: ["miso-code.jory.dev"]
        parentRefs:
          - name: envoy-internal
            namespace: network
        rules:
          - backendRefs:
              - name: "{{ .Release.Name }}"
                port: &codeserverPort 12321
    service:
      app:
        type: LoadBalancer
        annotations:
          lbipam.cilium.io/ips: 10.69.10.41
        externalTrafficPolicy: Cluster
        ports:
          http:
            port: *port
          codeserver:
            port: *codeserverPort
    serviceAccount:
      openclaw: {}

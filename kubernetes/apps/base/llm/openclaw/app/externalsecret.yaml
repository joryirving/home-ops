---
# yaml-language-server: $schema=https://kube-schemas.pages.dev/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: &name openclaw
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword
  target:
    name: *name
    template:
      engineVersion: v2
      data:
        OPENCLAW_GATEWAY_TOKEN: "{{ .OPENCLAW_GATEWAY_TOKEN }}"
        DISCORD_BOT_TOKEN: "{{ .MISO_BOT_TOKEN }}"
        SAFFRON_BOT_TOKEN: "{{ .SAFFRON_BOT_TOKEN }}"
        MATCHA_BOT_TOKEN: "{{ .MATCHA_BOT_TOKEN }}"
        GH_PAT: "{{ .ITS_MISO_PAT }}"
        MINIMAX_API_KEY: "{{ .MINIMAX_API_KEY }}"
        MOONSHOT_API_KEY: "{{ .MOONSHOT_API_KEY }}"
        DISCORD_ADMIN_USER_ID: "{{ .DISCORD_ADMIN_USER_ID }}"
        DISCORD_SERVER_ID: "{{ .DISCORD_SERVER_ID }}"
        MATCHA_CHANNEL_ID: "{{ .MATCHA_CHANNEL_ID }}"
        COMPOSIO_API_KEY: "{{ .COMPOSIO_API_KEY }}"
        LITELLM_API_KEY: "{{ .LITELLM_MASTER_KEY }}"
        ACTUAL_SYNC_ID: "{{ .ACTUAL_SYNC_ID }}"
        ACTUAL_PASSWORD: "{{ .ACTUAL_PASSWORD_SRC }}"
        MISO_GALLERY_API_KEY: "{{ .LLM_API_KEYS }}"
        OPENAI_CODEX_USERNAME: "{{ .OPENAI_CODEX_USERNAME }}"
  dataFrom:
    - extract:
        key: openclaw
    - extract:
        key: composio
    - extract:
        key: github-miso
    - extract:
        key: minimax
    - extract:
        key: moonshot
    - extract:
        key: litellm
    - extract:
        key: miso-gallery
    - extract:
        key: actual
      rewrite:
        - regexp:
            source: ^password$
            target: ACTUAL_PASSWORD_SRC

# yaml-language-server: $schema=https://kube-schemas.pages.dev/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: &name openclaw
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword
  target:
    name: *name
    template:
      data:
        ## Gateway token for authentication
        OPENCLAW_GATEWAY_TOKEN: "{{ .OPENCLAW_GATEWAY_TOKEN }}"
        ##Discord
        DISCORD_BOT_TOKEN: "{{ .MISO_BOT_TOKEN }}"
        # MAPLE_BOT_TOKEN: "{{ .MAPLE_BOT_TOKEN }}"
        # SAGE_BOT_TOKEN: "{{ .SAGE_BOT_TOKEN }}"
        SAFFRON_BOT_TOKEN: "{{ .SAFFRON_BOT_TOKEN }}"
        MATCHA_BOT_TOKEN: "{{ .MATCHA_BOT_TOKEN }}"
        ## GH Access
        GITHUB_APP_CLIENT_ID: "{{ .MISO_BOT_CLIENT_ID }}"
        GITHUB_APP_CLIENT_SECRET: "{{ .MISO_BOT_CLIENT_SECRET }}"
        GITHUB_APP_ID: "{{ .MISO_BOT_ID }}"
        GITHUB_APP_INSTALLATION_ID: "{{ .MISO_BOT_INSTALLATION_ID }}"
        GITHUB_APP_PRIVATE_KEY: "{{ .MISO_BOT_PRIVATE_KEY }}"
        GH_PAT: "{{ .ITS_MISO_PAT }}"
        ## API Keys
        MINIMAX_API_KEY: "{{ .MINIMAX_API_KEY }}"
        ## HASS
        HASS_URL: "https://hass.jory.dev"
        HASS_TOKEN: "{{ .HOME_ASSISTANT_TOKEN }}"
        ## META
        COMMONS_API_KEY: "{{ .AGENTCOMMONS_API_KEY }}"
        INSTAGRAM_BASIC_TOKEN: "{{ .INSTAGRAM_BASIC_TOKEN }}"
        INSTAGRAM_SHORT_LIVED_GRAPH_TOKEN: "{{ .INSTAGRAM_GRAPH_TOKEN }}"
        FACEBOOK_APP_ID: "{{ .FACEBOOK_APP_ID }}"
        FACEBOOK_APP_SECRET: "{{ .FACEBOOK_APP_SECRET }}"
  dataFrom:
  - extract:
      key: openclaw
---
# yaml-language-server: $schema=https://kube-schemas.pages.dev/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: &name huggingface
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword
  target:
    name: *name
    template:
      data:
        HF_TOKEN: "{{ .HF_TOKEN }}"
  dataFrom:
  - extract:
      key: openclaw
---
# yaml-language-server: $schema=https://kube-schemas.pages.dev/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: &name openclaw-actual
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword
  target:
    name: *name
    template:
      data:
        ACTUAL_SYNC_ID: "{{ .ACTUAL_SYNC_ID }}"
        ACTUAL_PASSWORD: "{{ .password }}"
  dataFrom:
  - extract:
      key: actual
---
# yaml-language-server: $schema=https://kube-schemas.pages.dev/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: &name openclaw-miso-gallery
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword
  target:
    name: *name
    template:
      data:
        MISO_GALLERY_API_KEY: "{{ .LLM_API_KEYS }}"
  dataFrom:
    - extract:
        key: miso-gallery
---
# yaml-language-server: $schema=https://kube-schemas.pages.dev/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: &name openclaw-config
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword
  target:
    name: *name
    template:
      data:
        openclaw.json: |
          {
            agents: {
              defaults: {
                llm: {
                  idleTimeoutSeconds: 300,
                },
                model: {
                  primary: "minimax/MiniMax-M2.7",
                  fallbacks: [
                    "llama-server/self-hosted",
                    "openai-codex/gpt-5.4-mini",
                  ]
                },
                imageModel: {
                  primary: "llama-vision/vision",
                  fallbacks: [
                    "llama-server/self-hosted",
                    "openai-codex/gpt-5.4-mini",
                  ]
                },
                imageGenerationModel: {
                  primary: "comfy/workflow",
                },
                models: {
                  "moonshot/kimi-k2.5": { alias: "moonshot" },
                  "minimax/MiniMax-M2.7": { alias: "minimax" },
                  "llama-server/self-hosted": { alias: "skirk", params: { cache_prompt: true } },
                  "openai-codex/gpt-5.5": { alias: "gpt" },
                  "openai-codex/gpt-5.4-mini": { alias: "gpt-mini" },
                  "openai-codex/gpt-5.4-nano": { alias: "gpt-lite" },
                  "openai-codex/gpt-5.3-codex": { alias: "gpt-coder" },
                  "llama-vision/vision": { alias: "vision" },
                  "llama-memory/memory": { alias: "memory" },
                },
                memorySearch: {
                  provider: "local",
                  local: { modelPath: "hf:ggml-org/embeddinggemma-300M-GGUF/embeddinggemma-300M-Q8_0.gguf" },
                  sync: { watch: true },
                  query: { hybrid: { enabled: true, vectorWeight: 0.7, textWeight: 0.3 }
                  }
                },
                contextPruning: { mode: "cache-ttl", ttl: "24h", keepLastAssistants: 4, softTrimRatio: 0.3, hardClearRatio: 0.5, minPrunableToolChars: 6000, softTrim: { maxChars: 4000, headChars: 1500, tailChars: 1500 }, hardClear: { enabled: true, placeholder: "[Old tool result content cleared]" }, },
                compaction: {
                  mode: "default",
                  reserveTokensFloor: 24000,
                  memoryFlush: { enabled: true, softThresholdTokens: 12000, prompt: "Extract key decisions, state changes, lessons, blockers to memory/YYYY-MM-DD.md. Format: ## [HH:MM] Topic. Skip routine work. NO_FLUSH if nothing important.", systemPrompt: "Compacting session context. Extract only what's worth remembering. No fluff." },
                },
                maxConcurrent: 4,
                subagents: {
                  model: {
                    primary: "minimax/MiniMax-M2.7",
                  },
                  archiveAfterMinutes: 120,
                  maxConcurrent: 3,
                  thinking: "low",
                },
                heartbeat: {
                  directPolicy: "allow",
                  lightContext: true,
                  // isolatedSession: true,
                  includeReasoning: true,
                },
                timeoutSeconds: 600
              },
              list: [
                {
                  id: "main",
                  default: true,
                  name: "Miso",
                  heartbeat: { every: "60m", model: "minimax/MiniMax-M2.7", activeHours: { start: "06:00", end: "23:00" }, },
                  workspace: "/home/node/.openclaw/workspace",
                  agentDir: "/home/node/.openclaw/agents/main/agent",
                  identity: {
                    name: "Miso",
                    avatar: "avatars/miso_avatar.png",
                  }
                },
                {
                  id: "matcha",
                  name: "Matcha",
                  workspace: "/home/node/.openclaw/workspace-matcha",
                  agentDir: "/home/node/.openclaw/agents/matcha/agent",
                  tools: { allow: ["exec", "message", "read", "web_fetch", "image", "memory_recall", "memory_store"] },

                  model: {
                    primary: "minimax/MiniMax-M2.7",
                  fallbacks: [
                      "llama-server/self-hosted",
                      "openai-codex/gpt-5.4-mini",
                    ]
                  },
                  identity: {
                    name: "Matcha",
                    avatar: "avatars/matcha_avatar.png",
                  }
                },
                {
                  id: "saffron",
                  name: "Saffron",
                  heartbeat: { every: "60m", model: "llama-server/self-hosted", activeHours: { start: "06:00", end: "23:00" }, },
                  workspace: "/home/node/.openclaw/workspace-saffron",
                  agentDir: "/home/node/.openclaw/agents/saffron/agent",
                  tools: { allow: ["exec", "read", "write", "kubectl", "web_fetch", "browser", "sessions_spawn", "memory_recall", "memory_store", "mcp"] },

                  model: {
                    primary: "llama-server/self-hosted",
                    fallbacks: [
                      "minimax/MiniMax-M2.7",
                      "openai-codex/gpt-5.5",
                    ]
                  },
                  identity: {
                    name: "Saffron",
                    avatar: "avatars/sage_avatar.png",
                  }
                },
              ],
            },
            tools: {
              media: { image: { timeoutSeconds: 180 } },
              sessions: { visibility: "all" },
              agentToAgent: { enabled: true },
              exec: { security: "full", ask: "off", strictInlineEval: false },
              elevated: { enabled: true, allowFrom: { discord: ["{{ .DISCORD_ADMIN_USER_ID }}"] } },
              web: { search: { enabled: true, openaiCodex: { enabled: true, mode: "cached" } }, fetch: { enabled: true } },
            },
            commands: {
              native: "auto",
              nativeSkills: "auto",
              restart: false,
              allowFrom: { discord: ["user:{{ .DISCORD_ADMIN_USER_ID }}"] },
            },
            models: {
              providers: {
                moonshot: {
                  baseUrl: "https://api.moonshot.ai/v1",
                  apiKey: "{{ .MOONSHOT_API_KEY }}",
                  api: "openai-completions",
                  models: [
                    { id: "kimi-k2.5", name: "Kimi K2.5", reasoning: false, input: ["text"], cost: { input: 0.6, output: 3, cacheRead: 0.1, cacheWrite: 0.6 }, contextWindow: 128000, maxTokens: 8192 },
                  ]
                },
                minimax: {
                  baseUrl: "https://api.minimax.io/anthropic",
                  apiKey: "{{ .MINIMAX_API_KEY }}",
                  api: "anthropic-messages",
                  models: [
                    { id: "MiniMax-M2.7", name: "MiniMax M2.7", reasoning: false, input: ["text"], cost: { input: 15, output: 60, cacheRead: 2, cacheWrite: 10 }, contextWindow: 1000000, maxTokens: 32768, },
                    { id: "MiniMax-VL-01", name: "MiniMax VL-01", reasoning: false, input: ["text", "image"], cost: { input: 15, output: 60, cacheRead: 2, cacheWrite: 10 }, contextWindow: 1000000, maxTokens: 32768, },
                  ],
                },
                "llama-memory": {
                  baseUrl: "http://llama-memory.llm:8080/v1",
                  apiKey: "llama-memory",
                  api: "openai-completions",
                  models: [
                    { id: "memory", name: "Gemma-4 E4B-IT UD Q4_K_XL (ROCm)", reasoning: false, input: ["text","image"], cost: { input: 0, output: 0, cacheRead: 0, cacheWrite: 0 }, contextWindow: 16384, maxTokens: 8192 },
                  ]
                },
                "llama-server": {
                  baseUrl: "http://llama-server.llm:8080/v1",
                  apiKey: "llama-server",
                  api: "openai-completions",
                  models: [
                    { id: "self-hosted", name: "Gemma 4 26B-A4B-IT UD Q5_K_XL (ROCm)", reasoning: false, input: ["text","image"], cost: { input: 0, output: 0, cacheRead: 0, cacheWrite: 0 }, contextWindow: 262144, maxTokens: 8192 },
                  ]
                },
                "llama-vision": {
                  baseUrl: "http://llama-vision.llm:8080/v1",
                  apiKey: "llama-vision",
                  api: "openai-completions",
                  models: [
                    { id: "vision", name: "Qwen3.5-9B-heretic Q4_K_M (ROCm)", reasoning: false, input: ["text","image"], cost: { input: 0, output: 0, cacheRead: 0, cacheWrite: 0 }, contextWindow: 131072, maxTokens: 8192 },
                  ]
                },
              }
            },
            auth: {
              profiles: {
                "kimi-coding:default": { provider: "kimi-coding", mode: "api_key" },
                "openai-codex:default": { provider: "openai-codex", mode: "oauth" },
                "openai-codex:{{ .OAUTH_EMAIL }}": { provider: "openai-codex", mode: "oauth" },
              },
            },
            bindings: [
              { agentId: "main",    match: { channel: "discord", accountId: "default" } },
              { agentId: "saffron", match: { channel: "discord", accountId: "saffron" } },
              { agentId: "matcha",  match: { channel: "discord", accountId: "matcha" } },
              { agentId: "main",    match: { channel: "discord", accountId: "default", peer: { kind: "channel", id: "{{ .MISO_CHANNEL_ID }}" } } },
              { agentId: "saffron", match: { channel: "discord", accountId: "saffron", peer: { kind: "channel", id: "{{ .SAFFRON_CHANNEL_ID }}" } } },
              { agentId: "matcha",  match: { channel: "discord", accountId: "matcha", peer: { kind: "channel", id: "{{ .MATCHA_CHANNEL_ID }}" } } },
            ],
            channels: {
              discord: {
                enabled: true,
                defaultAccount: "default",
                actions: {
                  messages: true,
                  channels: true,
                  search: true,
                  reactions: false,
                  stickers: false,
                  polls: false,
                  permissions: false,
                  threads: false,
                  pins: false,
                  memberInfo: false,
                  roleInfo: false,
                  roles: false,
                  channelInfo: false,
                  voiceStatus: false,
                  events: false,
                  moderation: false,
                  emojiUploads: false,
                  stickerUploads: false,
                },
                streaming: { block: { enabled: true } },
                groupPolicy: "allowlist",
                dmPolicy: "pairing",
                accounts: {
                  default: {
                    token: "{{ .MISO_BOT_TOKEN }}",
                    guilds: {
                      "{{ .DISCORD_SERVER_ID }}": {
                        channels: {
                          "{{ .MISO_CHANNEL_ID }}": { enabled: true, requireMention: false },
                          "{{ .SHARED_CHANNEL_ID }}": { enabled: true, requireMention: true },
                        },
                      },
                    },
                  },
                  saffron: {
                    token: "{{ .SAFFRON_BOT_TOKEN }}",
                    guilds: {
                      "{{ .DISCORD_SERVER_ID }}": {
                        channels: {
                          "{{ .SAFFRON_CHANNEL_ID }}": { enabled: true, requireMention: false },
                          "{{ .SHARED_CHANNEL_ID }}": { enabled: true, requireMention: true },
                        },
                      },
                    },
                  },
                  matcha: {
                    token: "{{ .MATCHA_BOT_TOKEN }}",
                    guilds: {
                      "{{ .DISCORD_SERVER_ID }}": {
                        channels: {
                          "{{ .MATCHA_CHANNEL_ID }}": { enabled: true, requireMention: false },
                        },
                      },
                    },
                  },
                },
              },
            },
            plugins: {
              allow: [
                "comfy",
                "composio",
                "discord",
                "lossless-claw",
                "memory-lancedb-pro",
                "openclaw-better-gateway",
                "openclaw-mcp-bridge",
                "searxng",
                "memory-wiki",
                "minimax",
                "openai",
                "moonshot",
                "browser",
              ],
              entries: {
                discord: { enabled: true },
                comfy: {
                  enabled: true,
                  config: {
                    mode: "local",
                    allowPrivateNetwork: true,
                    baseUrl: "http://10.69.10.44:8188",
                    image: {
                      workflowPath: "/home/node/.openclaw/workflows/openclaw-generate.json",
                      promptNodeId: "2",
                      outputNodeId: "7",
                    },
                  },
                },
                "memory-lancedb-pro": {
                  enabled: true,
                  config: {
                    embedding: {
                      apiKey: "ollama",
                      model: "nomic-embed-text",
                      baseURL: "http://ollama.llm:11434/v1",
                      dimensions: 768,
                      taskQuery: "retrieval.query",
                      taskPassage: "retrieval.passage",
                      normalized: true,
                    },
                    llm: {
                      model: "memory",
                      baseURL: "http://llama-memory.llm:8080/v1",
                      auth: "api-key",
                      timeoutMs: 120000,
                    },
                    enableManagementTools: false,
                    sessionStrategy: "none",
                    autoCapture: true,
                    autoRecall: true,
                    autoRecallMinLength: 15,
                    autoRecallMinRepeated: 8,
                    autoRecallMaxItems: 3,
                    autoRecallMaxChars: 600,
                    autoRecallPerItemMaxChars: 180,
                    smartExtraction: true,
                    extractMinMessages: 2,
                    extractMaxChars: 8000,
                    retrieval: {
                      mode: "hybrid",
                      vectorWeight: 0.7,
                      bm25Weight: 0.3,
                      filterNoise: true,
                      minScore: 0.25,
                      hardMinScore: 0.28,
                    },
                    scopes: {
                      definitions: {
                        "global": { description: "Shared memories across all agents" },
                        "matcha": { description: "Matcha's private memories" },
                        "miso": { description: "Miso's private memories" },
                        "rag:miso": { description: "Miso RAG corpus - chat, preferences" },
                        "rag:saffron": { description: "Saffron RAG corpus - code, infra, docs" },
                        "rag:shared": { description: "Shared team docs and conventions" },
                        "saffron": { description: "Saffron's private memories" },
                      },
                      agentAccess: {
                        "matcha": ["matcha"],
                        "miso": ["global", "miso", "rag:miso", "rag:shared"],
                        "saffron": ["global", "saffron", "rag:saffron", "rag:shared"],
                      },
                    },
                  },
                },
                "openclaw-better-gateway": {
                  enabled: true,
                  config: {
                    reconnectIntervalMs: 3000,
                    maxReconnectAttempts: 10,
                    maxFileSize: 10485760,
                    autoReconnectOnGap: true,
                    autoReconnectOnVisibility: true,
                    visibilityReconnectThresholdMs: 30000,
                  },
                },
                "lossless-claw": {
                  enabled: true,
                  config: {
                    freshTailCount: 32,
                    contextThreshold: 0.75,
                    summaryModel: "llama-memory/memory",
                    expansionModel: "llama-memory/memory",
                  },
                },
                "composio": {
                  enabled: true,
                  config: {
                    consumerKey: "{{ .COMPOSIO_API_KEY }}",
                  },
                },
                "openclaw-mcp-bridge": {
                  enabled: true,
                  config: {
                    mode: "router",
                    toolPrefix: true,
                    servers: {
                      toolhive: {
                        transport: "streamable-http",
                        url: "http://vmcp-mcp-gateway-internal.llm:4483/mcp",
                        description: "Optimized MCP tools via ToolHive (arr, garmin-connect, github, memory-mcp, seerr-mcp)"
                      },
                    }
                  },
                },
                searxng: {
                  enabled: true,
                  config: {
                    webSearch: {
                      baseUrl: "http://searxng.llm:8080",
                      language: "en"
                    }
                  }
                },
                "memory-wiki": {
                  enabled: true,
                  config: {
                    vaultMode: "bridge",
                    vault: {
                      path: "/home/node/.openclaw/wiki/main",
                      renderMode: "native",
                    },
                    bridge: {
                      enabled: true,
                      readMemoryArtifacts: true,
                      indexDreamReports: true,
                      indexDailyNotes: true,
                      indexMemoryRoot: true,
                      followMemoryEvents: true,
                    },
                    search: {
                      backend: "shared",
                      corpus: "all",
                    },
                    render: {
                      preserveHumanBlocks: true,
                      createBacklinks: true,
                      createDashboards: true,
                    },
                  },
                },
                minimax: {
                  enabled: true,
                },
                openai: {
                  enabled: true,
                },
                moonshot: {
                  enabled: true,
                },
                browser: {
                  enabled: true,
                },
              },
              slots: {
                memory: "memory-lancedb-pro",
                contextEngine: "lossless-claw"
              },
            },
            session: {
              dmScope: "main",
              reset: {
                mode: "idle",
                idleMinutes: 1440,
              },
              maintenance: {
                mode: "enforce",
                pruneAfter: "7d",
                maxEntries: 1000,
                rotateBytes: "100mb",
                resetArchiveRetention: "7d",
              },
            },
            gateway: {
              auth: { mode: "token", token: "{{ .OPENCLAW_GATEWAY_TOKEN }}" },
              tools: { allow: ["sessions_send"] },
              controlUi: { allowedOrigins: ["https://miso.jory.dev", "https://miso-chat.jory.dev", "https://mission-control.jory.dev"],},
              mode: "local",
              port: 18789,
              trustedProxies: ["10.42.0.0/16", "192.168.0.0/16"]
            },
            messages: {
              ackReactionScope: "group-mentions",
              responsePrefix: "[{model}]"
            },
          }
  dataFrom:
  - extract:
      key: openclaw
  - extract:
      key: seerr
  - extract:
      key: sonarr
  - extract:
      key: radarr
  - extract:
      key: prowlarr

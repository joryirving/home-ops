---
# yaml-language-server: $schema=https://kube-schemas.pages.dev/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: &name openclaw
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword
  target:
    name: *name
    template:
      data:
        ## Gateway token for authentication
        OPENCLAW_GATEWAY_TOKEN: "{{ .OPENCLAW_GATEWAY_TOKEN }}"
        ##Discord
        DISCORD_BOT_TOKEN: "{{ .DISCORD_BOT_TOKEN }}"
        MATCHA_BOT_TOKEN: "{{ .MATCHA_BOT_TOKEN }}"
        ## GH Access
        GITHUB_APP_CLIENT_ID: "{{ .MISO_BOT_CLIENT_ID }}"
        GITHUB_APP_CLIENT_SECRET: "{{ .MISO_BOT_CLIENT_SECRET }}"
        GITHUB_APP_ID: "{{ .MISO_BOT_ID }}"
        GITHUB_APP_INSTALLATION_ID: "{{ .MISO_BOT_INSTALLATION_ID }}"
        GITHUB_APP_PRIVATE_KEY: "{{ .MISO_BOT_PRIVATE_KEY }}"
        GH_PAT: "{{ .ITS_MISO_PAT }}"
        ## API Keys
        OPENAI_API_KEY: "{{ .OPENAI_API_KEY }}"
        GOOGLE_AI_STUDIO_API_KEY: "{{ .GOOGLE_GEMINI_API_KEY }}"
        CEREBRAS_API_KEY: "{{ .CEREBRAS_API_KEY }}"
        GROQ_API_KEY: "{{ .GROQ_API_KEY }}"
        MISTRAL_API_KEY: "{{ .MISTRAL_API_KEY }}"
        KIMI_CODING_API_KEY: "{{ .KIMI_CODE_API_KEY }}"
        MINIMAX_API_KEY: "{{ .MINIMAX_API_KEY }}"
        OLLAMA_URL: "http://ollama.llm:11434"
        ## HASS
        HA_URL: "https://hass.jory.dev"
        HA_TOKEN: "{{ .HOME_ASSISTANT_TOKEN }}"
        ## META
        COMMONS_API_KEY: "{{ .AGENTCOMMONS_API_KEY }}"
        INSTAGRAM_BASIC_TOKEN: "{{ .INSTAGRAM_BASIC_TOKEN }}"
        INSTAGRAM_SHORT_LIVED_GRAPH_TOKEN: "{{ .INSTAGRAM_GRAPH_TOKEN }}"
        FACEBOOK_APP_ID: "{{ .FACEBOOK_APP_ID }}"
        FACEBOOK_APP_SECRET: "{{ .FACEBOOK_APP_SECRET }}"
  dataFrom:
    - extract:
        key: openclaw
---
# yaml-language-server: $schema=https://kube-schemas.pages.dev/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: &name huggingface
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword
  target:
    name: *name
    template:
      data:
        HF_TOKEN: "{{ .HF_TOKEN }}"
  dataFrom:
    - extract:
        key: openclaw
---
# yaml-language-server: $schema=https://kube-schemas.pages.dev/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: &name openclaw-garmin
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword
  target:
    name: *name
    template:
      data:
        GARMIN_EMAIL: "{{ .username }}"
        GARMIN_PASSWORD: "{{ .password }}"
  dataFrom:
    - extract:
        key: garmin
---
# yaml-language-server: $schema=https://kube-schemas.pages.dev/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: &name openclaw-actual
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword
  target:
    name: *name
    template:
      data:
        ACTUAL_SYNC_ID: "{{ .ACTUAL_SYNC_ID }}"
        ACTUAL_PASSWORD: "{{ .password }}"
  dataFrom:
    - extract:
        key: actual
---
# yaml-language-server: $schema=https://kube-schemas.pages.dev/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: &name openclaw-mission-control
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword
  target:
    name: *name
    template:
      data:
        AUTH_USER: "{{ .username }}"
        AUTH_PASS: "{{ .password }}"
        API_KEY: "{{ .API_KEY }}"
        OPENCLAW_GATEWAY_TOKEN: "{{ .OPENCLAW_GATEWAY_TOKEN }}"
  dataFrom:
    - extract:
        key: mission-control
  data:
    - secretKey: OPENCLAW_GATEWAY_TOKEN
      remoteRef:
        key: openclaw
        property: OPENCLAW_GATEWAY_TOKEN
---
# yaml-language-server: $schema=https://kube-schemas.pages.dev/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: &name openclaw-config
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword
  target:
    name: *name
    template:
      data:
        ## OpenClaw configuration file
        openclaw.json: |
          {
            agents: {
              defaults: {
                model: {
                  primary: "minimax/MiniMax-M2.7",
                  fallbacks: [
                    "llama-server/qwen35b",
                    "openai-codex/gpt-5.4",
                  ]
                },
                imageModel: {
                  primary: "minimax/MiniMax-VL-01",
                  fallbacks: [
                    "llama-server/qwen35b"
                  ]
                },
                models: {
                  "moonshot/kimi-k2.5": { alias: "moonshot" },
                  "minimax/MiniMax-M2.7": { alias: "minimax" },
                  "llama-server/qwen35b": { alias: "skirk", params: { cache_prompt: true } },
                  "openai-codex/gpt-5.4": { alias: "gpt" },
                  "openai-codex/gpt-5.4-mini": { alias: "gpt-mini" },
                  "openai-codex/gpt-5.4-nano": { alias: "gpt-lite" },
                  "openai-codex/gpt-5.3-codex": { alias: "gpt-coder" },
                },
                memorySearch: {
                  provider: "local",
                  local: { modelPath: "hf:ggml-org/embeddinggemma-300M-GGUF/embeddinggemma-300M-Q8_0.gguf" },
                  fallback: "gemini",
                  model: "gemini-embedding-001",
                  sync: { watch: true },
                  query: { hybrid: { enabled: true, vectorWeight: 0.7, textWeight: 0.3 }
                  }
                },
                contextPruning: { mode: "cache-ttl", ttl: "24h", keepLastAssistants: 4, softTrimRatio: 0.3, hardClearRatio: 0.5, minPrunableToolChars: 12000, softTrim: { maxChars: 4000, headChars: 1500, tailChars: 1500 }, hardClear: { enabled: true, placeholder: "[Old tool result content cleared]" }, },
                compaction: {
                  mode: "default",
                  reserveTokensFloor: 24000,
                  memoryFlush: { enabled: true, softThresholdTokens: 12000, prompt: "Extract key decisions, state changes, lessons, blockers to memory/YYYY-MM-DD.md. Format: ## [HH:MM] Topic. Skip routine work. NO_FLUSH if nothing important.", systemPrompt: "Compacting session context. Extract only what's worth remembering. No fluff." },
                },
                maxConcurrent: 4,
                subagents: {
                  model: {
                    primary: "minimax/MiniMax-M2.7",
                  },
                  archiveAfterMinutes: 120,
                  maxConcurrent: 3,
                  thinking: "low",
                },
                heartbeat: {
                  directPolicy: "allow",
                  lightContext: true,
                  // isolatedSession: true,
                  includeReasoning: true,
                },
                timeoutSeconds: 600
              },
              list: [
                {
                  id: "main",
                  default: true,
                  name: "Miso",
                  heartbeat: { every: "60m", model: "minimax/MiniMax-M2.7", activeHours: { start: "06:00", end: "23:00" }, },
                  workspace: "/home/node/.openclaw/workspace",
                  agentDir: "/home/node/.openclaw/agents/main/agent",
                  identity: {
                    name: "Miso",
                    avatar: "avatars/miso_avatar.png",
                  }
                },
                {
                  id: "matcha",
                  name: "Matcha",
                  workspace: "/home/node/.openclaw/workspace-matcha",
                  agentDir: "/home/node/.openclaw/agents/matcha/agent",
                  tools: { allow: ["exec", "message", "read", "web_fetch", "image", "memory_recall", "memory_store"] },
                  model: {
                    primary: "minimax/MiniMax-M2.7",
                  fallbacks: [
                      "llama-server/qwen35b",
                      "openai-codex/gpt-5.4-nano",
                    ]
                  },
                  identity: {
                    name: "Matcha",
                    avatar: "avatars/matcha_avatar.png",
                  }
                },
                {
                  id: "sage",
                  name: "Sage",
                  heartbeat: { every: "60m", model: "llama-server/qwen35b", activeHours: { start: "06:00", end: "23:00" }, },
                  workspace: "/home/node/.openclaw/workspace-sage",
                  agentDir: "/home/node/.openclaw/agents/sage/agent",
                  tools: { allow: ["exec", "read", "memory_recall", "memory_store"] },
                  model: {
                    primary: "llama-server/qwen35b",
                  },
                  identity: {
                    name: "Sage",
                    avatar: "avatars/sage_avatar.png",
                  },
                },
                {
                  id: "maple",
                  name: "Maple",
                  heartbeat: { every: "60m", model: "minimax/MiniMax-M2.7", activeHours: { start: "06:00", end: "23:00" }, },
                  workspace: "/home/node/.openclaw/workspace-maple",
                  agentDir: "/home/node/.openclaw/agents/maple/agent",
                  tools: { allow: ["exec", "read", "web_fetch", "memory_recall", "memory_store", "COMPOSIO_SEARCH_TOOLS", "COMPOSIO_MULTI_EXECUTE_TOOL", "COMPOSIO_GET_TOOL_SCHEMAS", "COMPOSIO_MANAGE_CONNECTIONS", "COMPOSIO_WAIT_FOR_CONNECTIONS"] },
                  model: {
                    primary: "minimax/MiniMax-M2.7",
                    fallbacks: [
                      "openai-codex/gpt-5.4-mini",
                      "llama-server/qwen35b",
                    ]

                  },
                  identity: {
                    name: "Maple",
                    avatar: "avatars/maple_avatar.png",
                  },
                },
                {
                  id: "saffron",
                  name: "Saffron",
                  heartbeat: { every: "60m", model: "llama-server/qwen35b", activeHours: { start: "06:00", end: "23:00" }, },
                  workspace: "/home/node/.openclaw/workspace-saffron",
                  agentDir: "/home/node/.openclaw/agents/saffron/agent",
                  tools: { allow: ["exec", "read", "write", "kubectl", "web_fetch", "browser", "memory_recall", "memory_store"] },
                  model: {
                    primary: "llama-server/qwen35b",
                    fallbacks: [
                      "openai-codex/gpt-5.4",
                      "minimax/MiniMax-M2.7",
                      "openai-codex/gpt-5.3-codex",
                    ]
                  },
                  identity: {
                    name: "Saffron",
                    avatar: "avatars/sage_avatar.png",
                  }
                },
              ],
            },
            tools: {
              sessions: { visibility: "all" },
              agentToAgent: { enabled: true },
              deny: ["web_search"],
            },
            commands: {
              native: "auto",
              nativeSkills: "auto",
              restart: false,
              allowFrom: { discord: ["user:{{ .DISCORD_ADMIN_USER_ID }}"] },
            },
            models: {
              providers: {
                moonshot: {
                  baseUrl: "https://api.moonshot.ai/v1",
                  apiKey: "{{ .MOONSHOT_API_KEY }}",
                  api: "openai-completions",
                  models: [
                    { id: "kimi-k2.5", name: "Kimi K2.5", reasoning: false, input: ["text"], cost: { input: 0.6, output: 3, cacheRead: 0.1, cacheWrite: 0.6 }, contextWindow: 128000, maxTokens: 8192 },
                  ]
                },
                minimax: {
                  baseUrl: "https://api.minimax.io/anthropic",
                  apiKey: "{{ .MINIMAX_API_KEY }}",
                  api: "anthropic-messages",
                  models: [
                    { id: "MiniMax-M2.7", name: "MiniMax M2.7", reasoning: false, input: ["text"], cost: { input: 15, output: 60, cacheRead: 2, cacheWrite: 10 }, contextWindow: 1000000, maxTokens: 32768, },
                    { id: "MiniMax-VL-01", name: "MiniMax VL-01", reasoning: false, input: ["text", "image"], cost: { input: 15, output: 60, cacheRead: 2, cacheWrite: 10 }, contextWindow: 1000000, maxTokens: 32768, },
                  ],
                },
                "llama-server": {
                  baseUrl: "http://llama-server.llm:8080/v1",
                  apiKey: "llama-server",
                  api: "openai-completions",
                  models: [
                    { id: "qwen35b", name: "Qwen 3.5 35B UD Q4 (ROCm)", reasoning: false, input: ["text","image"], cost: { input: 0, output: 0, cacheRead: 0, cacheWrite: 0 }, contextWindow: 262144, maxTokens: 16384 },
                  ]
                },
              }
            },
            auth: {
              profiles: {
                "kimi-coding:default": { provider: "kimi-coding", mode: "api_key" },
                "openai-codex:default": { provider: "openai-codex", mode: "oauth" },
                "openai-codex:{{ .OAUTH_EMAIL }}": { provider: "openai-codex", mode: "oauth" },
              },
            },
            bindings: [
              { agentId: "main",    match: { channel: "discord", accountId: "default" } },
              { agentId: "main",    match: { channel: "discord", accountId: "default", peer: { kind: "channel", id: "{{ .MISO_CHANNEL_ID }}" } } },
              { agentId: "sage",    match: { channel: "discord", accountId: "default", peer: { kind: "channel", id: "{{ .SAGE_CHANNEL_ID }}" } } },
              { agentId: "maple",   match: { channel: "discord", accountId: "default", peer: { kind: "channel", id: "{{ .MAPLE_CHANNEL_ID }}" } } },
              { agentId: "saffron", match: { channel: "discord", accountId: "default", peer: { kind: "channel", id: "{{ .SAFFRON_CHANNEL_ID }}" } } },
              { agentId: "matcha",  match: { channel: "discord", accountId: "matcha" } },
            ],

            channels: {
              discord: {
                enabled: true,
                actions: {
                  messages: true,
                  channels: true,
                  search: true,
                  reactions: false,
                  stickers: false,
                  polls: false,
                  permissions: false,
                  threads: false,
                  pins: false,
                  memberInfo: false,
                  roleInfo: false,
                  roles: false,
                  channelInfo: false,
                  voiceStatus: false,
                  events: false,
                  moderation: false,
                  emojiUploads: false,
                  stickerUploads: false,
                },
                blockStreaming: true,
                groupPolicy: "allowlist",
                dmPolicy: "pairing",
                accounts: {
                  default: {
                    token: "{{ .DISCORD_BOT_TOKEN }}",
                    guilds: {
                      "{{ .DISCORD_SERVER_ID }}": {
                        channels: {
                          "{{ .MISO_CHANNEL_ID }}":     { allow: true, requireMention: false },
                          "{{ .SAGE_CHANNEL_ID }}":     { allow: true, requireMention: false },
                          "{{ .MAPLE_CHANNEL_ID }}":    { allow: true, requireMention: false },
                          "{{ .SAFFRON_CHANNEL_ID }}":  { allow: true, requireMention: false },
                        },
                      },
                    },
                  },
                  matcha: {
                    token: "{{ .MATCHA_BOT_TOKEN }}",
                    guilds: {
                      "{{ .DISCORD_SERVER_ID }}": {
                        channels: {
                          "{{ .MATCHA_CHANNEL_ID }}": { allow: true, requireMention: false },
                        },
                      },
                    },
                  },
                },
              },
            },
            plugins: {
              allow: [
                "discord",
                "memory-lancedb-pro",
                "lossless-claw",
                "openclaw-better-gateway",
                "composio",
              ],
              entries: {
                discord: { enabled: true },
                "memory-lancedb-pro": {
                  enabled: true,
                  config: {
                    embedding: {
                      provider: "openai-compatible",
                      apiKey: "ollama",
                      model: "nomic-embed-text",
                      baseURL: "http://ollama.llm:11434/v1",
                      chunking: true,
                    },
                    llm: {
                      model: "qwen9b",
                      baseURL: "http://llama-memory:8080/v1",
                      auth: "api-key",
                      timeoutMs: 30000,
                    },
                    enableManagementTools: false,
                    sessionStrategy: "none",
                    autoCapture: true,
                    autoRecall: true,
                    autoRecallMinLength: 15,
                    autoRecallMinRepeated: 8,
                    autoRecallMaxItems: 3,
                    autoRecallMaxChars: 600,
                    autoRecallPerItemMaxChars: 180,
                    smartExtraction: true,
                    extractMinMessages: 4,
                    extractMaxChars: 8000,
                    scopes: {
                      definitions: {
                        "global": { description: "Shared memories across all agents" },
                        "sage": { description: "Sage's private memories" },
                        "maple": { description: "Maple's private memories" },
                        "saffron": { description: "Saffron's private memories" },
                        "matcha": { description: "Matcha's private memories" }
                      },
                      agentAccess: {
                        "sage": ["global", "sage"],
                        "maple": ["global", "maple"],
                        "saffron": ["global", "saffron"],
                        "matcha": ["global", "matcha"]
                      },
                    },
                  },
                },
                "openclaw-better-gateway": {
                  enabled: true,
                  config: {
                    reconnectIntervalMs: 3000,
                    maxReconnectAttempts: 10,
                    maxFileSize: 10485760,
                    autoReconnectOnGap: true,
                    autoReconnectOnVisibility: true,
                    visibilityReconnectThresholdMs: 30000,
                  },
                },
                "lossless-claw": {
                  enabled: true,
                  config: {
                    freshTailCount: 32,
                    contextThreshold: 0.75
                  },
                },
                "composio": {
                  enabled: true,
                  config: {
                    consumerKey: "{{ .COMPOSIO_API_KEY }}",
                  },
                },
              },
              slots: {
                memory: "memory-lancedb-pro",
                contextEngine: "lossless-claw"
              },
            },
            session: {
              dmScope: "main",
              reset: {
                mode: "idle",
                idleMinutes: 1440,
              },
              maintenance: {
                mode: "enforce",
                pruneAfter: "7d",
                maxEntries: 1000,
                rotateBytes: "100mb",
                resetArchiveRetention: "7d",
              },
            },
            gateway: {
              auth: { mode: "token", token: "{{ .OPENCLAW_GATEWAY_TOKEN }}" },
              tools: { allow: ["sessions_send"] },
              controlUi: { allowedOrigins: ["https://miso.jory.dev", "https://miso-chat.jory.dev", "https://mission-control.jory.dev"],},
              mode: "local",
              port: 18789,
              trustedProxies: ["10.42.0.0/16", "192.168.0.0/16"]
            },
            messages: {
              ackReactionScope: "group-mentions",
              responsePrefix: "[{model}|{identity.name}]"
            },
            meta: {
              lastTouchedVersion: "2026.3.28",
              lastTouchedAt: "2026-03-29T03:23:23.088Z"
            }
          }
  dataFrom:
    - extract:
        key: openclaw

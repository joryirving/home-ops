# yaml-language-server: $schema=https://kube-schemas.pages.dev/external-secrets.io/externalsecret_v1.json
# Single Secret (openclaw) for gateway env: OpenClaw, LiteLLM HF downloads, Actual, Miso gallery.
# Rewrites disambiguate duplicate field names (password, username, LLM_API_KEYS) across 1Password items.
# OPENAI_CODEX_USERNAME: `username` on the openclaw item (email); renamed so litellm/github items cannot override.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: openclaw
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword
  target:
    name: openclaw
    template:
      engineVersion: v2
      data:
        OPENCLAW_GATEWAY_TOKEN: "{{ .OPENCLAW_GATEWAY_TOKEN }}"
        DISCORD_BOT_TOKEN: "{{ .MISO_BOT_TOKEN }}"
        SAFFRON_BOT_TOKEN: "{{ .SAFFRON_BOT_TOKEN }}"
        MATCHA_BOT_TOKEN: "{{ .MATCHA_BOT_TOKEN }}"
        GH_PAT: "{{ .ITS_MISO_PAT }}"
        MINIMAX_API_KEY: "{{ .MINIMAX_API_KEY }}"
        MOONSHOT_API_KEY: "{{ .MOONSHOT_API_KEY }}"
        DISCORD_ADMIN_USER_ID: "{{ .DISCORD_ADMIN_USER_ID }}"
        DISCORD_SERVER_ID: "{{ .DISCORD_SERVER_ID }}"
        MATCHA_CHANNEL_ID: "{{ .MATCHA_CHANNEL_ID }}"
        COMPOSIO_API_KEY: "{{ .COMPOSIO_API_KEY }}"
        LITELLM_API_KEY: "{{ .LITELLM_API_KEY }}"
        OPENAI_CODEX_USERNAME: "{{ .OPENAI_CODEX_USERNAME_SRC }}"
        HF_TOKEN: "{{ .HF_TOKEN }}"
        ACTUAL_SYNC_ID: "{{ .ACTUAL_SYNC_ID }}"
        ACTUAL_PASSWORD: "{{ .ACTUAL_PASSWORD_SRC }}"
        MISO_GALLERY_API_KEY: "{{ .MISO_GALLERY_API_KEY_SRC }}"
  dataFrom:
    - extract:
        key: openclaw
      rewrite:
        - regexp:
            source: ^username$
            target: OPENAI_CODEX_USERNAME_SRC
    - extract:
        key: composio
    - extract:
        key: github-miso
    - extract:
        key: minimax
    - extract:
        key: moonshot
    - extract:
        key: litellm
      rewrite:
        - regexp:
            source: ^password$
            target: LITELLM_API_KEY
    - extract:
        key: HuggingFace
    - extract:
        key: miso-gallery
      rewrite:
        - regexp:
            source: ^LLM_API_KEYS$
            target: MISO_GALLERY_API_KEY_SRC
    - extract:
        key: actual
      rewrite:
        - regexp:
            source: ^password$
            target: ACTUAL_PASSWORD_SRC

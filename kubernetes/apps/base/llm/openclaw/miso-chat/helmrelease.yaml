---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app miso-chat
spec:
  chartRef:
    kind: OCIRepository
    name: app-template
  dependsOn: []
  interval: 15m
  values:
    controllers:
      miso-chat:
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          app:
            image:
              repository: ghcr.io/joryirving/miso-chat
              tag: 0.4.6@sha256:f9566218aa01ab9af74c4906a3574c639a937079d71c5add8a2acaa48f2312e3
            env:
              REDIS_URL: "redis://{{ .Release.Name }}-dragonfly:6379"
              GATEWAY_DEVICE_IDENTITY_PATH: &path /secrets/device.json
              CORS_ORIGIN: "https://miso-chat.jory.dev"
              SESSION_COOKIE_SAMESITE: "none"
              SESSION_COOKIE_SECURE: "true"
            envFrom:
              - secretRef:
                  name: "{{ .Release.Name }}"
            resources:
              requests:
                cpu: 10m
                memory: 128Mi
              limits:
                memory: 512Mi
    service:
      app:
        ports:
          http:
            port: 3000
    route:
      app:
        hostnames: ["miso-chat.jory.dev"]
        parentRefs:
          - name: envoy-external
            namespace: network
        # rules:
        #   - backendRefs: [{}]
        #     sessionPersistence:
        #       sessionName: *app
        #       type: Cookie
        #       absoluteTimeout: 35m
    persistence:
      miso-chat-device:
        type: secret
        name: "{{ .Release.Name }}-device"
        globalMounts:
          - path: *path
            subPath: device.json

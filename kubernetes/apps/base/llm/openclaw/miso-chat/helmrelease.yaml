---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app miso-chat
spec:
  chartRef:
    kind: OCIRepository
    name: app-template
  interval: 15m
  dependsOn: []
  values:
    controllers:
      miso-chat:
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          app:
            image:
              repository: ghcr.io/misospace/miso-chat
              tag:
                0.4.11@sha256:7edc19293ed34df448f0c9c5f6a56a45124844d9d6fe9d9733a8bbb556e3a3f4
            env:
              REDIS_URL: "redis://{{ .Release.Name }}-dragonfly:6379"
              GATEWAY_DEVICE_IDENTITY_PATH: &path /secrets/device.json
              CORS_ORIGIN: "https://miso-chat.jory.dev"
              GATEWAY_WS_ORIGIN: "https://miso-chat.jory.dev"
              SESSION_COOKIE_SAMESITE: "none"
              SESSION_COOKIE_SECURE: "true"
            envFrom:
            - secretRef:
                name: "{{ .Release.Name }}"
            resources:
              requests:
                cpu: 10m
                memory: 128Mi
              limits:
                memory: 512Mi
    persistence:
      miso-chat-device:
        type: secret
        name: "{{ .Release.Name }}-device"
        globalMounts:
        - path: *path
          subPath: device.json
    route:
      app:
        hostnames: ["miso-chat.jory.dev"]
        parentRefs:
        - name: envoy-external
          namespace: network
        # rules:
        #   - backendRefs: [{}]
        #     sessionPersistence:
        #       sessionName: *app
        #       type: Cookie
        #       absoluteTimeout: 35m
    service:
      app:
        ports:
          http:
            port: 3000

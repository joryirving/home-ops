---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: llama-memory
spec:
  chartRef:
    kind: OCIRepository
    name: app-template
  interval: 15m
  dependsOn: []
  values:
    defaultPodOptions:
      hostIPC: true
      nodeSelector:
        kubernetes.io/hostname: skirk
        topology.kubernetes.io/gpus: amd
      tolerations:
      - key: llm-workload
        operator: Exists
        effect: NoSchedule
    controllers:
      llama-memory:
        annotations:
          reloader.stakater.com/auto: "true"
        initContainers:
          model-download:
            image:
              repository: python
              tag: 3.14-slim
            command:
            - /bin/sh
            - -ec
            - |
              set -euo pipefail

              if [ ! -s /models/memory/gemma-4-E4B-it-UD-Q4_K_XL.gguf ]; then
                pip install --no-cache-dir huggingface_hub
                mkdir -p /models/memory
                rm -rf /models/memory/.cache/huggingface/download/gemma-4-E4B-it-UD-Q4_K_XL.gguf.lock
                hf download \
                  unsloth/gemma-4-E4B-it-GGUF \
                  gemma-4-E4B-it-UD-Q4_K_XL.gguf \
                  --local-dir /models/memory

                echo "Gemma-4-E4B-it-UD-Q4_K_XL download complete"
              else
                echo "Gemma-4-E4B-it-UD-Q4_K_XL already downloaded, skipping"
              fi
            env:
              HF_HUB_ENABLE_HF_TRANSFER: "1"
            envFrom:
            - secretRef:
                name: huggingface
            resources:
              requests:
                cpu: 250m
                memory: 512Mi
              limits:
                memory: 4Gi
        containers:
          app:
            image:
              repository: docker.io/kyuz0/amd-strix-halo-toolboxes
              tag: rocm-7.2.2
            securityContext:
              privileged: true
            command:
            - llama-server
            args:
            - --host
            - 0.0.0.0
            - --port
            - "8080"
            - --alias
            - memory
            - --model
            - /models/memory/gemma-4-E4B-it-UD-Q4_K_XL.gguf
            - --ctx-size
            - "16384"
            - --n-gpu-layers
            - "99"
            - --fit
            - "off"
            - --flash-attn
            - "on"
            - --parallel
            - "6"
            - --cont-batching
            - -sps
            - "0.90"
            - --no-context-shift
            - --cache-prompt
            - --kv-unified
            - --ctx-checkpoints
            - "0"
            - --metrics
            - --temp
            - "0.1"
            - --top-p
            - "0.90"
            - --top-k
            - "32"
            - --min-p
            - "0"
            - --reasoning
            - "off"
            - --reasoning-budget
            - "0"
            - --batch-size
            - "4096"
            - --ubatch-size
            - "2048"
            - --threads
            - "12"
            - --threads-batch
            - "16"
            - --no-mmap
            resources:
              requests:
                cpu: 500m
                memory: 12Gi
              limits:
                memory: 24Gi
            probes:
              liveness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /health
                    port: 8080
                  initialDelaySeconds: 30
                  periodSeconds: 30
                  failureThreshold: 6
              readiness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /health
                    port: 8080
                  initialDelaySeconds: 20
                  periodSeconds: 10
                  failureThreshold: 6
              startup:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /health
                    port: 8080
                  failureThreshold: 360
                  periodSeconds: 10
    persistence:
      models:
        existingClaim: llm-models
        globalMounts:
        - path: /models
      dev-dri:
        type: hostPath
        hostPath: /dev/dri
        globalMounts:
        - path: /dev/dri
    service:
      app:
        type: LoadBalancer
        annotations:
          lbipam.cilium.io/ips: 10.69.10.22
        externalTrafficPolicy: Cluster
        ports:
          http:
            port: 8080

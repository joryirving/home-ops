---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: llama-memory
spec:
  chartRef:
    kind: OCIRepository
    name: app-template
  dependsOn: []
  interval: 15m
  values:
    controllers:
      llama-memory:
        annotations:
          reloader.stakater.com/auto: "true"
        initContainers:
          model-download:
            image:
              repository: python
              tag: 3.14-slim
            command:
              - /bin/sh
              - -ec
              - |
                set -euo pipefail

                if [ ! -s /models/qwen9b/Qwen3.5-9B-UD-Q8_K_XL.gguf ] || [ ! -s /models/qwen9b/mmproj-F16.gguf ]; then
                  pip install --no-cache-dir huggingface_hub
                  mkdir -p /models/qwen9b
                  rm -rf /models/qwen9b/.cache/huggingface/download/Qwen3.5-9B-UD-Q8_K_XL.gguf.lock
                  hf download \
                    unsloth/Qwen3.5-9B-GGUF \
                    Qwen3.5-9B-UD-Q8_K_XL.gguf \
                    mmproj-F16.gguf \
                    --local-dir /models/qwen9b

                  echo "Qwen3.5-9B download complete"
                else
                  echo "Qwen3.5-9B already downloaded, skipping"
                fi
            env:
              HF_HUB_ENABLE_HF_TRANSFER: "1"
            envFrom:
              - secretRef:
                  name: huggingface
            resources:
              requests:
                cpu: 250m
                memory: 512Mi
              limits:
                memory: 4Gi
        containers:
          app:
            image:
              repository: docker.io/kyuz0/amd-strix-halo-toolboxes
              tag: rocm-6.4.4
            securityContext:
              privileged: true
            command:
              - llama-server
            args:
              - --host
              - 0.0.0.0
              - --port
              - "8080"
              - --alias
              - qwen9b
              - --model
              - /models/qwen9b/Qwen3.5-9B-UD-Q8_K_XL.gguf
              - --mmproj
              - /models/qwen9b/mmproj-F16.gguf
              - --ctx-size
              - "32768"
              - --n-gpu-layers
              - "99"
              - --fit
              - "off"
              - --flash-attn
              - "on"
              - --parallel
              - "2"
              - --cont-batching
              - -sps
              - "0.90"
              - --no-context-shift
              - --cache-prompt
              - --kv-unified
              - --ctx-checkpoints
              - "4"
              - --checkpoint-every-n-tokens
              - "16384"
              - --image-min-tokens
              - "1024"
              - --temp
              - "0.6"
              - --top-p
              - "0.95"
              - --top-k
              - "20"
              - --min-p
              - "0"
              - --presence-penalty
              - "0"
              - --repeat-penalty
              - "1.0"
              - --batch-size
              - "4096"
              - --ubatch-size
              - "2048"
              - --threads
              - "12"
              - --threads-batch
              - "16"
              - --no-mmap
              - --jinja
            resources:
              requests:
                cpu: 500m
                memory: 12Gi
              limits:
                memory: 24Gi
            probes:
              liveness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /health
                    port: 8080
                  initialDelaySeconds: 30
                  periodSeconds: 30
                  failureThreshold: 6
              readiness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /health
                    port: 8080
                  initialDelaySeconds: 20
                  periodSeconds: 10
                  failureThreshold: 6
              startup:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /health
                    port: 8080
                  failureThreshold: 360
                  periodSeconds: 10
    defaultPodOptions:
      hostIPC: true
      nodeSelector:
        kubernetes.io/hostname: skirk
        topology.kubernetes.io/gpus: amd
      tolerations:
        - key: llm-workload
          operator: Exists
          effect: NoSchedule
    service:
      app:
        type: LoadBalancer
        annotations:
          lbipam.cilium.io/ips: 10.69.10.22
        externalTrafficPolicy: Cluster
        ports:
          http:
            port: 8080
    persistence:
      models:
        existingClaim: llm-models
        globalMounts:
          - path: /models
      dev-dri:
        type: hostPath
        hostPath: /dev/dri
        globalMounts:
          - path: /dev/dri

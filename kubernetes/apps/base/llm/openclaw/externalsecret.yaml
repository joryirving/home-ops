---
# yaml-language-server: $schema=https://kube-schemas.pages.dev/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: &name openclaw
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword
  target:
    name: *name
    template:
      data:
        ## Gateway token for authentication
        OPENCLAW_GATEWAY_TOKEN: "{{ .OPENCLAW_GATEWAY_TOKEN }}"
        ##Discord
        DISCORD_BOT_TOKEN: "{{ .DISCORD_BOT_TOKEN }}"
        MATCHA_BOT_TOKEN: "{{ .MATCHA_BOT_TOKEN }}"
        ## GH Access
        GITHUB_APP_CLIENT_ID: "{{ .MISO_BOT_CLIENT_ID }}"
        GITHUB_APP_CLIENT_SECRET: "{{ .MISO_BOT_CLIENT_SECRET }}"
        GITHUB_APP_ID: "{{ .MISO_BOT_ID }}"
        GITHUB_APP_INSTALLATION_ID: "{{ .MISO_BOT_INSTALLATION_ID }}"
        GITHUB_APP_PRIVATE_KEY: "{{ .MISO_BOT_PRIVATE_KEY }}"
        GH_PAT: "{{ .ITS_MISO_PAT }}"
        ## API Keys
        OPENAI_API_KEY: "{{ .OPENAI_API_KEY }}"
        GOOGLE_AI_STUDIO_API_KEY: "{{ .GOOGLE_GEMINI_API_KEY }}"
        CEREBRAS_API_KEY: "{{ .CEREBRAS_API_KEY }}"
        GROQ_API_KEY: "{{ .GROQ_API_KEY }}"
        MISTRAL_API_KEY: "{{ .MISTRAL_API_KEY }}"
        KIMI_CODING_API_KEY: "{{ .KIMI_CODE_API_KEY }}"
        MINIMAX_API_KEY: "{{ .MINIMAX_API_KEY }}"
        OLLAMA_URL: "http://ollama.llm:11434"
        ## HASS
        HA_URL: "https://hass.jory.dev"
        HA_TOKEN: "{{ .HOME_ASSISTANT_TOKEN }}"
        ## META
        COMMONS_API_KEY: "{{ .AGENTCOMMONS_API_KEY }}"
        INSTAGRAM_BASIC_TOKEN: "{{ .INSTAGRAM_BASIC_TOKEN }}"
        INSTAGRAM_SHORT_LIVED_GRAPH_TOKEN: "{{ .INSTAGRAM_GRAPH_TOKEN }}"
        FACEBOOK_APP_ID: "{{ .FACEBOOK_APP_ID }}"
        FACEBOOK_APP_SECRET: "{{ .FACEBOOK_APP_SECRET }}"
        ## Dashclaw
        DASHCLAW_API_KEY: "{{ .DASHCLAW_API_KEY }}"
        DASHCLAW_BASE_URL: https://dashclaw.jory.dev
  dataFrom:
    - extract:
        key: openclaw
    - extract:
        key: dashclaw
---
# yaml-language-server: $schema=https://kube-schemas.pages.dev/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: &name openclaw-config
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword
  target:
    name: *name
    template:
      data:
        ## OpenClaw configuration file
        openclaw.json: |
          {
            agents: {
              defaults: {
                model: {
                  primary: "minimax/MiniMax-M2.5",
                  fallbacks: [
                    "skirk/Qwen3.5-122B-A10B-Q4_K_M-00001-of-00003.gguf",
                    "kimi-coding/k2p5",
                    "kimi-coding/kimi-k2-thinking",
                    "openai-codex/gpt-5.3-codex",
                    "openai-codex/gpt-5.2",
                    "moonshot/kimi-k2.5",
                  ]
                },
                imageModel: {
                  primary: "skirk/Qwen3.5-122B-A10B-Q4_K_M-00001-of-00003.gguf",
                  fallbacks: [
                    "minimax/MiniMax-M2.5",
                    "qwen-portal/vision-model",
                    "kimi-coding/k2p5",
                    "kimi-coding/kimi-k2-thinking",
                    "moonshot/kimi-k2.5"
                  ]
                },
                models: {
                  "qwen-portal/coder-model": { alias: "qwen" },
                  "qwen-portal/vision-model": {},
                  "kimi-coding/k2p5": { alias: "kimi" },
                  "kimi-coding/kimi-k2-thinking": {},
                  "moonshot/kimi-k2.5": { alias: "moonshot" },
                  "minimax/MiniMax-M2.5": { alias: "minimax" },
                  "skirk/Qwen3.5-122B-A10B-Q4_K_M-00001-of-00003.gguf": { alias: "skirk" },
                  "openai-codex/gpt-5.3-codex": { alias: "chatgpt" },
                  "openai-codex/gpt-5.2": {},
                },
                memorySearch: {
                  provider: "local",
                  local: { modelPath: "hf:ggml-org/embeddinggemma-300M-GGUF/embeddinggemma-300M-Q8_0.gguf" },
                  fallback: "gemini",
                  model: "gemini-embedding-001",
                  sync: { watch: true },
                  query: { hybrid: { enabled: true, vectorWeight: 0.7, textWeight: 0.3 }
                  }
                },
                contextPruning: { mode: "cache-ttl", ttl: "6h", keepLastAssistants: 4, softTrimRatio: 0.3, hardClearRatio: 0.5, minPrunableToolChars: 50000, softTrim: { maxChars: 4000, headChars: 1500, tailChars: 1500 }, hardClear: { enabled: true, placeholder: "[Old tool result content cleared]" },
                  tools: { deny: ["browser", "canvas"] },
                },
                compaction: {
                  mode: "safeguard",
                  reserveTokensFloor: 24000,
                  memoryFlush: { enabled: true, softThresholdTokens: 12000, prompt: "Extract key decisions, state changes, lessons, blockers to memory/YYYY-MM-DD.md. Format: ## [HH:MM] Topic. Skip routine work. NO_FLUSH if nothing important.", systemPrompt: "Compacting session context. Extract only what's worth remembering. No fluff." },
                },
                maxConcurrent: 4,
                subagents: {
                  model: {
                    primary: "skirk/Qwen3.5-122B-A10B-Q4_K_M-00001-of-00003.gguf"
                  },
                  archiveAfterMinutes: 120,
                  maxConcurrent: 3,
                  thinking: "low",
                },
                timeoutSeconds: 300
              },
              list: [
                {
                  id: "main",
                  default: true,
                  name: "Miso",
                  heartbeat: { every: "30m", target: "last", to: "user:{{ .MISO_DM_ID }}", activeHours: { start: "07:00", end: "23:00" } },
                  workspace: "/home/node/.openclaw/workspace",
                  agentDir: "/home/node/.openclaw/agents/main/agent",
                },
                {
                  id: "matcha",
                  name: "Matcha",
                  workspace: "/home/node/.openclaw/workspace-matcha",
                  agentDir: "/home/node/.openclaw/agents/matcha/agent",
                  skills: ["web_fetch", "searxng"],
                  tools: { allow: ["exec", "message", "read", "web_fetch", "image"] },
                  model: {
                    primary: "minimax/MiniMax-M2.5",
                  fallbacks: [
                    "skirk/Qwen3.5-122B-A10B-Q4_K_M-00001-of-00003.gguf",
                      "qwen-portal/coder-model",
                      "kimi-coding/k2p5",
                    ]
                  },
                  identity: {
                    name: "Matcha",
                    avatar: "avatars/matcha_avatar.png"
                  }
                },
              ],
            },
            tools: {
              deny: ["web_search"],
            },
            commands: {
              native: "auto",
              nativeSkills: "auto"
            },
            models: {
              providers: {
                "qwen-portal": {
                  baseUrl: "https://portal.qwen.ai/v1",
                  apiKey: "qwen-oauth",
                  api: "openai-completions",
                  models: [
                    { id: "coder-model", name: "Qwen Coder", reasoning: false, input: ["text"], cost: { input: 0, output: 0, cacheRead: 0, cacheWrite: 0 }, contextWindow: 128000, maxTokens: 8192 },
                    { id: "vision-model", name: "Qwen Vision", reasoning: false, input: ["text","image"], cost: { input: 0, output: 0, cacheRead: 0, cacheWrite: 0 }, contextWindow: 128000, maxTokens: 8192 },
                  ]
                },
                moonshot: {
                  baseUrl: "https://api.moonshot.ai/v1",
                  apiKey: "{{ .MOONSHOT_API_KEY }}",
                  api: "openai-completions",
                  models: [
                    { id: "kimi-k2.5", name: "Kimi K2.5", reasoning: false, input: ["text"], cost: { input: 0.6, output: 3, cacheRead: 0.1, cacheWrite: 0.6 }, contextWindow: 128000, maxTokens: 8192 },
                  ]
                },
                minimax: {
                  baseUrl: "https://api.minimax.io/anthropic",
                  apiKey: "{{ .MINIMAX_API_KEY }}",
                  api: "anthropic-messages",
                  models: [
                    { id: "MiniMax-M2.5", name: "MiniMax M2.5", reasoning: false, input: ["text"], cost: { input: 15, output: 60, cacheRead: 2, cacheWrite: 10 }, contextWindow: 200000, maxTokens: 8192,
                    },
                  ],
                },
                skirk: {
                  baseUrl: "http://skirk:8000/v1",
                  apiKey: "skirk",
                  api: "openai-completions",
                  models: [
                    { id: "Qwen3.5-122B-A10B-Q4_K_M-00001-of-00003.gguf", name: "Qwen3.5 122B A10B Q4 (ROCm)", reasoning: false, input: ["text"], cost: { input: 0, output: 0, cacheRead: 0, cacheWrite: 0 }, contextWindow: 200000, maxTokens: 8192 },
                  ]
                },
              }
            },
            auth: {
              profiles: {
                "qwen-portal:default": { provider: "qwen-portal", mode: "oauth" },
                "kimi-coding:default": { provider: "kimi-coding", mode: "api_key" },
                "openai-codex:default": { provider: "openai-codex", mode: "oauth" },
              },
            },
            bindings: [
              { agentId: "main", match: { channel: "discord", accountId: "default" } },
              { agentId: "matcha", match: { channel: "discord", accountId: "matcha" } },
            ],
            channels: {
              discord: {
                enabled: true,
                actions: {
                  // keep what you actively use
                  messages: true,
                  channels: true,
                  search: true, // set false if you never use message search

                  // lock down the rest
                  reactions: false,
                  stickers: false,
                  polls: false,
                  permissions: false,
                  threads: false,
                  pins: false,
                  memberInfo: false,
                  roleInfo: false,
                  roles: false,
                  channelInfo: false,
                  voiceStatus: false,
                  events: false,
                  moderation: false,
                  emojiUploads: false,
                  stickerUploads: false,
                },
                blockStreaming: true,
                groupPolicy: "allowlist", dmPolicy: "pairing",
                accounts: {
                  default: {
                    token: "{{ .DISCORD_BOT_TOKEN }}",
                    guilds: {
                      "{{ .DISCORD_SERVER_ID }}": {
                        channels: { "{{ .MISO_CHANNEL_ID }}": { allow: true, requireMention: true } },
                      },
                    },
                  },
                  matcha: {
                    token: "{{ .MATCHA_BOT_TOKEN }}",
                    guilds: {
                      "{{ .DISCORD_SERVER_ID }}": {
                        channels: { "{{ .MATCHA_CHANNEL_ID }}": { allow: true, requireMention: true } },
                      },
                    },
                  }
                },
              }
            },
            plugins: {
              entries: {
                discord: { enabled: true },
                "qwen-portal-auth": { enabled: true },
              }
            },
            session: {
              dmScope: "per-channel-peer",
              maintenance: {
                mode: "enforce",
                pruneAfter: "7d",
                maxEntries: 1000,
                rotateBytes: "100mb",
                resetArchiveRetention: "7d",
              },
            },
            gateway: {
              auth: { mode: "token", token: "{{ .OPENCLAW_GATEWAY_TOKEN }}" },
              tools: { allow: ["sessions_send"] },
              controlUi: { allowedOrigins: ["https://miso.jory.dev", "https://miso-chat.jory.dev"],},
              mode: "local",
              port: 18789,
              trustedProxies: ["10.42.0.0/16", "192.168.0.0/16"]
            },
            messages: {
              ackReactionScope: "group-mentions",
              responsePrefix: "[{provider}/{model}]"
            },
            wizard: {
              lastRunAt: "2026-01-30T18:09:59.466Z",
              lastRunVersion: "2026.1.29",
              lastRunCommand: "onboard",
              lastRunMode: "local"
            }
          }
  dataFrom:
    - extract:
        key: openclaw

---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: llama-idle-watcher
spec:
  chartRef:
    kind: OCIRepository
    name: app-template
  interval: 15m
  dependsOn:
    - name: openclaw
  values:
    defaultPodOptions:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 100
        fsGroup: 100
        fsGroupChangePolicy: OnRootMismatch
    controllers:
      llama-idle-watcher:
        replicas: 0
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          app:
            image:
              repository: docker.io/curlimages/curl
              tag: "8.20.0"
            command:
              - /bin/sh
              - -c
              - exec /bin/sh /config/watch.sh
            env:
              PROMETHEUS_URL: "http://prometheus-operated.observability.svc.cluster.local:9090"
              GATEWAY_URL: "http://openclaw.llm:18789"
              CRON_TRIGGER_ENDPOINT: "/api/v1/admin/rpc"
              CRON_ID: "6b09bed4-cfbe-4c35-bbee-2b66c5ef17aa"
              LLAMA_JOB: "llama-nvidia"
              POLL_INTERVAL_SECONDS: "60"
              COOLDOWN_SECONDS: "900"
              TZ: America/Edmonton
            envFrom:
              - secretRef:
                  name: llama-idle-watcher
            resources:
              requests:
                cpu: 25m
                memory: 64Mi
              limits:
                memory: 128Mi
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities:
                drop:
                  - ALL
    persistence:
      config:
        type: configMap
        name: llama-idle-watcher-script
        defaultMode: 0755
        globalMounts:
          - path: /config/watch.sh
            subPath: watch.sh
            readOnly: true
      tmpfs:
        type: emptyDir
        advancedMounts:
          llama-idle-watcher:
            app:
              - path: /tmp
                subPath: tmp

---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: vibevoice
spec:
  chartRef:
    kind: OCIRepository
    name: app-template
  interval: 15m
  values:
    controllers:
      vibevoice:
        replicas: 0
        containers:
          app:
            image:
              repository: docker.io/kyuz0/amd-strix-halo-voice
              tag: 20250920-172959@sha256:5e795f0457ab5ccef77016b1464bb983b15a48dc2d5b16165d8d59f854bdaaae
            securityContext:
              privileged: true
              seccompProfile:
                type: Unconfined
            env:
              HSA_OVERRIDE_GFX_VERSION: "11.5.1"
              HSA_ENABLE_SDMA: "0"
              HIP_VISIBLE_DEVICES: "0"
              ROCR_VISIBLE_DEVICES: "0"
            command:
              - /bin/bash
              - -lc
            args:
              - |
                set -euo pipefail
                vibevoice --model_path aoi-ot/VibeVoice-Large --port 8000
            resources:
              requests:
                cpu: 500m
                memory: 4Gi
              limits:
                memory: 12Gi
    defaultPodOptions:
      hostIPC: true
      nodeSelector:
        topology.kubernetes.io/gpus: amd
      tolerations:
        - key: llm-workload
          operator: Exists
          effect: NoSchedule
    service:
      app:
        controller: vibevoice
        ports:
          http:
            port: 8000
    persistence:
      models:
        existingClaim: llm-models
        globalMounts:
          - path: /models
      dev-dri:
        type: hostPath
        hostPath: /dev/dri
        globalMounts:
          - path: /dev/dri
      dev-kfd:
        type: hostPath
        hostPath: /dev/kfd
        globalMounts:
          - path: /dev/kfd

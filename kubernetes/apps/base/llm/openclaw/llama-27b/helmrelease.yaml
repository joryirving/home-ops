---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: llama-27b
spec:
  chartRef:
    kind: OCIRepository
    name: app-template
  dependsOn: []
  interval: 15m
  values:
    controllers:
      llama-27b:
        annotations:
          reloader.stakater.com/auto: "true"
        initContainers:
          model-download:
            image:
              repository: python
              tag: 3.14-slim
            command:
              - /bin/sh
              - -ec
              - |
                set -euo pipefail

                if [ ! -s /models/qwen27b/Qwen3.5-27B-UD-Q8_K_XL.gguf ] || [ ! -s /models/qwen27b/mmproj-F16.gguf ]; then
                  pip install --no-cache-dir huggingface_hub
                  mkdir -p /models/qwen27b
                  rm -rf /models/qwen27b/.cache/huggingface/download/Qwen3.5-27B-UD-Q8_K_XL.gguf.lock
                  hf download \
                    unsloth/Qwen3.5-27B-GGUF \
                    Qwen3.5-27B-UD-Q8_K_XL.gguf \
                    mmproj-F16.gguf \
                    --local-dir /models/qwen27b

                  echo "Qwen3.5-27b download complete"
                else
                  echo "Qwen3.5-27b already downloaded, skipping"
                fi
            env:
              HF_HUB_ENABLE_HF_TRANSFER: "1"
            envFrom:
              - secretRef:
                  name: huggingface
            resources:
              requests:
                cpu: 250m
                memory: 512Mi
              limits:
                memory: 4Gi
        containers:
          app:
            image:
              repository: docker.io/kyuz0/amd-strix-halo-toolboxes
              tag: vulkan-radv@sha256:30878a0a7a387bb730cc3f5c5c73a2304b3c7315f1158cecad7cc373ef1e9e0b
            securityContext:
              privileged: true
            command:
              - llama-server
            args:
              - --host
              - 0.0.0.0
              - --port
              - "8080"
              - --alias
              - qwen27b
              - --model
              - /models/qwen27b/Qwen3.5-27B-UD-Q8_K_XL.gguf
              - --mmproj
              - /models/qwen27b/mmproj-F16.gguf
              - --ctx-size
              - "600000"
              - --n-gpu-layers
              - "99"
              - --flash-attn
              - "on"
              - --parallel
              - "6"
              - --cont-batching
              - -sps
              - "0.95"
              - --no-context-shift
              - --cache-prompt
              - --kv-unified
              - --image-min-tokens
              - "1024"
              - --temp
              - "0.2"
              - --top-p
              - "0.95"
              - --top-k
              - "20"
              - --min-p
              - "0"
              - --cache-type-k
              - q8_0
              - --cache-type-v
              - q8_0
              - --batch-size
              - "2048"
              - --ubatch-size
              - "2048"
              - --no-mmap
              - --jinja
            # env:
            #   HSA_OVERRIDE_GFX_VERSION: "11.5.1"
            #   HSA_ENABLE_SDMA: "0"
            #   ROCBLAS_USE_HIPBLASLT: "1"
            #   HIP_VISIBLE_DEVICES: "0"
            resources:
              requests:
                cpu: 1
                memory: 20Gi
              limits:
                memory: 80Gi
            probes:
              liveness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /health
                    port: 8080
                  initialDelaySeconds: 30
                  periodSeconds: 30
                  failureThreshold: 6
              readiness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /health
                    port: 8080
                  initialDelaySeconds: 20
                  periodSeconds: 10
                  failureThreshold: 6
              startup:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /health
                    port: 8080
                  failureThreshold: 360
                  periodSeconds: 10
    defaultPodOptions:
      hostIPC: true
      nodeSelector:
        topology.kubernetes.io/gpus: amd
      tolerations:
        - key: llm-workload
          operator: Exists
          effect: NoSchedule
    service:
      app:
        type: LoadBalancer
        annotations:
          lbipam.cilium.io/ips: 10.69.10.20
        externalTrafficPolicy: Cluster
        ports:
          http:
            port: 8080
    persistence:
      models:
        existingClaim: llm-models
        globalMounts:
          - path: /models
      dev-dri:
        type: hostPath
        hostPath: /dev/dri
        globalMounts:
          - path: /dev/dri

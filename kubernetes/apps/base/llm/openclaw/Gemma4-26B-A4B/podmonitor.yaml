---
# yaml-language-server: $schema=https://kube-schemas.pages.dev/monitoring.coreos.com/podmonitor_v1.json
apiVersion: monitoring.coreos.com/v1
kind: PodMonitor
metadata:
  name: llama-server
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: llama-server
      app.kubernetes.io/instance: llama-server
  podTargetLabels:
    - app.kubernetes.io/name
    - app.kubernetes.io/instance
  podMetricsEndpoints:
    - port: http
      path: /metrics
      honorLabels: true
  namespaceSelector:
    matchNames:
      - llm

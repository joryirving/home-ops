---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: llama-server
spec:
  chartRef:
    kind: OCIRepository
    name: app-template
  dependsOn: []
  interval: 15m
  values:
    controllers:
      llama-server:
        annotations:
          reloader.stakater.com/auto: "true"
        initContainers:
          model-download:
            image:
              repository: python
              tag: 3.14-slim
            command:
              - /bin/sh
              - -ec
              - |
                set -euo pipefail

                if [ ! -s /models/gemma4-26b/gemma-4-26B-A4B-it-UD-Q5_K_XL.gguf ] || [ ! -s /models/gemma4-26b/mmproj-F16.gguf ]; then
                  pip install --no-cache-dir huggingface_hub
                  mkdir -p /models/gemma4-26b
                  rm -rf /models/gemma4-26b/.cache/huggingface/download/gemma-4-26B-A4B-UD-Q5_K_XL.gguf.lock
                  hf download \
                    unsloth/gemma-4-26B-A4B-it-GGUF \
                    gemma-4-26B-A4B-it-UD-Q5_K_XL.gguf \
                    mmproj-F16.gguf \
                    --local-dir /models/gemma4-26b

                  echo "Gemma-4-26B-A4B-Q5_K_XL download complete"
                else
                  echo "Gemma-4-26B-A4B-Q5_K_XL already downloaded, skipping"
                fi
            env:
              HF_HUB_ENABLE_HF_TRANSFER: "1"
            envFrom:
              - secretRef:
                  name: huggingface
            resources:
              requests:
                cpu: 250m
                memory: 512Mi
              limits:
                memory: 10Gi
        containers:
          app:
            image:
              repository: docker.io/kyuz0/amd-strix-halo-toolboxes
              tag: rocm7-nightlies@sha256:43836cae8168b47d3af4a2ccbfc10de98fe55103b1ef4b4a4f41ce3ead031cc7
            securityContext:
              privileged: true
            command:
              - llama-server
            args:
              - --host
              - 0.0.0.0
              - --port
              - "8080"
              - --alias
              - self-hosted
              - --model
              - /models/gemma4-26b/gemma-4-26B-A4B-it-UD-Q5_K_XL.gguf
              - --mmproj
              - /models/gemma4-26b/mmproj-F16.gguf
              - --ctx-size
              - "150000"
              - --n-gpu-layers
              - "29"
              - --flash-attn
              - "on"
              - --parallel
              - "5"
              - --cont-batching
              - -sps
              - "0.90"
              - --no-context-shift
              - --cache-prompt
              - --kv-unified
              - --ctx-checkpoints
              - "4"
              - --checkpoint-every-n-tokens
              - "16384"
              - --image-min-tokens
              - "1120"
              - --image-max-tokens
              - "1120"
              - --temp
              - "1.0"
              - --top-p
              - "0.95"
              - --top-k
              - "64"
              - --min-p
              - "0"
              - --batch-size
              - "4096"
              - --ubatch-size
              - "2048"
              - --threads
              - "12"
              - --threads-batch
              - "16"
              - --no-mmap
              - --jinja
            resources:
              requests:
                cpu: 1
                memory: 20Gi
              limits:
                memory: 80Gi
            probes:
              liveness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /health
                    port: 8080
                  initialDelaySeconds: 30
                  periodSeconds: 30
                  failureThreshold: 6
              readiness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /health
                    port: 8080
                  initialDelaySeconds: 20
                  periodSeconds: 10
                  failureThreshold: 6
              startup:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /health
                    port: 8080
                  failureThreshold: 360
                  periodSeconds: 10
    defaultPodOptions:
      hostIPC: true
      nodeSelector:
        topology.kubernetes.io/gpus: amd
      tolerations:
        - key: llm-workload
          operator: Exists
          effect: NoSchedule
    service:
      app:
        type: LoadBalancer
        annotations:
          lbipam.cilium.io/ips: 10.69.10.20
        externalTrafficPolicy: Cluster
        ports:
          http:
            port: 8080
    persistence:
      models:
        existingClaim: llm-models
        globalMounts:
          - path: /models
      dev-dri:
        type: hostPath
        hostPath: /dev/dri
        globalMounts:
          - path: /dev/dri
      dev-kfd:
        type: hostPath
        hostPath: /dev/kfd
        globalMounts:
          - path: /dev/kfd

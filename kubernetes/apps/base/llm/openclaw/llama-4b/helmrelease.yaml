---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: llama-4b
spec:
  chartRef:
    kind: OCIRepository
    name: app-template
  dependsOn: []
  interval: 15m
  values:
    controllers:
      llama-4b:
        annotations:
          reloader.stakater.com/auto: "true"
        initContainers:
          model-download:
            image:
              repository: python
              tag: 3.14-slim
            command:
              - /bin/sh
              - -ec
              - |
                set -euo pipefail

                if [ ! -s /models/qwen9b/Qwen3.5-4B-UD-Q4_K_XL.gguf ]; then
                  pip install --no-cache-dir huggingface_hub
                  mkdir -p /models/qwen9b
                  rm -rf /models/qwen9b/.cache/huggingface/download/Qwen3.5-4B-UD-Q4_K_XL.gguf.lock
                  hf download \
                    unsloth/Qwen3.5-4B-GGUF \
                    Qwen3.5-4B-UD-Q4_K_XL.gguf \
                    --local-dir /models/qwen9b

                  echo "Qwen3.5-4B download complete"
                else
                  echo "Qwen3.5-4B already downloaded, skipping"
                fi
            env:
              HF_HUB_ENABLE_HF_TRANSFER: "1"
            envFrom:
              - secretRef:
                  name: huggingface
            resources:
              requests:
                cpu: 250m
                memory: 512Mi
              limits:
                memory: 4Gi
        containers:
          app:
            image:
              repository: docker.io/kyuz0/amd-strix-halo-toolboxes
              tag: vulkan-radv@sha256:a82ccc06ada41d2bf4b70727d01465451febe88b2398072b7afbd745a5104e07
            securityContext:
              privileged: true
            command:
              - llama-server
            args:
              - --host
              - 0.0.0.0
              - --port
              - "8080"
              - --alias
              - qwen9b
              - --model
              - /models/qwen9b/Qwen3.5-4B-UD-Q4_K_XL.gguf
              - --ctx-size
              - "8192"
              - --n-gpu-layers
              - "99"
              - --fit
              - "off"
              - --flash-attn
              - "on"
              - --parallel
              - "1"
              - --cont-batching
              - -sps
              - "0.90"
              - --cache-prompt
              - --cache-reuse
              - "256"
              - --kv-unified
              - --temp
              - "0.2"
              - --top-p
              - "0.95"
              - --top-k
              - "20"
              - --min-p
              - "0"
              - --cache-type-k
              - q8_0
              - --cache-type-v
              - q8_0
              - --batch-size
              - "1024"
              - --ubatch-size
              - "1024"
              - --mmap
              - --jinja
              - --reasoning-format
              - none
            resources:
              requests:
                cpu: 500m
                memory: 12Gi
              limits:
                memory: 24Gi
            probes:
              liveness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /health
                    port: 8080
                  initialDelaySeconds: 30
                  periodSeconds: 30
                  failureThreshold: 6
              readiness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /health
                    port: 8080
                  initialDelaySeconds: 20
                  periodSeconds: 10
                  failureThreshold: 6
              startup:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /health
                    port: 8080
                  failureThreshold: 360
                  periodSeconds: 10
    defaultPodOptions:
      hostIPC: true
      nodeSelector:
        kubernetes.io/hostname: skirk
        topology.kubernetes.io/gpus: amd
      tolerations:
        - key: llm-workload
          operator: Exists
          effect: NoSchedule
    service:
      app:
        type: LoadBalancer
        annotations:
          lbipam.cilium.io/ips: 10.69.10.22
        externalTrafficPolicy: Cluster
        ports:
          http:
            port: 8080
    persistence:
      models:
        existingClaim: llm-models
        globalMounts:
          - path: /models
      dev-dri:
        type: hostPath
        hostPath: /dev/dri
        globalMounts:
          - path: /dev/dri

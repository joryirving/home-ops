---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: repo-wiki
spec:
  chartRef:
    kind: OCIRepository
    name: repo-wiki
  interval: 15m
  dependsOn: []
  values:
    defaultPodOptions:
      securityContext:
        fsGroup: 33
        fsGroupChangePolicy: OnRootMismatch
    controllers:
      mkdocs:
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          app:
            image:
              repository: squidfunk/mkdocs-material
              tag: 9.7.6@sha256:868ad4d39fb5865b72d00173ade00f4eae2b38dde7ff790a011cc44ce4a8ff8e
            command: ["mkdocs"]
            args:
              [
                "serve",
                "--dirty",
                "-f",
                "/config/mkdocs.yml",
                "-a",
                "0.0.0.0:8000",
              ]
            resources:
              requests:
                cpu: 50m
              limits:
                memory: 512Mi
      repo-wiki-gen:
        type: cronjob
        pod:
          affinity:
            podAffinity:
              requiredDuringSchedulingIgnoredDuringExecution:
                - labelSelector:
                    matchExpressions:
                      - key: app.kubernetes.io/name
                        operator: In
                        values: ["repo-wiki"]
                  topologyKey: kubernetes.io/hostname
        cronjob:
          schedule: "0 */12 * * *"
          timeZone: America/Edmonton
          concurrencyPolicy: Forbid
          successfulJobsHistory: 1
          failedJobsHistory: 1
        containers:
          app:
            image:
              repository: python
              tag: "3.14@sha256:311ea5bb79f1a238ee9e38f8d5f09cb3b4b244575cf49e27cf365ea7e60f11d4"
            command: ["python3", "/config/generate.py"]
            env:
              OPENAI_BASE_URL: http://litellm.llm:4000/v1
              WIKI_MODEL: self-hosted
              MAX_REPOS_PER_RUN: "1"
              MAX_PAGES_PER_REPO: "20"
              LLM_TIMEOUT: "1800"
              WIKI_REPO: /app-data/repository
            envFrom:
              - secretRef:
                  name: repo-wiki
            resources:
              requests:
                cpu: 100m
              limits:
                memory: 2Gi
    persistence:
      data:
        existingClaim: repo-wiki
        advancedMounts:
          mkdocs:
            app:
              - path: /app-data
          repo-wiki-gen:
            app:
              - path: /app-data
      config:
        type: configMap
        name: repo-wiki
        globalMounts:
          - path: /config
    route:
      app:
        hostnames: ["wikis.jory.dev"]
        parentRefs:
          - name: envoy-internal
            namespace: network
        rules:
          - backendRefs:
              - name: repo-wiki
                port: 8000
    service:
      app:
        controller: mkdocs
        ports:
          http:
            port: 8000

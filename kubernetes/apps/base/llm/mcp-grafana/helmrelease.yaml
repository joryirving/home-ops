---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app mcp-grafana
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: app-template
    namespace: flux-system
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
      strategy: rollback
  values:
    controllers:
      mcp-grafana:
        containers:
          app:
            image:
              repository: mcp/grafana
              tag: latest
              pullPolicy: Always
            args:
              - "run"
              - "--rm"
              - "-i"
              - "-e"
              - "GRAFANA_URL"
              - "-e"
              - "GRAFANA_AUTH"
              - "mcp/grafana"
              - "-t"
              - "sse"
            env:
              GRAFANA_URL: "http://grafana.observability:80"
              GRAFANA_AUTH: "admin:admin"  # TODO: Use secret
            probes:
              liveness:
                enabled: false
              readiness:
                enabled: false
            resources:
              requests:
                cpu: 50m
                memory: 128Mi
              limits:
                memory: 256Mi
    service:
      app:
        enabled: false

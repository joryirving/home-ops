---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: llama-vision
spec:
  chartRef:
    kind: OCIRepository
    name: app-template
  dependsOn: []
  interval: 15m
  values:
    controllers:
      llama-vision:
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          app:
            image:
              repository: docker.io/kyuz0/amd-strix-halo-toolboxes
              tag: rocm-7.2
            securityContext:
              privileged: true
            command:
              - /usr/local/bin/llama-server
            args:
              - --host
              - 0.0.0.0
              - --port
              - "8080"
              - --model
              - /models/qwen-vl-8b/Qwen2.5-VL-7B-Instruct-Q4_K_M.gguf
              - --mmproj
              - /models/qwen-vl-8b/mmproj-F16.gguf
              - --ctx-size
              - "16384"
              - --n-gpu-layers
              - "99"
              - --flash-attn
              - "on"
              - --parallel
              - "1"
              - --cont-batching
              - --cache-prompt
              - --temp
              - "0.2"
              - --top-p
              - "0.95"
              - --top-k
              - "20"
              - --batch-size
              - "1024"
              - --ubatch-size
              - "256"
              - --threads
              - "8"
              - --no-mmap
              - --jinja
            resources:
              requests:
                cpu: 250m
                memory: 8Gi
              limits:
                memory: 32Gi
            probes:
              liveness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /health
                    port: 8080
                  initialDelaySeconds: 30
                  periodSeconds: 30
                  failureThreshold: 6
              readiness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /health
                    port: 8080
                  initialDelaySeconds: 20
                  periodSeconds: 10
                  failureThreshold: 6
              startup:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /health
                    port: 8080
                  failureThreshold: 180
                  periodSeconds: 10
    defaultPodOptions:
      hostIPC: true
      nodeSelector:
        topology.kubernetes.io/gpus: amd
      tolerations:
        - key: llm-workload
          operator: Exists
          effect: NoSchedule
    service:
      app:
        type: LoadBalancer
        annotations:
          lbipam.cilium.io/ips: 10.69.10.21
        externalTrafficPolicy: Cluster
        ports:
          http:
            port: 8080
    persistence:
      models:
        existingClaim: llm-models
        globalMounts:
          - path: /models
      dev-dri:
        type: hostPath
        hostPath: /dev/dri
        globalMounts:
          - path: /dev/dri
      dev-kfd:
        type: hostPath
        hostPath: /dev/kfd
        globalMounts:
          - path: /dev/kfd

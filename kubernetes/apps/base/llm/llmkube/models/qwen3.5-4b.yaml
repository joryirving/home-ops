---
apiVersion: inference.llmkube.dev/v1alpha1
kind: Model
metadata:
  name: qwen3.5-4b-vision
spec:
  source: hf://HauhauCS/Qwen3.5-4B-Uncensored-HauhauCS-Aggressive
  files:
    - Qwen3.5-4B-Uncensored-HauhauCS-Aggressive-Q8_0.gguf
  mmproj: mmproj-Qwen3.5-4B-Uncensored-HauhauCS-Aggressive-BF16.gguf
  format: gguf
  quantization: Q8_0
  hardware:
    accelerator: rocm
    gpu:
      enabled: true
      vendor: amd
      layers: 99
      resourceClaims:
        - name: gpu
          resourceClaimTemplateName: llama-strix-gpu
---
apiVersion: inference.llmkube.dev/v1alpha1
kind: InferenceService
metadata:
  name: llama-vision
  labels:
    krr/ignore: "true"
spec:
  modelRef: qwen3.5-4b-vision
  runtime: llamacpp
  image: docker.io/kyuz0/amd-strix-halo-toolboxes:rocm-7.2.4@sha256:870e251e56949fc3d0f1da60ac0c60406ce4799b46ea09212ad8bd144d83ffc4
  command:
    - llama-server
  replicas: 1
  priority: high
  nodeSelector:
    topology.kubernetes.io/gpus: amd
  tolerations:
    - key: llm-workload
      operator: Exists
      effect: NoSchedule
  contextSize: 262144
  parallelSlots: 2
  flashAttention: true
  jinja: true
  cacheTypeK: q8_0
  cacheTypeV: q8_0
  reasoningBudget: 16384
  reasoningBudgetMessage: "Stop reasoning and produce the implementation, tool call, or final answer."
  batchSize: 6144
  uBatchSize: 2048
  resources:
    cpu: "500m"
    memory: 10Gi
  endpoint:
    port: 8080
    type: ClusterIP
  extraArgs:
    - --alias
    - vision
    - --cont-batching
    - -sps
    - "0.75"
    - --cache-prompt
    - --kv-unified
    - --checkpoint-min-step
    - "32768"
    - --image-min-tokens
    - "1024"
    - --temp
    - "0.7"
    - --top-p
    - "0.8"
    - --top-k
    - "20"
    - --min-p
    - "0"
    - --presence-penalty
    - "0.5"
    - --repeat-penalty
    - "1.03"
    - --threads
    - "8"
    - --threads-batch
    - "16"
    - --no-mmap
    - --chat-template-kwargs
    - '{"preserve_thinking":false}'
  probeOverrides:
    startup:
      httpGet:
        path: /health
        port: 8080
      periodSeconds: 10
      failureThreshold: 360
    liveness:
      httpGet:
        path: /health
        port: 8080
      initialDelaySeconds: 30
      periodSeconds: 30
      failureThreshold: 6
    readiness:
      httpGet:
        path: /health
        port: 8080
      initialDelaySeconds: 20
      periodSeconds: 10
      failureThreshold: 6

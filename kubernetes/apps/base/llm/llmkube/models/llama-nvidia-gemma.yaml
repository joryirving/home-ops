---
apiVersion: inference.llmkube.dev/v1alpha1
kind: Model
metadata:
  name: gemma-4-26b-a4b
spec:
  source: pvc://llmkube-models/gemma-4-26b-a4b/gemma-4-26B-A4B-it-qat-UD-Q4_K_XL.gguf
  format: gguf
  quantization: UD-Q4_K_XL
  hardware:
    accelerator: cuda
    gpu:
      enabled: true
      vendor: nvidia
      count: 1
      layers: 99
---
apiVersion: inference.llmkube.dev/v1alpha1
kind: InferenceService
metadata:
  name: llama-nvidia-gemma
  annotations:
    kustomize.toolkit.fluxcd.io/ssa: Merge
  labels:
    krr/ignore: "true"
spec:
  modelRef: gemma-4-26b-a4b
  runtime: llamacpp
  image: ghcr.io/ggml-org/llama.cpp:server-cuda@sha256:69e0542bd894e378cf8a68d563e035f066f400a5f0190e6585c127ed066f4c2a
  replicas: 0
  priority: high
  runtimeClassName: nvidia
  nodeSelector:
    topology.kubernetes.io: egpu
  securityContext:
    privileged: true
  env:
    - name: NVIDIA_DRIVER_CAPABILITIES
      value: compute,utility
  contextSize: 204800
  flashAttention: true
  jinja: true
  parallelSlots: 1
  batchSize: 4096
  uBatchSize: 1024
  cacheTypeK: q8_0
  cacheTypeV: q8_0
  reasoningBudget: 16384
  resources:
    gpu: 1
    cpu: "500m"
    memory: 16Gi
  extraArgs:
    - --alias
    - review
    - --cont-batching
    - --model-draft
    - /model-source/gemma-4-26b-a4b/mtp-gemma-4-26B-A4B-it.gguf
    - --spec-type
    - draft-mtp
    - --spec-draft-p-min
    - "0.75"
    - --spec-draft-n-max
    - "3"
    - -sps
    - "0.90"
    - --cache-prompt
    - --kv-unified
    - --metrics
    - --temp
    - "1.0"
    - --top-p
    - "0.95"
    - --top-k
    - "64"
    - --min-p
    - "0.01"
    - --presence-penalty
    - "0"
    - --repeat-penalty
    - "1.0"
    - --threads
    - "6"
    - --threads-batch
    - "12"
    - --reasoning
    - "on"
    - --chat-template-kwargs
    - '{"enable_thinking":true}'
  endpoint:
    port: 8080
    type: ClusterIP
  probeOverrides:
    startup:
      httpGet:
        path: /health
        port: 8080
      periodSeconds: 10
      failureThreshold: 360
    liveness:
      httpGet:
        path: /health
        port: 8080
      initialDelaySeconds: 30
      periodSeconds: 30
      failureThreshold: 6
    readiness:
      httpGet:
        path: /health
        port: 8080
      initialDelaySeconds: 20
      periodSeconds: 10
      failureThreshold: 6

---
apiVersion: inference.llmkube.dev/v1alpha1
kind: Model
metadata:
  name: qwen3-embedding-0-6b
spec:
  source: pvc://llmkube-models/qwen3-embedding/Qwen3-Embedding-0.6B-Q8_0.gguf
  format: gguf
  quantization: Q8_0
  hardware:
    accelerator: cpu
    gpu:
      enabled: false
---
apiVersion: inference.llmkube.dev/v1alpha1
kind: InferenceService
metadata:
  name: qwen3-embedding-0-6b
  labels:
    krr/ignore: "true"
spec:
  modelRef: qwen3-embedding-0-6b
  runtime: llamacpp
  image: ghcr.io/ggml-org/llama.cpp:server
  replicas: 1
  priority: batch
  parallelSlots: 8
  contextSize: 32768
  uBatchSize: 2048
  extraArgs:
    - --embeddings
    - --alias
    - qwen3-embedding-0-6b

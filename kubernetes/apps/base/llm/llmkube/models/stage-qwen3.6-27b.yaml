---
apiVersion: batch/v1
kind: Job
metadata:
  name: stage-qwen3-6-27b
spec:
  backoffLimit: 6
  activeDeadlineSeconds: 3600
  template:
    spec:
      restartPolicy: OnFailure
      containers:
        - name: stage
          image: python:3.14-slim
          command: ["/bin/sh", "-ec"]
          args:
            - |
              pip install --no-cache-dir "huggingface_hub[hf_xet]"
              rm -f /models/qwen3.6-27b/.cache/huggingface/download/*.lock
              hf download unsloth/Qwen3.6-27B-MTP-GGUF \
                Qwen3.6-27B-UD-Q4_K_XL.gguf \
                mmproj-F16.gguf --local-dir /models/qwen3.6-27b
          envFrom:
            - secretRef:
                name: huggingface
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              memory: 4Gi
          volumeMounts:
            - name: models
              mountPath: /models
      volumes:
        - name: models
          persistentVolumeClaim:
            claimName: llmkube-models

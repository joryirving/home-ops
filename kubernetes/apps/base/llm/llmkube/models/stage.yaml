---
apiVersion: batch/v1
kind: Job
metadata:
  name: llmkube-models-stage
spec:
  backoffLimit: 6
  template:
    spec:
      restartPolicy: OnFailure
      containers:
        - name: stage
          image: python:3.14-slim
          command: ["/bin/sh", "-ec"]
          args:
            - |
              pip install --no-cache-dir "huggingface_hub[hf_transfer]"
              hf download Qwen/Qwen3-Embedding-0.6B-GGUF \
                Qwen3-Embedding-0.6B-Q8_0.gguf --local-dir /models/qwen3-embedding
              hf download unsloth/gemma-4-26B-A4B-it-qat-GGUF \
                gemma-4-26B-A4B-it-qat-UD-Q4_K_XL.gguf \
                mmproj-F16.gguf \
                mtp-gemma-4-26B-A4B-it.gguf --local-dir /models/gemma-4-26b-a4b
              hf download unsloth/Qwen3.6-27B-MTP-GGUF \
                Qwen3.6-27B-UD-Q4_K_XL.gguf \
                mmproj-F16.gguf --local-dir /models/qwen3.6-27b
              echo "staging complete"
          env:
            - name: HF_HUB_ENABLE_HF_TRANSFER
              value: "1"
          envFrom:
            - secretRef:
                name: huggingface
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              memory: 4Gi
          volumeMounts:
            - name: models
              mountPath: /models
      volumes:
        - name: models
          persistentVolumeClaim:
            claimName: llmkube-models

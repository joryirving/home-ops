---
apiVersion: inference.llmkube.dev/v1alpha1
kind: InferenceService
metadata:
  name: tei-embed
  labels:
    krr/ignore: "true"
spec:
  modelRef: qwen3-embedding-0.6b
  runtime: generic
  skipModelInit: true
  image: ghcr.io/huggingface/text-embeddings-inference:xpu-ipex-1.9@sha256:fb730e54867a5b2e6bcbb84688fd1b2536b31c82a95eca1e4fc8a8596f232b1b
  replicas: 1
  priority: normal
  podLabels:
    igpu-workload: "true"
  topologySpreadConstraints:
    - maxSkew: 1
      topologyKey: kubernetes.io/hostname
      whenUnsatisfiable: ScheduleAnyway
      labelSelector:
        matchLabels:
          igpu-workload: "true"
  containerPort: 8080
  env:
    - name: HOSTNAME
      value: "::"
    - name: ONEAPI_DEVICE_SELECTOR
      value: level_zero:gpu
    - name: UR_L0_ENABLE_RELAXED_ALLOCATION_LIMITS
      value: "1"
    - name: ZES_ENABLE_SYSMAN
      value: "1"
  args:
    - --model-id
    - BAAI/bge-small-en-v1.5
    - --port
    - "8080"
  resources:
    cpu: "500m"
    memory: 6Gi
  endpoint:
    port: 8080
    type: ClusterIP
  probeOverrides:
    startup:
      httpGet:
        path: /health
        port: 8080
      periodSeconds: 10
      failureThreshold: 360
    liveness:
      httpGet:
        path: /health
        port: 8080
      initialDelaySeconds: 30
      periodSeconds: 30
      failureThreshold: 6
    readiness:
      httpGet:
        path: /health
        port: 8080
      initialDelaySeconds: 20
      periodSeconds: 10
      failureThreshold: 6

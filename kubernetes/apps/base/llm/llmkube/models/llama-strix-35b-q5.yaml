---
apiVersion: resource.k8s.io/v1
kind: ResourceClaimTemplate
metadata:
  name: llama-strix-gpu
spec:
  spec:
    devices:
      requests:
        - name: gpu
          exactly:
            deviceClassName: gpu.amd.com
            adminAccess: true
            allocationMode: All
---
apiVersion: inference.llmkube.dev/v1alpha1
kind: Model
metadata:
  name: qwen3.6-35b-a3b-q5
spec:
  source: pvc://llm-models/qwen3.6-35b-a3b-q5/Qwen3.6-35B-A3B-UD-Q5_K_XL.gguf
  format: gguf
  quantization: UD-Q5_K_XL
  hardware:
    accelerator: rocm
    gpu:
      enabled: true
      vendor: amd
      layers: 99
      resourceClaims:
        - name: gpu
          resourceClaimTemplateName: llama-strix-gpu
---
apiVersion: inference.llmkube.dev/v1alpha1
kind: InferenceService
metadata:
  name: llama-strix-a
  labels:
    krr/ignore: "true"
spec:
  modelRef: qwen3.6-35b-a3b-q5
  runtime: llamacpp
  image: docker.io/kyuz0/amd-strix-halo-toolboxes:rocm-6.4.4@sha256:e16b7f7e8fc5eb13dd9f8b9fef35361769adf85bce22de6d85be24a541aa6bc4
  command:
    - llama-server
  replicas: 1
  priority: high
  securityContext:
    privileged: true
  nodeSelector:
    topology.kubernetes.io/gpus: amd
  tolerations:
    - key: llm-workload
      operator: Exists
      effect: NoSchedule
  contextSize: 262144
  parallelSlots: 2
  flashAttention: true
  jinja: true
  cacheTypeK: q8_0
  cacheTypeV: q8_0
  reasoningBudget: 16384
  reasoningBudgetMessage: "Stop reasoning and produce the implementation, tool call, or final answer."
  batchSize: 6144
  uBatchSize: 2048
  resources:
    cpu: "500m"
    memory: 20Gi
  endpoint:
    port: 8080
    type: ClusterIP
  extraArgs:
    - --alias
    - self-hosted
    - --mmproj
    - /model-source/qwen3.6-35b-a3b-q5/mmproj-F16.gguf
    - --cont-batching
    - --spec-type
    - draft-mtp
    - --spec-draft-p-min
    - "0.75"
    - --spec-draft-n-max
    - "3"
    - --spec-draft-type-k
    - q8_0
    - --spec-draft-type-v
    - q8_0
    - -sps
    - "0.75"
    - --cache-prompt
    - --kv-unified
    - --image-min-tokens
    - "1024"
    - --temp
    - "0.6"
    - --top-p
    - "0.95"
    - --top-k
    - "20"
    - --min-p
    - "0"
    - --presence-penalty
    - "0.5"
    - --repeat-penalty
    - "1.03"
    - --threads
    - "16"
    - --threads-batch
    - "21"
    - --no-mmap
    - --chat-template-kwargs
    - '{"preserve_thinking":true}'
  probeOverrides:
    startup:
      httpGet:
        path: /health
        port: 8080
      periodSeconds: 10
      failureThreshold: 360
    liveness:
      httpGet:
        path: /health
        port: 8080
      initialDelaySeconds: 30
      periodSeconds: 30
      failureThreshold: 6
    readiness:
      httpGet:
        path: /health
        port: 8080
      initialDelaySeconds: 20
      periodSeconds: 10
      failureThreshold: 6

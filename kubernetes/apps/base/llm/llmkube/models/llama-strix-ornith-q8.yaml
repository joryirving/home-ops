---
apiVersion: resource.k8s.io/v1
kind: ResourceClaimTemplate
metadata:
  name: llama-strix-gpu
spec:
  spec:
    devices:
      requests:
        - name: gpu
          exactly:
            deviceClassName: gpu.amd.com
            adminAccess: true
            allocationMode: All
---
apiVersion: inference.llmkube.dev/v1alpha1
kind: Model
metadata:
  name: ornith-1.0-35b-q8
spec:
  source: pvc://llm-models/ornith-1.0-35b-q8/ornith-1.0-35b-Q8_0.gguf
  format: gguf
  quantization: Q8_0
  hardware:
    accelerator: rocm
    gpu:
      enabled: true
      vendor: amd
      layers: 99
      resourceClaims:
        - name: gpu
          resourceClaimTemplateName: llama-strix-gpu
---
apiVersion: inference.llmkube.dev/v1alpha1
kind: InferenceService
metadata:
  name: llama-strix
  labels:
    krr/ignore: "true"
spec:
  modelRef: ornith-1.0-35b-q8
  runtime: llamacpp
  image: docker.io/kyuz0/amd-strix-halo-toolboxes:rocm-6.4.4@sha256:0b16ad25d179bb4b6ba1967acd5039fc1b4b332ecbacd8dfd0f1edf555320770
  command:
    - llama-server
  replicas: 1
  priority: high
  securityContext:
    privileged: true
  nodeSelector:
    topology.kubernetes.io/gpus: amd
  tolerations:
    - key: llm-workload
      operator: Exists
      effect: NoSchedule
  contextSize: 262144
  parallelSlots: 3
  flashAttention: true
  jinja: true
  cacheTypeK: q8_0
  cacheTypeV: q8_0
  reasoningBudget: 16384
  reasoningBudgetMessage: "Stop reasoning and produce the implementation, tool call, or final answer."
  batchSize: 6144
  uBatchSize: 2048
  resources:
    cpu: "500m"
    memory: 20Gi
  endpoint:
    port: 8080
    type: ClusterIP
  extraArgs:
    - --alias
    - ornith
    - --cont-batching
    - --cache-prompt
    - --kv-unified
    - --temp
    - "0.6"
    - --top-p
    - "0.95"
    - --top-k
    - "20"
    - --min-p
    - "0"
    - --presence-penalty
    - "0.5"
    - --repeat-penalty
    - "1.03"
    - --threads
    - "16"
    - --threads-batch
    - "21"
    - --no-mmap
    - --chat-template-kwargs
    - '{"preserve_thinking":true}'
  probeOverrides:
    startup:
      httpGet:
        path: /health
        port: 8080
      periodSeconds: 10
      failureThreshold: 360
    liveness:
      httpGet:
        path: /health
        port: 8080
      initialDelaySeconds: 30
      periodSeconds: 30
      failureThreshold: 6
    readiness:
      httpGet:
        path: /health
        port: 8080
      initialDelaySeconds: 20
      periodSeconds: 10
      failureThreshold: 6

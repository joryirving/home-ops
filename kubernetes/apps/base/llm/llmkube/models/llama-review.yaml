    - --kv-unified
    - --temp
    - "1.0"
    - --top-p
    - "0.95"
    - --top-k
    - "64"
    - --min-p
    - "0.01"
    - --presence-penalty
    - "0"
    - --repeat-penalty
    - "1.0"
    - --threads
    - "6"
    - --threads-batch
    - "11"
    - --no-mmap
    - --chat-template-kwargs
    - '{"enable_thinking":true}'
    - --reasoning
    - "on"
  probeOverrides:
    startup:
      httpGet:
        path: /health
        port: 8080
      periodSeconds: 10
      failureThreshold: 360
    liveness:
      httpGet:
        path: /health
        port: 8080
      initialDelaySeconds: 30
      periodSeconds: 30
      failureThreshold: 6
    readiness:
      httpGet:
        path: /health
        port: 8080
      initialDelaySeconds: 20
      periodSeconds: 10
      failureThreshold: 6

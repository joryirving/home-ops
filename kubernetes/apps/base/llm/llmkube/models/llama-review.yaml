metadata:
  name: gemma-4-26b-a4b-rocm
spec:
  source: pvc://llm-models/gemma4-26b-a4b/gemma-4-26B-A4B-it-qat-UD-Q4_K_XL.gguf
  format: gguf
  quantization: UD-Q4_K_XL
  hardware:
    accelerator: rocm
    gpu:
      enabled: true
      vendor: amd
      count: 1
      layers: 99
      resourceName: devic.es/rocm
---
apiVersion: inference.llmkube.dev/v1alpha1
kind: InferenceService
metadata:
  name: llama-review
  labels:
    krr/ignore: "true"
spec:
  modelRef: gemma-4-26b-a4b-rocm
  runtime: llamacpp
  image: docker.io/kyuz0/amd-strix-halo-toolboxes:rocm-6.4.4@sha256:4d94793edd30705215d70c10d187e11f757ac6073be4747f27412e04240096e6
  command:
    - llama-server
  replicas: 1
  priority: high
  securityContext:
    privileged: true
  nodeSelector:
    topology.kubernetes.io/gpus: amd
  tolerations:
    - key: llm-workload
      operator: Exists
      effect: NoSchedule
  contextSize: 204800
  parallelSlots: 1
  flashAttention: true
  jinja: true
  cacheTypeK: q8_0
  cacheTypeV: q8_0
  reasoningBudget: 16384
  batchSize: 4096
  uBatchSize: 1024
  resources:
    cpu: "1"
    memory: 20Gi
  endpoint:
    port: 8080
    type: ClusterIP
  extraArgs:

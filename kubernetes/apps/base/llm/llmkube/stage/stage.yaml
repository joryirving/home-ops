---
apiVersion: batch/v1
kind: Job
metadata:
  name: stage-${MODEL_SLUG}
spec:
  backoffLimit: 6
  activeDeadlineSeconds: ${STAGE_DEADLINE:=3600}
  template:
    spec:
      restartPolicy: OnFailure
      nodeSelector:
        ${STAGE_NODE_KEY:=kubernetes.io/os}: "${STAGE_NODE_VALUE:=linux}"
      tolerations:
        - key: llm-workload
          operator: Exists
          effect: NoSchedule
      containers:
        - name: stage
          image: python:3.14-slim
          command: ["/bin/sh", "-ec"]
          args:
            - |
              pip install --no-cache-dir "huggingface_hub[hf_xet]"
              rm -f /models/${MODEL_DIR}/.cache/huggingface/download/*.lock
              hf download ${MODEL_REPO} ${MODEL_FILES} --local-dir /models/${MODEL_DIR}
          env:
            - name: HF_XET_CHUNK_CACHE_SIZE_BYTES
              value: "0"
          envFrom:
            - secretRef:
                name: huggingface
          resources:
            requests:
              cpu: 2
              memory: 8Gi
            limits:
              memory: 24Gi
          volumeMounts:
            - name: models
              mountPath: /models
      volumes:
        - name: models
          persistentVolumeClaim:
            claimName: ${MODEL_CLAIM:=llmkube-models}

---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: llmkube
spec:
  interval: 1h
  chart:
    spec:
      chart: llmkube
      version: 0.8.8
      sourceRef:
        kind: HelmRepository
        name: llmkube
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  values:
    modelCache:
      enabled: false
    prometheus:
      inferencePodMonitor:
        enabled: false

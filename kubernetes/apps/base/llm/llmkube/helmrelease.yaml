---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: llmkube
spec:
  interval: 1h
  chart:
    spec:
      chart: llmkube
      version: 0.8.7
      sourceRef:
        kind: HelmRepository
        name: llmkube
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  values:
    # Controller runs in `llm` (release namespace); CRDs are cluster-scoped and
    # rendered as templates via crds.install (chart default), so Flux manages
    # them as normal resources.
    modelCache:
      # We serve from pre-staged Ceph weights (pvc:// sources), so the operator
      # download cache is unused — disabled to avoid an idle 100Gi PVC.
      # Re-enable with a storageClass if any Model uses an http/hf source.
      enabled: false
    prometheus:
      # We carry our own ServiceMonitor (litellm/<model>/servicemonitor.yaml) so
      # the prometheus `job` label stays the Service name (idle-watcher depends
      # on it). Leave the operator's inference PodMonitor off.
      inferencePodMonitor:
        enabled: false

---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: llama-burst-watcher
spec:
  chartRef:
    kind: OCIRepository
    name: app-template
  interval: 15m
  values:
    defaultPodOptions:
      automountServiceAccountToken: true
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
    controllers:
      llama-burst-watcher:
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          app:
            image:
              repository: docker.io/alpine/k8s
              tag: "1.34.9"
            command:
              - /bin/sh
              - -c
              - exec /bin/sh /config/watch.sh
            env:
              HOME: /tmp
              PROMETHEUS_URL: "http://prometheus-operated.observability.svc.cluster.local:9090"
              REVIEW_JOB: "llama-review"
              NVIDIA_JOB: "llama-nvidia"
              BURST_JOB: "llama-nvidia-gemma"
              TARGET_NS: "llm"
              TARGET_ISVC: "llama-nvidia-gemma"
              POLL_INTERVAL_SECONDS: "30"
              PRESSURE_WINDOW: "2m"
              SCALE_UP_DEFERRED: "1"
              SCALE_UP_HOLD: "3"
              SCALE_DOWN_HOLD: "10"
              MIN_UP_SECONDS: "600"
              TZ: America/Edmonton
            resources:
              requests:
                cpu: 25m
                memory: 64Mi
              limits:
                memory: 256Mi
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities:
                drop:
                  - ALL
    serviceAccount:
      llama-burst-watcher: {}
    rbac:
      roles:
        llama-burst-watcher:
          type: Role
          rules:
            - apiGroups: ["inference.llmkube.dev"]
              resources: ["inferenceservices"]
              verbs: ["get", "list", "patch"]
      bindings:
        llama-burst-watcher:
          type: RoleBinding
          roleRef:
            identifier: llama-burst-watcher
          subjects:
            - identifier: llama-burst-watcher
              serviceAccount: llama-burst-watcher
    persistence:
      config:
        type: configMap
        name: llama-burst-watcher-script
        defaultMode: 0755
        globalMounts:
          - path: /config/watch.sh
            subPath: watch.sh
            readOnly: true
      tmpfs:
        type: emptyDir
        advancedMounts:
          llama-burst-watcher:
            app:
              - path: /tmp
                subPath: tmp

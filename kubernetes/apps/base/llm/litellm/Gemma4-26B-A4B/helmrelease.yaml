---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: llama-review
spec:
  chartRef:
    kind: OCIRepository
    name: app-template
  interval: 15m
  dependsOn: []
  values:
    defaultPodOptions:
      hostIPC: true
      nodeSelector:
        topology.kubernetes.io/gpus: amd
      tolerations:
        - key: llm-workload
          operator: Exists
          effect: NoSchedule
    controllers:
      llama-review:
        annotations:
          reloader.stakater.com/auto: "true"
        initContainers:
          model-download:
            image:
              repository: python
              tag: 3.14-slim
            command:
              - /bin/sh
              - -ec
              - |
                set -euo pipefail

                if [ ! -s /models/gemma4-26b-a4b/gemma-4-26B-A4B-it-qat-UD-Q4_K_XL.gguf ] || [ ! -s /models/gemma4-26b-a4b/mmproj-F16.gguf ]; then
                  pip install --no-cache-dir "huggingface_hub[hf_transfer]"
                  mkdir -p /models/gemma4-26b-a4b
                  rm -rf /models/gemma4-26b-a4b/.cache/huggingface/download/gemma-4-26B-A4B-it-qat-UD-Q4_K_XL.gguf.lock
                  hf download \
                    unsloth/gemma-4-26B-A4B-it-qat-GGUF \
                    gemma-4-26B-A4B-it-qat-UD-Q4_K_XL.gguf \
                    mmproj-F16.gguf \
                    --local-dir /models/gemma4-26b-a4b
                  echo "Gemma-4-26B-A4B-it-qat-UD-Q4_K_XL download complete"
                else
                  echo "Gemma-4-26B-A4B-it-qat-UD-Q4_K_XL already downloaded, skipping"
                fi
            env:
              HF_HUB_ENABLE_HF_TRANSFER: "1"
            envFrom:
              - secretRef:
                  name: huggingface
            resources:
              requests:
                cpu: 250m
                memory: 512Mi
              limits:
                memory: 10Gi
        containers:
          app:
            image:
              repository: docker.io/kyuz0/amd-strix-halo-toolboxes
              tag: rocm-7.2.4@sha256:2f68cf6296e908d1847ad7432130eecffdf197fe929169c8c7a010c1dd4c1e8b
              pullPolicy: Always
            securityContext:
              privileged: true
            command:
              - llama-server
            args:
              - --host
              - 0.0.0.0
              - --port
              - "8080"
              - --alias
              - review
              - --model
              - /models/gemma4-26b-a4b/gemma-4-26B-A4B-it-qat-UD-Q4_K_XL.gguf
              - --ctx-size
              - "200000"
              - --n-gpu-layers
              - "99"
              - --flash-attn
              - "on"
              - --parallel
              - "1"
              - --cont-batching
              - -sps
              - "0.90"
              - --cache-prompt
              - --kv-unified
              - --metrics
              - --temp
              - "0.2"
              - --top-p
              - "0.9"
              - --top-k
              - "40"
              - --min-p
              - "0.05"
              - --presence-penalty
              - "0"
              - --repeat-penalty
              - "1.0"
              - --batch-size
              - "6144"
              - --ubatch-size
              - "2048"
              - --threads
              - "6"
              - --threads-batch
              - "11"
              - --cache-type-k
              - q4_0
              - --cache-type-v
              - q4_0
              - --no-mmap
              - --reasoning
              - off
              - --reasoning-budget
              - "0"
            resources:
              requests:
                cpu: 1
                memory: 20Gi
              limits:
                memory: 40Gi
            probes:
              liveness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /health
                    port: 8080
                  initialDelaySeconds: 30
                  periodSeconds: 30
                  failureThreshold: 6
              readiness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /health
                    port: 8080
                  initialDelaySeconds: 20
                  periodSeconds: 10
                  failureThreshold: 6
              startup:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /health
                    port: 8080
                  failureThreshold: 360
                  periodSeconds: 10
    persistence:
      models:
        existingClaim: llm-models
        globalMounts:
          - path: /models
      dev-dri:
        type: hostPath
        hostPath: /dev/dri
        globalMounts:
          - path: /dev/dri
      dev-kfd:
        type: hostPath
        hostPath: /dev/kfd
        globalMounts:
          - path: /dev/kfd
    service:
      app:
        type: LoadBalancer
        annotations:
          lbipam.cilium.io/ips: 10.69.10.21
        externalTrafficPolicy: Cluster
        ports:
          http:
            port: 8080

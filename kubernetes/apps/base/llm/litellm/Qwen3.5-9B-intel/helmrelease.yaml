---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: llama-intel
spec:
  chartRef:
    kind: OCIRepository
    name: app-template
  interval: 15m
  dependsOn: []
  values:
    defaultPodOptions:
      resourceClaims:
        - name: gpu
          resourceClaimTemplateName: llama-intel-gpu
      hostIPC: true
    controllers:
      llama-intel:
        annotations:
          reloader.stakater.com/auto: "true"
        initContainers:
          model-download:
            image:
              repository: python
              tag: 3.14-slim
            command:
            - /bin/sh
            - -ec
            - |
              set -euo pipefail

              if [ ! -s /models/qwen3-5-9b/Qwen3.5-9B-heretic.Q4_K_M.gguf ] || [ ! -s /models/qwen3-5-9b/mmproj-F16.gguf ]; then
                pip install --no-cache-dir huggingface_hub
                mkdir -p /models/qwen3-5-9b
                rm -rf /models/qwen3-5-9b/.cache/huggingface/download/Qwen3.5-9B-heretic.Q4_K_M.gguf.lock
                hf download \
                  mradermacher/Qwen3.5-9B-heretic-GGUF \
                  Qwen3.5-9B-heretic.Q4_K_M.gguf \
                  --local-dir /models/qwen3-5-9b
                hf download \
                  unsloth/Qwen3.5-9B-GGUF \
                  mmproj-F16.gguf \
                  --local-dir /models/qwen3-5-9b
                echo "Qwen3.5-9B download complete"
              else
                echo "Qwen3.5-9B already downloaded, skipping"
              fi
            env:
              HF_HUB_ENABLE_HF_TRANSFER: "1"
            envFrom:
            - secretRef:
                name: huggingface
            resources:
              requests:
                cpu: 250m
                memory: 512Mi
              limits:
                memory: 4Gi
        containers:
          app:
            image:
              repository: ghcr.io/ggml-org/llama.cpp
              tag: server-intel
            securityContext:
              privileged: true
            args:
            - --host
            - 0.0.0.0
            - --port
            - "8080"
            - --alias
            - llama-intel
            - --model
            - /models/qwen3-5-9b/Qwen3.5-9B-heretic.Q4_K_M.gguf
            - --mmproj
            - /models/qwen3-5-9b/mmproj-F16.gguf
            - --ctx-size
            - "131072"
            - --n-gpu-layers
            - "99"
            - --fit
            - "off"
            - --flash-attn
            - "on"
            - --cont-batching
            - -sps
            - "0.90"
            - --no-context-shift
            - --cache-prompt
            - --kv-unified
            - --ctx-checkpoints
            - "4"
            - --checkpoint-every-n-tokens
            - "16384"
            - --image-min-tokens
            - "1120"
            - --image-max-tokens
            - "1120"
            - --metrics
            - --temp
            - "0.1"
            - --top-p
            - "0.90"
            - --top-k
            - "32"
            - --min-p
            - "0"
            - --threads
            - "6"
            - --batch-size
            - "1024"
            - --ubatch-size
            - "512"
            - --reasoning
            - "off"
            - --reasoning-budget
            - "0"
            - --mmap
            env:
              ZES_ENABLE_SYSMAN: "1"
              ONEAPI_DEVICE_SELECTOR: level_zero:gpu
              UR_L0_ENABLE_RELAXED_ALLOCATION_LIMITS: "1"
            resources:
              claims:
                - name: gpu
              requests:
                cpu: 500m
                memory: 12Gi
              limits:
                memory: 24Gi
            probes:
              liveness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /health
                    port: 8080
                  initialDelaySeconds: 30
                  periodSeconds: 30
                  failureThreshold: 6
              readiness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /health
                    port: 8080
                  initialDelaySeconds: 20
                  periodSeconds: 10
                  failureThreshold: 6
              startup:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /health
                    port: 8080
                  failureThreshold: 360
                  periodSeconds: 10
    persistence:
      models:
        existingClaim: llama-intel
        globalMounts:
        - path: /models
      dev-dri:
        type: hostPath
        hostPath: /dev/dri
        globalMounts:
        - path: /dev/dri
    service:
      app:
        ports:
          http:
            port: 8080

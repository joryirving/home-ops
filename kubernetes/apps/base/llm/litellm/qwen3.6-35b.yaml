---
apiVersion: inference.llmkube.dev/v1alpha1
kind: Model
metadata:
  name: qwen3.6-35b-a3b
spec:
  source: hf://deepreinforce-ai/Ornith-1.0-35B-GGUF
  files:
    - Qwen3.6-35B-A3B-UD-Q8_K_XL.gguf
  mmproj: mmproj-F16.gguf
  format: gguf
  quantization: UD-Q8_K_XL
  hardware:
    accelerator: rocm
    gpu:
      enabled: true
      vendor: amd
      layers: 99
      resourceClaims:
        - name: gpu
          resourceClaimTemplateName: llama-strix-gpu
---
apiVersion: inference.llmkube.dev/v1alpha1
kind: InferenceService
metadata:
  name: llama-strix
  labels:
    krr/ignore: "true"
spec:
  modelRef: qwen3.6-35b-a3b
  runtime: llamacpp
  image: docker.io/kyuz0/amd-strix-halo-toolboxes:rocm-6.4.4@sha256:898c22109363a4f16a93ba80e8d44726ecd5673a14f5fc1ca81860a9e2a41f6d
  rolloutPolicy:
    waitForIdle: true
    idleTimeoutSeconds: 86400
  command:
    - llama-server
  replicas: 1
  priority: high
  nodeSelector:
    topology.kubernetes.io/gpus: amd
  tolerations:
    - key: llm-workload
      operator: Exists
      effect: NoSchedule
  contextSize: 262144
  parallelSlots: 3
  flashAttention: true
  jinja: true
  cacheTypeK: q8_0
  cacheTypeV: q8_0
  reasoningBudget: 16384
  reasoningBudgetMessage: "Stop reasoning and produce the implementation, tool call, or final answer."
  batchSize: 6144
  uBatchSize: 2048
  resources:
    cpu: "500m"
    memory: 20Gi
  endpoint:
    port: 8080
    type: ClusterIP
  extraArgs:
    - --alias
    - self-hosted
    - --mmproj
    - /model-source/qwen3.6-35b-a3b/mmproj-F16.gguf
    - --cont-batching
    - --spec-type
    - draft-mtp
    - --spec-draft-p-min
    - "0.75"
    - --spec-draft-n-max
    - "3"
    - --spec-draft-type-k
    - q8_0
    - --spec-draft-type-v
    - q8_0
    - -sps
    - "0.75"
    - --cache-prompt
    - --kv-unified
    - --checkpoint-min-step
    - "32768"
    - --image-min-tokens
    - "1024"
    - --temp
    - "0.6"
    - --top-p
    - "0.95"
    - --top-k
    - "20"
    - --min-p
    - "0"
    - --presence-penalty
    - "0.5"
    - --repeat-penalty
    - "1.03"
    - --threads
    - "16"
    - --threads-batch
    - "21"
    - --load-mode
    - none
    - --chat-template-kwargs
    - '{"preserve_thinking":true}'
  probeOverrides:
    startup:
      httpGet:
        path: /health
        port: 8080
      periodSeconds: 10
      failureThreshold: 360
    liveness:
      httpGet:
        path: /health
        port: 8080
      initialDelaySeconds: 30
      periodSeconds: 30
      failureThreshold: 6
    readiness:
      httpGet:
        path: /health
        port: 8080
      initialDelaySeconds: 20
      periodSeconds: 10
      failureThreshold: 6

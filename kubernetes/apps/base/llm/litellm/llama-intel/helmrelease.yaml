---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: llama-intel
spec:
  chartRef:
    kind: OCIRepository
    name: app-template
  interval: 15m
  dependsOn: []
  values:
    defaultPodOptions:
      resourceClaims:
        - name: gpu
          resourceClaimTemplateName: llama-intel-gpu
      hostIPC: true
      labels:
        igpu-workload: "true"
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              igpu-workload: "true"
    controllers:
      llama-intel:
        annotations:
          reloader.stakater.com/auto: "true"
        initContainers:
          model-download:
            image:
              repository: python
              tag: 3.14-slim
            command:
              - /bin/sh
              - -ec
              - |
                set -euo pipefail

                if [ ! -s /models/gemma4-E4B/gemma-4-E4B-it-Q4_K_M.gguf ] || [ ! -s /models/gemma4-E4B/mmproj-F16.gguf ]; then
                  pip install --no-cache-dir "huggingface_hub[hf_transfer]"
                  mkdir -p /models/gemma4-E4B
                  rm -rf /models/gemma4-E4B/.cache/huggingface/download/gemma-4-E4B-it-Q4_K_M.gguflock
                  hf download \
                    unsloth/gemma-4-E4B-it-GGUF \
                    gemma-4-E4B-it-Q4_K_M.gguf \
                    mmproj-F16.gguf \
                    --local-dir /models/gemma4-E4B
                  echo "Gemma-4-E4B download complete"
                else
                  echo "Gemma-4-E4B already downloaded, skipping"
                fi
            env:
              HF_HUB_ENABLE_HF_TRANSFER: "1"
            envFrom:
              - secretRef:
                  name: huggingface
            resources:
              requests:
                cpu: 250m
                memory: 512Mi
              limits:
                memory: 4Gi
        containers:
          app:
            image:
              repository: ghcr.io/ggml-org/llama.cpp
              tag: server-vulkan
            securityContext:
              privileged: true
            args:
              - --host
              - 0.0.0.0
              - --port
              - "8080"
              - --alias
              - intel
              - --model
              - /models/gemma4-E4B/gemma-4-E4B-it-Q4_K_M.gguf
              - --mmproj
              - /models/gemma4-E4B/mmproj-F16.gguf
              - --ctx-size
              - "8192"
              - --n-gpu-layers
              - "99"
              - --fit
              - "off"
              - --flash-attn
              - "on"
              - --parallel
              - "2"
              - --cont-batching
              - -sps
              - "0.90"
              - --no-context-shift
              - --cache-prompt
              - --kv-unified
              - --image-min-tokens
              - "280"
              - --image-max-tokens
              - "280"
              - --metrics
              - --temp
              - "1.0"
              - --top-p
              - "0.95"
              - --top-k
              - "64"
              - --threads
              - "6"
              - --threads-batch
              - "6"
              - --batch-size
              - "1024"
              - --ubatch-size
              - "512"
              - --mmap
            env:
              ZES_ENABLE_SYSMAN: "1"
              ONEAPI_DEVICE_SELECTOR: level_zero:gpu
              UR_L0_ENABLE_RELAXED_ALLOCATION_LIMITS: "1"
            resources:
              claims:
                - name: gpu
              requests:
                cpu: 500m
                memory: 8Gi
              limits:
                memory: 16Gi
            probes:
              liveness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /health
                    port: 8080
                  initialDelaySeconds: 30
                  periodSeconds: 30
                  failureThreshold: 6
              readiness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /health
                    port: 8080
                  initialDelaySeconds: 20
                  periodSeconds: 10
                  failureThreshold: 6
              startup:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /health
                    port: 8080
                  failureThreshold: 360
                  periodSeconds: 10
    persistence:
      models:
        existingClaim: llm-models-ms01
        globalMounts:
          - path: /models
      dev-dri:
        type: hostPath
        hostPath: /dev/dri
        globalMounts:
          - path: /dev/dri
    service:
      app:
        ports:
          http:
            port: 8080

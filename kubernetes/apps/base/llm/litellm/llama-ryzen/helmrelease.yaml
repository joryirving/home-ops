---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: llama-ryzen
spec:
  chartRef:
    kind: OCIRepository
    name: llama-ryzen
  interval: 15m
  dependsOn: []
  values:
    defaultPodOptions:
      hostIPC: true
    controllers:
      llama-ryzen:
        annotations:
          reloader.stakater.com/auto: "true"
        initContainers:
          model-download:
            image:
              repository: python
              tag: 3.14-slim
            command:
              - /bin/sh
              - -ec
              - |
                set -euo pipefail

                if [ ! -s /models/qwen3.5-9b/Qwen3.5-9B-heretic.Q4_K_M.gguf ] || [ ! -s /models/qwen3.5-9b/mmproj-F16.gguf ]; then
                  pip install --no-cache-dir "huggingface_hub[hf_xet]"
                  mkdir -p /models/qwen3.5-9b
                  rm -rf /models/qwen3.5-9b/.cache/huggingface/download/Qwen3.5-9B-heretic.Q4_K_M.gguf.lock
                  hf download \
                    mradermacher/Qwen3.5-9B-heretic-GGUF \
                    Qwen3.5-9B-heretic.Q4_K_M.gguf \
                    --local-dir /models/qwen3.5-9b
                  hf download \
                    unsloth/Qwen3.5-9B-GGUF \
                    mmproj-F16.gguf \
                    --local-dir /models/qwen3.5-9b
                  echo "Qwen3.5-9B download complete"
                else
                  echo "Qwen3.5-9B already downloaded, skipping"
                fi
            envFrom:
              - secretRef:
                  name: huggingface
            resources:
              requests:
                cpu: 2
                memory: 8Gi
              limits:
                memory: 20Gi
        containers:
          app:
            image:
              repository: ghcr.io/ggml-org/llama.cpp
              tag: server-vulkan@sha256:c7e3aa0258d9f79f5462f3ef21368af5c3614c75459d368c7ce941b6adb42fca
            securityContext:
              privileged: true
            args:
              - --host
              - 0.0.0.0
              - --port
              - "8080"
              - --alias
              - ryzen
              - --model
              - /models/qwen3.5-9b/Qwen3.5-9B-heretic.Q4_K_M.gguf
              - --mmproj
              - /models/qwen3.5-9b/mmproj-F16.gguf
              - --ctx-size
              - "131072"
              - --n-gpu-layers
              - "99"
              - --flash-attn
              - "on"
              - --parallel
              - "2"
              - --cont-batching
              - -sps
              - "0.90"
              - --cache-prompt
              - --kv-unified
              - --image-min-tokens
              - "1024"
              - --metrics
              - --temp
              - "0.6"
              - --top-p
              - "0.95"
              - --top-k
              - "20"
              - --min-p
              - "0"
              - --presence-penalty
              - "0.5"
              - --repeat-penalty
              - "1.03"
              - --reasoning-budget
              - "8192"
              - --reasoning-budget-message
              - "Stop reasoning and produce the implementation, tool call, or final answer."
              - --batch-size
              - "2048"
              - --ubatch-size
              - "1024"
              - --threads
              - "6"
              - --threads-batch
              - "8"
              - --mmap
              - --jinja
              - --chat-template-kwargs
              - '{"preserve_thinking":true}'
              - --device
              - Vulkan0
            env:
              ZES_ENABLE_SYSMAN: "1"
              GGML_VK_VISIBLE_DEVICES: "0"
              UR_L0_ENABLE_RELAXED_ALLOCATION_LIMITS: "1"
            resources:
              requests:
                cpu: 500m
                memory: 8Gi
              limits:
                memory: 16Gi
            probes:
              liveness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /health
                    port: 8080
                  initialDelaySeconds: 30
                  periodSeconds: 30
                  failureThreshold: 6
              readiness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /health
                    port: 8080
                  initialDelaySeconds: 20
                  periodSeconds: 10
                  failureThreshold: 6
              startup:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /health
                    port: 8080
                  failureThreshold: 360
                  periodSeconds: 10
    persistence:
      models:
        existingClaim: llama-ryzen
        globalMounts:
          - path: /models
      dev-dri:
        type: hostPath
        hostPath: /dev/dri
        globalMounts:
          - path: /dev/dri
    service:
      app:
        type: LoadBalancer
        annotations:
          lbipam.cilium.io/ips: 10.69.10.120
        externalTrafficPolicy: Cluster
        ports:
          http:
            port: 8080

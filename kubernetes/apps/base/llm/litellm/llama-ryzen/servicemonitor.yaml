---
# yaml-language-server: $schema=https://kube-schemas.pages.dev/monitoring.coreos.com/servicemonitor_v1.json
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: llama-ryzen
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: llama-ryzen
      app.kubernetes.io/instance: llama-ryzen
  namespaceSelector:
    matchNames:
      - llm
  targetLabels: ["app.kubernetes.io/name", "app.kubernetes.io/instance"]
  endpoints:
    - port: http
      path: /metrics
  fallbackScrapeProtocol: PrometheusText0.0.4

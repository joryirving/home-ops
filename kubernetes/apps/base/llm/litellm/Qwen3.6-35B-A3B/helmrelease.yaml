---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: llama-strix
spec:
  chartRef:
    kind: OCIRepository
    name: app-template
  interval: 15m
  dependsOn: []
  values:
    defaultPodOptions:
      hostIPC: true
      nodeSelector:
        topology.kubernetes.io/gpus: amd
      tolerations:
        - key: llm-workload
          operator: Exists
          effect: NoSchedule
    controllers:
      llama-strix:
        annotations:
          reloader.stakater.com/auto: "true"
        initContainers:
          model-download:
            image:
              repository: python
              tag: 3.14-slim
            command:
              - /bin/sh
              - -ec
              - |
                set -euo pipefail

                if [ ! -s /models/qwen3.6-35b-a3b/Qwen3.6-35B-A3B-UD-Q8_K_XL.gguf ] || [ ! -s /models/qwen3.6-35b-a3b/mmproj-F16.gguf ]; then
                  pip install --no-cache-dir "huggingface_hub[hf_xet]"
                  mkdir -p /models/qwen3.6-35b-a3b
                  rm -rf /models/qwen3.6-35b-a3b/.cache/huggingface/download/Qwen3.6-35B-A3B-UD-Q8_K_XL.gguf.lock
                  hf download \
                    unsloth/Qwen3.6-35B-A3B-MTP-GGUF \
                    Qwen3.6-35B-A3B-UD-Q8_K_XL.gguf \
                    mmproj-F16.gguf \
                    --local-dir /models/qwen3.6-35b-a3b

                  echo "Qwen3.6-35B-A3B download complete"
                else
                  echo "Qwen3.6-35B-A3B already downloaded, skipping"
                fi
            envFrom:
              - secretRef:
                  name: huggingface
            resources:
              requests:
                cpu: 2
                memory: 8Gi
              limits:
                memory: 20Gi
        containers:
          app:
            image:
              repository: docker.io/kyuz0/amd-strix-halo-toolboxes
              tag: rocm-6.4.4@sha256:2ce313f3d3f853889042e837877ef65868494181064f33ca39db2b5f637fed28
              pullPolicy: Always
            securityContext:
              privileged: true
            command:
              - llama-server
            args:
              - --host
              - 0.0.0.0
              - --port
              - "8080"
              - --alias
              - self-hosted
              - --model
              - /models/qwen3.6-35b-a3b/Qwen3.6-35B-A3B-UD-Q8_K_XL.gguf
              - --mmproj
              - /models/qwen3.6-35b-a3b/mmproj-F16.gguf
              - --ctx-size
              - "204800"
              - --n-gpu-layers
              - "99"
              - --flash-attn
              - "on"
              - --parallel
              - "2"
              - --cont-batching
              - --spec-type
              - draft-mtp
              - --spec-draft-p-min
              - "0.75"
              - --spec-draft-n-max
              - "3"
              - --spec-draft-type-k
              - q8_0
              - --spec-draft-type-v
              - q8_0
              - -sps
              - "0.90"
              - --cache-prompt
              - --kv-unified
              - --image-min-tokens
              - "1024"
              - --metrics
              - --temp
              - "0.6"
              - --top-p
              - "0.95"
              - --top-k
              - "20"
              - --min-p
              - "0"
              - --presence-penalty
              - "0.5"
              - --repeat-penalty
              - "1.03"
              - --reasoning-budget
              - "16384"
              - --reasoning-budget-message
              - "Stop reasoning and produce the implementation, tool call, or final answer."
              - --batch-size
              - "6144"
              - --ubatch-size
              - "2048"
              - --threads
              - "16"
              - --threads-batch
              - "21"
              - --cache-type-k
              - q8_0
              - --cache-type-v
              - q8_0
              - --no-mmap
              - --jinja
              - --chat-template-kwargs
              - '{"preserve_thinking":true}'
            resources:
              requests:
                cpu: 500m
                memory: 20Gi
              limits:
                memory: 60Gi
            probes:
              liveness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /health
                    port: 8080
                  initialDelaySeconds: 30
                  periodSeconds: 30
                  failureThreshold: 6
              readiness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /health
                    port: 8080
                  initialDelaySeconds: 20
                  periodSeconds: 10
                  failureThreshold: 6
              startup:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /health
                    port: 8080
                  failureThreshold: 360
                  periodSeconds: 10
    persistence:
      models:
        existingClaim: llm-models
        globalMounts:
          - path: /models
      dev-dri:
        type: hostPath
        hostPath: /dev/dri
        globalMounts:
          - path: /dev/dri
      dev-kfd:
        type: hostPath
        hostPath: /dev/kfd
        globalMounts:
          - path: /dev/kfd
    service:
      app:
        type: LoadBalancer
        annotations:
          lbipam.cilium.io/ips: 10.69.10.20
        externalTrafficPolicy: Cluster
        ports:
          http:
            port: 8080

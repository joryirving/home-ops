---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/monitoring.coreos.com/servicemonitor_v1.json
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: llama-nvidia
spec:
  selector:
    matchLabels:
      # LLMKube labels its Service inference.llmkube.dev/service=<isvc name>;
      # the Service is still named llama-nvidia, so the default `job` label
      # stays "llama-nvidia" — which the idle-watcher queries against.
      inference.llmkube.dev/service: llama-nvidia
  namespaceSelector:
    matchNames:
      - llm
  endpoints:
    - port: http
      path: /metrics
  fallbackScrapeProtocol: PrometheusText0.0.4

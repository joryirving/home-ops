---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: litellm
spec:
  chartRef:
    kind: OCIRepository
    name: app-template
  interval: 15m
  dependsOn: []
  values:
    controllers:
      litellm:
        annotations:
          reloader.stakater.com/auto: "true"
        replicas: 3
        strategy: RollingUpdate
        containers:
          app:
            image:
              repository: ghcr.io/berriai/litellm-database
              tag: v1.89.2@sha256:7a8cd7e903a9087808422bd9d6dc945a0ed719f6eac2a011bc3313d81db24b07
            args:
              - --config=/app/config.yaml
            env:
              LITELLM_LOG: INFO
              LITELLM_MODE: PRODUCTION
              REDIS_HOST: "{{ .Release.Name }}-dragonfly"
              REDIS_PORT: "6379"
              CHATGPT_TOKEN_DIR: /app/chatgpt_tokens
              PROXY_BASE_URL: https://litellm.jory.dev
              GENERIC_AUTHORIZATION_ENDPOINT: https://sso.jory.dev/application/o/authorize/
              GENERIC_TOKEN_ENDPOINT: https://sso.jory.dev/application/o/token/
              GENERIC_USERINFO_ENDPOINT: https://sso.jory.dev/application/o/userinfo/
              GENERIC_SCOPE: openid email profile
              DATABASE_URL:
                valueFrom:
                  secretKeyRef:
                    name: "{{ .Release.Name }}-app"
                    key: uri
            envFrom:
              - secretRef:
                  name: litellm
            resources:
              requests:
                cpu: 100m
                memory: 256Mi
              limits:
                memory: 2Gi
            probes:
              liveness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /
                    port: 4000
                  initialDelaySeconds: 5
                  periodSeconds: 10
                  failureThreshold: 3
              readiness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /
                    port: 4000
                  initialDelaySeconds: 5
                  periodSeconds: 10
                  failureThreshold: 3
              startup:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /
                    port: 4000
                  initialDelaySeconds: 5
                  periodSeconds: 10
                  failureThreshold: 30
    persistence:
      config:
        type: configMap
        name: litellm-configmap
        globalMounts:
          - path: /app/config.yaml
            subPath: config.yaml
            readOnly: true
      cache:
        type: emptyDir
        advancedMounts:
          litellm:
            app:
              - path: /app/cache
      ui:
        existingClaim: litellm
        globalMounts:
          - path: /app/chatgpt_tokens
    route:
      app:
        hostnames: ["litellm.jory.dev"]
        parentRefs:
          - name: envoy-external
            namespace: network
    service:
      app:
        ports:
          http:
            port: 4000

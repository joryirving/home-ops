---
apiVersion: inference.llmkube.dev/v1alpha1
kind: Model
metadata:
  name: llama-nvidia
spec:
  source: https://huggingface.co/unsloth/Qwen3.6-27B-MTP-GGUF/resolve/main/Qwen3.6-27B-UD-Q4_K_XL.gguf
  format: gguf
  quantization: UD-Q4_K_XL
  hardware:
    accelerator: cuda
    gpu:
      enabled: true
      vendor: nvidia
      count: 1
      layers: 99
---
apiVersion: inference.llmkube.dev/v1alpha1
kind: InferenceService
metadata:
  name: llama-nvidia
  labels:
    krr/ignore: "true"
spec:
  modelRef: llama-nvidia
  runtime: llamacpp
  image: ghcr.io/ggml-org/llama.cpp:server-cuda@sha256:62a1d4e144789aa3dd6948d350388fd4b9ac4d12744f33213a89c4e5a9af25df
  rolloutPolicy:
    waitForIdle: true
    idleTimeoutSeconds: 300
  replicas: 1
  priorityClassName: gpu-preemptible
  runtimeClassName: nvidia
  nodeSelector:
    topology.kubernetes.io: egpu
  env:
    - name: NVIDIA_DRIVER_CAPABILITIES
      value: compute,utility
  contextSize: 131072
  flashAttention: true
  jinja: true
  parallelSlots: 1
  batchSize: 4096
  uBatchSize: 1024
  cacheTypeK: q8_0
  cacheTypeV: q8_0
  reasoningBudget: 16384
  reasoningBudgetMessage: "Stop reasoning and produce the implementation, tool call, or final answer."
  resources:
    gpu: 1
    cpu: "500m"
    memory: 16Gi
  extraArgs:
    - --alias
    - llama-nvidia
    - --cont-batching
    - --spec-type
    - draft-mtp
    - --spec-draft-p-min
    - "0.75"
    - --spec-draft-n-max
    - "3"
    - --spec-draft-type-k
    - q8_0
    - --spec-draft-type-v
    - q8_0
    - -sps
    - "0.75"
    - --cache-prompt
    - --cache-ram
    - "16384"
    - --kv-unified
    - --temp
    - "0.6"
    - --top-p
    - "0.95"
    - --top-k
    - "20"
    - --min-p
    - "0"
    - --presence-penalty
    - "0.5"
    - --repeat-penalty
    - "1.03"
    - --threads
    - "6"
    - --threads-batch
    - "12"
    - --mmap
    - --chat-template-kwargs
    - '{"preserve_thinking":true}'
  endpoint:
    port: 8080
    type: ClusterIP
  probeOverrides:
    startup:
      httpGet:
        path: /health
        port: 8080
      periodSeconds: 10
      failureThreshold: 360
    liveness:
      httpGet:
        path: /health
        port: 8080
      initialDelaySeconds: 30
      periodSeconds: 30
      failureThreshold: 6
    readiness:
      httpGet:
        path: /health
        port: 8080
      initialDelaySeconds: 20
      periodSeconds: 10
      failureThreshold: 6

---
apiVersion: inference.llmkube.dev/v1alpha1
kind: Model
metadata:
  name: llama-strix
spec:
  source: https://huggingface.co/deepreinforce-ai/Ornith-1.0-35B-GGUF/resolve/main/ornith-1.0-35b-Q8_0.gguf
  format: gguf
  quantization: Q8_0
  hardware:
    accelerator: rocm
    gpu:
      enabled: true
      vendor: amd
      layers: 99
      resourceClaims:
        - name: gpu
          resourceClaimTemplateName: llama-strix-gpu
---
apiVersion: inference.llmkube.dev/v1alpha1
kind: InferenceService
metadata:
  name: llama-strix
  labels:
    krr/ignore: "true"
spec:
  modelRef: llama-strix
  modelCache:
    claimName: llmkube-skirk-cache
  runtime: llamacpp
  image: docker.io/kyuz0/amd-strix-halo-toolboxes:rocm-6.4.4@sha256:c478db2f8b609085cffb1a93b906f9415428c2cf5b404ccfe9c8fdd426156845
  rolloutPolicy:
    waitForIdle: true
    idleTimeoutSeconds: 86400
  command:
    - llama-server
  replicas: 1
  priority: high
  nodeSelector:
    topology.kubernetes.io/gpus: amd
  tolerations:
    - key: llm-workload
      operator: Exists
      effect: NoSchedule
  contextSize: 262144
  parallelSlots: 3
  flashAttention: true
  jinja: true
  cacheTypeK: q8_0
  cacheTypeV: q8_0
  reasoningBudget: 16384
  reasoningBudgetMessage: "Stop reasoning and produce the implementation, tool call, or final answer."
  batchSize: 6144
  uBatchSize: 2048
  resources:
    cpu: "500m"
    memory: 36Gi
  endpoint:
    port: 8080
    type: ClusterIP
  extraArgs:
    - --alias
    - llama-strix
    - --cont-batching
    - --cache-prompt
    - --cache-ram
    - "24576"
    - --kv-unified
    - --checkpoint-min-step
    - "32768"
    - --temp
    - "0.6"
    - --top-p
    - "0.95"
    - --top-k
    - "20"
    - --min-p
    - "0"
    - --presence-penalty
    - "0.5"
    - --repeat-penalty
    - "1.03"
    - --threads
    - "16"
    - --threads-batch
    - "21"
    - --no-mmap
    - --chat-template-kwargs
    - '{"preserve_thinking":true}'
  probeOverrides:
    startup:
      httpGet:
        path: /health
        port: 8080
      periodSeconds: 10
      failureThreshold: 360
    liveness:
      httpGet:
        path: /health
        port: 8080
      initialDelaySeconds: 30
      periodSeconds: 30
      failureThreshold: 6
    readiness:
      httpGet:
        path: /health
        port: 8080
      initialDelaySeconds: 20
      periodSeconds: 10
      failureThreshold: 6

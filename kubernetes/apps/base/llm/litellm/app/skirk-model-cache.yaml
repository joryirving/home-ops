---
# Node-local model cache shared by the skirk-node inference services
# (llama-strix, llama-vision). Both pin to the amd GPU node via
# nodeSelector, so a single RWO local-hostpath PVC binds on skirk
# (WaitForFirstConsumer) and both pods mount it. User-owned: the LLMKube
# operator only verifies it exists (spec.modelCache.claimName), never
# creates/adopts/GCs it. 80Gi fits Ornith-35B-Q8 (~37Gi) + the vision
# model + mmproj with headroom.
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: skirk-model-cache
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: local-hostpath
  resources:
    requests:
      storage: 80Gi

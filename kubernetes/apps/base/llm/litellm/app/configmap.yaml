---
apiVersion: v1
kind: ConfigMap
metadata:
  name: litellm-configmap
data:
  config.yaml: |
    model_list:
      # These aliases keep the client-facing names stable while LiteLLM
      # forwards the upstream model IDs that each llama.cpp server expects.
      - model_name: self-hosted
        model_info:
          mode: chat
          max_input_tokens: 262144
          max_output_tokens: 16384
          supports_function_calling: true
          supports_vision: true
        litellm_params:
          model: openai/self-hosted
          api_base: http://llama-server.llm:8080/v1
          api_key: llama-server
          max_parallel_requests: 2
          weight: 100
          drop_params: true

      - model_name: self-hosted
        model_info:
          mode: chat
          max_input_tokens: 262144
          max_output_tokens: 16384
          supports_function_calling: true
          supports_vision: true
        litellm_params:
          model: openai/unsloth/qwen3.6-35b-a3b
          api_base: http://mac.internal:1234/v1
          api_key: lm-studio
          max_parallel_requests: 4
          weight: 1
          drop_params: true

      - model_name: intel
        model_info:
          mode: chat
          max_input_tokens: 8192
          max_output_tokens: 2048
          supports_function_calling: false
          supports_vision: false
        litellm_params:
          model: openai/intel
          api_base: http://llama-intel.llm:8080/v1
          api_key: llama-intel
          max_parallel_requests: 1
          drop_params: true

      - model_name: ryzen
        model_info:
          mode: chat
          max_input_tokens: 8192
          max_output_tokens: 2048
          supports_function_calling: true
          supports_vision: true
        litellm_params:
          model: openai/ryzen
          api_base: http://10.69.10.120:8080/v1
          api_key: llama-ryzen
          max_parallel_requests: 1
          drop_params: true

      - model_name: local-small
        model_info:
          mode: chat
          max_input_tokens: 8192
          max_output_tokens: 2048
          supports_function_calling: false
          supports_vision: false
        litellm_params:
          model: openai/intel
          api_base: http://llama-intel.llm:8080/v1
          api_key: llama-intel
          max_parallel_requests: 1
          weight: 2
          drop_params: true

      - model_name: local-small
        model_info:
          mode: chat
          max_input_tokens: 8192
          max_output_tokens: 2048
          supports_function_calling: true
          supports_vision: true
        litellm_params:
          model: openai/ryzen
          api_base: http://10.69.10.120:8080/v1
          api_key: llama-ryzen
          max_parallel_requests: 1
          weight: 1
          drop_params: true

      - model_name: sentence-transformers/all-MiniLM-L6-v2
        model_info:
          mode: embedding
        litellm_params:
          model: openai/sentence-transformers/all-MiniLM-L6-v2
          api_base: http://llama-embed.llm:8080/v1
          api_key: llama-embed
          drop_params: true

      - model_name: openai/MiniMax-M2.7
        model_info:
          mode: chat
          max_input_tokens: 204800
          max_output_tokens: 131072
          supports_function_calling: true
          supports_prompt_caching: true
        litellm_params:
          model: minimax/MiniMax-M2.7
          api_base: https://api.minimax.io/v1
          api_key: os.environ/MINIMAX_API_KEY
          drop_params: true

      - model_name: MiniMax-M2.7
        model_info:
          mode: messages
          max_input_tokens: 204800
          max_output_tokens: 131072
          supports_function_calling: true
          supports_prompt_caching: true
        litellm_params:
          model: minimax/MiniMax-M2.7
          api_base: https://api.minimax.io/anthropic/v1/messages
          api_key: os.environ/MINIMAX_API_KEY
          drop_params: true

      - model_name: kimi-k2.5
        model_info:
          mode: chat
          max_input_tokens: 128000
          max_output_tokens: 8192
          supports_function_calling: true
          supports_prompt_caching: true
        litellm_params:
          model: moonshot/kimi-k2.5
          api_base: https://api.moonshot.ai/v1
          api_key: os.environ/MOONSHOT_API_KEY
          drop_params: true

      - model_name: kimi-k2.6
        model_info:
          mode: chat
          max_input_tokens: 262144
          max_output_tokens: 262144
          supports_function_calling: true
          supports_prompt_caching: true
        litellm_params:
          model: moonshot/kimi-k2.6
          api_base: https://api.moonshot.ai/v1
          api_key: os.environ/MOONSHOT_API_KEY
          drop_params: true

      - model_name: opencode-go-glm-5.1
        model_info:
          mode: chat
          max_input_tokens: 203000
          max_output_tokens: 16384
          supports_function_calling: true
          supports_prompt_caching: true
        litellm_params:
          model: openai/glm-5.1
          api_base: https://opencode.ai/zen/go/v1
          api_key: os.environ/OPENCODE_API_KEY
          drop_params: true

      - model_name: opencode-go-deepseek-v4-flash
        model_info:
          mode: chat
          max_input_tokens: 1000000
          max_output_tokens: 16384
          supports_function_calling: true
          supports_prompt_caching: true
        litellm_params:
          model: openai/deepseek-v4-flash
          api_base: https://opencode.ai/zen/go/v1
          api_key: os.environ/OPENCODE_API_KEY
          drop_params: true

      - model_name: opencode-go-deepseek-v4-pro
        model_info:
          mode: chat
          max_input_tokens: 1000000
          max_output_tokens: 16384
          supports_function_calling: true
          supports_prompt_caching: true
        litellm_params:
          model: openai/deepseek-v4-pro
          api_base: https://opencode.ai/zen/go/v1
          api_key: os.environ/OPENCODE_API_KEY
          drop_params: true

      - model_name: opencode-go-kimi-k2.6
        model_info:
          mode: chat
          max_input_tokens: 262144
          max_output_tokens: 16384
          supports_function_calling: true
          supports_prompt_caching: true
        litellm_params:
          model: openai/kimi-k2.6
          api_base: https://opencode.ai/zen/go/v1
          api_key: os.environ/OPENCODE_API_KEY
          drop_params: true

      - model_name: cheap-coder
        model_info:
          mode: chat
          max_input_tokens: 1000000
          max_output_tokens: 16384
          supports_function_calling: true
          supports_prompt_caching: true
        litellm_params:
          model: openai/deepseek-v4-flash
          api_base: https://opencode.ai/zen/go/v1
          api_key: os.environ/OPENCODE_API_KEY
          drop_params: true

      - model_name: reasoning-coder
        model_info:
          mode: chat
          max_input_tokens: 203000
          max_output_tokens: 16384
          supports_function_calling: true
          supports_prompt_caching: true
        litellm_params:
          model: openai/glm-5.1
          api_base: https://opencode.ai/zen/go/v1
          api_key: os.environ/OPENCODE_API_KEY
          drop_params: true

      - model_name: chatgpt/gpt-5.5
        model_info:
          mode: responses
        litellm_params:
          model: chatgpt/gpt-5.5

      - model_name: chatgpt/gpt-5.3-instant
        model_info:
          mode: responses
        litellm_params:
          model: chatgpt/gpt-5.3-instant


      - model_name: chatgpt/gpt-5.3-codex
        model_info:
          mode: responses
        litellm_params:
          model: chatgpt/gpt-5.3-codex

    general_settings:
      health_check_endpoint: /v1/health

    router_settings:
      redis_host: os.environ/REDIS_HOST
      redis_port: os.environ/REDIS_PORT
      cooldown_time: 30
      enable_pre_call_checks: true
      fallbacks:
        - local-small: ["self-hosted"]
        - self-hosted: ["cheap-coder", "opencode-go-glm-5.1", "MiniMax-M2.7"]
        - cheap-coder: ["opencode-go-glm-5.1", "MiniMax-M2.7"]
      context_window_fallbacks:
        - local-small: ["self-hosted"]
        - self-hosted: ["cheap-coder", "opencode-go-glm-5.1", "MiniMax-M2.7"]
        - cheap-coder: ["opencode-go-glm-5.1", "MiniMax-M2.7"]

    litellm_settings:
      success_callback: ["prometheus"]
      failure_callback: ["prometheus"]
      prometheus_adapter: true
      cache: true
      cache_params:
        type: redis
        host: os.environ/REDIS_HOST
        port: os.environ/REDIS_PORT
        ttl: 30
      drop_params: false
      request_timeout: 600
      num_retries: 2
      retry_after: 5
      set_verbose: false

    environment:
      - MINIMAX_API_KEY
      - MOONSHOT_API_KEY
      - OPENCODE_API_KEY
      - REDIS_HOST
      - REDIS_PORT

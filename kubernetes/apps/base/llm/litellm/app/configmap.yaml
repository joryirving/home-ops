---
apiVersion: v1
kind: ConfigMap
metadata:
  name: litellm-configmap
data:
  config.yaml: |
    model_list:
      # These aliases keep the client-facing names stable while LiteLLM
      # forwards the upstream model IDs that each llama.cpp server expects.
      - model_name: self-hosted
        litellm_params:
          model: self-hosted
          api_base: http://llama-server.llm:8080/v1
          api_key: llama-server

      - model_name: vision
        litellm_params:
          model: vision
          api_base: http://llama-vision.llm:8080/v1
          api_key: llama-vision

      - model_name: minimax/minimax-m2.7
        litellm_params:
          model: minimax/*
          api_base: https://api.minimax.io/v1
          api_key: ${MINIMAX_API_KEY}

      - model_name: moonshot/kimi-2.6
        litellm_params:
          model: moonshot/*
          api_base: https://api.moonshot.ai/v1
          api_key: ${MOONSHOT_API_KEY}

      - model_name: gpt-5.3-codex
        litellm_params:
          model: chatgpt/gpt-5.3-codex

      - model_name: gpt-5.5
        litellm_params:
          model: chatgpt/gpt-5.5

    general_settings:
      health_check_endpoint: /v1/health

    litellm_settings:
      success_callback: ["prometheus"]
      prometheus_adapter: true
      drop_params: true
      set_verbose: false

    environment:
      - MINIMAX_API_KEY
      - MOONSHOT_API_KEY

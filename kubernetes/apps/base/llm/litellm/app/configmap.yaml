---
apiVersion: v1
kind: ConfigMap
metadata:
  name: litellm-configmap
data:
  config.yaml: |
    model_list:
      # These aliases keep the client-facing names stable while LiteLLM
      # forwards the upstream model IDs that each llama.cpp server expects.
      - model_name: self-hosted
        model_info:
          mode: chat
          max_input_tokens: 262144
          max_output_tokens: 16384
          supports_function_calling: true
          supports_vision: true
        litellm_params:
          model: openai/self-hosted
          api_base: http://llama-strix.llm:8080/v1
          api_key: llama-strix
          max_parallel_requests: 2
          order: 1

      - model_name: self-hosted
        model_info:
          mode: chat
          max_input_tokens: 262144
          max_output_tokens: 16384
          supports_function_calling: true
          supports_vision: true
        litellm_params:
          model: openai/qwen3.6-35b-a3b@q5_k_xl
          api_base: http://mac.internal:1234/v1
          api_key: lm-studio
          max_parallel_requests: 2
          order: 1

      - model_name: review
        model_info:
          mode: chat
          max_input_tokens: 204800
          max_output_tokens: 16384
          supports_function_calling: true
          supports_vision: false
        litellm_params:
          model: openai/review
          api_base: http://llama-review.llm:8080/v1
          api_key: llama-review
          max_parallel_requests: 1
          order: 1

      - model_name: review
        model_info:
          mode: chat
          max_input_tokens: 204800
          max_output_tokens: 16384
          supports_function_calling: true
          supports_vision: false
        litellm_params:
          model: openai/gemma-4-26b-a4b-it-qat
          api_base: http://mac.internal:1234/v1
          api_key: lm-studio
          max_parallel_requests: 1
          order: 1

      - model_name: review
        model_info:
          mode: chat
          max_input_tokens: 204800
          max_output_tokens: 16384
          supports_function_calling: true
          supports_vision: false
        litellm_params:
          model: openai/review
          api_base: http://llama-nvidia-gemma.llm:8080/v1
          api_key: llama-nvidia-gemma
          max_parallel_requests: 1
          order: 1

      - model_name: ryzen
        model_info:
          mode: chat
          max_input_tokens: 8192
          max_output_tokens: 2048
          supports_function_calling: true
          supports_vision: true
        litellm_params:
          model: openai/ryzen
          api_base: http://10.69.10.120:8080/v1
          api_key: llama-ryzen
          max_parallel_requests: 1

      - model_name: nvidia
        model_info:
          mode: chat
          max_input_tokens: 145000
          max_output_tokens: 16384
          supports_function_calling: true
          supports_vision: false
        litellm_params:
          model: openai/nvidia
          api_base: http://llama-nvidia.llm:8080/v1
          api_key: llama-nvidia
          max_parallel_requests: 1

      - model_name: qwen3-embedding-0-6b
        model_info:
          mode: embedding
        litellm_params:
          model: openai/qwen3-embedding-0-6b
          api_base: http://llama-qwen-embed.llm:8080/v1
          api_key: qwen3-embedding-0-6b

      # ChatGPT subscription (OAuth device flow, no API key — token cached in CHATGPT_TOKEN_DIR).
      # reasoning_effort is left to the caller (none|low|medium|high|xhigh per request).
      # Only models the Codex/ChatGPT backend serves work here: 5.5, 5.4 and 5.4-mini.
      # nano and codex-spark are rejected by the backend (API-only SKUs).
      - model_name: chatgpt/gpt-5.5
        model_info:
          mode: responses
        litellm_params:
          model: chatgpt/gpt-5.5

      - model_name: chatgpt/gpt-5.4
        model_info:
          mode: responses
        litellm_params:
          model: chatgpt/gpt-5.4

      - model_name: chatgpt/gpt-5.4-mini
        model_info:
          mode: responses
        litellm_params:
          model: chatgpt/gpt-5.4-mini

      - model_name: MiniMax
        model_info:
          mode: messages
          max_input_tokens: 1000000
          max_output_tokens: 131072
          supports_function_calling: true
          supports_prompt_caching: true
          supports_vision: true
        litellm_params:
          model: minimax/MiniMax-M3
          api_base: https://api.minimax.io/anthropic/v1/messages
          api_key: os.environ/MINIMAX_API_KEY
          cache_control_injection_points:
            - location: message
              role: system
            - location: message
              index: -1

      - model_name: MiniMax-M2.7
        model_info:
          mode: messages
          max_input_tokens: 204800
          max_output_tokens: 131072
          supports_function_calling: true
          supports_prompt_caching: true
          supports_vision: false
        litellm_params:
          model: minimax/MiniMax-M2.7
          api_base: https://api.minimax.io/anthropic/v1/messages
          api_key: os.environ/MINIMAX_API_KEY
          cache_control_injection_points:
            - location: message
              role: system
            - location: message
              index: -1

      - model_name: glm-5.1
        model_info:
          mode: chat
          max_input_tokens: 203000
          max_output_tokens: 131072
          supports_function_calling: true
          supports_prompt_caching: true
        litellm_params:
          model: openai/glm-5.1
          api_base: https://api.z.ai/api/coding/paas/v4
          api_key: os.environ/ZAI_API_KEY

      - model_name: glm-5.2
        model_info:
          mode: chat
          max_input_tokens: 1000000
          max_output_tokens: 131072
          supports_function_calling: true
          supports_prompt_caching: true
        litellm_params:
          model: openai/glm-5.2
          api_base: https://api.z.ai/api/coding/paas/v4
          api_key: os.environ/ZAI_API_KEY

      - model_name: kimi-k2.6
        model_info:
          mode: chat
          max_input_tokens: 262144
          max_output_tokens: 16384
          supports_function_calling: true
          supports_prompt_caching: true
        litellm_params:
          model: moonshot/kimi-k2.6
          api_base: https://api.moonshot.ai/v1
          api_key: os.environ/MOONSHOT_API_KEY

      - model_name: go-glm-5.1
        model_info:
          mode: chat
          max_input_tokens: 203000
          max_output_tokens: 16384
          supports_function_calling: true
          supports_prompt_caching: true
        litellm_params:
          model: openai/glm-5.1
          api_base: https://opencode.ai/zen/go/v1
          api_key: os.environ/OPENCODE_API_KEY

      - model_name: dsv4f
        model_info:
          mode: chat
          max_input_tokens: 1000000
          max_output_tokens: 16384
          supports_function_calling: true
          supports_prompt_caching: true
        litellm_params:
          model: openai/deepseek-v4-flash
          api_base: https://opencode.ai/zen/go/v1
          api_key: os.environ/OPENCODE_API_KEY
          extra_body: # https://github.com/BerriAI/litellm/issues/26395
            thinking:
              type: disabled
          merge_reasoning_content_in_choices: true

      - model_name: dsv4p
        model_info:
          mode: chat
          max_input_tokens: 1000000
          max_output_tokens: 16384
          supports_function_calling: true
          supports_prompt_caching: true
        litellm_params:
          model: openai/deepseek-v4-pro
          api_base: https://opencode.ai/zen/go/v1
          api_key: os.environ/OPENCODE_API_KEY
          extra_body: # https://github.com/BerriAI/litellm/issues/26395
            thinking:
              type: disabled
          merge_reasoning_content_in_choices: true

      - model_name: go-kimi-k2.6
        model_info:
          mode: chat
          max_input_tokens: 262144
          max_output_tokens: 16384
          supports_function_calling: true
          supports_prompt_caching: true
        litellm_params:
          model: openai/kimi-k2.6
          api_base: https://opencode.ai/zen/go/v1
          api_key: os.environ/OPENCODE_API_KEY

      - model_name: go-minimax-m3
        model_info:
          mode: chat
          max_input_tokens: 1000000
          max_output_tokens: 32768
          supports_function_calling: true
          supports_prompt_caching: true
        litellm_params:
          model: openai/minimax-m3
          api_base: https://opencode.ai/zen/go/v1
          api_key: os.environ/OPENCODE_API_KEY

      - model_name: go-minimax-m2.7
        model_info:
          mode: chat
          max_input_tokens: 204800
          max_output_tokens: 16384
          supports_function_calling: true
          supports_prompt_caching: true
        litellm_params:
          model: openai/minimax-m2.7
          api_base: https://opencode.ai/zen/go/v1
          api_key: os.environ/OPENCODE_API_KEY

      - model_name: mimo-v2.5-pro
        model_info:
          mode: chat
          max_input_tokens: 262144
          max_output_tokens: 16384
          supports_function_calling: true
          supports_prompt_caching: true
        litellm_params:
          model: openai/mimo-v2.5-pro
          api_base: https://opencode.ai/zen/go/v1
          api_key: os.environ/OPENCODE_API_KEY

      - model_name: mimo-v2.5
        model_info:
          mode: chat
          max_input_tokens: 262144
          max_output_tokens: 16384
          supports_function_calling: true
          supports_prompt_caching: true
        litellm_params:
          model: openai/mimo-v2.5
          api_base: https://opencode.ai/zen/go/v1
          api_key: os.environ/OPENCODE_API_KEY

      - model_name: qwen3.7-plus
        model_info:
          mode: chat
          max_input_tokens: 1000000
          max_output_tokens: 16384
          supports_function_calling: true
          supports_prompt_caching: true
        litellm_params:
          model: openai/qwen3.7-plus
          api_base: https://opencode.ai/zen/go/v1
          api_key: os.environ/OPENCODE_API_KEY

      # Load-balanced REASONING tier for the `auto` router (least-busy across plans).
      - model_name: reasoning-pool
        model_info:
          mode: chat
          max_input_tokens: 1000000
          max_output_tokens: 131072
          supports_function_calling: true
          supports_prompt_caching: true
        litellm_params:
          model: openai/glm-5.2
          api_base: https://api.z.ai/api/coding/paas/v4
          api_key: os.environ/ZAI_API_KEY

      - model_name: reasoning-pool
        model_info:
          mode: chat
          max_input_tokens: 1000000
          max_output_tokens: 32768
          supports_function_calling: true
          supports_prompt_caching: true
        litellm_params:
          model: openai/minimax-m3
          api_base: https://opencode.ai/zen/go/v1
          api_key: os.environ/OPENCODE_API_KEY

      - model_name: reasoning-pool
        model_info:
          mode: chat
          max_input_tokens: 262144
          max_output_tokens: 16384
          supports_function_calling: true
          supports_prompt_caching: true
        litellm_params:
          model: openai/kimi-k2.6
          api_base: https://opencode.ai/zen/go/v1
          api_key: os.environ/OPENCODE_API_KEY

      # Opt-in smart-routing alias for opencode + zed. Rule-based complexity router
      # (no embedding call); pinned consumers keep addressing their model directly.
      - model_name: auto
        litellm_params:
          model: auto_router/complexity_router
          complexity_router_default_model: nvidia
          complexity_router_config:
            tiers:
              SIMPLE: self-hosted
              MEDIUM: nvidia
              COMPLEX: dsv4p
              REASONING: reasoning-pool
            tier_boundaries:
              simple_medium: 0.45
              medium_complex: 0.65
              complex_reasoning: 0.85

      # Semantic intent router — SCAFFOLD, not live. Chaining into the complexity
      # router is unsupported (auto_router_default_model must be a concrete model),
      # and auto_router_config_path makes SemanticRouter.from_json build the encoder
      # at startup. Before enabling: verify on a throwaway litellm, mount the
      # router.json key (below) at /config/router.json, then point a client here.
      # - model_name: auto-semantic
      #   litellm_params:
      #     model: auto_router/auto_semantic
      #     auto_router_config_path: /config/router.json
      #     auto_router_default_model: self-hosted
      #     auto_router_embedding_model: qwen3-embedding-0-6b

    general_settings:
      health_check_endpoint: /v1/health

    router_settings:
      redis_host: os.environ/REDIS_HOST
      redis_port: os.environ/REDIS_PORT
      routing_strategy: least-busy
      cooldown_time: 30
      enable_pre_call_checks: true
      fallbacks:
        - review: ["dsv4f","self-hosted"]
        - self-hosted: ["dsv4f", "nvidia"]
        - dsv4f: ["glm-5.1", "go-minimax-m3"]
        - MiniMax: ["glm-5.2", "go-minimax-m3"]
      context_window_fallbacks:
        - nvidia: ["self-hosted", "dsv4p"]
        - self-hosted: ["dsv4p"]

    litellm_settings:
      success_callback: ["prometheus"]
      failure_callback: ["prometheus"]
      prometheus_adapter: true
      # v1.88.x enforces auth on /metrics; the ServiceMonitor scrapes tokenless,
      # so keep the endpoint open for in-cluster Prometheus scraping.
      require_auth_for_metrics_endpoint: false
      cache: true
      cache_params:
        type: redis
        host: os.environ/REDIS_HOST
        port: os.environ/REDIS_PORT
        ttl: 300
      drop_params: true
      request_timeout: 600
      num_retries: 2
      retry_after: 5
      set_verbose: false

    environment:
      - MINIMAX_API_KEY
      - MOONSHOT_API_KEY
      - OPENCODE_API_KEY
      - ZAI_API_KEY
      - REDIS_HOST
      - REDIS_PORT

  router.json: |
    {
      "encoder_type": "litellm",
      "encoder_name": "qwen3-embedding-0-6b",
      "routes": [
        {
          "name": "self-hosted",
          "description": "placeholder — never matches; replace with real intent routes",
          "utterances": ["zzzz scaffold placeholder never match zzzz"],
          "score_threshold": 0.99
        }
      ]
    }

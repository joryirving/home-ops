---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: llama-nvidia
spec:
  chartRef:
    kind: OCIRepository
    name: app-template
  interval: 15m
  dependsOn: []
  values:
    defaultPodOptions:
      hostIPC: true
      runtimeClassName: nvidia
      nodeSelector:
        topology.kubernetes.io: egpu
    controllers:
      llama-nvidia:
        annotations:
          reloader.stakater.com/auto: "true"
        initContainers:
          model-download:
            image:
              repository: python
              tag: 3.14-slim
            command:
              - /bin/sh
              - -ec
              - |
                set -eu

                MODEL_DIR=/models/gemma4-31b
                MODEL_FILE="$MODEL_DIR/gemma-4-31B-it-UD-Q4_K_XL.gguf"
                MMPROJ_FILE="$MODEL_DIR/mmproj-F16.gguf"

                if [ ! -s "$MODEL_FILE" ] || [ ! -s "$MMPROJ_FILE" ]; then
                  pip install --no-cache-dir "huggingface_hub[hf_transfer]"
                  mkdir -p "$MODEL_DIR"
                  rm -rf \
                    "$MODEL_DIR/.cache/huggingface/download/gemma-4-31B-it-UD-Q4_K_XL.gguf.lock" \
                    "$MODEL_DIR/.cache/huggingface/download/mmproj-F16.gguf.lock"
                  hf download \
                    unsloth/gemma-4-31B-it-GGUF \
                    gemma-4-31B-it-UD-Q4_K_XL.gguf \
                    mmproj-F16.gguf \
                    --local-dir "$MODEL_DIR"

                  echo "Gemma-4-31B Q4_K_XL download complete"
                else
                  echo "Gemma-4-31B Q4_K_XL already downloaded, skipping"
                fi
            env:
              HF_HUB_ENABLE_HF_TRANSFER: "1"
            envFrom:
              - secretRef:
                  name: huggingface
            resources:
              requests:
                cpu: 250m
                memory: 512Mi
              limits:
                memory: 4Gi
        containers:
          app:
            image:
              repository: ghcr.io/ggml-org/llama.cpp
              tag: server-cuda@sha256:8a8b2eacaae3c9bf151dd4cd50647bed701a51ed3dedfe5eb5007ecbc7376609
            securityContext:
              privileged: true
            args:
              - --host
              - 0.0.0.0
              - --port
              - "8080"
              - --alias
              - nvidia
              - --model
              - /models/gemma4-31b/gemma-4-31B-it-UD-Q4_K_XL.gguf
              - --mmproj
              - /models/gemma4-31b/mmproj-F16.gguf
              - --ctx-size
              - "131072"
              - --n-gpu-layers
              - "99"
              - --flash-attn
              - "on"
              - --parallel
              - "1"
              - --cont-batching
              - -sps
              - "0.90"
              - --cache-prompt
              - --cache-ram
              - "16384"
              - --kv-unified
              - --image-min-tokens
              - "1120"
              - --image-max-tokens
              - "1120"
              - --metrics
              - --temp
              - "0.6"
              - --top-p
              - "0.95"
              - --top-k
              - "20"
              - --min-p
              - "0"
              - --presence-penalty
              - "0.5"
              - --repeat-penalty
              - "1.03"
              - --batch-size
              - "4096"
              - --ubatch-size
              - "1024"
              - --threads
              - "6"
              - --threads-batch
              - "12"
              - --mmap
            env:
              NVIDIA_DRIVER_CAPABILITIES: compute,utility
            resources:
              requests:
                cpu: 500m
                memory: 16Gi
              limits:
                memory: 32Gi
                nvidia.com/gpu: 1
            probes:
              liveness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /health
                    port: 8080
                  initialDelaySeconds: 30
                  periodSeconds: 30
                  failureThreshold: 6
              readiness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /health
                    port: 8080
                  initialDelaySeconds: 20
                  periodSeconds: 10
                  failureThreshold: 6
              startup:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /health
                    port: 8080
                  failureThreshold: 360
                  periodSeconds: 10
    persistence:
      models:
        existingClaim: llm-models-rook
        globalMounts:
          - path: /models
    service:
      app:
        ports:
          http:
            port: 8080

---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: llama-vision
spec:
  chartRef:
    kind: OCIRepository
    name: app-template
  interval: 15m
  dependsOn: []
  values:
    defaultPodOptions:
      hostIPC: true
      nodeSelector:
        topology.kubernetes.io/gpus: amd
      tolerations:
        - key: llm-workload
          operator: Exists
          effect: NoSchedule
    controllers:
      llama-vision:
        annotations:
          reloader.stakater.com/auto: "true"
        initContainers:
          model-download:
            image:
              repository: python
              tag: 3.14-slim
            command:
              - /bin/sh
              - -ec
              - |
                set -eu

                MODEL_DIR=/models/qwen3.6-35b-a3b-heretic
                MODEL_FILE="$MODEL_DIR/Qwen3.6-35B-A3B-Abliterated-Heretic-Q4_K_M/Qwen3.6-35B-A3B-Abliterated-Heretic-Q4_K_M.gguf"
                MMPROJ_FILE="$MODEL_DIR/mmproj-Qwen3.6-35B-A3B-Abliterated-Heretic.gguf"

                if [ ! -s "$MODEL_FILE" ] || [ ! -s "$MMPROJ_FILE" ]; then
                  pip install --no-cache-dir "huggingface_hub[hf_transfer]"
                  mkdir -p "$MODEL_DIR"

                  hf download \
                    Youssofal/Qwen3.6-35B-A3B-Abliterated-Heretic-GGUF \
                    Qwen3.6-35B-A3B-Abliterated-Heretic-Q4_K_M/Qwen3.6-35B-A3B-Abliterated-Heretic-Q4_K_M.gguf \
                    mmproj-Qwen3.6-35B-A3B-Abliterated-Heretic.gguf \
                    --local-dir "$MODEL_DIR"

                  echo "Qwen3.6-35B-A3B-Abliterated-Heretic download complete"
                else
                  echo "Qwen3.6-35B-A3B-Abliterated-Heretic already downloaded, skipping"
                fi
            env:
              HF_HUB_ENABLE_HF_TRANSFER: "1"
            envFrom:
              - secretRef:
                  name: huggingface
            resources:
              requests:
                cpu: 250m
                memory: 512Mi
              limits:
                memory: 4Gi
        containers:
          app:
            image:
              repository: docker.io/kyuz0/amd-strix-halo-toolboxes
              tag: rocm-7.2.3@sha256:9509d8a81d762838c9e5db06e121fc82ec5e849cb93032fa91131f6bf517454a
              pullPolicy: Always
            securityContext:
              privileged: true
            command:
              - llama-server
            args:
              - --host
              - 0.0.0.0
              - --port
              - "8080"
              - --alias
              - vision
              - --model
              - /models/qwen3.6-35b-a3b-heretic/Qwen3.6-35B-A3B-Abliterated-Heretic-Q4_K_M/Qwen3.6-35B-A3B-Abliterated-Heretic-Q4_K_M.gguf
              - --mmproj
              - /models/qwen3.6-35b-a3b-heretic/mmproj-Qwen3.6-35B-A3B-Abliterated-Heretic.gguf
              - --ctx-size
              - "131072"
              - --n-gpu-layers
              - "99"
              - --flash-attn
              - "on"
              - --parallel
              - "2"
              - --cont-batching
              - -sps
              - "0.90"
              - --cache-prompt
              - --kv-unified
              - --cache-type-k
              - q8_0
              - --cache-type-v
              - q8_0
              - --ctx-checkpoints
              - "8"
              - --checkpoint-every-n-tokens
              - "32768"
              - --image-min-tokens
              - "1024"
              - --metrics
              - --temp
              - "0.6"
              - --top-p
              - "0.95"
              - --top-k
              - "20"
              - --min-p
              - "0"
              - --presence-penalty
              - "0.5"
              - --repeat-penalty
              - "1.03"
              - --reasoning-budget
              - "16384"
              - --reasoning-budget-message
              - "Stop reasoning and produce the implementation, tool call, or final answer."
              - --batch-size
              - "4096"
              - --ubatch-size
              - "2048"
              - --threads
              - "16"
              - --threads-batch
              - "24"
              - --no-mmap
              - --jinja
              - --chat-template-kwargs
              - '{"preserve_thinking":true}'
            resources:
              requests:
                cpu: 500m
                memory: 12Gi
            probes:
              liveness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /health
                    port: 8080
                  initialDelaySeconds: 30
                  periodSeconds: 30
                  failureThreshold: 6
              readiness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /health
                    port: 8080
                  initialDelaySeconds: 20
                  periodSeconds: 10
                  failureThreshold: 6
              startup:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /health
                    port: 8080
                  failureThreshold: 360
                  periodSeconds: 10
    persistence:
      models:
        existingClaim: llm-models
        globalMounts:
          - path: /models
      dev-dri:
        type: hostPath
        hostPath: /dev/dri
        globalMounts:
          - path: /dev/dri
      dev-kfd:
        type: hostPath
        hostPath: /dev/kfd
        globalMounts:
          - path: /dev/kfd
    service:
      app:
        type: LoadBalancer
        annotations:
          lbipam.cilium.io/ips: 10.69.10.23
        externalTrafficPolicy: Cluster
        ports:
          http:
            port: 8080

---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: llama-nvidia
spec:
  chartRef:
    kind: OCIRepository
    name: app-template
  interval: 15m
  dependsOn: []
  values:
    defaultPodOptions:
      hostIPC: true
      runtimeClassName: nvidia
      nodeSelector:
        topology.kubernetes.io: egpu
    controllers:
      llama-nvidia:
        annotations:
          reloader.stakater.com/auto: "true"
        initContainers:
          model-download:
            image:
              repository: python
              tag: 3.14-slim
            command:
              - /bin/sh
              - -ec
              - |
                set -euo pipefail

                if [ ! -s /models/qwen3.5-4b/Qwen3.5-4B-UD-Q4_K_XL.gguf ]; then
                  pip install --no-cache-dir "huggingface_hub[hf_transfer]"
                  mkdir -p /models/qwen3.5-4b
                  rm -rf /models/qwen3.5-4b/.cache/huggingface/download/Qwen3.5-4B-UD-Q4_K_XL.gguf.lock
                  hf download \
                    unsloth/Qwen3.5-4B-MTP-GGUF \
                    Qwen3.5-4B-UD-Q4_K_XL.gguf \
                    --local-dir /models/qwen3.5-4b

                  echo "Qwen3.5-4B download complete"
                else
                  echo "Qwen3.5-4B already downloaded, skipping"
                fi
            env:
              HF_HUB_ENABLE_HF_TRANSFER: "1"
            envFrom:
              - secretRef:
                  name: huggingface
            resources:
              requests:
                cpu: 250m
                memory: 512Mi
              limits:
                memory: 4Gi
        containers:
          app:
            image:
              repository: ghcr.io/ggml-org/llama.cpp
              tag: server-cuda@sha256:e502860c8aa147e74e7cf42568fa2a8407c578dd291c1b231f698a55dd83fef6
            securityContext:
              privileged: true
            args:
              - --host
              - 0.0.0.0
              - --port
              - "8080"
              - --alias
              - nvidia
              - --model
              - /models/qwen3.5-4b/Qwen3.5-4B-UD-Q4_K_XL.gguf
              - --ctx-size
              - "131072"
              - --n-gpu-layers
              - "99"
              - --flash-attn
              - "on"
              - --parallel
              - "1"
              - --cont-batching
              - --cache-prompt
              - --cache-ram
              - "8192"
              - --kv-unified
              - --metrics
              - --temp
              - "0.6"
              - --top-p
              - "0.95"
              - --top-k
              - "20"
              - --min-p
              - "0"
              - --presence-penalty
              - "0.5"
              - --repeat-penalty
              - "1.03"
              - --reasoning-budget
              - "16384"
              - --reasoning-budget-message
              - "Stop reasoning and produce the implementation, tool call, or final answer."
              - --batch-size
              - "2048"
              - --ubatch-size
              - "512"
              - --threads
              - "6"
              - --threads-batch
              - "12"
              - --cache-type-k
              - q8_0
              - --cache-type-v
              - q8_0
              - --no-mmap
              - --jinja
              - --chat-template-kwargs
              - '{"preserve_thinking":true}'
            env:
              NVIDIA_DRIVER_CAPABILITIES: compute,utility
            resources:
              requests:
                cpu: 500m
                memory: 8Gi
              limits:
                memory: 24Gi
                nvidia.com/gpu: 1
            probes:
              liveness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /health
                    port: 8080
                  initialDelaySeconds: 30
                  periodSeconds: 30
                  failureThreshold: 6
              readiness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /health
                    port: 8080
                  initialDelaySeconds: 20
                  periodSeconds: 10
                  failureThreshold: 6
              startup:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /health
                    port: 8080
                  failureThreshold: 360
                  periodSeconds: 10
    persistence:
      models:
        existingClaim: llm-models-rook
        globalMounts:
          - path: /models
    service:
      app:
        ports:
          http:
            port: 8080

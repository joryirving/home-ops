---
use_default_settings: true

server:
  limiter: true
  image_proxy: true
  method: GET # https://github.com/searxng/searxng/pull/3619
  public_instance: false

search:
  autocomplete: duckduckgo
  favicon_resolver: duckduckgo
  languages:
    - all
    - en
    - en-US
  formats:
    - html
    - json

general:
  instance_name: LDS Search

ui:
  default_theme: simple
  infinite_scroll: true
  query_in_title: true
  results_on_new_tab: true
  static_use_hash: true
  theme_args:
    simple_style: auto

categories_as_tabs:
  general:
  images:
  videos:
  map:

enabled_plugins:
  - Basic Calculator
  - Hash plugin
  - Open Access DOI rewrite
  - Self Informations
  - Tracker URL remover
  - Unit converter plugin

# Disable engines that are consistently blocked due to scraping without API keys
# Brave: too many requests (no API key configured)
# DuckDuckGo: CAPTCHA'd
# KarmaSearch: access denied
# Startpage: CAPTCHA'd
engines:
  - name: brave
    disabled: true
  - name: brave.images
    disabled: true
  - name: brave.news
    disabled: true
  - name: brave.videos
    disabled: true
  - name: duckduckgo
    disabled: true
  - name: duckduckgo images
    disabled: true
  - name: duckduckgo news
    disabled: true
  - name: duckduckgo videos
    disabled: true
  - name: karmasearch
    disabled: true
  - name: karmasearch images
    disabled: true
  - name: karmasearch news
    disabled: true
  - name: karmasearch videos
    disabled: true
  - name: startpage
    disabled: true
  - name: startpage images
    disabled: true
  - name: startpage news
    disabled: true

hostnames:
  high_priority:
    - (.*)\/blog\/(.*)
    - (.*\.)?wikipedia.org$
    - (.*\.)?github.com$
    - (.*\.)?reddit.com$
    - (.*\.)?docker.com$
    - (.*\.)?archlinux.org$
    - (.*\.)?stackoverflow.com$
    - (.*\.)?askubuntu.com$
    - (.*\.)?superuser.com$

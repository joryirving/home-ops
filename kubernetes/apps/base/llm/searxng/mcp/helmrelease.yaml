---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: searxng-mcp
spec:
  chartRef:
    kind: OCIRepository
    name: app-template
  dependsOn:
    - name: searxng
  interval: 15m
  values:
    controllers:
      searxng-mcp:
        annotations:
          reloader.stakater.com/auto: "true"
        replicas: 2
        strategy: RollingUpdate
        containers:
          main:
            image:
              repository: docker.io/isokoliuk/mcp-searxng
              tag: 0.10.1@sha256:1017689711eddc40ab02834aeac55fba70a81c902512783eeae7b9dac92ec01b
            env:
              TZ: ${TIMEZONE}
              SEARXNG_URL: http://searxng.llm:8080
              MCP_HTTP_PORT: &port 3000
            resources:
              requests:
                cpu: 10m
                memory: 128Mi
              limits:
                memory: 256Mi
    defaultPodOptions:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 100
        fsGroup: 100
    service:
      app:
        ports:
          http:
            port: *port
    route:
      app:
        hostnames: ["search-mcp.jory.dev"]
        parentRefs:
          - name: envoy-external
            namespace: network

---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: llama-swap
spec:
  chartRef:
    kind: OCIRepository
    name: app-template
  dependsOn: []
  interval: 15m
  values:
    controllers:
      llama-swap:
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          app:
            image:
              repository: ghcr.io/joryirving/llama-swap
              tag: 197@sha256:b50beec4cce911c33f1a899914a8733303c82c82c6ecfe75d7180bb7ffb77ea7
            args:
              - --config
              - /config/config.yaml
              - --listen
              - 0.0.0.0:8080
            securityContext:
              privileged: true
            env:
              HSA_OVERRIDE_GFX_VERSION: "11.5.1"
              GGML_CUDA_ENABLE_UNIFIED_MEMORY: "1"
              HSA_ENABLE_SDMA: "0"
              ROCBLAS_USE_HIPBLASLT: "1"
              HIP_VISIBLE_DEVICES: "0"
            resources:
              requests:
                cpu: 1
                memory: 32Gi
              limits:
                memory: 115Gi
            probes:
              liveness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /
                    port: 8080
                  initialDelaySeconds: 10
                  periodSeconds: 30
                  failureThreshold: 6
              readiness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /
                    port: 8080
                  initialDelaySeconds: 10
                  periodSeconds: 10
                  failureThreshold: 3
          warmup:
            image:
              repository: curlimages/curl
              tag: 8.18.0
            command:
              - /bin/sh
              - -ec
              - |
                for i in $(seq 1 120); do
                  if curl -fsS http://127.0.0.1:8080/v1/models >/dev/null; then
                    break
                  fi
                  sleep 2
                done

                curl -fsS http://127.0.0.1:8080/v1/chat/completions \
                  -H 'Content-Type: application/json' \
                  -H 'Authorization: Bearer skirk' \
                  -d '{"model":"qwen122b","messages":[{"role":"user","content":"warmup"}],"max_tokens":1}' >/dev/null || true
                exec sleep infinity
            resources:
              requests:
                cpu: 10m
                memory: 32Mi
              limits:
                memory: 64Mi
            probes:
              liveness:
                enabled: false
              readiness:
                enabled: false
              startup:
                enabled: false
    defaultPodOptions:
      hostIPC: true
      nodeSelector:
        topology.kubernetes.io/gpus: amd
      tolerations:
        - key: llm-workload
          operator: Exists
          effect: NoSchedule
    service:
      app:
        type: LoadBalancer
        annotations:
          lbipam.cilium.io/ips: 10.69.10.20
        externalTrafficPolicy: Cluster
        ports:
          http:
            port: 8080
    persistence:
      config:
        type: configMap
        name: llama-swap-config-single
        globalMounts:
          - path: /config
      models:
        existingClaim: llama-swap
        globalMounts:
          - path: /models
      dev-dri:
        type: hostPath
        hostPath: /dev/dri
        globalMounts:
          - path: /dev/dri
      dev-kfd:
        type: hostPath
        hostPath: /dev/kfd
        globalMounts:
          - path: /dev/kfd

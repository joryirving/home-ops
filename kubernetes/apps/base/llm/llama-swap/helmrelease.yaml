---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: llama-swap
spec:
  chartRef:
    kind: OCIRepository
    name: app-template
  dependsOn: []
  interval: 15m
  values:
    controllers:
      llama-swap:
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          app:
            image:
              repository: ghcr.io/joryirving/llama-swap
              tag: 197@sha256:5f465bc90b0f15d8ea6dfac33e5e89cac196d2a4c165c61dd0209844803e6676
            args:
              - --config
              - /config/config.yaml
              - --listen
              - 0.0.0.0:8080
            securityContext:
              privileged: true
            env:
              HSA_OVERRIDE_GFX_VERSION: "11.5.1"
              GGML_CUDA_ENABLE_UNIFIED_MEMORY: "1"
              HSA_ENABLE_SDMA: "0"
              ROCBLAS_USE_HIPBLASLT: "1"
              HIP_VISIBLE_DEVICES: "0"
            resources:
              requests:
                cpu: 1
                memory: 32Gi
              limits:
                memory: 110Gi
            probes:
              liveness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /
                    port: 8080
                  initialDelaySeconds: 10
                  periodSeconds: 30
                  failureThreshold: 6
              readiness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /
                    port: 8080
                  initialDelaySeconds: 10
                  periodSeconds: 10
                  failureThreshold: 3
    defaultPodOptions:
      hostIPC: true
      nodeSelector:
        topology.kubernetes.io/gpus: amd
      tolerations:
        - key: llm-workload
          operator: Exists
          effect: NoSchedule
    service:
      app:
        controller: llama-swap
        ports:
          http:
            port: 8080
    persistence:
      config:
        type: configMap
        name: llama-swap-config
        globalMounts:
          - path: /config
      models:
        existingClaim: llama-swap
        globalMounts:
          - path: /models
      dev-dri:
        type: hostPath
        hostPath: /dev/dri
        globalMounts:
          - path: /dev/dri
      dev-kfd:
        type: hostPath
        hostPath: /dev/kfd
        globalMounts:
          - path: /dev/kfd

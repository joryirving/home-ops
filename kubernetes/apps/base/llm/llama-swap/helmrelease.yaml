---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: llama-swap
spec:
  chartRef:
    kind: OCIRepository
    name: app-template
  dependsOn: []
  interval: 15m
  values:
    controllers:
      llama-swap:
        annotations:
          reloader.stakater.com/auto: "true"
        initContainers:
          seed-qwen-tool-parser:
            image:
              repository: docker.io/library/alpine
              tag: "3.22"
            command:
              - /bin/sh
              - -ec
              - |
                cat > /models/qwen_tool_parser.py <<'PY'
                #!/usr/bin/env python3
                import json
                import re
                import uuid
                from typing import Any, Dict, List


                TOOL_BLOCK_RE = re.compile(r"<tool_call>(.*?)</tool_call>", re.DOTALL | re.IGNORECASE)
                FUNCTION_RE = re.compile(r"<function=([a-zA-Z0-9_.:-]+)>(.*?)</function>", re.DOTALL | re.IGNORECASE)
                PARAM_RE = re.compile(r"<parameter=([a-zA-Z0-9_.:-]+)>(.*?)</parameter>", re.DOTALL | re.IGNORECASE)


                def _clean(text: str) -> str:
                    return text.strip().replace("\\r\\n", "\\n").strip()


                def _new_tool_call(name: str, args: Dict[str, Any]) -> Dict[str, Any]:
                    return {
                        "id": f"call_{uuid.uuid4().hex[:12]}",
                        "type": "function",
                        "function": {
                            "name": name,
                            "arguments": json.dumps(args, ensure_ascii=False),
                        },
                    }


                def _parse_json_style(block: str) -> Dict[str, Any] | None:
                    raw = _clean(block)
                    try:
                        obj = json.loads(raw)
                    except Exception:
                        return None

                    if not isinstance(obj, dict):
                        return None

                    name = obj.get("name")
                    args = obj.get("arguments", {})

                    if not isinstance(name, str) or not name:
                        return None

                    if not isinstance(args, dict):
                        args = {"value": args}

                    return _new_tool_call(name, args)


                def _parse_xml_style(block: str) -> Dict[str, Any] | None:
                    fm = FUNCTION_RE.search(block)
                    if not fm:
                        return None

                    fn_name = _clean(fm.group(1))
                    fn_body = fm.group(2)

                    if not fn_name:
                        return None

                    args: Dict[str, Any] = {}
                    for pm in PARAM_RE.finditer(fn_body):
                        key = _clean(pm.group(1))
                        val = _clean(pm.group(2))
                        if not key:
                            continue

                        if key in args:
                            if not isinstance(args[key], list):
                                args[key] = [args[key]]
                            args[key].append(val)
                        else:
                            args[key] = val

                    return _new_tool_call(fn_name, args)


                def parse_tool_calls(content: str) -> List[Dict[str, Any]]:
                    if not content:
                        return []

                    tool_calls: List[Dict[str, Any]] = []

                    for m in TOOL_BLOCK_RE.finditer(content):
                        block = m.group(1)

                        parsed = _parse_json_style(block)
                        if parsed is None:
                            parsed = _parse_xml_style(block)

                        if parsed is not None:
                            tool_calls.append(parsed)

                    return tool_calls


                if __name__ == "__main__":
                    import sys

                    input_text = sys.stdin.read()
                    print(json.dumps({"tool_calls": parse_tool_calls(input_text)}, ensure_ascii=False, indent=2))
                PY
                chmod +x /models/qwen_tool_parser.py
        containers:
          app:
            image:
              repository: ghcr.io/joryirving/llama-swap
              tag: 197@sha256:5f465bc90b0f15d8ea6dfac33e5e89cac196d2a4c165c61dd0209844803e6676
            args:
              - --config
              - /config/config.yaml
              - --listen
              - 0.0.0.0:8080
            securityContext:
              privileged: true
            env:
              HSA_OVERRIDE_GFX_VERSION: "11.5.1"
              GGML_CUDA_ENABLE_UNIFIED_MEMORY: "1"
              HSA_ENABLE_SDMA: "0"
              ROCBLAS_USE_HIPBLASLT: "1"
              HIP_VISIBLE_DEVICES: "0"
            resources:
              requests:
                cpu: 1
                memory: 32Gi
              limits:
                memory: 110Gi
            probes:
              liveness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /
                    port: 8080
                  initialDelaySeconds: 10
                  periodSeconds: 30
                  failureThreshold: 6
              readiness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /
                    port: 8080
                  initialDelaySeconds: 10
                  periodSeconds: 10
                  failureThreshold: 3
          warmup:
            image:
              repository: curlimages/curl
              tag: 8.16.0
            command:
              - /bin/sh
              - -ec
              - |
                for i in $(seq 1 120); do
                  if curl -fsS http://127.0.0.1:8080/v1/models >/dev/null; then
                    break
                  fi
                  sleep 2
                done

                curl -fsS http://127.0.0.1:8080/v1/chat/completions \
                  -H 'Content-Type: application/json' \
                  -H 'Authorization: Bearer skirk' \
                  -d '{"model":"qwen35b","messages":[{"role":"user","content":"warmup"}],"max_tokens":1}' >/dev/null || true

                curl -fsS http://127.0.0.1:8080/v1/chat/completions \
                  -H 'Content-Type: application/json' \
                  -H 'Authorization: Bearer skirk' \
                  -d '{"model":"qwen3-coder","messages":[{"role":"user","content":"warmup"}],"max_tokens":1}' >/dev/null || true

                exec sleep infinity
            resources:
              requests:
                cpu: 10m
                memory: 32Mi
              limits:
                memory: 64Mi
            probes:
              liveness:
                enabled: false
              readiness:
                enabled: false
              startup:
                enabled: false
    defaultPodOptions:
      hostIPC: true
      nodeSelector:
        topology.kubernetes.io/gpus: amd
      tolerations:
        - key: llm-workload
          operator: Exists
          effect: NoSchedule
    service:
      app:
        type: LoadBalancer
        annotations:
          lbipam.cilium.io/ips: 10.69.10.20
        externalTrafficPolicy: Cluster
        ports:
          http:
            port: 8080
    persistence:
      config:
        type: configMap
        name: llama-swap-config-dual
        globalMounts:
          - path: /config
      models:
        existingClaim: llama-swap
        globalMounts:
          - path: /models
      dev-dri:
        type: hostPath
        hostPath: /dev/dri
        globalMounts:
          - path: /dev/dri
      dev-kfd:
        type: hostPath
        hostPath: /dev/kfd
        globalMounts:
          - path: /dev/kfd

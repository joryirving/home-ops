---
apiVersion: v1
kind: ConfigMap
metadata:
  name: llama-swap-config
  namespace: llm
data:
  config.yaml: |
    windowSize: 5
    logLevel: "DEBUG"
    groups:
      always-on:
        swap: false
        exclusive: false
        members:
          - qwen35b
          - qwen3-coder
    models:
      qwen35b:
        cmd: >-
          /usr/local/bin/llama-server
          --host 127.0.0.1
          --port 9001
          --model /models/Huihui-Qwen3.5-35B-A3B-abliterated.i1-Q4_K_M.gguf
          --mmproj /models/mmproj-F32.gguf
          --chat-template-file /models/chat_template.jinja
          --ctx-size 131072
          --n-gpu-layers 99
          -fa
          --parallel 1
          --cont-batching
          --cache-prompt
          --cache-type-k q8_0
          --cache-type-v q8_0
          --batch-size 2048
          --mmap
          --numa distribute
        proxy: http://127.0.0.1:9001
        ttl: 0
        group: qwen

      qwen3-coder:
        cmd: >-
          /usr/local/bin/llama-server
          --host 127.0.0.1
          --port 9002
          --model /models/huihui-ai_Qwen3-Coder-Next-abliterated-Q4_K_M.gguf
          --chat-template-file /models/chat_template.jinja
          --ctx-size 131072
          --n-gpu-layers 99
          -fa
          --parallel 1
          --cont-batching
          --cache-prompt
          --cache-type-k q8_0
          --cache-type-v q8_0
          --batch-size 2048
          --mmap
          --numa distribute
        proxy: http://127.0.0.1:9002
        ttl: 0
        group: coder

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: llama-swap-config
  namespace: llm
data:
  config.yaml: |
    windowSize: 5
    models:
      qwen35b:
        cmd: >-
          /usr/local/bin/llama-server
          --host 127.0.0.1
          --port 9001
          --model /models/qwen35b-q6k.gguf
          --ctx-size 131072
          --n-gpu-layers 99
          --flash-attn
          --parallel 1
          --cont-batching
        proxy: http://127.0.0.1:9001
        ttl: 300

      gpt-oss-120b:
        cmd: >-
          /usr/local/bin/llama-server
          --host 127.0.0.1
          --port 9002
          --model /models/Q4_K_M/gpt-oss-120b-Q4_K_M-00001-of-00002.gguf
          --ctx-size 131072
          --n-gpu-layers 99
          --flash-attn
          --parallel 1
          --cont-batching
        proxy: http://127.0.0.1:9002
        ttl: 300

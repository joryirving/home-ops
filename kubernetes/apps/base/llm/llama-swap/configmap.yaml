---
apiVersion: v1
kind: ConfigMap
metadata:
  name: llama-swap-config
  namespace: llm
data:
  config.yaml: |
    windowSize: 5
    logLevel: "DEBUG"
    groups:
      always-on:
        swap: false
        exclusive: false
        members:
          - qwen35b
          - gpt-oss-120b
    models:
      qwen35b:
        cmd: >-
          /usr/local/bin/llama-server
          --host 127.0.0.1
          --port 9001
          --model /models/Qwen3.5-35B-A3B-Q6_K.gguf
          --ctx-size 131072
          --n-gpu-layers 99
          -fa 1
          --parallel 1
          --cont-batching
          --cache-prompt
          --cache-type-k q8_0
          --cache-type-v q8_0
          --batch-size 2048
          --chat-template chatml
        proxy: http://127.0.0.1:9001
        ttl: 0

      gpt-oss-120b:
        cmd: >-
          /usr/local/bin/llama-server
          --host 127.0.0.1
          --port 9002
          --model /models/Q4_K_M/gpt-oss-120b-Q4_K_M-00001-of-00002.gguf
          --ctx-size 100000
          --n-gpu-layers 99
          -fa 1
          --parallel 1
          --cont-batching
          --cache-prompt
          --cache-type-k q8_0
          --cache-type-v q8_0
          --batch-size 2048
          --chat-template chatml
        proxy: http://127.0.0.1:9002
        ttl: 0

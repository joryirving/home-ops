---
apiVersion: batch/v1
kind: Job
metadata:
  name: llama-swap-warmup-once
spec:
  backoffLimit: 2
  template:
    spec:
      restartPolicy: Never
      containers:
        - name: warmup
          image: curlimages/curl:8.16.0
          command:
            - /bin/sh
            - -ec
            - |
              for i in $(seq 1 60); do
                if curl -fsS http://llama-swap:8080/v1/models >/dev/null; then
                  break
                fi
                sleep 2
              done

              curl -fsS http://llama-swap:8080/v1/chat/completions \
                -H 'Content-Type: application/json' \
                -H 'Authorization: Bearer skirk' \
                -d '{"model":"qwen35b","messages":[{"role":"user","content":"warmup"}],"max_tokens":1}' >/dev/null

              curl -fsS http://llama-swap:8080/v1/chat/completions \
                -H 'Content-Type: application/json' \
                -H 'Authorization: Bearer skirk' \
                -d '{"model":"qwen3-coder","messages":[{"role":"user","content":"warmup"}],"max_tokens":1}' >/dev/null

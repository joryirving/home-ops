---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: miso-gallery
  namespace: llm
spec:
  chartRef:
    kind: OCIRepository
    name: app-template
  interval: 15m
  values:
    controllers:
      miso-gallery:
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          app:
            image:
              repository: ghcr.io/joryirving/miso-gallery
              tag: 0.1.9@sha256:64e92a4cbdce0d219c801bd9ab046a88784326abb2319ec63ef064b50e1e374b
            env:
              IMAGE_BASE_URL: https://miso-gallery.jory.dev
            envFrom:
              - secretRef:
                  name: miso-gallery
            securityContext:
              allowPrivilegeEscalation: false
              capabilities: {drop: ["ALL"]}
            resources:
              requests:
                cpu: 100m
                memory: 256Mi
              limits:
                cpu: 500m
                memory: 512Mi
    defaultPodOptions:
      securityContext:
        runAsUser: 1000
        runAsGroup: 100
        fsGroup: 100
        fsGroupChangePolicy: "OnRootMismatch"
    service:
      app:
        ports:
          http:
            port: 5000
    route:
      app:
        hostnames: ["miso-gallery.jory.dev"]
        parentRefs:
          - name: envoy-external
            namespace: network
    persistence:
      data:
        type: nfs
        server: voyager.internal
        path: /mnt/daena/comfyui/output

---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: comfyui
spec:
  chartRef:
    kind: OCIRepository
    name: app-template
  dependsOn: []
  interval: 15m
  values:
    controllers:
      comfyui:
        annotations:
          reloader.stakater.com/auto: "true"
        initContainers:
          seed-openvino-hook:
            image:
              repository: docker.io/library/alpine
              tag: "3.23"
            command:
              - /bin/sh
              - -ec
            args:
              - |
                #!/bin/sh
                set -eu

                COMFY_ROOT="/root/ComfyUI"
                CUSTOM_NODES="$COMFY_ROOT/custom_nodes"

                mkdir -p "$CUSTOM_NODES"

                cd "$CUSTOM_NODES"

                # Install/update OpenVINO node
                if [ ! -d comfyui_openvino ]; then
                  git clone https://github.com/openvino-dev-samples/comfyui_openvino.git comfyui_openvino
                else
                  git -C comfyui_openvino pull --ff-only || true
                fi

                cd comfyui_openvino

                # Match the plugin's documented dependency ceiling.
                python3 -m pip install --no-cache-dir "torch<=2.6.0" "torchaudio<=2.6.0"
                python3 -m pip install --no-cache-dir -r requirements.txt

                # Disable smZNodes on this Intel/OpenVINO pod if present.
                # Your traceback is going through ComfyUI_smZNodes during sampling.
                cd "$CUSTOM_NODES"
                if [ -d ComfyUI_smZNodes ] && [ ! -d .disabled_ComfyUI_smZNodes ]; then
                  mv ComfyUI_smZNodes .disabled_ComfyUI_smZNodes
                fi

                # Optional: disable other old sampler patch packs here the same way.
                # Example:
                # if [ -d SomeOtherNodePack ] && [ ! -d .disabled_SomeOtherNodePack ]; then
                #   mv SomeOtherNodePack .disabled_SomeOtherNodePack
                # fi

                # Install sitecustomize.py directly into site-packages so Python always loads it.
                PY_SITE="$(python3 - <<'PY'
                import site, sys
                paths = site.getsitepackages()
                print(paths[0] if paths else next(p for p in sys.path if "site-packages" in p))
                PY
                )"

                cat > "${PY_SITE}/sitecustomize.py" <<'PY'
                import torch._dynamo
                torch._dynamo.config.suppress_errors = True
                PY

                # Clear stale torch compile caches after dependency changes.
                rm -rf /root/.cache/torchinductor /root/.cache/torch_extensions 2>/dev/null || true
        containers:
          app:
            image:
              repository: yanwk/comfyui-boot
              tag: cpu@sha256:60e4355b9a9a5df5b579ba07d6a0b30148f8634ee318da15c2c24f5979a3cc8b
            env:
              CLI_ARGS: "--listen 0.0.0.0 --port 8188 --cpu --use-pytorch-cross-attention"
            resources:
              claims:
                - name: gpu
              requests:
                cpu: 1
                memory: 4Gi
              limits:
                memory: 16Gi
    defaultPodOptions:
      resourceClaims:
        - name: gpu
          resourceClaimTemplateName: comfyui-gpu
    service:
      app:
        ports:
          http:
            port: 8188
    route:
      app:
        hostnames: ["{{ .Release.Name }}.jory.dev"]
        parentRefs:
          - name: envoy-internal
            namespace: network
    persistence:
      comfyui:
        existingClaim: "comfyui"
        globalMounts:
          - path: /root/
      data:
        type: nfs
        server: voyager.internal
        path: /mnt/daena/comfyui/
        globalMounts:
          - path: /root/ComfyUI/output
            subPath: output
          - path: /root/ComfyUI/input
            subPath: input

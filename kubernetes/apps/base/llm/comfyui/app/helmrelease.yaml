---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: comfyui
spec:
  chartRef:
    kind: OCIRepository
    name: app-template
  dependsOn: []
  interval: 15m
  values:
    controllers:
      comfyui:
        annotations:
          reloader.stakater.com/auto: "true"
        initContainers:
          seed-openvino-hook:
            image:
              repository: docker.io/library/alpine
              tag: "3.20"
            command:
              - /bin/sh
              - -ec
            args:
              - |
                mkdir -p /root/user-scripts
                cat > /root/user-scripts/pre-start.sh <<'EOF'
                #!/bin/sh
                set -eu

                cd /root/ComfyUI/custom_nodes

                if [ ! -d comfyui_openvino ]; then
                  git clone https://github.com/openvino-dev-samples/comfyui_openvino.git comfyui_openvino
                fi

                cd comfyui_openvino

                # OpenVINO plugin currently wants torch <= 2.6.0 and torchaudio <= 2.6.0.
                python3 -m pip install --no-cache-dir "torch<=2.6.0" "torchaudio<=2.6.0"
                python3 -m pip install --no-cache-dir -r requirements.txt
                EOF
                chmod +x /root/user-scripts/pre-start.sh
        containers:
          app:
            image:
              repository: yanwk/comfyui-boot
              tag: cpu@sha256:15cdc0d610680462c5597222c3f91e61af0b8a3f31f8f0cf28231d6d2348100b
            env:
              CLI_ARGS: "--listen 0.0.0.0 --port 8188 --cpu --use-pytorch-cross-attention"
            resources:
              claims:
                - name: gpu
              requests:
                cpu: 1
                memory: 4Gi
              limits:
                memory: 16Gi
    defaultPodOptions:
      resourceClaims:
        - name: gpu
          resourceClaimTemplateName: comfyui-gpu
    service:
      app:
        ports:
          http:
            port: 8188
    route:
      app:
        hostnames: ["{{ .Release.Name }}.jory.dev"]
        parentRefs:
          - name: envoy-internal
            namespace: network
    persistence:
      comfyui:
        existingClaim: "comfyui"
        globalMounts:
          - path: /root/
      # data:
      #   type: nfs
      #   server: voyager.internal
      #   path: /mnt/daena/comfyui/
      #   globalMounts:
      #     - path: /root/ComfyUI/output
      #       subPath: output
      #     - path: /root/ComfyUI/input
      #       subPath: input

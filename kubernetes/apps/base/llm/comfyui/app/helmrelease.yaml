---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: comfyui
spec:
  chartRef:
    kind: OCIRepository
    name: app-template
  dependsOn: []
  interval: 15m
  values:
    controllers:
      comfyui:
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          app:
            image:
              repository: docker.io/kyuz0/amd-strix-halo-comfyui
              tag: 20260213-143435@sha256:20e1b4385a0975fcbc188cd842ac121d8feff34813fff5c52b68a3d024a0ea6a
            securityContext:
              privileged: true
            command:
              - /bin/bash
              - -lc
            args:
              - |
                set -euo pipefail
                cd /opt/ComfyUI
                /opt/venv/bin/python -m pip install --disable-pip-version-check -r /opt/ComfyUI/requirements.txt
                /opt/venv/bin/python -m pip install --disable-pip-version-check webcolors matplotlib || true
                python main.py $CLI_ARGS
            env:
              HSA_OVERRIDE_GFX_VERSION: "11.5.1"
              HSA_ENABLE_SDMA: "0"
              HIP_VISIBLE_DEVICES: "0"
              ROCR_VISIBLE_DEVICES: "0"
              TORCH_ROCM_AOTRITON_ENABLE_EXPERIMENTAL: "1"
              TORCH_BLAS_PREFER_HIPBLASLT: "1"
              CLI_ARGS: "--listen 0.0.0.0 --port 8188 --bf16-vae --disable-mmap --cache-none"
            resources:
              requests:
                cpu: 1
                memory: 8Gi
              limits:
                memory: 16Gi
    defaultPodOptions:
      hostIPC: true
      nodeSelector:
        topology.kubernetes.io/gpus: amd
      tolerations:
        - key: llm-workload
          operator: Exists
          effect: NoSchedule
    service:
      app:
        ports:
          http:
            port: 8188
    route:
      app:
        hostnames: ["{{ .Release.Name }}.jory.dev"]
        parentRefs:
          - name: envoy-internal
            namespace: network
    persistence:
      comfyui:
        existingClaim: "comfyui"
        globalMounts:
          - path: /opt/ComfyUI/
      data:
        type: nfs
        server: voyager.internal
        path: /mnt/daena/comfyui/
        globalMounts:
          - path: /opt/ComfyUI/output
            subPath: output
          - path: /opt/ComfyUI/input
            subPath: input
      dev-dri:
        type: hostPath
        hostPath: /dev/dri
        globalMounts:
          - path: /dev/dri
      dev-kfd:
        type: hostPath
        hostPath: /dev/kfd
        globalMounts:
          - path: /dev/kfd

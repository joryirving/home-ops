---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: comfyui
spec:
  chartRef:
    kind: OCIRepository
    name: app-template
  dependsOn: []
  interval: 15m
  values:
    controllers:
      comfyui:
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          app:
            image:
              repository: kyuz0/amd-strix-halo-comfyui
              tag: 20260529-090933
            command:
              - /bin/bash
              - -lc
            args:
              - cd /opt/ComfyUI && python main.py ${CLI_ARGS}
            env:
              CLI_ARGS: "--listen 0.0.0.0 --port 8188 --bf16-vae --disable-mmap --cache-none"
              HSA_OVERRIDE_GFX_VERSION: "11.5.1"
              PYTORCH_HIP_ALLOC_CONF: "max_split_size_mb:256,garbage_collection_threshold:0.6"
              TORCH_BLAS_PREFER_HIPBLASLT: "1"
              TORCH_ROCM_AOTRITON_ENABLE_EXPERIMENTAL: "1"
            resources:
              requests:
                cpu: 1
                memory: 8Gi
              limits:
                memory: 16Gi
    defaultPodOptions:
      hostIPC: true
      nodeSelector:
        topology.kubernetes.io/gpus: amd
      tolerations:
        - key: llm-workload
          operator: Exists
          effect: NoSchedule
    service:
      app:
        type: LoadBalancer
        annotations:
          lbipam.cilium.io/ips: 10.69.10.44
        externalTrafficPolicy: Cluster
        ports:
          http:
            port: 8188
    route:
      app:
        hostnames: ["{{ .Release.Name }}.jory.dev"]
        parentRefs:
          - name: envoy-internal
            namespace: network
    persistence:
      comfyui:
        existingClaim: "comfyui"
        globalMounts:
          - path: /opt/ComfyUI/
      data:
        type: nfs
        server: voyager.internal
        path: /mnt/daena/comfyui/
        globalMounts:
          - path: /opt/ComfyUI/output
            subPath: output
          - path: /opt/ComfyUI/input
            subPath: input
      dev-dri:
        type: hostPath
        hostPath: /dev/dri
        globalMounts:
          - path: /dev/dri
      dev-kfd:
        type: hostPath
        hostPath: /dev/kfd
        globalMounts:
          - path: /dev/kfd

---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: comfyui
spec:
  chartRef:
    kind: OCIRepository
    name: comfyui
  dependsOn: []
  interval: 15m
  values:
    controllers:
      comfyui:
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          app:
            image:
              repository: yanwk/comfyui-boot
              tag: rocm7@sha256:06144961e62523a904082bcc3922c355691ccdb6ebaa356f726840ad0873740d
            securityContext:
              privileged: true
            env:
              HSA_OVERRIDE_GFX_VERSION: "11.5.1"
              HSA_ENABLE_SDMA: "0"
              HIP_VISIBLE_DEVICES: "0"
              ROCR_VISIBLE_DEVICES: "0"
              PYTORCH_HIP_ALLOC_CONF: "max_split_size_mb:256,garbage_collection_threshold:0.6"
              CLI_ARGS: "--listen 0.0.0.0 --port 8188 --use-pytorch-cross-attention --disable-mmap"
            # No resources block on purpose: BestEffort QoS makes comfyui the
            # first pod the Talos OOM manager kills (ranking weight 1.0) and the
            # first kubelet evicts under node MemoryPressure on the shared UMA node.
    defaultPodOptions:
      hostIPC: true
      nodeSelector:
        topology.kubernetes.io/gpus: amd
      tolerations:
        - key: llm-workload
          operator: Exists
          effect: NoSchedule
    service:
      app:
        type: LoadBalancer
        annotations:
          lbipam.cilium.io/ips: 10.69.10.44
        externalTrafficPolicy: Cluster
        ports:
          http:
            port: 8188
    route:
      app:
        hostnames: ["{{ .Release.Name }}.jory.dev"]
        parentRefs:
          - name: envoy-internal
            namespace: network
    persistence:
      comfyui:
        existingClaim: "comfyui"
        globalMounts:
          - path: /root/ComfyUI/
      data:
        type: nfs
        server: voyager.internal
        path: /mnt/daena/comfyui/
        globalMounts:
          - path: /root/ComfyUI/output
            subPath: output
          - path: /root/ComfyUI/input
            subPath: input
      dev-dri:
        type: hostPath
        hostPath: /dev/dri
        globalMounts:
          - path: /dev/dri
      dev-kfd:
        type: hostPath
        hostPath: /dev/kfd
        globalMounts:
          - path: /dev/kfd

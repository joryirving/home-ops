---
apiVersion: inference.llmkube.dev/v1alpha1
kind: Model
metadata:
  name: toolhive-embed
spec:
  source: https://huggingface.co/Qwen/Qwen3-Embedding-0.6B-GGUF/resolve/main/Qwen3-Embedding-0.6B-Q8_0.gguf
  format: gguf
  quantization: Q8_0
  hardware:
    accelerator: rocm
    gpu:
      enabled: true
      vendor: amd
      layers: 99
      resourceClaims:
        - name: gpu
          resourceClaimTemplateName: llama-strix-gpu
---
apiVersion: inference.llmkube.dev/v1alpha1
kind: InferenceService
metadata:
  name: toolhive-embed
  labels:
    krr/ignore: "true"
spec:
  modelRef: toolhive-embed
  modelCache:
    claimName: llmkube-skirk-cache
  runtime: llamacpp
  image: docker.io/kyuz0/amd-strix-halo-toolboxes:rocm-6.4.4@sha256:ed784792cd3b623baa58a57f20fd7be5ac24d5f108ba1a4be31a3acc2a224475
  rolloutPolicy:
    waitForIdle: true
    idleTimeoutSeconds: 86400
  command:
    - llama-server
  replicas: 1
  priority: normal
  nodeSelector:
    topology.kubernetes.io/gpus: amd
  tolerations:
    - key: llm-workload
      operator: Exists
      effect: NoSchedule
  contextSize: 81920
  parallelSlots: 32
  batchSize: 16384
  uBatchSize: 16384
  resources:
    cpu: "500m"
    memory: 4Gi
  extraArgs:
    - --alias
    - toolhive-embed
    - --embeddings
    - --pooling
    - last
    - --cache-ram
    - "0"
    - --cont-batching
    - --threads
    - "6"
    - --threads-batch
    - "12"
    - --no-mmap
  endpoint:
    port: 8080
    type: ClusterIP
  probeOverrides:
    startup:
      httpGet:
        path: /health
        port: 8080
      periodSeconds: 10
      failureThreshold: 360
    liveness:
      httpGet:
        path: /health
        port: 8080
      initialDelaySeconds: 30
      periodSeconds: 30
      failureThreshold: 6
    readiness:
      httpGet:
        path: /health
        port: 8080
      initialDelaySeconds: 20
      periodSeconds: 10
      failureThreshold: 6

---
apiVersion: toolhive.stacklok.dev/v1alpha1
kind: VirtualMCPServer
metadata:
  name: mcp-gateway-internal
spec:
  groupRef:
    name: mcp-tools
  config:
    aggregation:
      conflictResolution: prefix
      conflictResolutionConfig:
        prefixFormat: "{workload}_"
    optimizer:
      embeddingProvider: openai
      embeddingModel: toolhive-embed
      embeddingService: http://toolhive-embed.llm:8080/v1
  incomingAuth:
    type: anonymous
  outgoingAuth:
    source: discovered
  podTemplateSpec:
    spec:
      containers:
        - name: vmcp
          resources:
            requests:
              memory: 256Mi
            limits:
              memory: 2Gi

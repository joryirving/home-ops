---
# yaml-language-server: $schema=https://kube-schemas.pages.dev/toolhive.stacklok.dev/mcpserver_v1alpha1.json
apiVersion: toolhive.stacklok.dev/v1alpha1
kind: MCPServer
metadata:
  name: &name comfyui-mcp
spec:
  image: docker.io/siniidrozd/mcp-comfy-ui-builder:2.4.1@sha256:a271889df9d5eb85240763c5dcfe1c490dfff6e2d3b2cf0851b3e6d81285fdc4
  transport: stdio
  proxyMode: streamable-http
  groupRef:
    name: mcp-tools
  env:
    - name: COMFYUI_HOST
      value: http://comfyui.llm:8188
    - name: COMFYUI_PATH
      value: /root/ComfyUI
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      memory: 256Mi

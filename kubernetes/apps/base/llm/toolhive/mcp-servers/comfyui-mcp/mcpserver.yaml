---
# yaml-language-server: $schema=https://kube-schemas.pages.dev/toolhive.stacklok.dev/mcpserver_v1alpha1.json
apiVersion: toolhive.stacklok.dev/v1alpha1
kind: MCPServer
metadata:
  name: &name comfyui-mcp
spec:
  image: docker.io/node:24-alpine
  transport: stdio
  proxyMode: streamable-http
  groupRef:
    name: mcp-tools
  env:
    - name: HOME
      value: /tmp
    - name: NPM_CONFIG_CACHE
      value: /tmp/.npm
    - name: COMFYUI_HOST
      value: comfyui-app.llm
    - name: COMFYUI_PATH
      value: /root/ComfyUI
    - name: COMFYUI_PORT
      value: "8188"
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      memory: 256Mi
  podTemplateSpec:
    spec:
      containers:
        - name: mcp
          image: docker.io/node:24-alpine
          command:
            - npx
          args:
            - -y
            - comfyui-mcp@0.3.2
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}

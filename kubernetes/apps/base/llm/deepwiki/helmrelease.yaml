---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: deepwiki
spec:
  chartRef:
    kind: OCIRepository
    name: deepwiki
  interval: 15m
  dependsOn: []
  values:
    controllers:
      deepwiki:
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          app:
            image:
              repository: ghcr.io/asyncfuncai/deepwiki-open
              tag: main@sha256:122fb1cef471aedcc74ade93272e81caf0c0a580663ef0447f549f0b0a10fbe4
            env:
              SERVER_BASE_URL: http://localhost:8001
              OPENAI_BASE_URL: http://litellm.llm:4000/v1
            envFrom:
              - secretRef:
                  name: "{{ .Release.Name }}"
            resources:
              requests:
                cpu: 100m
              limits:
                memory: 2Gi
    persistence:
      adalflow:
        existingClaim: "{{ .Release.Name }}"
        globalMounts:
          - path: /root/.adalflow
      config:
        type: configMap
        name: deepwiki-config
        advancedMounts:
          deepwiki:
            app:
              - path: /app/api/config/embedder.json
                subPath: embedder.json
                readOnly: true
              - path: /app/api/config/generator.json
                subPath: generator.json
                readOnly: true
    route:
      app:
        hostnames: ["{{ .Release.Name }}.jory.dev"]
        parentRefs:
          - name: envoy-internal
            namespace: network
        rules:
          - backendRefs:
              - name: "{{ .Release.Name }}"
                port: 3000
    service:
      app:
        ports:
          http:
            port: 3000
          api:
            port: 8001

---
# yaml-language-server: $schema=https://kube-schemas.pages.dev/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: &name tool-servers
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword
  target:
    name: *name
    template:
      data:
        config.json: |
          {
            "mcpServers": {
              "toolhive": {
                "type": "streamable-http",
                "url": "https://mcp.jory.dev"
              }
            }
          }
  dataFrom:
    - extract:
        key: openclaw

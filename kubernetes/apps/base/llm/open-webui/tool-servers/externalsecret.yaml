---
# yaml-language-server: $schema=https://kube-schemas.pages.dev/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: &name tool-servers
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword
  target:
    name: *name
    template:
      data:
        config.json: |
          {
            "mcpServers": {
              "homeassistant": {
                "type": "streamable-http",
                "url": "https://hass.jory.dev/api/mcp",
                "headers": {
                  "Authorization": "Bearer {{ .HOME_ASSISTANT_TOKEN }}",
                  "Accept": "application/json"
                }
              },
              "grafana": {
                "type": "sse",
                "url": "http://mcp-grafana.observability:8000/sse"
              },
              "arr": {
                "type": "sse",
                "url": "http://mcp-arr.downloads:3000"
              },
              "seerr": {
                "type": "sse",
                "url": "http://seerr-mcp.media:8085"
              }
            }
          }
  dataFrom:
    - extract:
        key: openclaw

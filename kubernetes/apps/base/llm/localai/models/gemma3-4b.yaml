---
# yaml-language-server: $schema=https://kube-schemas.pages.dev/v1/configmap.json
apiVersion: v1
kind: ConfigMap
metadata:
  name: localai-model-gemma3-4b
data:
  gemma3_4b.yaml: |
    name: gemma3_4b
    backend: llama-cpp
    parameters:
      model: gemma-3-4b-it-Q4_K_M.gguf
    context_size: 8192
    threads: 6
    mmap: false
    gpu_layers: 999
---
# yaml-language-server: $schema=https://kube-schemas.pages.dev/batch/v1/job.json
apiVersion: batch/v1
kind: Job
metadata:
  name: localai-model-sync-gemma3-4b
spec:
  ttlSecondsAfterFinished: 86400
  backoffLimit: 2
  template:
    spec:
      restartPolicy: Never
      containers:
        - name: sync
          image: curlimages/curl:8.20.0
          imagePullPolicy: IfNotPresent
          command:
            - /bin/sh
            - -c
            - |
              set -eu

              model_file="gemma-3-4b-it-Q4_K_M.gguf"
              model_url="https://huggingface.co/lmstudio-community/gemma-3-4b-it-GGUF/resolve/main/gemma-3-4b-it-Q4_K_M.gguf"
              model_sha256="be49949e48422e4547b00af14179a193d3777eea7fbbd7d6e1b0861304628a01"
              config_file="gemma3_4b.yaml"

              target="/models/${model_file}"
              tmp="${target}.part"

              if [ -f "${target}" ]; then
                existing="$(sha256sum "${target}" | cut -d ' ' -f 1)"
                if [ "${existing}" = "${model_sha256}" ]; then
                  cp "/config/${config_file}" "/models/${config_file}"
                  exit 0
                fi
              fi

              if [ -n "${HF_TOKEN:-}" ]; then
                curl -fL --retry 3 --retry-all-errors -H "Authorization: Bearer ${HF_TOKEN}" -o "${tmp}" "${model_url}"
              else
                curl -fL --retry 3 --retry-all-errors -o "${tmp}" "${model_url}"
              fi

              actual="$(sha256sum "${tmp}" | cut -d ' ' -f 1)"
              [ "${actual}" = "${model_sha256}" ]

              mv "${tmp}" "${target}"
              cp "/config/${config_file}" "/models/${config_file}"
          env:
            - name: HF_TOKEN
              valueFrom:
                secretKeyRef:
                  name: localai-secret
                  key: HF_TOKEN
                  optional: true
          volumeMounts:
            - name: config
              mountPath: /config
            - name: models
              mountPath: /models
      volumes:
        - name: config
          configMap:
            name: localai-model-gemma3-4b
        - name: models
          persistentVolumeClaim:
            claimName: localai

---
# yaml-language-server: $schema=https://kube-schemas.pages.dev/v1/configmap.json
apiVersion: v1
kind: ConfigMap
metadata:
  name: localai-model-qwen2-5-coder-7b
data:
  qwen2_5_coder_7b.yaml: |
    name: qwen2_5_coder_7b
    backend: llama-cpp
    parameters:
      model: /models-data/qwen2-5-coder-7b/Qwen2.5-Coder-7B-Instruct-Q4_K_M.gguf
    context_size: 32768
    threads: 12
    mmap: false
    gpu_layers: 999
---
# yaml-language-server: $schema=https://kube-schemas.pages.dev/batch/v1/job.json
apiVersion: batch/v1
kind: Job
metadata:
  name: localai-model-sync-qwen2-5-coder-7b-v1
spec:
  ttlSecondsAfterFinished: 86400
  backoffLimit: 2
  template:
    spec:
      restartPolicy: Never
      containers:
        - name: sync
          image: python:3.14-slim
          imagePullPolicy: IfNotPresent
          command:
            - /bin/sh
            - -ec
            - |
              set -euo pipefail

              target_dir=/models-data/qwen2-5-coder-7b
              model_file="$target_dir/Qwen2.5-Coder-7B-Instruct-Q4_K_M.gguf"

              if [ ! -s "$model_file" ]; then
                pip install --no-cache-dir huggingface_hub
                mkdir -p "$target_dir"
                rm -rf "$target_dir/.cache/huggingface/download/Qwen2.5-Coder-7B-Instruct-Q4_K_M.gguf.lock"
                hf download \
                  unsloth/Qwen2.5-Coder-7B-Instruct-GGUF \
                  Qwen2.5-Coder-7B-Instruct-Q4_K_M.gguf \
                  --local-dir "$target_dir"
              fi

          env:
            - name: HF_HUB_ENABLE_HF_TRANSFER
              value: "1"
          envFrom:
            - secretRef:
                name: huggingface
          volumeMounts:
            - name: models
              mountPath: /models-data
      volumes:
        - name: models
          persistentVolumeClaim:
            claimName: localai-models

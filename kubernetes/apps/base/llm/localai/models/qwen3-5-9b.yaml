---
# yaml-language-server: $schema=https://kube-schemas.pages.dev/v1/configmap.json
apiVersion: v1
kind: ConfigMap
metadata:
  name: localai-model-qwen3-5-9b
data:
  qwen3_5_9b.yaml: |
    name: qwen3_5_9b
    backend: llama-cpp
    parameters:
      model: qwen-vision/Qwen3.5-9B-heretic.Q4_K_M.gguf
    mmproj: qwen-vision/mmproj-F16.gguf
    context_size: 131072
    threads: 12
    mmap: false
    gpu_layers: 999
    template:
      chat_message: chatml
---
# yaml-language-server: $schema=https://kube-schemas.pages.dev/batch/v1/job.json
apiVersion: batch/v1
kind: Job
metadata:
  name: localai-model-sync-qwen3-5-9b
spec:
  ttlSecondsAfterFinished: 86400
  backoffLimit: 2
  template:
    spec:
      restartPolicy: Never
      containers:
        - name: sync
          image: python:3.14-slim
          imagePullPolicy: IfNotPresent
          command:
            - /bin/sh
            - -ec
            - |
              set -euo pipefail

              target_dir=/models/qwen-vision
              model_file="${target_dir}/Qwen3.5-9B-heretic.Q4_K_M.gguf"
              mmproj_file="${target_dir}/mmproj-F16.gguf"
              config_file=qwen3_5_9b.yaml

              if [ ! -s "${model_file}" ] || [ ! -s "${mmproj_file}" ]; then
                pip install --no-cache-dir huggingface_hub
                mkdir -p "${target_dir}"
                rm -rf "${target_dir}/.cache/huggingface/download/Qwen3.5-9B-heretic.Q4_K_M.gguf.lock"
                hf download \
                  mradermacher/Qwen3.5-9B-heretic-GGUF \
                  Qwen3.5-9B-heretic.Q4_K_M.gguf \
                  --local-dir "${target_dir}"
                hf download \
                  unsloth/Qwen3.5-9B-GGUF \
                  mmproj-F16.gguf \
                  --local-dir "${target_dir}"
              fi

              cp "/config/${config_file}" "/models/${config_file}"
          env:
            - name: HF_HUB_ENABLE_HF_TRANSFER
              value: "1"
          envFrom:
            - secretRef:
                name: localai-secret
          volumeMounts:
            - name: config
              mountPath: /config
            - name: models
              mountPath: /models
      volumes:
        - name: config
          configMap:
            name: localai-model-qwen3-5-9b
        - name: models
          persistentVolumeClaim:
            claimName: localai

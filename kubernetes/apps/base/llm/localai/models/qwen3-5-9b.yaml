---
# yaml-language-server: $schema=https://kube-schemas.pages.dev/v1/configmap.json
apiVersion: v1
kind: ConfigMap
metadata:
  name: localai-model-qwen3-5-9b
data:
  qwen3_5_9b.yaml: |
    name: qwen3_5_9b
    backend: llama-cpp
    parameters:
      model: qwen3-5-9b/Qwen3.5-9B-heretic.Q4_K_M.gguf
      temperature: 0.6
      top_p: 0.95
      top_k: 20
      min_p: 0
      presence_penalty: 0
      repeat_penalty: 1.0
    mmproj: qwen3-5-9b/mmproj-F16.gguf
    context_size: 131072
    threads: 12
    mmap: false
    gpu_layers: 999
    prompt_cache_path: cache/qwen3_5_9b
    prompt_cache_all: true
    options:
      - parallel:1
      - cont_batching:true
      - kv_unified:true
      - ctx_checkpoints:4
    template:
      chat_message: chatml
---
# yaml-language-server: $schema=https://kube-schemas.pages.dev/batch/v1/job.json
apiVersion: batch/v1
kind: Job
metadata:
  name: localai-model-sync-qwen3-5-9b
spec:
  ttlSecondsAfterFinished: 86400
  backoffLimit: 2
  template:
    spec:
      restartPolicy: Never
      containers:
        - name: sync
          image: python:3.14-slim
          imagePullPolicy: IfNotPresent
          command:
            - /bin/sh
            - -ec
            - |
              set -euo pipefail

              target_dir=/models/qwen3-5-9b
              model_file="$target_dir/Qwen3.5-9B-heretic.Q4_K_M.gguf"
              mmproj_file="$target_dir/mmproj-F16.gguf"

              if [ ! -s "$model_file" ] || [ ! -s "$mmproj_file" ]; then
                pip install --no-cache-dir huggingface_hub
                mkdir -p "$target_dir"
                rm -rf "$target_dir/.cache/huggingface/download/Qwen3.5-9B-heretic.Q4_K_M.gguf.lock"
                hf download \
                  mradermacher/Qwen3.5-9B-heretic-GGUF \
                  Qwen3.5-9B-heretic.Q4_K_M.gguf \
                  --local-dir "$target_dir"
                hf download \
                  unsloth/Qwen3.5-9B-GGUF \
                  mmproj-F16.gguf \
                  --local-dir "$target_dir"
              fi

          env:
            - name: HF_HUB_ENABLE_HF_TRANSFER
              value: "1"
          envFrom:
            - secretRef:
                name: huggingface
          volumeMounts:
            - name: models
              mountPath: /models
      volumes:
        - name: models
          persistentVolumeClaim:
            claimName: localai-models

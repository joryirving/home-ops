---
# yaml-language-server: $schema=https://kube-schemas.pages.dev/v1/configmap.json
apiVersion: v1
kind: ConfigMap
metadata:
  name: localai-model-gemma4-e4b
data:
  gemma4_e4b.yaml: |
    name: gemma4_e4b
    backend: llama-cpp
    parameters:
      model: gemma4-e4b/gemma-4-E4B-it-UD-Q4_K_XL.gguf
      temperature: 1.0
      top_p: 0.95
      top_k: 64
      min_p: 0
      presence_penalty: 0
      repeat_penalty: 1.0
    mmproj: gemma4-e4b/mmproj-F16.gguf
    context_size: 131072
    threads: 12
    mmap: false
    gpu_layers: 999
    prompt_cache_path: cache/gemma4_e4b
    prompt_cache_all: true
    options:
      - parallel:1
      - cont_batching:true
      - kv_unified:true
      - ctx_checkpoints:4
---
# yaml-language-server: $schema=https://kube-schemas.pages.dev/batch/v1/job.json
apiVersion: batch/v1
kind: Job
metadata:
  name: localai-model-sync-gemma4-e4b
spec:
  ttlSecondsAfterFinished: 86400
  backoffLimit: 2
  template:
    spec:
      restartPolicy: Never
      containers:
        - name: sync
          image: python:3.14-slim
          imagePullPolicy: IfNotPresent
          command:
            - /bin/sh
            - -ec
            - |
              set -euo pipefail

              target_dir=/models/gemma4-e4b
              model_file="$target_dir/gemma-4-E4B-it-UD-Q4_K_XL.gguf"
              mmproj_file="$target_dir/mmproj-F16.gguf"

              if [ ! -s "$model_file" ] || [ ! -s "$mmproj_file" ]; then
                pip install --no-cache-dir huggingface_hub
                mkdir -p "$target_dir"
                rm -rf "$target_dir/.cache/huggingface/download/gemma-4-E4B-it-UD-Q4_K_XL.gguf.lock"
                hf download \
                  unsloth/gemma-4-E4B-it-GGUF \
                  gemma-4-E4B-it-UD-Q4_K_XL.gguf \
                  --local-dir "$target_dir"
                hf download \
                  unsloth/gemma-4-E4B-it-GGUF \
                  mmproj-F16.gguf \
                  --local-dir "$target_dir"
              fi

          env:
            - name: HF_HUB_ENABLE_HF_TRANSFER
              value: "1"
          envFrom:
            - secretRef:
                name: huggingface
          volumeMounts:
            - name: models
              mountPath: /models
      volumes:
        - name: models
          persistentVolumeClaim:
            claimName: localai-models

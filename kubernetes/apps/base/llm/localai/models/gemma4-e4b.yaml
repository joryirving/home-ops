---
# yaml-language-server: $schema=https://kube-schemas.pages.dev/v1/configmap.json
apiVersion: v1
kind: ConfigMap
metadata:
  name: localai-model-gemma4-e4b
data:
  gemma4_e4b.yaml: |
    name: gemma4_e4b
    backend: llama-cpp
    parameters:
      model: memory/gemma-4-E4B-it-UD-Q4_K_XL.gguf
    mmproj: memory/mmproj-F16.gguf
    context_size: 131072
    threads: 12
    mmap: false
    gpu_layers: 999
---
# yaml-language-server: $schema=https://kube-schemas.pages.dev/batch/v1/job.json
apiVersion: batch/v1
kind: Job
metadata:
  name: localai-model-sync-gemma4-e4b
spec:
  ttlSecondsAfterFinished: 86400
  backoffLimit: 2
  template:
    spec:
      restartPolicy: Never
      containers:
        - name: sync
          image: python:3.14-slim
          imagePullPolicy: IfNotPresent
          command:
            - /bin/sh
            - -ec
            - |
              set -euo pipefail

              target_dir=/models/memory
              model_file="${target_dir}/gemma-4-E4B-it-UD-Q4_K_XL.gguf"
              mmproj_file="${target_dir}/mmproj-F16.gguf"
              config_file=gemma4_e4b.yaml

              if [ ! -s "${model_file}" ] || [ ! -s "${mmproj_file}" ]; then
                pip install --no-cache-dir huggingface_hub
                mkdir -p "${target_dir}"
                rm -rf "${target_dir}/.cache/huggingface/download/gemma-4-E4B-it-UD-Q4_K_XL.gguf.lock"
                hf download \
                  unsloth/gemma-4-E4B-it-GGUF \
                  gemma-4-E4B-it-UD-Q4_K_XL.gguf \
                  --local-dir "${target_dir}"
                hf download \
                  unsloth/gemma-4-E4B-it-GGUF \
                  mmproj-F16.gguf \
                  --local-dir "${target_dir}"
              fi

              cp "/config/${config_file}" "/models/${config_file}"
          env:
            - name: HF_HUB_ENABLE_HF_TRANSFER
              value: "1"
          envFrom:
            - secretRef:
                name: localai-secret
          volumeMounts:
            - name: config
              mountPath: /config
            - name: models
              mountPath: /models
      volumes:
        - name: config
          configMap:
            name: localai-model-gemma4-e4b
        - name: models
          persistentVolumeClaim:
            claimName: localai

---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: localai
spec:
  chartRef:
    kind: OCIRepository
    name: app-template
  dependsOn: []
  interval: 15m
  values:
    defaultPodOptions:
      resourceClaims:
        - name: gpu
          resourceClaimTemplateName: localai-gpu
    controllers:
      localai:
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          app:
            image:
              repository: quay.io/go-skynet/local-ai
              tag: v4.1.3-gpu-intel@sha256:8fb1248c11ee7379521c7531a42dff696affe010c2b98d8dc55b03e12841a16c
            env:
              TZ: America/Edmonton
              DEBUG: "false"
              LOCALAI_FORCE_META_BACKEND_CAPABILITY: intel
              LOCALAI_BACKEND_GALLERIES: >-
                [{"name":"localai","url":"https://raw.githubusercontent.com/mudler/LocalAI/master/backend/index.yaml"}]
              LOCALAI_EXTERNAL_BACKENDS: llama-cpp
              LOCALAI_MAX_ACTIVE_BACKENDS: "3"
              LOCALAI_WATCHDOG_IDLE: "true"
              LOCALAI_WATCHDOG_IDLE_TIMEOUT: 15m
              MODELS_PATH: &modelPath /models
              THREADS: "6"
              ZES_ENABLE_SYSMAN: "1"
            resources:
              claims:
                - name: gpu
              requests:
                cpu: 500m
                memory: 8Gi
              limits:
                memory: 16Gi
    persistence:
      models:
        existingClaim: "{{ .Release.Name }}"
        globalMounts:
          - path: *modelPath
      dev-dri:
        type: hostPath
        hostPath: /dev/dri
        globalMounts:
          - path: /dev/dri
            readOnly: true
    service:
      app:
        ports:
          http:
            port: 8080

---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: localai-gemma4-e4b
spec:
  chartRef:
    kind: OCIRepository
    name: app-template
  dependsOn: []
  interval: 15m
  values:
    defaultPodOptions:
      resourceClaims:
        - name: gpu
          resourceClaimTemplateName: localai-gpu
    controllers:
      localai-gemma4-e4b:
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          app:
            image: &image
              repository: quay.io/go-skynet/local-ai
              tag: v4.1.3-gpu-intel@sha256:8fb1248c11ee7379521c7531a42dff696affe010c2b98d8dc55b03e12841a16c
            env: &env
              DEBUG: "false"
              LOCALAI_BACKEND_GALLERIES: >-
                [{"name":"localai","url":"https://raw.githubusercontent.com/mudler/LocalAI/master/backend/index.yaml"}]
              LOCALAI_EXTERNAL_BACKENDS: llama-cpp
              LOCALAI_FORCE_META_BACKEND_CAPABILITY: intel
              LOCALAI_LOAD_TO_MEMORY: gemma4_e4b
              LOCALAI_WATCHDOG_IDLE: "false"
              MODELS_PATH: /models
              THREADS: "6"
              TZ: America/Edmonton
              ZES_ENABLE_SYSMAN: "1"
            resources: &resources
              claims:
                - name: gpu
              requests:
                cpu: 500m
                memory: 8Gi
              limits:
                memory: 16Gi
            probes:
              liveness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /healthz
                    port: 8080
                  initialDelaySeconds: 30
                  periodSeconds: 30
                  failureThreshold: 6
              readiness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /readyz
                    port: 8080
                  initialDelaySeconds: 5
                  periodSeconds: 10
                  failureThreshold: 3
              startup:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /readyz
                    port: 8080
                  failureThreshold: 60
                  periodSeconds: 10
    persistence:
      model-config:
        type: configMap
        name: localai-model-gemma4-e4b
        globalMounts:
          - path: /models/gemma4_e4b.yaml
            subPath: gemma4_e4b.yaml
            readOnly: true
      model-data: &modelData
        existingClaim: localai-models
        globalMounts:
          - path: /models
      dev-dri: &devDri
        type: hostPath
        hostPath: /dev/dri
        globalMounts:
          - path: /dev/dri
            readOnly: true
    service:
      app: &service
        ports:
          http:
            port: 8080

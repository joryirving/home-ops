---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: ollama
spec:
  chartRef:
    kind: OCIRepository
    name: app-template
  interval: 15m
  dependsOn: []
  values:
    controllers:
      ollama:
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          app:
            image:
              repository: ollama/ollama
              tag: 
                0.21.2@sha256:2038a264392af4d21f7f14e1568e8dd9aa0f2bd0f31d7d9a59a8cca1e9829663
            securityContext:
              privileged: true
            env:
              OLLAMA_NUM_PARALLEL: 1
              OLLAMA_CONTEXT_LENGTH: 32768
              OLLAMA_KV_CACHE_TYPE: q8_0
              OLLAMA_FLASH_ATTENTION: 0
              OLLAMA_KEEP_ALIVE: 30m
            resources:
              requests:
                cpu: 2
                memory: 8Gi
              limits:
                cpu: 12
                memory: 16Gi
          exporter:
            image:
              repository: lucabecker42/ollama-exporter
              tag: 
                1.0.1@sha256:4d1d96fae76dbefd6b763d576a12fb9799913ae9a585990a464eacab2b600f55
    persistence:
      ollama:
        existingClaim: "{{ .Release.Name }}"
        globalMounts:
        - path: /root/.ollama/models
          subPath: models
        - path: /root/.ollama
          subPath: config
    service:
      app:
        ports:
          http:
            port: 11434
          metrics:
            port: 8000
    # route:
    #   app:
    #     hostnames: ["{{ .Release.Name }}.jory.dev"]
    #     parentRefs:
    #       - name: envoy-internal
    #         namespace: network

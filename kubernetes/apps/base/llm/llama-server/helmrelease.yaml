---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: llama-server
spec:
  chartRef:
    kind: OCIRepository
    name: app-template
  dependsOn: []
  interval: 15m
  values:
    controllers:
      llama-server:
        annotations:
          reloader.stakater.com/auto: "true"
        initContainers:
          model-download:
            image:
              repository: curlimages/curl
              tag: 8.18.0
            command:
              - /bin/sh
              - -ec
              - |
                set -euo pipefail

                MODEL_DST="/models/qwen122b/wen3.5-122B-A10B-UD-Q4_K_XL-00001-of-00003.gguf"
                MMPROJ_DST="/models/qwen122b/mmproj-F16.gguf"

                mkdir -p "$(dirname "$MODEL_DST")" "$(dirname "$MMPROJ_DST")"

                for shard in \
                  Qwen3.5-122B-A10B-UD-Q4_K_XL-00001-of-00003.gguf \
                  Qwen3.5-122B-A10B-UD-Q4_K_XL-00002-of-00003.gguf \
                  Qwen3.5-122B-A10B-UD-Q4_K_XL-00003-of-00003.gguf; do
                  shard_dst="/models/qwen122b/${shard}"
                  if [ ! -s "$shard_dst" ]; then
                    echo "Downloading $shard..."
                    curl -fL --retry 10 --retry-delay 5 --retry-all-errors \
                      "${MODEL_BASE_URL}/${shard}" -o "$shard_dst"
                  else
                    echo "$shard already exists, skipping download"
                  fi
                done

                if [ ! -s "$MMPROJ_DST" ]; then
                  echo "Downloading mmproj..."
                  curl -fL --retry 10 --retry-delay 5 --retry-all-errors \
                    "$MMPROJ_URL" -o "$MMPROJ_DST"
                else
                  echo "mmproj already exists, skipping download"
                fi
            env:
              MODEL_BASE_URL: https://huggingface.co/unsloth/Qwen3.5-122B-A10B-UD-Q4_K_XL/resolve/main
              MMPROJ_URL: https://huggingface.co/unsloth/Qwen3.5-122B-A10B-GGUF/resolve/main/mmproj-F16.gguf
            resources:
              requests:
                cpu: 100m
                memory: 256Mi
              limits:
                memory: 1Gi
        containers:
          app:
            image:
              repository: docker.io/kyuz0/amd-strix-halo-toolboxes
              tag: rocm7-nightlies_20260312T131453@sha256:98fac00c98eeee250dc0ee694890871bf5c51146667577df15e83454dbece95b
            securityContext:
              privileged: true
            command:
              - /usr/local/bin/llama-server
            args:
              - --host
              - 0.0.0.0
              - --port
              - "8080"
              - --alias
              - qwen122b
              - --model
              - /models/qwen122b/Qwen3.5-122B-A10B-UD-Q4_K_XL-00001-of-00003.gguf
              - --mmproj
              - /models/qwen122b/mmproj-F16.gguf
              - --ctx-size
              - "200000"
              - --n-gpu-layers
              - "99"
              - --flash-attn
              - "on"
              - --parallel
              - "2"
              - --cont-batching
              - --slot-save-path
              - "/models/qwen122b/slots"
              - -sps
              - "0.95"
              - --no-context-shift
              - --cache-prompt
              - --cache-ram
              - "16384"
              - --temp
              - "0.5"
              - --top-p
              - "0.95"
              - --top-k
              - "20"
              - --min-p
              - "0"
              - --cache-type-k
              - q8_0
              - --cache-type-v
              - q8_0
              - --batch-size
              - "2048"
              - --ubatch-size
              - "1024"
              - --no-mmap
              - --jinja
            env:
              HSA_OVERRIDE_GFX_VERSION: "11.5.1"
              HSA_ENABLE_SDMA: "0"
              ROCBLAS_USE_HIPBLASLT: "1"
              HIP_VISIBLE_DEVICES: "0"
            resources:
              requests:
                cpu: 1
                memory: 32Gi
              limits:
                memory: 100Gi
            probes:
              liveness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /health
                    port: 8080
                  initialDelaySeconds: 30
                  periodSeconds: 30
                  failureThreshold: 6
              readiness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /health
                    port: 8080
                  initialDelaySeconds: 20
                  periodSeconds: 10
                  failureThreshold: 6
              startup:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /health
                    port: 8080
                  failureThreshold: 360
                  periodSeconds: 10
    defaultPodOptions:
      hostIPC: true
      nodeSelector:
        topology.kubernetes.io/gpus: amd
      tolerations:
        - key: llm-workload
          operator: Exists
          effect: NoSchedule
    service:
      app:
        type: LoadBalancer
        annotations:
          lbipam.cilium.io/ips: 10.69.10.20
        externalTrafficPolicy: Cluster
        ports:
          http:
            port: 8080
    persistence:
      models:
        existingClaim: llm-models
        globalMounts:
          - path: /models
      dev-dri:
        type: hostPath
        hostPath: /dev/dri
        globalMounts:
          - path: /dev/dri
      dev-kfd:
        type: hostPath
        hostPath: /dev/kfd
        globalMounts:
          - path: /dev/kfd

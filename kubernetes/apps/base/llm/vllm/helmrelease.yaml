---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: vllm
spec:
  chartRef:
    kind: OCIRepository
    name: app-template
  dependsOn: []
  interval: 15m
  values:
    controllers:
      vllm:
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          app:
            image:
              repository: docker.io/kyuz0/vllm-therock-gfx1151
              tag: latest
            securityContext:
              privileged: true
            command:
              - /bin/bash
              - -lc
            args:
              - >-
                python -m vllm.entrypoints.openai.api_server
                --host 0.0.0.0
                --port 8080
                --model dazipe/Qwen3-Next-80B-A3B-Instruct-GPTQ-Int4A16
                --served-model-name qwen-next-80b
                --max-model-len 131072
                --gpu-memory-utilization 0.95
                --dtype auto
                --trust-remote-code
            env:
              HSA_OVERRIDE_GFX_VERSION: "11.5.1"
              HSA_ENABLE_SDMA: "0"
              HIP_VISIBLE_DEVICES: "0"
              ROCR_VISIBLE_DEVICES: "0"
              HF_HOME: /models/huggingface
              VLLM_CACHE_ROOT: /models/vllm
            resources:
              requests:
                cpu: 1
                memory: 32Gi
              limits:
                memory: 115Gi
            probes:
              liveness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /health
                    port: 8080
                  initialDelaySeconds: 30
                  periodSeconds: 30
                  failureThreshold: 6
              readiness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /health
                    port: 8080
                  initialDelaySeconds: 20
                  periodSeconds: 10
                  failureThreshold: 6
              startup:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /health
                    port: 8080
                  failureThreshold: 180
                  periodSeconds: 10
    defaultPodOptions:
      hostIPC: true
      nodeSelector:
        topology.kubernetes.io/gpus: amd
      tolerations:
        - key: llm-workload
          operator: Exists
          effect: NoSchedule
    service:
      app:
        type: LoadBalancer
        annotations:
          lbipam.cilium.io/ips: 10.69.10.20
        externalTrafficPolicy: Cluster
        ports:
          http:
            port: 8080
    persistence:
      models:
        existingClaim: vllm-model-cache
        globalMounts:
          - path: /models
      dev-dri:
        type: hostPath
        hostPath: /dev/dri
        globalMounts:
          - path: /dev/dri
      dev-kfd:
        type: hostPath
        hostPath: /dev/kfd
        globalMounts:
          - path: /dev/kfd

---
apiVersion: foreman.llmkube.dev/v1alpha1
kind: Agent
metadata:
  name: reviewer
spec:
  role: reviewer
  # Ornith-1.0-35B on the Strix Halo — the big/slow model, used to review rather
  # than code.
  provider: cloud-proxy
  providerConfig:
    baseURL: http://litellm.llm:4000/v1
    model: self-hosted
    apiKeySecretRef:
      name: foreman-agent
      key: LITELLM_API_KEY
  # Read-only whitelist: no write_file / str_replace. The reviewer describes needed
  # changes in its verdict, it does not edit the branch.
  tools:
    - read_file
    - grep
    - bash
    - fetch_issue
    - submit_result
  temperature: "0.35"
  maxTurns: 80
  maxRetries: 3
  requestTurnTimeoutSeconds: 900
  requestTimeoutSeconds: 5400
  bashTimeoutSeconds: 60
  requiredCapability:
    roles:
      - worker
    accelerator: any
  systemPrompt: |
    You are a code reviewer (pipeline step 3), scoring the coder's branch against the
    issue after the gate has run fmt/vet/lint/test. Your task payload (in the user
    message) names the repo, issue, and the branch under review.

    STEP 1 — navigate to the branch (MANDATORY, before any judgment). Until you run
    this, the workspace is on an unrelated branch off main and any diff you compute is
    WRONG, so do it first, in order:
      1. bash("git fetch origin <branch>:refs/remotes/origin/<branch> && git checkout origin/<branch>")
         using the branch from your payload. If it fails, call submit_result with
         verdict ERROR naming the fetch failure — do NOT guess the diff.
      2. fetch_issue(repo, issue) to read the issue title/body/labels (your scope anchor).
      3. bash("git log -1 --pretty=full HEAD") for the commit message.
      4. bash("git diff --stat main...HEAD") then bash("git diff main...HEAD") for the
         file list and full diff (if huge, git show --stat + targeted read_file).
      5. read_file each touched file to judge whether the change fits.

    STEP 2 — review. Ground every statement in what the diff really changes — never
    claim a change, file, or problem that is not present in the diff. Verify the change
    resolves the issue and stays in scope, that a behaviour change carries a test (a
    config/docs-only change does not), and check correctness, security, and scope creep.
    You are read-only — do not edit the branch; if a change is needed, describe it
    specifically in the review. Then call submit_result:
    - request-changes: give specific, diff-grounded reasons.
    - approve (GO): foreman opens the PR using your summary as the body, so write a
      clear, self-contained PR description — enough that a reviewer understands the
      change without reading every line of the diff:

        ## What
        <what the diff changes>

        ## Why
        <why it is needed>

        Fixes #<issue>

        ## How
        <how it was implemented; call out any design decision or trade-off>

        Assisted-by: LLMKube foreman (coder generated the change; gate ran the
        project's lint/test; a human is accountable via review + sign-off).

      Ground every section in the real diff. Keep it tight but informative — a few
      sentences per section, not one line. Do not put attribution in commit messages.

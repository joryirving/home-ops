---
apiVersion: foreman.llmkube.dev/v1alpha1
kind: Agent
metadata:
  name: coder-frontier
spec:
  role: coder
  # Escalation-tier coder: issues the local coder failed RETRY_MAX_ATTEMPTS
  # times get re-laned to "frontier" by the bridge and land here. cloud-proxy
  # dispatches OpenAI-compatible requests through litellm to MiniMax-M3 (the
  # subscription key lives in litellm). Subject to the operator's
  # --allow-cloud-providers switch.
  provider: cloud-proxy
  providerConfig:
    baseURL: http://litellm.llm:4000/v1
    model: MiniMax-M3-chat
    apiKeySecretRef:
      name: foreman-agent
      key: LITELLM_API_KEY
  tools:
    - read_file
    - write_file
    - str_replace
    - grep
    - bash
    - submit_result
  temperature: "0.2"
  maxTurns: 80
  maxRetries: 3
  stuckLoopDetection:
    editFreeTurnsLimit: 12
  requestTurnTimeoutSeconds: 1800
  requestTimeoutSeconds: 7200
  bashTimeoutSeconds: 60
  requiredCapability:
    # Same shared foreman-agent executes these; the model is remote, so the
    # executor node needs no GPU — but it still needs the coder toolchain image.
    roles:
      - coder
    accelerator: any
  systemPrompt: |
    You are a coding agent resolving a single GitHub issue in the referenced repo.
    This issue was escalated to you after repeated failed attempts by a smaller
    model — read any existing foreman branches/comments for prior context, expect
    the problem to be subtler than it looks, and prefer root-cause fixes over
    surface patches. Read the issue and the relevant files, then make the smallest
    correct change. Every behavior change needs a test (add a regression test for
    a bug). Match the surrounding code style.
    Make every file change with the write_file and str_replace tools only — never
    edit files through the bash tool (no sed/echo/tee/heredocs/git apply). Edits
    made via bash are invisible to the harness, count as no progress, and will trip
    the stuck-loop detector. Do NOT run git add, git commit, or git push: leave your
    changes uncommitted in the working tree — the harness stages, commits, DCO-signs,
    and pushes them for you using the message you pass to submit_result. If you
    commit the work yourself the harness sees a clean tree and records it as "no
    changes."
    Ground every external fact in something
    you can read: reference GitHub Actions by version tag (uses: azure/setup-helm@v5)
    and NEVER write commit SHAs, URLs, or version numbers from memory — if you cannot
    verify a value from the repo, leave a TODO comment instead. Prefer tools
    preinstalled on CI runners (yq, jq, helm) over pip/npm-installing alternatives. Run the repo's verification commands
    (fmt/vet/lint/test) via the bash tool before finishing. When the change is
    complete and verification passes, call submit_result with a concise commit
    message. If the task is an epic, needs a human design decision, or would touch
    many files, call submit_result with that verdict instead of guessing.

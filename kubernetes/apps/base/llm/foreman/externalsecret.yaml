---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: &name foreman-agent
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword
  target:
    name: *name
    template:
      engineVersion: v2
      data:
        GITHUB_TOKEN: "{{ .GITHUB_TOKEN }}"
        # foreman's per-consumer litellm virtual key (1Password item
        # "litellm-foreman", field LITELLM_API_KEY) — used by the reviewer
        # (ornith alias) and coder-frontier Agents for spend attribution.
        LITELLM_API_KEY: "{{ .LITELLM_API_KEY }}"
  dataFrom:
    - extract:
        key: github-miso
    - extract:
        key: litellm-foreman

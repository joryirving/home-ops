---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: foreman
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: foreman
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  values:
    operator:
      # Audit-record ConfigMaps (foreman.llmkube.dev/audit) accumulate one per
      # task and are only GC'd by the operator's reaper. Default retention is 7d;
      # trim to 48h — a homelab does not need a week of audit trail, and heavy
      # task churn otherwise piles up hundreds of CMs (#990).
      audit:
        retention: 48h
    agent:
      replicaCount: 2
      mode: native
      taskNamespace: llm
      roles:
        - worker
        - coder
        - verifier
      image:
        repository: ghcr.io/misospace/llmkube-coder
        tag: "0.9.4@sha256:6e67a3d60d154f92c98f4d86e16b36550ed75c2852a53e7ada2011a1aeda74de"
      githubToken:
        secretName: foreman-agent
        secretKey: GITHUB_TOKEN
      commitAuthorName: Saffron
      commitAuthorEmail: 263493777+itsmiso-ai@users.noreply.github.com
      gateCache:
        storageClass: ceph-filesystem
        accessModes: ["ReadWriteMany"]
    coder:
      gitCredentialsSecret: foreman-agent
      gitCredentialsSecretKey: GITHUB_TOKEN

---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: foreman
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: foreman
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  values:
    agent:
      replicaCount: 2
      mode: native
      taskNamespace: llm
      roles:
        - worker
        - coder
        - verifier
      image:
        repository: ghcr.io/joryirving/llmkube-coder
      githubToken:
        secretName: foreman-agent
        secretKey: GITHUB_TOKEN
      commitAuthorName: Saffron
      commitAuthorEmail: 263493777+itsmiso-ai@users.noreply.github.com
      gateCache:
        storageClass: ceph-filesystem
        accessModes: ["ReadWriteMany"]
    coder:
      gitCredentialsSecret: foreman-agent
      gitCredentialsSecretKey: GITHUB_TOKEN

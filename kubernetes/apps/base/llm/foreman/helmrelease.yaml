---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: foreman
spec:
  chartRef:
    kind: OCIRepository
    name: foreman
  interval: 1h
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  values:
    operator:
      enabled: true
    agent:
      enabled: true
      # stub: registers a FleetNode + writes synthetic Succeeded results.
      # No GitHub token, no model inference, no repo pushes — control-plane
      # smoke test only. Flip to `native` + wire githubToken/gitRemoteURL/
      # inferenceServiceRef to actually run the self-hosted Qwen coder.
      mode: stub
      roles:
        - worker
        - verifier
      gateCache:
        enabled: false
    coder:
      enabled: false

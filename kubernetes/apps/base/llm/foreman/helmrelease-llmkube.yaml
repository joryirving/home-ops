---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: foreman-llmkube
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: foreman
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  # Agent-only second release pinned to the joryirving/LLMKube fork for upstream
  # dogfooding. The operator + webhook come from the primary `foreman` release;
  # the chart's CRDs are ungated templates (LLMKube#991), so strip them here to
  # avoid fighting the primary release for CRD ownership.
  postRenderers:
    - kustomize:
        patches:
          - target:
              kind: CustomResourceDefinition
            patch: |
              apiVersion: apiextensions.k8s.io/v1
              kind: CustomResourceDefinition
              metadata:
                name: unused
              $patch: delete
  values:
    fullnameOverride: foreman-llmkube
    operator:
      enabled: false
    webhook:
      enabled: false
    agent:
      enabled: true
      replicaCount: 1
      mode: native
      taskNamespace: llm
      # Custom roles so the WHOLE pipeline (code -> verify -> review -> PR) runs
      # on this fork-pinned agent and clones/pushes the fork — misospace work
      # (roles coder/verifier/worker) never lands here. coder-go, gate-fork, and
      # reviewer-fork target these. Roles are scheduling-only; native mode + the
      # coder image + gitRemoteURL are what let it execute the tasks.
      roles:
        - coder-fork
        - verifier-fork
        - reviewer-fork
      # Upstream Go coder image (same as coder-go's Job image): this is a Go
      # repo, so the orchestrator and the InProcess reviewer-fork get the Go
      # toolchain, not our polyglot Python+Node one. Keep in lockstep with the
      # deployed foreman version.
      image:
        repository: ghcr.io/misospace/llmkube-coder-go
        tag: "0.9.6@sha256:36a32efb731994f3f64771c4d8971700ee39d92607cc79763fda48917ba967ed"
      # Clones AND pushes this fork; the reviewer opens a cross-repo PR into the
      # upstream repo named by the Workload (defilantech/LLMKube).
      gitRemoteURL: https://github.com/joryirving/LLMKube
      # Jory's PAT (can push to the joryirving/LLMKube fork); DCO sign-off +
      # attribution as Jory to match.
      commitAuthorName: Jory Irving
      commitAuthorEmail: jory@jory.dev
      githubToken:
        secretName: foreman-agent-fork
        secretKey: GITHUB_TOKEN
      gateCache:
        storageClass: ceph-filesystem
        accessModes: ["ReadWriteMany"]
      # reviewer-fork runs InProcess in this pod; the chart default caps CPU at
      # 2, which throttles review. Burst to 6 cores.
      resources:
        requests:
          cpu: "2"
          memory: 512Mi
        limits:
          cpu: "6"
          memory: 8Gi
    coder:
      enabled: true
      # Reuse the primary release's foreman-coder SA (fixed name) rather than
      # recreating it — create:false avoids the cross-release collision.
      serviceAccount:
        create: false
        name: foreman-coder
      gitCredentialsSecret: foreman-agent-fork
      gitCredentialsSecretKey: GITHUB_TOKEN

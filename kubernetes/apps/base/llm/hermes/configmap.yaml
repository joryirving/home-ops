---
apiVersion: v1
kind: ConfigMap
metadata:
  name: hermes-config
data:
  config.yaml: |
    model:
      default: self-hosted
      provider: litellm
      base_url: http://litellm.llm:4000/v1
      api_key: $${LITELLM_API_KEY}
    fallback_providers:
      - provider: minimax
        model: minimax/MiniMax-M2.7
      - provider: openai
        model: chatgpt/gpt-5.5
      - provider: openai
        model: vision
      - provider: moonshot
        model: moonshot/kimi-k2.6
    providers:
      litellm:
        base_url: http://litellm.llm:4000/v1
        api_key: $${LITELLM_API_KEY}
      minimax:
        api_key: $${MINIMAX_API_KEY}
        base_url: https://api.minimax.chat/v1
      openai:
        api_key: $${OPENAI_API_KEY}
      moonshot:
        api_key: $${MOONSHOT_API_KEY}
        base_url: https://api.moonshot.ai/v1
    toolsets:
      - hermes-cli
    terminal:
      backend: local
      cwd: /opt/data/workspace
      timeout: 180
      persistent_shell: true
    memory:
      auto_migrate: true
      auto_summarize:
        threshold: 50
    compression:
      enabled: true
    agent:
      max_turns: 90
      gateway_timeout: 1800
      restart_drain_timeout: 60
      api_max_retries: 2
      reasoning_effort: medium
    streaming:
      enabled: false
    security:
      redact_secrets: true
    privacy:
      redact_pii: true
    platform_toolsets:
      cli:
        - hermes-cli
      telegram:
        - hermes-telegram
    mcp_servers:
      toolhive:
        url: http://vmcp-mcp-gateway-internal.llm:4483/mcp
    auxiliary:
      vision:
        provider: openai
        model: vision
        base_url: http://litellm.llm:4000/v1
        api_key: $${LITELLM_API_KEY}

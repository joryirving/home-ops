---
apiVersion: v1
kind: ConfigMap
metadata:
  name: hermes-config
data:
  config.yaml: |
    model:
      default: selfhosted
      provider: custom
      base_url: http://llama-server.llm:8080/v1
      api_key: ""
    providers:
      litellm:
        base_url: http://litellm.llm:4000/v1
        api_key: $${LITELLM_API_KEY}
      minimax:
        api_key: $${MINIMAX_API_KEY}
        base_url: https://api.minimax.chat/v1
      moonshot:
        api_key: $${MOONSHOT_API_KEY}
        base_url: https://api.moonshot.ai/v1
    toolsets:
      - hermes-cli
    terminal:
      backend: local
      cwd: /opt/data/workspace
      timeout: 180
      persistent_shell: true
    memory:
      auto_migrate: true
      auto_summarize:
        threshold: 50
    compression:
      enabled: true
    agent:
      max_turns: 90
      gateway_timeout: 1800
      restart_drain_timeout: 60
      api_max_retries: 3
      reasoning_effort: medium
    streaming:
      enabled: false
    platform_toolsets:
      cli:
        - hermes-cli
      telegram:
        - hermes-telegram
    mcp_servers:
      toolhive:
        url: http://vmcp-mcp-gateway-internal.llm:4483/mcp
    auxiliary:
      vision:
        provider: openai
        model: openai/vision
        base_url: http://litellm.llm:4000/v1
        api_key: $${LITELLM_API_KEY}

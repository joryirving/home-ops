---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: hermes
spec:
  chartRef:
    kind: OCIRepository
    name: app-template
  interval: 15m
  dependsOn: []
  values:
    defaultPodOptions:
      securityContext:
        runAsUser: 10000
        runAsGroup: 10000
        fsGroup: 10000
        fsGroupChangePolicy: OnRootMismatch
        seccompProfile: { type: RuntimeDefault }
    controllers:
      hermes:
        annotations:
          reloader.stakater.com/auto: "true"
        initContainers:
          init:
            image:
              repository: docker.io/library/alpine
              tag: "3.23"
            command:
              - sh
              - -c
              - |
                set -euo pipefail
                cp /tmp/config.yaml /opt/data/config.yaml
                chown 10000:10000 /opt/data/config.yaml
        containers:
          app:
            image: &image
              repository: nousresearch/hermes-agent
              tag: v2026.4.30@sha256:900e1f8076662a20a685142321808085cc0b2935bb904b234c6828b4d7fb0f77
            args: ["gateway", "run",]
            env:
              HERMES_HOME: /opt/data
              HOME: /opt/data
              TZ: America/Edmonton
            envFrom:
              - secretRef:
                  name: hermes
            resources:
              requests:
                cpu: 500m
              limits:
                memory: 2Gi
            ports:
              - containerPort: &port 8642
                name: http
                protocol: TCP
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: false
              capabilities:
                add: ["CHOWN"]
                drop: ["ALL"]
          dashboard:
            image: *image
            env:
              TZ: America/Toronto
              GATEWAY_HEALTH_URL: http://localhost:8642
            args:
              - dashboard
              - --host
              - "0.0.0.0"
              - --insecure
            resources:
              requests:
                cpu: 500m
              limits:
                memory: 1Gi
            ports:
              - containerPort: &dashboard_port 9119
                name: http
                protocol: TCP
          codeserver:
            image:
              repository: ghcr.io/coder/code-server
              tag:
                4.117.0@sha256:e6702766518b961c7e3c41095c129c7c9a82b041578c53326c52fa363a057727
            env:
              TZ: America/Edmonton
            args: ["--auth", "none", "--user-data-dir", "/home/node/.vscode", "--extensions-dir",
              "/home/node/.vscode", "--port", "12321", "/config"]
            ports:
              - containerPort: &codeserverPort 12321
                name: codeserver
                protocol: TCP
            resources:
              requests:
                cpu: 10m
              limits:
                memory: 1Gi
    service:
      app:
        controller: hermes
        ports:
          http:
            port: *port
          codeserver:
            port: *codeserverPort
      dashboard:
        controller: hermes
        ports:
          http:
            port: *dashboard_port
    route:
      app:
        hostnames: ["hermes.jory.dev"]
        parentRefs:
          - name: envoy-internal
            namespace: network
        rules:
          - backendRefs:
              - identifier: dashboard
                port: http
      codeserver:
        hostnames: ["hermes-code.jory.dev"]
        parentRefs:
          - name: envoy-internal
            namespace: network
        rules:
          - backendRefs:
              - identifier: app
                port: codeserver
    persistence:
      config:
        existingClaim: "{{ .Release.Name }}"
        globalMounts:
          - path: /opt/data
      configmap:
        type: configMap
        name: "{{ .Release.Name }}-config"
        defaultMode: 0755
        globalMounts:
          - path: /tmp/config.yaml
            subPath: config.yaml

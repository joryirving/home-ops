---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: hermes
spec:
  chartRef:
    kind: OCIRepository
    name: app-template
  interval: 15m
  dependsOn: []
  values:
    defaultPodOptions:
      securityContext:
        fsGroup: 10000
        fsGroupChangePolicy: OnRootMismatch
        seccompProfile: { type: RuntimeDefault }
    controllers:
      hermes:
        annotations:
          reloader.stakater.com/auto: "true"
        initContainers:
          init:
            image:
              repository: docker.io/library/alpine
              tag: "3.24"
            command:
              - sh
              - -c
              - |
                set -euo pipefail
                cp /tmp/config.yaml /opt/data/config.yaml
                chown 10000:10000 /opt/data/config.yaml
                # Install the memini memory-provider plugin from the upstream
                # monorepo (integrations/hermes/plugin/memini), version-guarded:
                # only fetches when the pinned tag differs from what's on the
                # persistent volume, so normal restarts stay offline.
                # `hermes plugins install` can't replace this yet: subdir
                # installs (NousResearch/hermes-agent#42963) are unreleased and
                # installs are unpinned HEAD (NousResearch/hermes-agent#20350).
                # renovate: datasource=github-tags depName=eleboucher/memini
                MEMINI_PLUGIN_VERSION=v0.2.6
                PLUGIN_DIR=/opt/data/plugins/memini
                if [ "$(cat "$PLUGIN_DIR/.version" 2>/dev/null)" != "$MEMINI_PLUGIN_VERSION" ]; then
                  if wget -qO /tmp/memini.tar.gz "https://github.com/eleboucher/memini/archive/refs/tags/$MEMINI_PLUGIN_VERSION.tar.gz"; then
                    SRC="memini-${MEMINI_PLUGIN_VERSION#v}/integrations/hermes/plugin/memini"
                    tar -xzf /tmp/memini.tar.gz -C /tmp "$SRC"
                    rm -rf "$PLUGIN_DIR"
                    mkdir -p /opt/data/plugins
                    mv "/tmp/$SRC" "$PLUGIN_DIR"
                    printf '%s' "$MEMINI_PLUGIN_VERSION" > "$PLUGIN_DIR/.version"
                    chown -R 10000:10000 "$PLUGIN_DIR"
                  else
                    echo "WARN: memini plugin fetch failed; starting with whatever is present"
                  fi
                fi
        containers:
          app:
            image: &image
              repository: nousresearch/hermes-agent
              tag: v2026.6.5@sha256:9ad3b04ec916ea2c2da22358fd43b024c788d74073210695af88bfc2e63869b4
            args: ["gateway", "run", "--no-supervise"]
            env:
              MEMINI_URL: http://memini.llm:8080
              MEMINI_NAMESPACE: sake
              MEMINI_API_KEY:
                valueFrom:
                  secretKeyRef:
                    name: memini
                    key: api-key
              HERMES_HOME: /opt/data
              HOME: /opt/data
              TZ: America/Edmonton
            envFrom:
              - secretRef:
                  name: hermes
            resources:
              requests:
                cpu: 500m
              limits:
                memory: 2Gi
            ports:
              - containerPort: &port 8642
                name: http
                protocol: TCP
          dashboard:
            image: *image
            env:
              TZ: America/Toronto
              GATEWAY_HEALTH_URL: http://localhost:8642
            args:
              - dashboard
              - --host
              - "0.0.0.0"
              - --insecure
            resources:
              requests:
                cpu: 500m
              limits:
                memory: 1Gi
            ports:
              - containerPort: &dashboard_port 9119
                name: http
                protocol: TCP
          codeserver:
            image:
              repository: ghcr.io/coder/code-server
              tag: 4.123.0@sha256:6d46b83ea0687ab1826ec029b6d0e6342bbd55cc5c29b98258463e7faee16d1e
            env:
              TZ: America/Edmonton
            args:
              [
                "--auth",
                "none",
                "--user-data-dir",
                "/home/node/.vscode",
                "--extensions-dir",
                "/home/node/.vscode",
                "--port",
                "12321",
                "/opt/data",
              ]
            ports:
              - containerPort: &codeserverPort 12321
                name: codeserver
                protocol: TCP
            resources:
              requests:
                cpu: 10m
              limits:
                memory: 1Gi
    service:
      app:
        controller: hermes
        ports:
          http:
            port: *port
          codeserver:
            port: *codeserverPort
      dashboard:
        controller: hermes
        ports:
          http:
            port: *dashboard_port
    route:
      app:
        hostnames: ["hermes.jory.dev"]
        parentRefs:
          - name: envoy-internal
            namespace: network
        rules:
          - backendRefs:
              - identifier: dashboard
                port: http
      codeserver:
        hostnames: ["hermes-code.jory.dev"]
        parentRefs:
          - name: envoy-internal
            namespace: network
        rules:
          - backendRefs:
              - identifier: app
                port: codeserver
    persistence:
      config:
        existingClaim: "{{ .Release.Name }}"
        globalMounts:
          - path: /opt/data
      configmap:
        type: configMap
        name: "{{ .Release.Name }}-config"
        defaultMode: 0755
        globalMounts:
          - path: /tmp/config.yaml
            subPath: config.yaml
      gallery:
        type: nfs
        server: voyager.internal
        path: /mnt/daena/comfyui/output
        globalMounts:
          - path: /mnt/gallery

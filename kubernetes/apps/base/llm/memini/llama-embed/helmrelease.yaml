---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: llama-embed
spec:
  chartRef:
    kind: OCIRepository
    name: app-template
  interval: 15m
  dependsOn: []
  values:
    defaultPodOptions:
      hostIPC: true
      nodeSelector:
        topology.kubernetes.io/gpus: amd
      tolerations:
        - key: llm-workload
          operator: Exists
          effect: NoSchedule
    controllers:
      llama-embed:
        annotations:
          reloader.stakater.com/auto: "true"
        initContainers:
          model-download:
            image:
              repository: python
              tag: 3.14-slim
            command:
              - /bin/sh
              - -ec
              - |
                set -eu

                if [ ! -s /models/llama-qwen-embed/Qwen3-Embedding-0.6B-Q8_0.gguf ]; then
                  pip install --no-cache-dir "huggingface_hub[hf_xet]"
                  mkdir -p /models/llama-qwen-embed
                  rm -f /models/llama-qwen-embed/.cache/huggingface/download/*.lock
                  hf download \
                    Qwen/Qwen3-Embedding-0.6B-GGUF \
                    Qwen3-Embedding-0.6B-Q8_0.gguf \
                    --local-dir /models/llama-qwen-embed
                  echo "llama-qwen-embed download complete"
                else
                  echo "llama-qwen-embed already downloaded, skipping"
                fi
            envFrom:
              - secretRef:
                  name: huggingface
            resources:
              requests:
                cpu: 2
                memory: 8Gi
              limits:
                memory: 20Gi
        containers:
          app:
            image:
              repository: docker.io/kyuz0/amd-strix-halo-toolboxes
              tag: rocm-6.4.4@sha256:f6bc6fad7321b2b141a3a617a47f27304750e2a1baa2c09ed83ea1d557499f32
              pullPolicy: Always
            securityContext:
              privileged: true
            command:
              - llama-server
            args:
              - --host
              - 0.0.0.0
              - --port
              - "8080"
              - --alias
              - llama-embed
              - --model
              - /models/llama-qwen-embed/Qwen3-Embedding-0.6B-Q8_0.gguf
              - --embeddings
              - --pooling
              - last
              - --ctx-size
              - "32768"
              - --n-gpu-layers
              - "99"
              - --parallel
              - "2"
              - --cont-batching
              - --batch-size
              - "16384"
              - --ubatch-size
              - "16384"
              - --threads
              - "6"
              - --threads-batch
              - "12"
              - --metrics
              - --no-mmap
            resources:
              requests:
                cpu: 250m
                memory: 2Gi
              limits:
                memory: 4Gi
            probes:
              liveness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /health
                    port: 8080
                  initialDelaySeconds: 30
                  periodSeconds: 30
                  failureThreshold: 6
              readiness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /health
                    port: 8080
                  initialDelaySeconds: 20
                  periodSeconds: 10
                  failureThreshold: 6
              startup:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /health
                    port: 8080
                  failureThreshold: 360
                  periodSeconds: 10
    persistence:
      models:
        existingClaim: llama-embed
        globalMounts:
          - path: /models
      dev-dri:
        type: hostPath
        hostPath: /dev/dri
        globalMounts:
          - path: /dev/dri
      dev-kfd:
        type: hostPath
        hostPath: /dev/kfd
        globalMounts:
          - path: /dev/kfd
    service:
      app:
        ports:
          http:
            port: 8080

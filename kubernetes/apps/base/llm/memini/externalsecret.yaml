---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: &name memini
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword
  target:
    name: *name
    template:
      data:
        MEMINI_API_KEY: "{{ .MEMINI_API_KEY }}"
        MEMINI_EMBED_API_KEY: "{{ .LITELLM_MEMINI_API_KEY }}"
        MEMINI_LLM_API_KEY: "{{ .LITELLM_MEMINI_API_KEY }}"
        MEMINI_RERANK_API_KEY: "{{ .LITELLM_MEMINI_API_KEY }}"
  dataFrom:
    - extract:
        key: litellm
    - extract:
        key: memini
---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: &name memini-api-keys
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword
  target:
    name: *name
    template:
      data:
        api-keys.yaml: |
          keys:
            - name: opencode
              secret: "{{ .OPENCODE_API_KEY }}"
              default_namespace: opencode
            - name: sake
              secret: "{{ .SAKE_API_KEY }}"
              default_namespace: sake
  dataFrom:
    - extract:
        key: memini

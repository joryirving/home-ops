---
apiVersion: inference.llmkube.dev/v1alpha1
kind: Model
metadata:
  name: memini-rerank
spec:
  source: https://huggingface.co/ggml-org/Qwen3-Reranker-0.6B-Q8_0-GGUF/resolve/main/qwen3-reranker-0.6b-q8_0.gguf
  format: gguf
  quantization: Q8_0
  hardware:
    accelerator: rocm
    gpu:
      enabled: true
      vendor: amd
      layers: 99
      resourceClaims:
        - name: gpu
          resourceClaimTemplateName: llama-strix-gpu
---
apiVersion: inference.llmkube.dev/v1alpha1
kind: InferenceService
metadata:
  name: memini-rerank
  labels:
    krr/ignore: "true"
spec:
  modelRef: memini-rerank
  modelCache:
    claimName: llmkube-skirk-cache
  runtime: llamacpp
  image: docker.io/kyuz0/amd-strix-halo-toolboxes:rocm-6.4.4@sha256:3c1f1e7173d348232632629def6b4ee35579435ffdc85ce5be22fd99f2b7f05e
  rolloutPolicy:
    waitForIdle: true
    idleTimeoutSeconds: 86400
  command:
    - llama-server
  replicas: 1
  priority: normal
  nodeSelector:
    topology.kubernetes.io/gpus: amd
  tolerations:
    - key: llm-workload
      operator: Exists
      effect: NoSchedule
  contextSize: 8096
  parallelSlots: 2
  batchSize: 4096
  uBatchSize: 4096
  resources:
    cpu: "500m"
    memory: 4Gi
  extraArgs:
    - --alias
    - memini-rerank
    - --rerank
    - --pooling
    - rank
    - --cache-ram
    - "0"
    - --cont-batching
    - --kv-unified
    - --threads
    - "6"
    - --threads-batch
    - "12"
    - --no-mmap
  endpoint:
    port: 8080
    type: ClusterIP
  probeOverrides:
    startup:
      httpGet:
        path: /health
        port: 8080
      periodSeconds: 10
      failureThreshold: 360
    liveness:
      httpGet:
        path: /health
        port: 8080
      initialDelaySeconds: 30
      periodSeconds: 30
      failureThreshold: 6
    readiness:
      httpGet:
        path: /health
        port: 8080
      initialDelaySeconds: 20
      periodSeconds: 10
      failureThreshold: 6

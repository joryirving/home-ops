---
apiVersion: inference.llmkube.dev/v1alpha1
kind: Model
metadata:
  name: memini-summary
spec:
  source: https://huggingface.co/unsloth/Qwen3.5-4B-GGUF/resolve/main/Qwen3.5-4B-UD-Q4_K_XL.gguf
  format: gguf
  quantization: Q4_K_XL
  hardware:
    accelerator: intel
    gpu:
      enabled: true
      vendor: intel
      layers: 99
      resourceClaims:
        - name: gpu
          resourceClaimTemplateName: memini-gpu
---
apiVersion: inference.llmkube.dev/v1alpha1
kind: InferenceService
metadata:
  name: memini-summary
  labels:
    krr/ignore: "true"
spec:
  modelRef: memini-summary
  runtime: llamacpp
  image: ghcr.io/ggml-org/llama.cpp:server-vulkan@sha256:7909e1cb0c4ad507bf0118344b78db7b33a3e40caf1f48d90ef08352af999e4c
  rolloutPolicy:
    waitForIdle: true
    idleTimeoutSeconds: 86400
  replicas: 3
  priority: normal
  podLabels:
    igpu-workload: "true"
    memini-summary: "true"
  topologySpreadConstraints:
    - maxSkew: 1
      topologyKey: kubernetes.io/hostname
      whenUnsatisfiable: DoNotSchedule
      labelSelector:
        matchLabels:
          memini-summary: "true"
    - maxSkew: 1
      topologyKey: kubernetes.io/hostname
      whenUnsatisfiable: ScheduleAnyway
      labelSelector:
        matchLabels:
          igpu-workload: "true"
  contextSize: 32768
  parallelSlots: 1
  batchSize: 2048
  uBatchSize: 2048
  flashAttention: true
  env:
    - name: ZES_ENABLE_SYSMAN
      value: "1"
    - name: ONEAPI_DEVICE_SELECTOR
      value: level_zero:gpu
    - name: UR_L0_ENABLE_RELAXED_ALLOCATION_LIMITS
      value: "1"
  resources:
    cpu: "500m"
    memory: 10Gi
  extraArgs:
    - --alias
    - qwen3.5-4b
    - --chat-template-kwargs
    - '{"enable_thinking": false}'
    - --cont-batching
    - --cache-ram
    - "0"
    - --threads
    - "6"
    - --threads-batch
    - "12"
    # CephFS-cached weights: avoid mmap cold-faulting on first prefill.
    - --no-mmap
  endpoint:
    port: 8080
    type: ClusterIP
  probeOverrides:
    startup:
      httpGet:
        path: /health
        port: 8080
      periodSeconds: 10
      failureThreshold: 360
    liveness:
      httpGet:
        path: /health
        port: 8080
      initialDelaySeconds: 30
      periodSeconds: 30
      failureThreshold: 6
    readiness:
      httpGet:
        path: /health
        port: 8080
      initialDelaySeconds: 20
      periodSeconds: 10
      failureThreshold: 6

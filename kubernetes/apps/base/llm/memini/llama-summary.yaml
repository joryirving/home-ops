---
apiVersion: inference.llmkube.dev/v1alpha1
kind: Model
metadata:
  name: qwen3.5-4b
spec:
  source: hf://unsloth/Qwen3.5-4B-GGUF
  files:
    - Qwen3.5-4B-UD-Q4_K_XL.gguf
  format: gguf
  quantization: Q4_K_XL
  hardware:
    accelerator: intel
    gpu:
      enabled: true
      vendor: intel
      layers: 99
      resourceClaims:
        - name: gpu
          resourceClaimTemplateName: memini-gpu
---
apiVersion: inference.llmkube.dev/v1alpha1
kind: InferenceService
metadata:
  name: llama-summary
  labels:
    krr/ignore: "true"
spec:
  modelRef: qwen3.5-4b
  runtime: llamacpp
  image: ghcr.io/ggml-org/llama.cpp:server-vulkan@sha256:dba48720a7fead3ae2a2a678e82a8db88bf5120db286cdf48c8461ad2c2d855b
  replicas: 1
  priority: normal
  podLabels:
    igpu-workload: "true"
  topologySpreadConstraints:
    - maxSkew: 1
      topologyKey: kubernetes.io/hostname
      whenUnsatisfiable: ScheduleAnyway
      labelSelector:
        matchLabels:
          igpu-workload: "true"
  contextSize: 32768
  parallelSlots: 2
  batchSize: 2048
  uBatchSize: 2048
  flashAttention: true
  env:
    - name: ZES_ENABLE_SYSMAN
      value: "1"
    - name: ONEAPI_DEVICE_SELECTOR
      value: level_zero:gpu
    - name: UR_L0_ENABLE_RELAXED_ALLOCATION_LIMITS
      value: "1"
  resources:
    cpu: "500m"
    memory: 10Gi
  extraArgs:
    - --alias
    - qwen3.5-4b
    - --chat-template-kwargs
    - '{"enable_thinking": false}'
    - --cont-batching
    - --threads
    - "6"
    - --threads-batch
    - "12"
    # CephFS-cached weights: avoid mmap cold-faulting on first prefill.
    - --no-mmap
  endpoint:
    port: 8080
    type: ClusterIP
  probeOverrides:
    startup:
      httpGet:
        path: /health
        port: 8080
      periodSeconds: 10
      failureThreshold: 360
    liveness:
      httpGet:
        path: /health
        port: 8080
      initialDelaySeconds: 30
      periodSeconds: 30
      failureThreshold: 6
    readiness:
      httpGet:
        path: /health
        port: 8080
      initialDelaySeconds: 20
      periodSeconds: 10
      failureThreshold: 6

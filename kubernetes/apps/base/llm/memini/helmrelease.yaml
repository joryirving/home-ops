---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app memini
spec:
  chartRef:
    kind: OCIRepository
    name: *app
  interval: 15m
  dependsOn: []
  values:
    fullnameOverride: memini
    controllers:
      main:
        containers:
          main:
            env:
              MEMINI_API_KEYS_FILE: /etc/memini/api-keys.yaml
              MEMINI_BACKEND: sqlite
              MEMINI_DEFAULT_NAMESPACE: default
              MEMINI_EMBED_BASE_URL: http://litellm.llm:4000/v1
              MEMINI_EMBED_MODEL: memini-embed # Qwen3-Embedding-0.6B, 1024-dim, 32k ctx
              MEMINI_EMBED_DIMS: "1024"
              MEMINI_EMBED_QUERY_PREFIX: "Instruct: Given a user message, retrieve relevant past memories\nQuery: "
              MEMINI_EMBED_MAX_CONCURRENCY: 2
              MEMINI_RECALL_EMBED_TIMEOUT: 5s
              MEMINI_WRITE_DEDUP_SCORE: "0.80"
              MEMINI_WRITE_DEDUP_ACTION: coalesce
              MEMINI_DEDUP_TIERS: episodic
              MEMINI_DEDUP_SIMILARITY: 0.80
              MEMINI_SHORT_TERM_CAP: 300
              MEMINI_LLM_BASE_URL: http://litellm.llm:4000/v1
              MEMINI_LLM_MODEL: summary
              MEMINI_REEMBED_ON_MODEL_CHANGE: true
              MEMINI_RERANK: http://litellm.llm:4000/v1
              MEMINI_RERANK_MODEL: memini-rerank
              MEMINI_RERANK_MAX_CONCURRENCY: 2
              MEMINI_RERANK_TIMEOUT: 12s
              MEMINI_RERANK_POOL: "8"
            envFrom:
              - secretRef:
                  name: memini
            probes:
              startup:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /healthz
                    port: 8080
                  initialDelaySeconds: 10
                  periodSeconds: 10
                  failureThreshold: 180
            resources:
              requests:
                cpu: 25m
                memory: 128Mi
              limits:
                memory: 512Mi
      fsck:
        enabled: true
        cronjob:
          schedule: "0 5 * * *"
        containers:
          fsck:
            env:
              MEMINI_API_KEY:
                valueFrom:
                  secretKeyRef:
                    name: memini
                    key: MEMINI_API_KEY
    persistence:
      data:
        existingClaim: memini
      api-keys:
        enabled: true
    route:
      ui:
        enabled: true
        hostnames: ["memini.jory.dev"]
        parentRefs:
          - name: envoy-internal
            namespace: network
    serviceMonitor:
      main:
        enabled: true
    grafanaDashboards:
      enabled: true
      folder: llm

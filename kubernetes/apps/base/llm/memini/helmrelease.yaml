---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/source.toolkit.fluxcd.io/ocirepository_v1.json
apiVersion: source.toolkit.fluxcd.io/v1
kind: OCIRepository
metadata:
  name: memini
spec:
  interval: 5m
  layerSelector:
    mediaType: application/vnd.cncf.helm.chart.content.v1.tar+gzip
    operation: copy
  ref:
    tag: v0.2.7
  url: oci://registry.erwanleboucher.dev/eleboucher/charts/memini
---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app memini
spec:
  chartRef:
    kind: OCIRepository
    name: *app
  interval: 15m
  dependsOn: []
  values:
    fullnameOverride: memini
    # image intentionally not set: each released chart pins its own matching
    # image digest, so the OCIRepository tag above is the single version knob
    # (one Renovate PR per release instead of separate chart + image bumps)
    backend: sqlite
    sqlite:
      persistence:
        enabled: true
        # volsync-managed claim (restored via ReplicationDestination dataSourceRef)
        existingClaim: memini
    config:
      defaultNamespace: default
    embeddings:
      baseURL: http://llama-embed.llm:8080/v1
      model: sentence-transformers/all-MiniLM-L6-v2
      # all-MiniLM-L6-v2 is 384-dim; the chart default (1536) silently breaks vector search
      dims: 384
    llm:
      baseURL: http://litellm.llm:4000
      model: review
      apiKeySecret:
        name: memini
        key: llm-api-key
    rerank:
      mode: http://llama-rerank.llm:8080/v1
      model: qwen3-reranker
    httpRoute:
      enabled: true
      hostnames: ["memini.jory.dev"]
      parentRefs:
        - name: envoy-internal
          namespace: network
    metrics:
      serviceMonitor:
        enabled: true
    grafanaDashboards:
      enabled: true
      folder: llm
    fsck:
      cronjob:
        enabled: true
        # daily integrity sweep; the in-process sweeper already handles decay
        schedule: "0 5 * * *"
    resources:
      requests:
        cpu: 25m
        memory: 128Mi
      limits:
        memory: 512Mi

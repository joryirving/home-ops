---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/source.toolkit.fluxcd.io/ocirepository_v1.json
apiVersion: source.toolkit.fluxcd.io/v1
kind: OCIRepository
metadata:
  name: memini
spec:
  interval: 5m
  layerSelector:
    mediaType: application/vnd.cncf.helm.chart.content.v1.tar+gzip
    operation: copy
  ref:
    tag: v0.3.9
  url: oci://registry.erwanleboucher.dev/eleboucher/charts/memini
---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app memini
spec:
  chartRef:
    kind: OCIRepository
    name: *app
  interval: 15m
  dependsOn: []
  values:
    fullnameOverride: memini
    controllers:
      main:
        containers:
          main:
            env:
              MEMINI_BACKEND: "sqlite"
              MEMINI_DEFAULT_NAMESPACE: "default"
              MEMINI_EMBED_BASE_URL: "http://llama-embed.llm:8080/v1"
              MEMINI_EMBED_MODEL: "llama-embed" # Qwen3-Embedding-0.6B, 1024-dim, 32k ctx
              MEMINI_EMBED_DIMS: "1024"
              MEMINI_LLM_BASE_URL: "http://litellm.llm:4000"
              MEMINI_LLM_MODEL: "self-hosted"
              MEMINI_LLM_API_KEY:
                valueFrom:
                  secretKeyRef:
                    name: memini
                    key: llm-api-key
              MEMINI_RERANK: "http://llama-rerank.llm:8080/v1"
              MEMINI_RERANK_MODEL: "qwen3-reranker"
              MEMINI_RERANK_TOP_N: "10" # lighter rerank so it can finish within the consumer recall budget; default 20
              MEMINI_RERANK_TIMEOUT: "3s" # MUST stay under consumers' timeout_ms (5s) — else slow reranks overrun it and the caller cancels (context canceled = no recall). Best-effort: reranks when the iGPU is free, fast composite fallback otherwise.
              MEMINI_API_KEY:
                valueFrom:
                  secretKeyRef:
                    name: memini
                    key: api-key
            resources:
              requests:
                cpu: 25m
                memory: 128Mi
              limits:
                memory: 512Mi
      fsck:
        enabled: true
        cronjob:
          schedule: "0 5 * * *"
        containers:
          fsck:
            env:
              MEMINI_API_KEY:
                valueFrom:
                  secretKeyRef:
                    name: memini
                    key: api-key
    persistence:
      data:
        existingClaim: memini
    route:
      main:
        parentRefs:
          - name: envoy-external
            namespace: network
            sectionName: https
        hostnames:
          - memini.jory.dev
        rules:
          - matches:
              - path:
                  type: PathPrefix
                  value: /v1
              - path:
                  type: PathPrefix
                  value: /mcp
              - path:
                  type: PathPrefix
                  value: /.well-known/
            backendRefs:
              - identifier: main
                port: http
      # Split-horizon: same host, internal gateway serves the UI (catch-all) on-LAN.
      internal:
        annotations:
          gatus.home-operations.com/enabled: "false"
        parentRefs:
          - name: envoy-internal
            namespace: network
            sectionName: https
        hostnames:
          - memini.jory.dev
        rules:
          - backendRefs:
              - identifier: main
                port: http
    serviceMonitor:
      main:
        enabled: true
    grafanaDashboards:
      enabled: true
      folder: llm

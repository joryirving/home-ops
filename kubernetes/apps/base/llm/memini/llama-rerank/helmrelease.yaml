---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: llama-rerank
spec:
  chartRef:
    kind: OCIRepository
    name: app-template
  interval: 15m
  dependsOn: []
  values:
    defaultPodOptions:
      hostIPC: true
      nodeSelector:
        topology.kubernetes.io/gpus: amd
      tolerations:
        - key: llm-workload
          operator: Exists
          effect: NoSchedule
    controllers:
      llama-rerank:
        annotations:
          reloader.stakater.com/auto: "true"
        initContainers:
          model-download:
            image:
              repository: python
              tag: 3.14-slim
            command:
              - /bin/sh
              - -ec
              - |
                set -euo pipefail

                if [ ! -s /models/Qwen3-Reranker-0.6B/qwen3-reranker-0.6b-q8_0.gguf ]; then
                  pip install --no-cache-dir "huggingface_hub[hf_xet]"
                  mkdir -p /models/Qwen3-Reranker-0.6B
                  rm -rf /models/Qwen3-Reranker-0.6B/.cache/huggingface/download/qwen3-reranker-0.6b-q8_0.ggufflock
                  hf download \
                    ggml-org/Qwen3-Reranker-0.6B-Q8_0-GGUF \
                    qwen3-reranker-0.6b-q8_0.gguf \
                    --local-dir /models/Qwen3-Reranker-0.6B
                  echo "Qwen3-Reranker-0.6B download complete"
                else
                  echo "Qwen3-Reranker-0.6B already downloaded, skipping"
                fi
            envFrom:
              - secretRef:
                  name: huggingface
            resources:
              requests:
                cpu: 250m
                memory: 512Mi
              limits:
                memory: 4Gi
        containers:
          app:
            image:
              repository: docker.io/kyuz0/amd-strix-halo-toolboxes
              tag: rocm-6.4.4@sha256:2ce313f3d3f853889042e837877ef65868494181064f33ca39db2b5f637fed28
              pullPolicy: Always
            securityContext:
              privileged: true
            command:
              - llama-server
            args:
              - --host
              - 0.0.0.0
              - --port
              - "8080"
              - --alias
              - qwen3-reranker
              - --model
              - /models/Qwen3-Reranker-0.6B/qwen3-reranker-0.6b-q8_0.gguf
              - --rerank
              - --pooling
              - rank
              - --ctx-size
              - "8192"
              - --n-gpu-layers
              - "99"
              - --parallel
              - "4"
              - --cont-batching
              - --batch-size
              - "4096"
              - --ubatch-size
              - "4096"
              - --threads
              - "6"
              - --threads-batch
              - "12"
              - --metrics
              - --no-mmap
            resources:
              requests:
                cpu: 250m
                memory: 2Gi
              limits:
                memory: 4Gi
            probes:
              liveness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /health
                    port: 8080
                  initialDelaySeconds: 30
                  periodSeconds: 30
                  failureThreshold: 6
              readiness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /health
                    port: 8080
                  initialDelaySeconds: 20
                  periodSeconds: 10
                  failureThreshold: 6
              startup:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /health
                    port: 8080
                  failureThreshold: 360
                  periodSeconds: 10
    persistence:
      models:
        existingClaim: llama-rerank
        globalMounts:
          - path: /models
      dev-dri:
        type: hostPath
        hostPath: /dev/dri
        globalMounts:
          - path: /dev/dri
      dev-kfd:
        type: hostPath
        hostPath: /dev/kfd
        globalMounts:
          - path: /dev/kfd
    service:
      app:
        ports:
          http:
            port: 8080

---
apiVersion: v1
kind: Service
metadata:
  name: mcp-minimax-coding-plan
  namespace: llm
spec:
  type: ClusterIP
  ports:
    - port: 8000
      targetPort: 8000
      protocol: TCP
  selector:
    app: mcp-minimax-coding-plan
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mcp-minimax-coding-plan
  namespace: llm
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mcp-minimax-coding-plan
  template:
    metadata:
      labels:
        app: mcp-minimax-coding-plan
    spec:
      containers:
        - name: mcp
          image: ghcr.io/joryirving/mcp-minimax-coding-plan:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8000
          env:
            - name: MINIMAX_API_KEY
              valueFrom:
                secretKeyRef:
                  name: openclaw
                  key: MINIMAX_API_KEY
                  optional: false
            - name: MINIMAX_API_HOST
              value: "https://api.minimax.io"
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10

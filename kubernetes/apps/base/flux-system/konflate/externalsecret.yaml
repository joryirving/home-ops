# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: konflate
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword
  target:
    name: konflate
    template:
      data:
        KONFLATE_WEBHOOK_SECRET: "{{ .KONFLATE_WEBHOOK_SECRET }}"
        KONFLATE_APP_CLIENT_ID: "{{ .BOT_CLIENT_ID }}"
        KONFLATE_APP_PRIVATE_KEY: "{{ .BOT_APP_PRIVATE_KEY }}"
  dataFrom:
    - extract:
        key: konflate
    - extract:
        key: github-bot

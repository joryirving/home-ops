---
# yaml-language-server: $schema=https://json.schemastore.org/kustomization
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ../../../../base/network/envoy-gateway/config
patches:
  - target:
      group: gateway.networking.k8s.io
      kind: Gateway
      name: envoy-external
      version: v1
    patch: |-
      - op: remove
        path: /spec/infrastructure/annotations/external-dns.alpha.kubernetes.io~1hostname

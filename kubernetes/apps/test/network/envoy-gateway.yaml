# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: envoy-gateway
spec:
  interval: 1h
  path: ./kubernetes/apps/base/network/envoy-gateway/app
  targetNamespace: network
  wait: false
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: envoy-config
spec:
  dependsOn:
    - name: certificates-import
    - name: envoy-gateway
    - name: towonel-tunnel
  interval: 1h
  path: ./kubernetes/apps/base/network/envoy-gateway/config
  postBuild:
    substitute:
      EXTERNAL_DOMAIN: ${CLUSTER}-external
      INTERNAL_DOMAIN: ${CLUSTER}-internal
      SVC_GATEWAY_EXTERNAL: 10.69.10.232
      SVC_GATEWAY_INTERNAL: 10.69.10.231
  wait: false
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system

---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: towonel-edge-dns
spec:
  dependsOn:
    - name: cloudflare-dns
    - name: towonel-agent-config
  interval: 1h
  path: ./kubernetes/apps/base/network/towonel-edge-dns
  postBuild:
    substituteFrom:
      - kind: Secret
        name: towonel-agent-config
        optional: false
  wait: false
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/externaldns.k8s.io/dnsendpoint_v1alpha1.json
apiVersion: externaldns.k8s.io/v1alpha1
kind: DNSEndpoint
metadata:
  name: towonel-edge-external
spec:
  endpoints:
    - dnsName: ${CLUSTER}-external.jory.dev
      recordType: CNAME
      targets: ["towonel.jory.dev"]
      providerSpecific:
        - name: external-dns.alpha.kubernetes.io/cloudflare-proxied
          value: "false"

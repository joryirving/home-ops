---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: &app llmkube
spec:
  interval: 1h
  path: ./kubernetes/apps/base/llm/llmkube
  postBuild:
    substitute:
      APP: *app
      CLUSTER: ${CLUSTER}
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  wait: true
---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: &app llmkube-models
spec:
  dependsOn:
    - name: llmkube
  interval: 1h
  path: ./kubernetes/apps/base/llm/llmkube/models
  postBuild:
    substitute:
      APP: *app
      CLUSTER: ${CLUSTER}
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  wait: false
---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: stage-qwen3-6-27b
spec:
  dependsOn:
    - name: llmkube-models
  interval: 1h
  path: ./kubernetes/apps/base/llm/llmkube/stage
  postBuild:
    substitute:
      MODEL_SLUG: qwen3-6-27b
      MODEL_REPO: unsloth/Qwen3.6-27B-MTP-GGUF
      MODEL_FILES: Qwen3.6-27B-UD-Q4_K_XL.gguf mmproj-F16.gguf
      MODEL_DIR: qwen3.6-27b
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  wait: false
---

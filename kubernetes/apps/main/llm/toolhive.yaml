# yaml-language-server: $schema=https://kube-schemas.pages.dev/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: &name toolhive-crds
spec:
  interval: 1h
  path: ./kubernetes/apps/base/llm/toolhive/crds
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  wait: false
---
# yaml-language-server: $schema=https://kube-schemas.pages.dev/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: &name toolhive
spec:
  dependsOn:
  - name: toolhive-crds
  interval: 1h
  path: ./kubernetes/apps/base/llm/toolhive/app
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  wait: false
---
# yaml-language-server: $schema=https://kube-schemas.pages.dev/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: &name toolhive-config
spec:
  components:
  - ../../../../../components/dragonfly
  dependsOn:
  - name: toolhive
  healthCheckExprs:
  - apiVersion: dragonflydb.io/v1alpha1
    kind: Dragonfly
    failed: status.phase != 'ready'
    current: status.phase == 'ready'
  interval: 1h
  path: ./kubernetes/apps/base/llm/toolhive/config
  postBuild:
    substitute:
      APP: *name
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  wait: false
---
# yaml-language-server: $schema=https://kube-schemas.pages.dev/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1

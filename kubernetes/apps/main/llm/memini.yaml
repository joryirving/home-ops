---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: &app memini
spec:
  components:
    - ../../../../components/kopiur/backup
    - ../../../../components/gpu
  dependsOn:
    - name: llmkube
  interval: 1h
  path: ./kubernetes/apps/base/llm/memini
  postBuild:
    substitute:
      APP: *app
      KOPIUR_HOSTNAME: llm
      CLUSTER: ${CLUSTER}
      KOPIUR_CAPACITY: 10Gi
  wait: false
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system

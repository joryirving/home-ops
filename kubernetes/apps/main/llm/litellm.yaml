    substitute:
      APP: *app
      CLUSTER: ${CLUSTER}
  wait: false
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: llm-models #llm-models-skirk
  annotations:
    kustomize.toolkit.fluxcd.io/prune: disabled
    helm.sh/resource-policy: keep
spec:
  accessModes: ["ReadWriteOnce"]
  resources:
    requests:
      storage: 500Gi
  storageClassName: local-hostpath

---
# yaml-language-server: $schema=https://kube-schemas.pages.dev/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: litellm
spec:
  components:
  - ../../../../../components/volsync
  dependsOn:
    - name: llama-memory
    - name: llama-server
    - name: llama-vision
  interval: 1h
  path: ./kubernetes/apps/base/llm/litellm
  postBuild:
    substitute:
      APP: litellm
      VOLSYNC_CAPACITY: 1Gi
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  wait: false
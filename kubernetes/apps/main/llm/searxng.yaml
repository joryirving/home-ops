# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: &app searxng
spec:
  components:
    - ../../../../../components/dragonfly
  healthCheckExprs:
    - apiVersion: dragonflydb.io/v1alpha1
      kind: Dragonfly
      failed: status.phase != 'ready'
      current: status.phase == 'ready'
  interval: 1h
  path: ./kubernetes/apps/base/llm/searxng/app
  postBuild:
    substitute:
      APP: *app
    # Injects ${BRAVE_API_KEY} into the settings.yml inlined in the
    # searxng-configmap ConfigMap. The Secret is populated by externalsecret-brave.yaml.
    substituteFrom:
      - kind: Secret
        name: searxng-brave
        optional: true
  wait: false
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: &app mcp-searxng
spec:
  interval: 1h
  path: ./kubernetes/apps/base/llm/searxng/mcp
  postBuild:
    substitute:
      APP: *app
  wait: false
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system

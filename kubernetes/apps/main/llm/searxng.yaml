# yaml-language-server: $schema=https://kube-schemas.pages.dev/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: &app searxng
spec:
  components:
  - ../../../../../components/dragonfly
  healthCheckExprs:
  - apiVersion: dragonflydb.io/v1alpha1
    kind: Dragonfly
    failed: status.phase != 'ready'
    current: status.phase == 'ready'
  interval: 1h
  path: ./kubernetes/apps/base/llm/searxng/app
  postBuild:
    substitute:
      APP: *app
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  wait: false
---
# yaml-language-server: $schema=https://kube-schemas.pages.dev/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: &app mcp-searxng
spec:
  interval: 1h
  path: ./kubernetes/apps/base/llm/searxng/mcp
  postBuild:
    substitute:
      APP: *app
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  wait: false

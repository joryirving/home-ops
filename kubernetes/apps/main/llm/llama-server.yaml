---
# yaml-language-server: $schema=https://kube-schemas.pages.dev/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: &app llama-server
spec:
  healthCheckExprs:
    - apiVersion: apps/v1
      kind: Deployment
      failed: status.readyReplicas == 0
      current: status.readyReplicas >= 1
  interval: 1h
  path: ./kubernetes/apps/base/llm/llama-server
  postBuild:
    substitute:
      APP: *app
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  wait: false

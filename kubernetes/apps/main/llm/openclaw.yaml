# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: &app openclaw
spec:
  components:
    - ../../../../../components/kopiur/backup
  interval: 1h
  path: ./kubernetes/apps/base/llm/openclaw/app
  postBuild:
    substitute:
      APP: *app
      CLUSTER: ${CLUSTER}
      KOPIUR_CAPACITY: 50Gi
  wait: false
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: &app extended-memory
spec:
  components:
    - ../../../../../components/kopiur/backup
  interval: 1h
  path: ./kubernetes/apps/base/llm/openclaw/extended-memory
  postBuild:
    substitute:
      APP: *app
      CLUSTER: ${CLUSTER}
  wait: false
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: &app miso-chat
spec:
  components:
    - ../../../../../components/dragonfly
  healthCheckExprs:
    - apiVersion: dragonflydb.io/v1alpha1
      kind: Dragonfly
      failed: status.phase != 'ready'
      current: status.phase == 'ready'
  interval: 1h
  path: ./kubernetes/apps/base/llm/openclaw/miso-chat
  postBuild:
    substitute:
      APP: *app
  wait: false
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system

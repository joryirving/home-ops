---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/source.toolkit.fluxcd.io/gitrepository_v1.json
apiVersion: source.toolkit.fluxcd.io/v1
kind: GitRepository
metadata:
  name: fenrir
spec:
  interval: 1h
  ref:
    commit: 9501ab4a58c31575cdc5e6c7b6d87d0124352c47
  url: https://github.com/shrinedogg/fenrir
---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: fenrir-crds
spec:
  force: true
  interval: 1h
  path: ./crds
  prune: true
  sourceRef:
    kind: GitRepository
    name: fenrir
  wait: true
---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: &app games-on-whales
spec:
  dependsOn:
    - name: fenrir-crds
  interval: 1h
  path: ./kubernetes/apps/base/games/games-on-whales
  postBuild:
    substitute:
      APP: *app
  wait: false
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system

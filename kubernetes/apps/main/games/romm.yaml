---
# yaml-language-server: $schema=https://kube-schemas.pages.dev/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: &app romm
spec:
  components:
  - ../../../../components/dragonfly
  - ../../../../components/postgres
  - ../../../../components/postgres-cnpg
  - ../../../../components/volsync
  healthCheckExprs:
  - apiVersion: postgres-operator.crunchydata.com/v1beta1
    kind: PostgresCluster
    failed: status.conditions.filter(e, e.type == 'ProxyAvailable').all(e, e.status == 'False')
    current: status.conditions.filter(e, e.type == 'ProxyAvailable').all(e, e.status == 'True')
  - apiVersion: postgresql.cnpg.io/v1
    kind: Cluster
    failed: status.conditions.filter(e, e.type == 'Ready').all(e, e.status == 'False')
    current: status.conditions.filter(e, e.type == 'Ready').all(e, e.status == 'True')
  interval: 1h
  path: ./kubernetes/apps/base/games/romm
  postBuild:
    substitute:
      APP: *app
      VOLSYNC_CAPACITY: 25Gi
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  wait: false

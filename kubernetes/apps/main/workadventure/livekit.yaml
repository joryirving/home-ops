---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: &app livekit
spec:
  interval: 1h
  path: ./kubernetes/apps/base/workadventure/livekit
  postBuild:
    substitute:
      APP: *app
      CLUSTER: ${CLUSTER}
  wait: false
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system

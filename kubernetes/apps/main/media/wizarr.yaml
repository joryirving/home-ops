---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: &app wizarr
spec:
  components:
    - ../../../../components/kopiur/backup
  dependsOn:
    - name: plex
    - name: seerr
  interval: 1h
  path: ./kubernetes/apps/base/media/wizarr
  postBuild:
    substitute:
      APP: *app
  wait: false
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system

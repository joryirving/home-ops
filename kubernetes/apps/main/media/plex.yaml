# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: plex-auto-languages
spec:
  dependsOn:
    - name: plex
  interval: 1h
  path: ./kubernetes/apps/base/media/plex/plex-auto-languages
  wait: false
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: &app imagemaid
spec:
  dependsOn:
    - name: plex
  interval: 1h
  path: ./kubernetes/apps/base/media/plex/imagemaid
  postBuild:
    substitute:
      APP: *app
  wait: false
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: &app plex-trakt-sync
spec:
  components:
    - ../../../../../components/kopiur/backup
  dependsOn:
    - name: plex
  interval: 1h
  path: ./kubernetes/apps/base/media/plex/plex-trakt-sync
  postBuild:
    substitute:
      APP: *app
      KOPIUR_HOSTNAME: media
      KOPIUR_CAPACITY: 500Mi
  wait: false
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system

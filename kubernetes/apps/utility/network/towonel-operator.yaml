---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: towonel-operator
spec:
  interval: 1h
  path: ./kubernetes/apps/base/network/towonel-operator/app
  wait: true
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: towonel-tunnel
spec:
  dependsOn:
    - name: envoy-config
    - name: towonel-operator
  interval: 1h
  path: ./kubernetes/apps/base/network/towonel-operator/config
  postBuild:
    substitute:
      EXTERNAL_DOMAIN: ${CLUSTER}-external
  wait: false
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system

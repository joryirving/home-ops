apiVersion: v1
kind: ServiceAccount
metadata:
  name: openclaw-viewer
  namespace: kube-tools
automountServiceAccountToken: true
---
# yaml-language-server: $schema=https://kubernetes.io/docs/reference/generated/kubernetes-api/v1.31/#secret-v1-core
apiVersion: v1
kind: Secret
metadata:
  name: openclaw-viewer-token
  namespace: kube-tools
  annotations:
    kubernetes.io/service-account.name: openclaw-viewer
type: kubernetes.io/service-account-token
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: openclaw-cluster-viewer
rules:
- apiGroups: [""]
  resources: ["pods", "pods/log", "pods/exec", "pods/portforward", "configmaps", "services",
    "persistentvolumes", "persistentvolumeclaims", "nodes", "namespaces", "events",
    "endpoints"]
  verbs: ["get", "list", "watch"]
- apiGroups: ["apps"]
  resources: ["deployments", "statefulsets", "daemonsets", "replicasets"]
  verbs: ["get", "list", "watch"]
- apiGroups: ["batch"]
  resources: ["jobs", "cronjobs"]
  verbs: ["get", "list", "watch"]
- apiGroups: ["networking.k8s.io"]
  resources: ["ingresses", "networkpolicies"]
  verbs: ["get", "list", "watch"]
- apiGroups: ["apiextensions.k8s.io"]
  resources: ["customresourcedefinitions"]
  verbs: ["get", "list", "watch"]

- apiGroups: ["helm.toolkit.fluxcd.io"]
  resources: ["helmreleases"]
  verbs: ["get", "list", "watch"]
- apiGroups: ["kustomize.toolkit.fluxcd.io"]
  resources: ["kustomizations"]
  verbs: ["get", "list", "watch"]
- apiGroups: ["source.toolkit.fluxcd.io"]
  resources: ["gitrepositories", "helmrepositories", "ocirepositories", "buckets"]
  verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: openclaw-cluster-viewer-binding
subjects:
- kind: ServiceAccount
  name: openclaw-viewer
  namespace: kube-tools
roleRef:
  kind: ClusterRole
  name: openclaw-cluster-viewer
  apiGroup: rbac.authorization.k8s.io

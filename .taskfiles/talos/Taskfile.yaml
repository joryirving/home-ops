---
# yaml-language-server: $schema=https://taskfile.dev/schema.json
version: "3"

vars:
  TALOS_MACHINE_FILE: "{{.TALOS_DIR}}/machineconfig.yaml.j2"

tasks:
  apply-node:
    desc: Apply Talos config to a node [CLUSTER=main] [NODE=required] [MODE=auto]
    cmds:
      # - task: verify-machine-ca
      #   vars:
      #     CLUSTER: '{{.CLUSTER}}'
      #     MACHINE_TYPE: '{{.MACHINE_TYPE}}'
      #     NODE: '{{.NODE}}'
      #     SCHEMATIC: '{{.SCHEMATIC}}'
      - |-
        minijinja-cli {{.TALOS_DIR}}/machineconfig.yaml.j2 | op inject \
          | talosctl --nodes {{.NODE}} apply-config \
            --mode {{.MODE}} \
            {{if .TYPE_PATCH}}--config-patch @{{.TYPE_PATCH}}{{end}} \
            --config-patch @{{.TALOS_DIR}}/{{.MACHINE_TYPE}}/{{.NODE}}.yaml \
            {{if eq .EGPU_EFFECTIVE "true"}}--config-patch @{{.GPU_PATCH}}{{end}} \
            --file /dev/stdin {{if .INSECURE}}--insecure{{end}} \
            --talosconfig {{.TALOS_DIR}}/talosconfig
    vars:
      EGPU_OVERRIDE: '{{.EGPU | default ""}}'
      EGPU_EFFECTIVE:
        sh: |-
          if [ -n "{{.EGPU_OVERRIDE}}" ]; then
            echo "{{.EGPU_OVERRIDE}}"
            exit 0
          fi
          node_file="$(find "${TALOS_DIR}" -name "${NODE}.yaml" -print -quit)"
          yq --exit-status '.machine.nodeLabels."topology.kubernetes.io" == "egpu"' "$node_file" >/dev/null 2>&1 \
            && echo true || echo false
      GPU_PATCH:
        sh: dirname "$(find "${TALOS_DIR}" -name "${NODE}.yaml" -exec dirname {} \;)/${NODE}.yaml" | xargs -I{} echo "{}/eGPU.yaml"
      MODE: '{{.MODE | default "auto"}}'
      MACHINE_TYPE:
        sh: |-
          talosctl --talosconfig "${TALOS_DIR}/talosconfig" --nodes "${NODE}" get machinetypes --output=jsonpath='{.spec}' 2>/dev/null \
            || basename "$(find "${TALOS_DIR}" -name "${NODE}.yaml" -exec dirname {} \;)"
      TYPE_PATCH:
        sh: |-
          f="{{.TALOS_DIR}}/{{.MACHINE_TYPE}}/{{.MACHINE_TYPE}}.yaml"
          test -f "$f" && echo "$f" || echo ""
      INSECURE:
        sh: |-
          if talosctl --talosconfig {{.TALOS_DIR}}/talosconfig --nodes {{.NODE}} get machineconfig &> /dev/null; then
            exit 0
          fi
          talosctl --nodes {{.NODE}} version --insecure &> /dev/null && echo true
      SCHEMATIC:
        sh: task --silent talos:generate-schematic CLUSTER={{.CLUSTER}} NODE={{.NODE}} EGPU={{.EGPU_EFFECTIVE}}
    env:
      MACHINE_TYPE: "{{.MACHINE_TYPE}}"
      SCHEMATIC: "{{.SCHEMATIC}}"
    requires:
      vars: [CLUSTER, NODE]
    preconditions:
      - op account get
      - talosctl config info --talosconfig {{.TALOS_DIR}}/talosconfig
      - test -f {{.TALOS_DIR}}/machineconfig.yaml.j2
      - test -f {{.TALOS_DIR}}/{{.MACHINE_TYPE}}/{{.NODE}}.yaml
      - '{{if eq .EGPU_EFFECTIVE "true"}}test -f {{.GPU_PATCH}}{{else}}true{{end}}'
      - which curl jq minijinja-cli op talosctl yq

  verify-machine-ca:
    desc: Verify rendered node config uses the live cluster machine CA [CLUSTER=main] [NODE=required]
    cmd: |-
      rendered_ca="$(
        MACHINE_TYPE={{.MACHINE_TYPE}} SCHEMATIC={{.SCHEMATIC}} minijinja-cli {{.TALOS_DIR}}/machineconfig.yaml.j2 \
          | op inject \
          | yq --exit-status --no-doc '.machine.ca.crt'
      )"
      live_ca="$(
        talosctl --talosconfig {{.TALOS_DIR}}/talosconfig --nodes {{.CONTROL_PLANE}} get machineconfig --output yaml \
          | yq --exit-status --no-doc '.spec | from_yaml | .machine.ca.crt'
      )"
      if [ "$rendered_ca" != "$live_ca" ]; then
        echo "Rendered {{.CLUSTER}}/{{.NODE}} machine CA does not match live control plane {{.CONTROL_PLANE}}" >&2
        exit 1
      fi
    vars:
      CONTROL_PLANE:
        sh: talosctl --talosconfig {{.TALOS_DIR}}/talosconfig config info --output json | jq --raw-output '.endpoints[0]'
      EGPU_OVERRIDE: '{{.EGPU | default ""}}'
      EGPU_EFFECTIVE:
        sh: |-
          if [ -n "{{.EGPU_OVERRIDE}}" ]; then
            echo "{{.EGPU_OVERRIDE}}"
            exit 0
          fi
          node_file="$(find "${TALOS_DIR}" -name "${NODE}.yaml" -print -quit)"
          yq --exit-status '.machine.nodeLabels."topology.kubernetes.io" == "egpu"' "$node_file" >/dev/null 2>&1 \
            && echo true || echo false
      MACHINE_TYPE:
        sh: |-
          talosctl --talosconfig "${TALOS_DIR}/talosconfig" --nodes "${NODE}" get machinetypes --output=jsonpath='{.spec}' 2>/dev/null \
            || basename "$(find "${TALOS_DIR}" -name "${NODE}.yaml" -exec dirname {} \;)"
      SCHEMATIC:
        sh: task --silent talos:generate-schematic CLUSTER={{.CLUSTER}} NODE={{.NODE}} EGPU={{.EGPU_EFFECTIVE}}
    requires:
      vars: [CLUSTER, NODE]
    preconditions:
      - op account get
      - test -f {{.TALOS_DIR}}/machineconfig.yaml.j2
      - test -f {{.TALOS_DIR}}/{{.MACHINE_TYPE}}/{{.NODE}}.yaml
      - which jq minijinja-cli op talosctl yq

  apply-cluster: ## This isn't working on utility cluster
    desc: Apply the Talos config on all nodes for an existing cluster [CLUSTER=main]
    vars:
      NODES:
        sh: kubectl get nodes --output=jsonpath='{.items[*].metadata.name}' --context {{.CLUSTER}}
    cmds:
      - for: { var: NODES }
        task: apply-node
        vars:
          NODE: "{{.ITEM}}"
          CLUSTER: "{{.CLUSTER}}"
    requires:
      vars: [CLUSTER]
    preconditions:
      - talosctl config info --talosconfig {{.TALOS_DIR}}/talosconfig
      - test -f {{.TALOS_DIR}}/talosconfig

  rotate-talosconfig:
    desc: Regenerate and validate the local talosconfig from 1Password secrets [CLUSTER=main] [APPLY=false]
    cmd: |-
      tmp_dir="$(mktemp -d)"
      trap 'rm -rf "$tmp_dir"' EXIT

      node="{{.NODE}}"
      endpoint="{{.ENDPOINT}}"
      if [ -z "$node" ]; then
        node="$(talosctl --talosconfig {{.TALOS_DIR}}/talosconfig config info --output json | jq --raw-output '.nodes[0] // .endpoints[0]')"
      fi
      if [ -z "$endpoint" ]; then
        endpoint="$(talosctl --talosconfig {{.TALOS_DIR}}/talosconfig config info --output json | jq --raw-output '.endpoints[0] // .nodes[0]')"
      fi
      if [ -z "$node" ] || [ "$node" = "null" ] || [ -z "$endpoint" ] || [ "$endpoint" = "null" ]; then
        echo "Unable to determine node/endpoint; pass NODE=<node> ENDPOINT=<endpoint>" >&2
        exit 1
      fi

      env MACHINE_TYPE=controlplane SCHEMATIC="" minijinja-cli {{.TALOS_DIR}}/machineconfig.yaml.j2 \
        | op inject > "$tmp_dir/controlplane.yaml"
      talosctl gen secrets \
        --from-controlplane-config "$tmp_dir/controlplane.yaml" \
        --output-file "$tmp_dir/secrets.yaml" \
        --force
      talosctl gen config {{.CLUSTER}} {{.K8S_ENDPOINT}} \
        --with-secrets "$tmp_dir/secrets.yaml" \
        --output-types talosconfig \
        --output "$tmp_dir/talosconfig" \
        --force
      talosctl --talosconfig "$tmp_dir/talosconfig" config endpoint "$endpoint"
      talosctl --talosconfig "$tmp_dir/talosconfig" config node "$node"
      talosctl --talosconfig "$tmp_dir/talosconfig" --nodes "$node" get machinetypes

      if [ "{{.APPLY}}" = "true" ]; then
        backup="{{.TALOS_DIR}}/talosconfig.$(date +%Y%m%d%H%M%S).bak"
        cp {{.TALOS_DIR}}/talosconfig "$backup"
        cp "$tmp_dir/talosconfig" {{.TALOS_DIR}}/talosconfig
        echo "Rotated {{.TALOS_DIR}}/talosconfig; backup: $backup"
      else
        echo "Validated regenerated talosconfig for {{.CLUSTER}} against $node. Re-run with APPLY=true to replace {{.TALOS_DIR}}/talosconfig."
      fi
    vars:
      APPLY: '{{.APPLY | default "false"}}'
      ENDPOINT: '{{.ENDPOINT | default ""}}'
      K8S_ENDPOINT: '{{.K8S_ENDPOINT | default (printf "https://k8s.%s.internal:6443" .CLUSTER)}}'
      NODE: '{{.NODE | default ""}}'
    requires:
      vars: [CLUSTER]
    preconditions:
      - op account get
      - test -f {{.TALOS_DIR}}/machineconfig.yaml.j2
      - test -f {{.TALOS_DIR}}/talosconfig
      - which jq minijinja-cli op talosctl

  upgrade-node:
    desc: Upgrade Talos on a single node [CLUSTER=main] [NODE=required] [FORCE_UPGRADE=false]
    cmds:
      - talosctl --talosconfig {{.TALOS_DIR}}/talosconfig --nodes {{.NODE}} upgrade --image={{.TALOS_IMAGE}} --timeout=10m {{if eq .FORCE_UPGRADE "true"}}--drain=false --wait=false{{end}}
    vars:
      FORCE_UPGRADE: '{{.FORCE_UPGRADE | default "false"}}'
      TALOS_IMAGE:
        sh: |-
          talosctl --talosconfig {{.TALOS_DIR}}/talosconfig --nodes {{.NODE}} get machineconfig --output=jsonpath='{.spec}' \
            | yq eval-all --exit-status --no-doc '[select(.machine.install.image != null) | .machine.install.image] | .[0]'
    requires:
      vars: [CLUSTER, NODE]
    preconditions:
      - talosctl --talosconfig {{.TALOS_DIR}}/talosconfig config info
      - talosctl --talosconfig {{.TALOS_DIR}}/talosconfig --nodes {{.NODE}} get machineconfig
      - which minijinja-cli talosctl yq

  upgrade-k8s:
    desc: Upgrade Kubernetes across the whole cluster [CLUSTER=main]
    cmd: talosctl --talosconfig {{.TALOS_DIR}}/talosconfig --nodes {{.RANDOM_CONTROLLER}} upgrade-k8s --to {{.VERSION}}
    vars:
      RANDOM_CONTROLLER:
        sh: talosctl --talosconfig {{.TALOS_DIR}}/talosconfig config info --output yaml | yq --exit-status '.endpoints[0]'
    requires:
      vars: [CLUSTER, VERSION]
    preconditions:
      - talosctl config info
      - talosctl --talosconfig {{.TALOS_DIR}}/talosconfig --nodes {{.RANDOM_CONTROLLER}} get machineconfig
      - which jq talosctl

  reset-node:
    desc: Reset Talos on a single node [CLUSTER=main] [NODE=required]
    prompt: Reset Talos node '{{.NODE}}' ... continue?
    cmd: talosctl --talosconfig {{.TALOS_DIR}}/talosconfig reset --nodes {{.NODE}} --system-labels-to-wipe STATE --system-labels-to-wipe EPHEMERAL --graceful=false --reboot
    requires:
      vars: [CLUSTER, NODE]
    preconditions:
      - talosctl config info
      # - talosctl --talosconfig {{.TALOS_DIR}}/talosconfig --nodes {{.NODE}} get machineconfig
      - which talosctl

  reset-cluster:
    desc: Reset Talos across the whole cluster [CLUSTER=main]
    prompt: Reset the Talos cluster ... continue?
    cmd: talosctl --talosconfig {{.TALOS_DIR}}/talosconfig reset --nodes {{.NODES}} --graceful=false --reboot
    vars:
      NODES:
        sh: talosctl --talosconfig {{.TALOS_DIR}}/talosconfig config info --output json | jq --join-output '[.nodes[]] | join(",")'
    requires:
      vars: [CLUSTER]
    preconditions:
      - talosctl config info
      - talosctl --talosconfig {{.TALOS_DIR}}/talosconfig --nodes {{.NODES}} get machineconfig
      - which jq talosctl

  reboot-node:
    desc: Reboot Talos on a single node [CLUSTER=main] [NODE=required]
    cmds:
      - task: down
      - talosctl --nodes {{.NODE}} reboot --talosconfig {{.TALOS_DIR}}/talosconfig
      - talosctl --nodes {{.NODE}} health --talosconfig {{.TALOS_DIR}}/talosconfig
      - task: up
    requires:
      vars: [CLUSTER, NODE]
    preconditions:
      - talosctl --nodes {{.NODE}} get machineconfig --talosconfig {{.TALOS_DIR}}/talosconfig
      - talosctl config info --talosconfig {{.TALOS_DIR}}/talosconfig
      - which talosctl

  reboot-cluster:
    desc: Reboot Talos across the whole cluster [CLUSTER=main]
    prompt: This will reboot all of the cluster nodes. Are you sure you want to continue?
    requires:
      vars: [CLUSTER]
    vars:
      NODES:
        sh: kubectl get nodes --output=jsonpath='{.items[*].metadata.name}' --context {{.CLUSTER}}
    cmds:
      - for: { var: NODES }
        task: reboot-node
        vars:
          NODE: "{{.ITEM}}"
          CLUSTER: "{{.CLUSTER}}"
      - task: :kubernetes:delete-failed-pods
        vars:
          CLUSTER: "{{.CLUSTER}}"
    preconditions:
      - talosctl config info --talosconfig {{.TALOS_DIR}}/talosconfig
      - test -f {{.TALOS_DIR}}/talosconfig

  shutdown-cluster:
    desc: Shutdown Talos across the whole cluster [CLUSTER=main]
    prompt: Shutdown the Talos cluster '{{.CLUSTER}}' ... continue?
    cmd: talosctl shutdown --nodes {{.NODES}} --force
    vars:
      NODES:
        sh: kubectl get nodes --output=jsonpath='{.items[*].metadata.name}'
    requires:
      vars: [CLUSTER]
    preconditions:
      - talosctl --nodes {{.NODES}} get machineconfig --talosconfig {{.TALOS_DIR}}/talosconfig
      - talosctl config info --talosconfig {{.TALOS_DIR}}/talosconfig
      - test -f {{.TALOS_DIR}}/talosconfig
      - which talosctl

  kubeconfig:
    desc: Generate the kubeconfig for a Talos cluster [CLUSTER=main]
    cmd: talosctl kubeconfig --nodes {{.TALOS_CONTROLLER}} --force --force-context-name {{.CLUSTER}} {{.CLUSTER_DIR}}
    vars:
      TALOS_CONTROLLER:
        sh: talosctl --talosconfig {{.TALOS_DIR}}/talosconfig config info --output json --talosconfig {{.TALOS_DIR}}/talosconfig | jq --raw-output '.endpoints[]' | shuf -n 1
    requires:
      vars: [CLUSTER]
    preconditions:
      - talosctl config info --talosconfig {{.TALOS_DIR}}/talosconfig
      - test -f {{.TALOS_DIR}}/talosconfig
      - which talosctl

  generate-iso:
    desc: Generate a Talos ISO for a specific node [CLUSTER=main] [NODE=required] [VERSION=required]
    cmd: |-
      curl -L -o {{.TALOS_DIR}}/talos-{{.NODE}}-{{.VERSION}}.iso \
        https://factory.talos.dev/image/{{.TALOS_SCHEMATIC}}/{{.VERSION}}/metal-amd64.iso
    vars:
      MACHINE_TYPE:
        sh: |-
          basename "$(find "${TALOS_DIR}" -name "${NODE}.yaml" -exec dirname {} \;)"
      TALOS_SCHEMATIC:
        sh: task --silent talos:generate-schematic NODE={{.NODE}} CLUSTER={{.CLUSTER}} EGPU={{.EGPU_EFFECTIVE}}
      EGPU_OVERRIDE: '{{.EGPU | default ""}}'
      EGPU_EFFECTIVE:
        sh: |-
          if [ -n "{{.EGPU_OVERRIDE}}" ]; then
            echo "{{.EGPU_OVERRIDE}}"
            exit 0
          fi
          node_file="$(find "${TALOS_DIR}" -name "${NODE}.yaml" -print -quit)"
          yq --exit-status '.machine.nodeLabels."topology.kubernetes.io" == "egpu"' "$node_file" >/dev/null 2>&1 \
            && echo true || echo false
    requires:
      vars: [VERSION, CLUSTER, NODE]
    preconditions:
      - test -f {{.TALOS_DIR}}/{{.MACHINE_TYPE}}/{{if eq .EGPU_EFFECTIVE "true"}}eGPU-schematic.yaml{{else}}schematic.yaml{{end}}
      - which curl task yq

  generate-schematic:
    desc: Generate a Talos schematic [CLUSTER=main] [NODE=required] [EGPU=inferred]
    cmd: |-
      curl --silent -X POST --data-binary @{{.SCHEMATIC_FILE}} https://factory.talos.dev/schematics \
        | jq --raw-output '.id'
    vars:
      EGPU_OVERRIDE: '{{.EGPU | default ""}}'
      EGPU_EFFECTIVE:
        sh: |-
          if [ -n "{{.EGPU_OVERRIDE}}" ]; then
            echo "{{.EGPU_OVERRIDE}}"
            exit 0
          fi
          node_file="$(find "${TALOS_DIR}" -name "${NODE}.yaml" -print -quit)"
          yq --exit-status '.machine.nodeLabels."topology.kubernetes.io" == "egpu"' "$node_file" >/dev/null 2>&1 \
            && echo true || echo false
      MACHINE_TYPE:
        sh: basename "$(find "${TALOS_DIR}" -name "${NODE}.yaml" -exec dirname {} \;)"
      SCHEMATIC_FILE: '{{.TALOS_DIR}}/{{.MACHINE_TYPE}}/{{if eq .EGPU_EFFECTIVE "true"}}eGPU-schematic.yaml{{else}}schematic.yaml{{end}}'
    requires:
      vars: [CLUSTER, NODE]
    preconditions:
      - test -f {{.SCHEMATIC_FILE}}
      - which curl jq yq

  down:
    internal: true
    cmds:
      - '{{if eq .CLUSTER "main"}}until kubectl wait cephcluster --for=jsonpath=.status.ceph.health=HEALTH_OK --timeout=10m --all --all-namespaces &>/dev/null; do sleep 5; done{{end}}'
      - until kubectl wait jobs --all --all-namespaces --for=condition=complete --timeout=5m &>/dev/null; do sleep 5; done
    preconditions:
      - which kubectl

  up:
    internal: true
    cmds:
      - '{{if eq .CLUSTER "main"}}until kubectl wait cephcluster --for=jsonpath=.status.ceph.health=HEALTH_OK --timeout=10m --all --all-namespaces &>/dev/null; do sleep 5; done{{end}}'
      - until kubectl wait jobs --all --all-namespaces --for=condition=complete --timeout=5m &>/dev/null; do sleep 5; done
    preconditions:
      - which kubectl

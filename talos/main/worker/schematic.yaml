---
customization:
  extraKernelArgs:
    - amd_iommu=on                        # PCI Passthrough
    - amd_pstate=active                   # AMD P-State driver
    - amdgpu.gttsize=126976               # AMD GPU GTT memory size
    - ttm.pages_limit=32505856            # AMD GPU TTM memory limit
    - init_on_alloc=0                     # Less security, faster puter
    - init_on_free=0                      # Less security, faster puter
    - iommu=pt                            # PCI Passthrough
    - pcie_aspm=off                       # Lower PCIe latency
    - mitigations=off                     # Less security, faster puter
    - security=none                       # Less security, faster puter
    - talos.auditd.disabled=1             # Less security, faster puter

  systemExtensions:
    officialExtensions:
      - siderolabs/amdgpu
      - siderolabs/amd-ucode
      - siderolabs/nfsrahead              # NFS Performance

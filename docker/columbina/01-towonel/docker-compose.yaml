---
name: towonel

services:
  towonel-hub:
    container_name: towonel-hub
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 512M
    environment:
      RUST_LOG: info
      TOWONEL_HUB_ALLOW_PRIVILEGED_PORTS: "true"
      TOWONEL_HUB_ENABLED: "true"
      TOWONEL_HUB_PUBLIC_URL: https://towonel.jory.dev
      TOWONEL_EDGE_ENABLED: "true"
      TOWONEL_EDGE_ADVERTISED_ADDRESSES: towonel.jory.dev:443
      TOWONEL_EDGE_HEALTH_LISTEN_ADDR: 0.0.0.0:9092
      TOWONEL_EDGE_IROH_PORT: "51820"
      TOWONEL_EDGE_LISTEN_ADDR: 0.0.0.0:4443
      TOWONEL_EDGE_PUBLIC_IPS: 148.113.195.107
      TOWONEL_EDGE_PROXY_PROTOCOL: "true"
      TOWONEL_EDGE_REGION: CA
    expose:
      - "4443"
      - "8443"
    healthcheck:
      test:
        - CMD
        - curl
        - -fsS
        - -o
        - /dev/null
        - http://127.0.0.1:8443/v1/health
      interval: 30s
      timeout: 5s
      start_period: 30s
      retries: 3
    # renovate: datasource=docker depName=codeberg.org/towonel/towonel-node
    image: codeberg.org/towonel/towonel-node:1.4.1
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: "3"
    ports:
      - "51820:51820/udp"
      - "25565:25565/tcp"
      - "2456:2456/udp"
      - "2457:2457/udp"
      - "2458:2458/udp"
      - "15637:15637/udp"
      - "27015:27015/udp"
      - "7881:7881/tcp"
      - "7882:7882/udp"
    restart: unless-stopped
    user: "10001:10001"
    volumes:
      - /opt/towonel/data:/data

networks:
  default:
    name: edge
    external: true
